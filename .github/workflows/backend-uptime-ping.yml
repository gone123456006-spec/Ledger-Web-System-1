# External keep-alive: wakes Render free-tier web services that spin down when idle.
# Backend cron job (node-cron) also runs internally every 1 minute as backup.
# Set repo variable LEDGER_API_HEALTH_URL to override the default health URL.
# https://docs.github.com/en/actions/writing-workflows/choosing-when-your-trigger-workflows#schedule
name: Backend uptime ping (1-min)

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  ping-health:
    runs-on: ubuntu-latest
    steps:
      - name: GET /api/v1/health
        env:
          LEDGER_API_HEALTH_URL: ${{ vars.LEDGER_API_HEALTH_URL }}
        run: |
          HEALTH="${LEDGER_API_HEALTH_URL:-https://ledger-api-qmtc.onrender.com/api/v1/health}"
          echo "⏰ $(date -u +'%Y-%m-%d %H:%M:%S UTC') - Pinging ${HEALTH}"
          curl -fsS --max-time 60 "$HEALTH" | head -c 500
          echo ""
          echo "✅ Ping sent"
