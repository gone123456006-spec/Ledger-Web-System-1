# External keep-alive: pings Render every 1 minute so the API does not sleep (Free tier).
# Also: BackEnd/services/uptimeService.js (when server is awake) + frontend uptime-ping.js (when app open).
# Override URL: GitHub repo variable LEDGER_API_HEALTH_URL
name: Backend uptime ping (1-min)

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  ping-health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: GET /api/v1/health (keep Render alive)
        env:
          LEDGER_API_HEALTH_URL: ${{ vars.LEDGER_API_HEALTH_URL }}
        run: |
          HEALTH="${LEDGER_API_HEALTH_URL:-https://ledger-api-qmtc.onrender.com/api/v1/health}"
          echo "Pinging ${HEALTH} at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          for attempt in 1 2 3; do
            if curl -fsS --max-time 90 --retry 2 --retry-delay 5 "$HEALTH"; then
              echo ""
              echo "Ping OK (attempt ${attempt})"
              exit 0
            fi
            echo "Attempt ${attempt} failed, retrying..."
            sleep 5
          done
          echo "All ping attempts failed"
          exit 1
