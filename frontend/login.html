<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Ledger Management System</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

    :root {
      --login-blue: #5aa1f7;
      --login-blue-dark: #5c95ea;
      --login-blue-deep: #4a8ae8;
      --google-blue: #1a73e8;
      --google-gray: #5f6368;
      --text-dark: #202124;
      --border-color: #c7ccd4;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      height: 100vh;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(165deg, #73a9fb 0%, var(--login-blue) 42%, var(--login-blue-deep) 100%);
    }

    .login-page {
      width: 100%;
      max-width: 780px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      display: flex;
      align-items: stretch;
      background: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 14px;
      overflow: hidden;
      box-shadow:
        0 18px 40px rgba(26, 58, 92, 0.18),
        0 4px 12px rgba(26, 58, 92, 0.08);
      animation: cardIn 0.45s ease-out;
    }

    .login-card-visual {
      flex: 0 0 46%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background: linear-gradient(180deg, #eef4ff 0%, #f8fbff 100%);
      border-right: 1px solid #e3eaf5;
      text-align: center;
    }

    .login-illustration {
      width: 100%;
      max-width: 320px;
      height: auto;
      object-fit: contain;
      margin-bottom: 18px;
      display: block;
    }

    .login-card-visual h2 {
      font-size: 18px;
      font-weight: 700;
      color: #1a3a5c;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .login-card-visual p {
      color: var(--google-gray);
      font-size: 12px;
      line-height: 1.45;
      max-width: 240px;
    }

    .login-card-form {
      flex: 1;
      min-width: 0;
      padding: 32px 28px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-form-header {
      margin-bottom: 22px;
    }

    .login-form-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .login-form-header p {
      color: var(--google-gray);
      font-size: 13px;
      line-height: 1.4;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #1a3a5c;
    }

    .form-control {
      width: 100%;
      height: 42px;
      padding: 10px 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
      color: var(--text-dark);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--google-blue);
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.14);
    }

    .error-msg {
      color: #d93025;
      font-size: 12px;
      margin-top: 4px;
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .login-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 18px;
    }

    .btn {
      height: 42px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(#73a9fb, var(--login-blue-dark));
      color: #fff;
      border: 1px solid #4a86d9;
    }

    .btn-primary:hover {
      background: linear-gradient(#689ff5, #4f8de6);
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(74, 138, 232, 0.35);
    }

    .btn-outline {
      background: #fff;
      color: var(--google-gray);
    }

    .btn-outline:hover {
      background: #f4f8ff;
      border-color: #a8c4ef;
      color: #1a3a5c;
    }

    .server-status {
      margin-bottom: 14px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 11px;
      line-height: 1.4;
      border: 1px solid transparent;
    }

    .server-status--checking {
      background: #f4f6f8;
      color: #5f6368;
      border-color: #e3eaf5;
    }

    .server-status--online {
      background: #e8f5e9;
      color: #1b5e20;
      border-color: #c8e6c9;
    }

    .server-status--offline {
      background: #fff8e1;
      color: #7a5d00;
      border-color: #ffe082;
    }

    @media (max-width: 680px) {
      body {
        padding: 14px;
      }

      .login-card {
        flex-direction: column;
        border-radius: 12px;
      }

      .login-card-visual {
        flex: none;
        padding: 24px 20px 20px;
        border-right: none;
        border-bottom: 1px solid #e3eaf5;
      }

      .login-illustration {
        max-width: 240px;
        margin-bottom: 14px;
      }

      .login-card-form {
        padding: 24px 20px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <div class="login-card-visual">
        <img src="assets/Image Login.png" alt="Ledger Illustration" class="login-illustration">
        <h2>Ledger Management</h2>
        <p>Manage orders, bills, and accounts in one place.</p>
      </div>

      <div class="login-card-form">
        <div class="login-form-header">
          <h1>Welcome back</h1>
          <p>Please enter your credentials to access your ledger.</p>
        </div>

        <div class="server-status server-status--checking" id="serverStatus" aria-live="polite">
          Checking server…
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Enter username" autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter password" autocomplete="current-password">
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="login-actions">
          <button class="btn btn-primary" id="loginBtn">
            Sign in <i class="fas fa-arrow-right"></i>
          </button>
          <button class="btn btn-outline" id="resetBtn">
            Reset Fields
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="api-config.js"></script>
  <script src="uptime-ping.js"></script>
  <script src="auth.js"></script>
  <script>
    // If already logged in, go to dashboard
    if (window.ledgerAuth && window.ledgerAuth.isLoggedIn()) {
      window.location.replace("index.html");
    }

    const u = document.getElementById("username");
    const p = document.getElementById("password");
    const err = document.getElementById("errorMsg");

    async function doLogin(){
      err.innerHTML = "";
      if(!window.ledgerAuth || typeof window.ledgerAuth.login !== "function"){
        err.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Auth system not loaded. Refreshing...';
        return;
      }
      const res = await window.ledgerAuth.login(u.value, p.value);
      if(!res.ok){
        err.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + (res.message || "Invalid credentials");
        return;
      }
      window.location.replace("index.html");
    }

    document.getElementById("loginBtn").addEventListener("click", doLogin);
    document.getElementById("resetBtn").addEventListener("click", function(){
      u.value = "";
      p.value = "";
      err.innerHTML = "";
      u.focus();
    });

    [u, p].forEach(el => {
      el.addEventListener("keydown", function(e){
        if(e.key === "Enter") doLogin();
      });
    });

    u.focus();

    (async function updateServerStatus() {
      var el = document.getElementById('serverStatus');
      if (!el || !window.ledgerAuth || typeof window.ledgerAuth.checkServerHealth !== 'function') return;
      var online = await window.ledgerAuth.checkServerHealth();
      el.classList.remove('server-status--checking');
      if (online) {
        el.classList.add('server-status--online');
        el.textContent = 'Server connected — online login available.';
      } else {
        el.classList.add('server-status--offline');
        el.textContent = 'Server offline — you can still sign in offline with your saved password.';
      }
    })();
  </script>
</body>
</html>
