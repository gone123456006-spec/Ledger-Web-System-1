<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Ledger Management System</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

    :root {
      --google-blue: #1a73e8;
      --google-gray: #5f6368;
      --text-dark: #202124;
      --bg-light: #f8fafc;
      --border-color: #dadce0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-light);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    .login-container {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* Left Side - Image */
    .visual-panel {
      flex: 1.2;
      background: #eef2f7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    .visual-panel img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      max-width: 600px;
      animation: fadeIn 1s ease-out;
    }

    .visual-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(26, 115, 232, 0.05) 0%, rgba(26, 115, 232, 0) 100%);
      pointer-events: none;
    }

    /* Right Side - Form */
    .form-panel {
      flex: 1;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      box-shadow: -10px 0 30px rgba(0,0,0,0.03);
      z-index: 10;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
    }

    .login-header {
      margin-bottom: 32px;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .login-header p {
      color: var(--google-gray);
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--google-gray);
    }

    .form-control {
      width: 100%;
      height: 48px;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.2s;
      background: #fff;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--google-blue);
      box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1);
    }

    .error-msg {
      color: #d93025;
      font-size: 13px;
      margin-top: 8px;
      min-height: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .login-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 32px;
    }

    .btn {
      height: 48px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--google-blue);
      color: #fff;
      border: none;
    }

    .btn-primary:hover {
      background: #1765cc;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(26, 115, 232, 0.25);
    }

    .btn-outline {
      background: #fff;
      color: var(--google-gray);
    }

    .btn-outline:hover {
      background: #f8f9fa;
      border-color: #ccd0d5;
    }

    .hint-box {
      margin-top: 40px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 13px;
      color: var(--google-gray);
      border-left: 4px solid var(--google-blue);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsiveness */
    @media (max-width: 900px) {
      .visual-panel { display: none; }
      .form-panel { flex: 1; height: 100vh; }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <!-- Left Side: Visual -->
    <div class="visual-panel">
      <img src="assets/Image Login.png" alt="Ledger Illustration">
    </div>

    <!-- Right Side: Form -->
    <div class="form-panel">
      <div class="login-card">
        <div class="login-header">
          <h1>Welcome back</h1>
          <p>Please enter your credentials to access your ledger.</p>
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Enter username" autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter password" autocomplete="current-password">
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="login-actions">
          <button class="btn btn-primary" id="loginBtn">
            Sign in <i class="fas fa-arrow-right"></i>
          </button>
          <button class="btn btn-outline" id="resetBtn">
            Reset Fields
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    // If already logged in, go to dashboard
    if (window.ledgerAuth && window.ledgerAuth.isLoggedIn()) {
      window.location.replace("index.html");
    }

    const u = document.getElementById("username");
    const p = document.getElementById("password");
    const err = document.getElementById("errorMsg");

    function doLogin(){
      err.innerHTML = "";
      if(!window.ledgerAuth || typeof window.ledgerAuth.login !== "function"){
        err.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Auth system not loaded. Refreshing...';
        return;
      }
      const res = window.ledgerAuth.login(u.value, p.value);
      if(!res.ok){
        err.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + (res.message || "Invalid credentials");
        return;
      }
      window.location.replace("index.html");
    }

    document.getElementById("loginBtn").addEventListener("click", doLogin);
    document.getElementById("resetBtn").addEventListener("click", function(){
      u.value = "";
      p.value = "";
      err.innerHTML = "";
      u.focus();
    });

    [u, p].forEach(el => {
      el.addEventListener("keydown", function(e){
        if(e.key === "Enter") doLogin();
      });
    });

    u.focus();
  </script>
</body>
</html>
