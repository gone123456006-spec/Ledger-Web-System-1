<body>

                    </li>

                    <li class="submenu-item has-submenu">
                        👥 Customers
                        <ul class="submenu right">
                            <li onclick="loadPage('pages/customer.html')">Add Customer</li>
                            <li
                                onclick="localStorage.setItem('showCustomerList', 'true'); loadPage('pages/customer.html')">
                                Customer List</li>
                        </ul>
                    </li>
                    <li onclick="loadPage('pages/jobworker-entry.html')">👷 Job Workers</li>

                    <li
                        onclick="window.ledgerAuth && (window.ledgerAuth.logout(), window.location.replace('login.html'))">
                        🚪 Logout</li>
                    <li class="submenu-esc-item" title="Show the left sidebar (when it was hidden for a page)"
                        onclick="if (window.ledgerEscShowSidebarOnly) ledgerEscShowSidebarOnly();">⌨ Esc — Show sidebar</li>
                </ul>
            </li>

            <li class="menu-item" onclick="showInfo('Transactions module coming soon')">Transactions</li>
            <li class="menu-item" onclick="loadPage('pages/report-bugs.html')">Reports</li>
            <li class="menu-item" onclick="loadPage('pages/clear-local-data.html')">Tools</li>
            <li class="menu-item" onclick="loadPage('pages/settings.html')">⚙️ Settings</li>

        </ul>
    </nav>


    <div class="app-container" id="appContainer">

        <main class="workspace" id="workspace" tabindex="-1"></main>

        <!-- side bar  -->
        <aside class="sidebar">
            <button onclick="loadPage('pages/customer.html')">Add Customer</button>
            <button onclick="openStation()">Add Station</button>
            <button class="section-gap">Add Jobworker</button>
            <div class="sidebar-add-item section-gap" style="margin-bottom:8px; position:relative; display:none;">
                <button type="button" class="add-item-trigger"
                    style="margin-bottom:0; font-weight:bold; height:42px; padding:0 14px;">Add Item</button>
                <div class="sidebar-add-item-submenu"
                    style="display:none; position:fixed; min-width:170px; padding:4px 0; background:#fff; border:1px solid #d1d6de; border-radius:10px; box-shadow:0 6px 16px rgba(0,0,0,.12); z-index:10000;">
                    <button type="button"
                        style="display:block; width:100%; margin:0; padding:8px 14px; border:none; border-radius:6px; background:transparent; font-size:13px; font-weight:bold; text-align:left; cursor:pointer; color:#000 !important;">Add Item</button>
                    <button type="button"
                        style="display:block; width:100%; margin:0; padding:8px 14px; border:none; border-radius:6px; background:transparent; font-size:13px; font-weight:bold; text-align:left; cursor:pointer; color:#000 !important;">Item Sheet</button>
                </div>
            </div>
            <div class="sidebar-agents-order section-gap" style="margin-bottom:8px; position:relative; display:none;">
                <button type="button" class="agents-order-trigger"
                    style="margin-bottom:0; font-weight:bold;">Agents</button>
                <div class="sidebar-agents-submenu"
                    style="display:none; position:fixed; min-width:140px; padding:4px 0; background:#fff; border:1px solid #d1d6de; border-radius:10px; box-shadow:0 6px 16px rgba(0,0,0,.12); z-index:10000;">
                    <button type="button"
                        style="display:block; width:100%; margin:0; padding:8px 14px; border:none; border-radius:6px; background:transparent; font-size:13px; font-weight:bold; text-align:left; cursor:pointer; color:#000 !important;">Balance
                        Sheet</button>
                    <button type="button"
                        style="display:block; width:100%; margin:0; padding:8px 14px; border:none; border-radius:6px; background:transparent; font-size:13px; font-weight:bold; text-align:left; cursor:pointer; color:#000 !important;">Purchase</button>
                </div>
            </div>
            <button>Customer Balance</button>

            <div class="sidebar-direct-bill">
                <button type="button" class="direct-bill-trigger">DIRECT BILL</button>
                <div class="sidebar-direct-bill-submenu">
                    <button type="button">GOLD INVOICE</button>
                    <button type="button">SILVER INVOICE</button>
                    <button type="button">RAW GOLD INVOICE</button>
                    <button type="button">RAW SILVER INVOICE</button>
                </div>
            </div>

            <button class="section-gap">All Bill</button>

            <div class="sidebar-gold-order section-gap">
                <button type="button" class="gold-order-trigger">GOLD ORDER BOOK</button>
                <div class="sidebar-gold-submenu">
                    <button type="button">New Order</button>
                    <button type="button">Orders</button>
                    <button type="button">Pending Orders</button>
                    <button type="button">Pending Items</button>
                    <button type="button" onclick="loadPage('pages/item-process.html')">Item Process</button>
                    <button type="button" onclick="loadPage('pages/ready-items.html')">Ready Items</button>
                    <button type="button">Ready Orders</button>
                </div>
            </div>

            <div class="sidebar-jobworker-book section-gap">
                <button type="button" class="jobworker-book-trigger">JOB WORKER BOOK</button>
                <div class="sidebar-jobworker-submenu">
                    <button type="button">Jobworker Entry</button>
                    <button type="button">Job Worker List</button>
                    <button type="button">Jobworker Balance</button>
                </div>
            </div>

            <button class="section-gap" style="display:none;">New Loan</button>
            <button style="display:none;">Pending Loans</button>

            <button class="section-gap" style="display:none;">Day Book</button>
            <button class="logout">Logout</button>
        </aside>

    </div>

    <script>
        /* =========================
           OPEN STATION FORM
        ========================= */
        function openStation() {
            try {
                if (window.ledgerSetSidebarHidden) window.ledgerSetSidebarHidden(true);
                if (window.ledgerSetMenuBarHidden) window.ledgerSetMenuBarHidden(true);
            } catch (e) { }
            document.getElementById("workspace").innerHTML = `
    <div class="station-window">
        <div class="station-titlebar">Station</div>

        <div class="station-body">
            <div class="station-group">
                <label>Station <span>*</span></label>
                <input id="stationName" name="stationName">
            </div>

            <div class="station-group">
                <label>Country <span>*</span></label>
                <input value="India" disabled>
            </div>

            <div class="station-group">
                <label>State <span>*</span></label>
                <select id="stationState" name="stationState">
                    <option value="">-- Select State --</option>

<option>Andhra Pradesh</option>
<option>Arunachal Pradesh</option>
<option>Assam</option>
<option>Bihar</option>
<option>Chhattisgarh</option>
<option>Goa</option>
<option>Gujarat</option>
<option>Haryana</option>
<option>Himachal Pradesh</option>
<option>Jharkhand</option>
<option>Karnataka</option>
<option>Kerala</option>
<option>Madhya Pradesh</option>
<option>Maharashtra</option>
<option>Manipur</option>
<option>Meghalaya</option>
<option>Mizoram</option>
<option>Nagaland</option>
<option>Odisha</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Sikkim</option>
<option>Tamil Nadu</option>
<option>Telangana</option>
<option>Tripura</option>
<option>Uttar Pradesh</option>
<option>Uttarakhand</option>
<option>West Bengal</option>

<option disabled>──────────</option>

<option>Andaman and Nicobar Islands</option>
<option>Chandigarh</option>
<option>Dadra and Nagar Haveli and Daman and Diu</option>
<option>Delhi</option>
<option>Jammu and Kashmir</option>
<option>Ladakh</option>
<option>Lakshadweep</option>
<option>Puducherry</option>
                </select>
            </div>

            <div class="station-group">
                <label>City</label>
                <input id="stationCity" name="stationCity">
            </div>

            <div class="station-group">
                <label>Pin code</label>
                <input id="stationPin" maxlength="6" name="stationPin">
            </div>
        </div>

        <div class="station-footer">
            <button class="btn" onclick="saveStation(true)">Save And Close</button>
            <button class="btn" onclick="saveStation(false)">Save And New</button>
            <button class="btn" onclick="resetStation()">Reset</button>
            <button class="btn" onclick="closeStation()">Close</button>
        </div>
    </div>`;

            // [PERSISTENCE] Set context and restore
            if (window.FormPersistence) {
                const p = window.FormPersistence.getInstance();
                p.setContext('station');
                setTimeout(() => p.restore(), 50);
            }
        }

        /* =========================
           SAVE STATION
        ========================= */
        function saveStation(closeAfterSave) {
            const nameEl = document.getElementById("stationName");
            const stateEl = document.getElementById("stationState");
            const cityEl = document.getElementById("stationCity");
            const pinEl = document.getElementById("stationPin");

            if (!nameEl || !stateEl || !cityEl || !pinEl) {
                alert("Form elements not found. Please refresh the page.");
                return;
            }

            const name = nameEl.value.trim();
            const state = stateEl.value;
            const city = cityEl.value.trim();
            const pin = pinEl.value.trim();

            // Validation
            if (name === "") {
                alert("Station name is required");
                return;
            }
            if (state === "") {
                alert("Please select state");
                return;
            }
            if (pin !== "" && !/^[0-9]{6}$/.test(pin)) {
                alert("Pin code must be 6 digits");
                return;
            }

            // Load existing data
            let stations = JSON.parse(localStorage.getItem("stations")) || [];

            // Duplicate check
            if (stations.some(s => s.name.toLowerCase() === name.toLowerCase())) {
                alert("Station already exists");
                return;
            }

            // Save
            stations.push({
                name: name,
                country: "India",
                state: state,
                city: city,
                pin: pin
            });

            localStorage.setItem("stations", JSON.stringify(stations));

            alert("Station saved successfully");

            // [PERSISTENCE] Clear saved form data on success
            if (window.FormPersistence) window.FormPersistence.getInstance().clear('station');

            if (closeAfterSave) {
                closeStation();
            } else {
                resetStation();
            }
        }

        /* =========================
           RESET FORM
        ========================= */
        function resetStation() {
            const nameEl = document.getElementById("stationName");
            const stateEl = document.getElementById("stationState");
            const cityEl = document.getElementById("stationCity");
            const pinEl = document.getElementById("stationPin");

            if (nameEl) nameEl.value = "";
            if (stateEl) stateEl.value = "";
            if (cityEl) cityEl.value = "";
            if (pinEl) pinEl.value = "";

            // [PERSISTENCE] Explicit clear
            if (window.FormPersistence) window.FormPersistence.getInstance().clear('station');
        }


        /* =========================
           CLOSE FORM
        ========================= */
        function closeStation() {
            document.getElementById("workspace").innerHTML = "";
        }

        /* =========================
           EXIT APP (Handled by script.js)
        ========================= */
        // exitApp function is defined in script.js

        /* =========================
           LIST STATIONS
        ========================= */
        function listStations() {
            try {
                if (window.ledgerSetSidebarHidden) window.ledgerSetSidebarHidden(true);
                if (window.ledgerSetMenuBarHidden) window.ledgerSetMenuBarHidden(true);
            } catch (e) { }
            const stations = JSON.parse(localStorage.getItem("stations") || "[]");
            let html = `
            <div class="station-list-wrap">
                <div class="ledger-page-titlebar">Station List</div>
                <div class="station-list-toolbar">
                    <button type="button" class="station-list-btn-primary" onclick="openStation()">Add New Station</button>
                    <input type="text" id="stationSearch" placeholder="Search station…" onkeyup="filterStationsTable()" autocomplete="off" aria-label="Search stations">
                </div>
                <div class="station-list-table-wrap">
                    <table id="stationsTable" class="station-excel-table">
                        <thead>
                            <tr>
                                <th>Station</th>
                                <th>State</th>
                                <th>City</th>
                                <th>Pin</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>`;

            if (stations.length === 0) {
                html += `<tr><td colspan="5" class="station-list-empty">No stations found. Click &quot;Add New Station&quot; to start.</td></tr>`;
            } else {
                stations.forEach(s => {
                    const safeName = String(s.name || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
                    html += `
                    <tr>
                        <td>${s.name}</td>
                        <td>${s.state || "—"}</td>
                        <td>${s.city || "—"}</td>
                        <td>${s.pin || "—"}</td>
                        <td>
                            <button type="button" class="station-list-btn-danger" onclick="deleteStation('${safeName}')">Delete</button>
                        </td>
                    </tr>`;
                });
            }

            html += `   </tbody>
                    </table>
                </div>
                <div class="station-list-footer">
                   <button type="button" class="station-list-btn" onclick="closeStation()">Close</button>
                </div>
            </div>`;

            const workspace = document.getElementById("workspace");
            workspace.innerHTML = html;
            workspace.setAttribute("data-page", "station-list");
        }

        /* =========================
           FILTER STATIONS TABLE
        ========================= */
        function filterStationsTable() {
            const input = document.getElementById("stationSearch");
            const filter = input.value.toUpperCase();
            const table = document.getElementById("stationsTable");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let found = false;
                const tds = tr[i].getElementsByTagName("td");
                for (let j = 0; j < tds.length - 1; j++) {
                    if (tds[j]) {
                        const txtValue = tds[j].textContent || tds[j].innerText;
                        if (txtValue.toUpperCase().indexOf(filter) > -1) {
                            found = true;
                            break;
                        }
                    }
                }
                tr[i].style.display = found ? "" : "none";
            }
        }

        /* =========================
           DELETE STATION
        ========================= */
        function deleteStation(name) {
            if (!confirm("Delete station: " + name + "?")) return;

            let stations = JSON.parse(localStorage.getItem("stations") || "[]");
            stations = stations.filter(s => s.name !== name);
            localStorage.setItem("stations", JSON.stringify(stations));

            listStations(); // Refresh list
        }


    </script>
    <script src="js/form-persistence.js"></script>
    <script src="script.js"></script>

</body>

</html>
