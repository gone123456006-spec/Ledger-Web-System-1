    <script>
        /* =========================
           OPEN STATION FORM
        ========================= */
        function openStation() {
            document.getElementById("workspace").innerHTML = `
    <div class="station-window">
        <div class="station-titlebar">Station</div>

        <div class="station-body">
            <div class="station-group">
                <label>Station <span>*</span></label>
                <input id="stationName" name="stationName">
            </div>

            <div class="station-group">
                <label>Country <span>*</span></label>
                <input value="India" disabled>
            </div>

            <div class="station-group">
                <label>State <span>*</span></label>
                <select id="stationState" name="stationState">
                    <option value="">-- Select State --</option>

<option>Andhra Pradesh</option>
<option>Arunachal Pradesh</option>
<option>Assam</option>
<option>Bihar</option>
<option>Chhattisgarh</option>
<option>Goa</option>
<option>Gujarat</option>
<option>Haryana</option>
<option>Himachal Pradesh</option>
<option>Jharkhand</option>
<option>Karnataka</option>
<option>Kerala</option>
<option>Madhya Pradesh</option>
<option>Maharashtra</option>
<option>Manipur</option>
<option>Meghalaya</option>
<option>Mizoram</option>
<option>Nagaland</option>
<option>Odisha</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Sikkim</option>
<option>Tamil Nadu</option>
<option>Telangana</option>
<option>Tripura</option>
<option>Uttar Pradesh</option>
<option>Uttarakhand</option>
<option>West Bengal</option>

<option disabled>──────────</option>

<option>Andaman and Nicobar Islands</option>
<option>Chandigarh</option>
<option>Dadra and Nagar Haveli and Daman and Diu</option>
<option>Delhi</option>
<option>Jammu and Kashmir</option>
<option>Ladakh</option>
<option>Lakshadweep</option>
<option>Puducherry</option>
                </select>
            </div>

            <div class="station-group">
                <label>City</label>
                <input id="stationCity" name="stationCity">
            </div>

            <div class="station-group">
                <label>Pin code</label>
                <input id="stationPin" maxlength="6" name="stationPin">
            </div>
        </div>

        <div class="station-footer">
            <button class="btn" onclick="saveStation(true)">Save And Close</button>
            <button class="btn" onclick="saveStation(false)">Save And New</button>
            <button class="btn" onclick="resetStation()">Reset</button>
            <button class="btn" onclick="closeStation()">Close</button>
        </div>
    </div>`;

            // [PERSISTENCE] Set context and restore
            if (window.FormPersistence) {
                const p = window.FormPersistence.getInstance();
                p.setContext('station');
                setTimeout(() => p.restore(), 50);
            }
        }

        /* =========================
           SAVE STATION
        ========================= */
        function saveStation(closeAfterSave) {
            const nameEl = document.getElementById("stationName");
            const stateEl = document.getElementById("stationState");
            const cityEl = document.getElementById("stationCity");
            const pinEl = document.getElementById("stationPin");

            if (!nameEl || !stateEl || !cityEl || !pinEl) {
                alert("Form elements not found. Please refresh the page.");
                return;
            }

            const name = nameEl.value.trim();
            const state = stateEl.value;
            const city = cityEl.value.trim();
            const pin = pinEl.value.trim();

            // Validation
            if (name === "") {
                alert("Station name is required");
                return;
            }
            if (state === "") {
                alert("Please select state");
                return;
            }
            if (pin !== "" && !/^[0-9]{6}$/.test(pin)) {
                alert("Pin code must be 6 digits");
                return;
            }

            // Load existing data
            let stations = JSON.parse(localStorage.getItem("stations")) || [];

            // Duplicate check
            if (stations.some(s => s.name.toLowerCase() === name.toLowerCase())) {
                alert("Station already exists");
                return;
            }

            // Save
            stations.push({
                name: name,
                country: "India",
                state: state,
                city: city,
                pin: pin
            });

            localStorage.setItem("stations", JSON.stringify(stations));

            alert("Station saved successfully");

            // [PERSISTENCE] Clear saved form data on success
            if (window.FormPersistence) window.FormPersistence.getInstance().clear('station');

            if (closeAfterSave) {
                closeStation();
            } else {
                resetStation();
            }
        }

        /* =========================
           RESET FORM
        ========================= */
        function resetStation() {
            const nameEl = document.getElementById("stationName");
            const stateEl = document.getElementById("stationState");
            const cityEl = document.getElementById("stationCity");
            const pinEl = document.getElementById("stationPin");

            if (nameEl) nameEl.value = "";
            if (stateEl) stateEl.value = "";
            if (cityEl) cityEl.value = "";
            if (pinEl) pinEl.value = "";

            // [PERSISTENCE] Explicit clear
            if (window.FormPersistence) window.FormPersistence.getInstance().clear('station');
        }


        /* =========================
           CLOSE FORM
        ========================= */
        function closeStation() {
            document.getElementById("workspace").innerHTML = "";
        }

        /* =========================
           EXIT APP (Handled by script.js)
        ========================= */
        // exitApp function is defined in script.js

        /* =========================
           LIST STATIONS
        ========================= */
        function listStations() {
            const stations = JSON.parse(localStorage.getItem("stations") || "[]");
            let html = `
            <div style="padding: 20px; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 10px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #f1f3f4; padding-bottom: 15px;">
                    <h2 style="margin: 0; font-size: 20px; color: #1a73e8;">Station List</h2>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="stationSearch" placeholder="Search station..." onkeyup="filterStationsTable()" style="padding: 8px 12px; border: 1px solid #dadce0; border-radius: 8px; font-size: 14px; width: 250px;">
                        <button class="btn" onclick="openStation()" style="background: #1a73e8; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 500;">Add New Station</button>
                    </div>
                </div>
                <div style="overflow-x: auto; border: 1px solid #f1f3f4; border-radius: 8px;">
                    <table style="width: 100%; border-collapse: collapse; background: #fff;" id="stationsTable">
                        <thead>
                            <tr style="background: #f8f9fa;">
                                <th style="padding: 12px 15px; text-align: left; font-size: 13px; color: #5f6368; text-transform: uppercase; border: 1px solid #eee;">Station</th>
                                <th style="padding: 12px 15px; text-align: left; font-size: 13px; color: #5f6368; text-transform: uppercase; border: 1px solid #eee;">State</th>
                                <th style="padding: 12px 15px; text-align: left; font-size: 13px; color: #5f6368; text-transform: uppercase; border: 1px solid #eee;">City</th>
                                <th style="padding: 12px 15px; text-align: left; font-size: 13px; color: #5f6368; text-transform: uppercase; border: 1px solid #eee;">Pin</th>
                                <th style="padding: 12px 15px; text-align: right; font-size: 13px; color: #5f6368; text-transform: uppercase; border: 1px solid #eee;">Action</th>
                            </tr>
                        </thead>
                        <tbody>`;

            if (stations.length === 0) {
                html += `<tr><td colspan="5" style="padding: 40px; text-align: center; color: #9aa0a6; font-style: italic; border: 1px solid #eee;">No stations found. Click "Add New Station" to start.</td></tr>`;
            } else {
                stations.forEach(s => {
                    html += `
                    <tr style="transition: background 0.2s;" onmouseover="this.style.background='#f8faff'" onmouseout="this.style.background='white'">
                        <td style="padding: 12px 15px; font-size: 14px; color: #3c4043; font-weight: 500; border: 1px solid #eee;">${s.name}</td>
                        <td style="padding: 12px 15px; font-size: 14px; color: #5f6368; border: 1px solid #eee;">${s.state}</td>
                        <td style="padding: 12px 15px; font-size: 14px; color: #5f6368; border: 1px solid #eee;">${s.city || '-'}</td>
                        <td style="padding: 12px 15px; font-size: 14px; color: #5f6368; border: 1px solid #eee;">${s.pin || '-'}</td>
                        <td style="padding: 12px 15px; text-align: right; border: 1px solid #eee;">
                            <button onclick="deleteStation('${s.name}')" style="padding: 6px 12px; font-size: 12px; background: #feebeb; color: #d93025; border: 1px solid #fad2cf; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s;" onmouseover="this.style.background='#fbc9c9'" onmouseout="this.style.background='#feebeb'">Delete</button>
                        </td>
                    </tr>`;
                });
            }

            html += `   </tbody>
                    </table>
                </div>
                <div style="margin-top: 15px; text-align: right;">
                   <button class="btn" onclick="closeStation()" style="background: #f1f3f4; color: #3c4043; border: 1px solid #dadce0; padding: 8px 20px; border-radius: 8px; cursor: pointer;">Close</button>
                </div>
            </div>`;

            document.getElementById("workspace").innerHTML = html;
        }

        /* =========================
           FILTER STATIONS TABLE
        ========================= */
        function filterStationsTable() {
            const input = document.getElementById("stationSearch");
            const filter = input.value.toUpperCase();
            const table = document.getElementById("stationsTable");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let found = false;
                const tds = tr[i].getElementsByTagName("td");
                for (let j = 0; j < tds.length - 1; j++) {
                    if (tds[j]) {
                        const txtValue = tds[j].textContent || tds[j].innerText;
                        if (txtValue.toUpperCase().indexOf(filter) > -1) {
                            found = true;
                            break;
                        }
                    }
                }
                tr[i].style.display = found ? "" : "none";
            }
        }

        /* =========================
           DELETE STATION
        ========================= */
        function deleteStation(name) {
            if (!confirm("Delete station: " + name + "?")) return;

            let stations = JSON.parse(localStorage.getItem("stations") || "[]");
            stations = stations.filter(s => s.name !== name);
            localStorage.setItem("stations", JSON.stringify(stations));

            listStations(); // Refresh list
        }


    </script>
    <script>
        (function () {
            function toggleLedgerSidebar() {
                var app = document.getElementById("appContainer");
                if (!app) return;
                app.classList.toggle("sidebar-hidden");
            }
            document.addEventListener("keydown", function (e) {
                if (e.ctrlKey && !e.altKey && !e.shiftKey && (e.key === "m" || e.key === "M")) {
                    e.preventDefault();
                    toggleLedgerSidebar();
                }
            });
        })();
    </script>
    <script src="js/form-persistence.js"></script>
    <script src="script.js"></script>

</body>
