<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ready Orders</title>

<style>
/* =========================
   BASE
========================= */
*{
  box-sizing:border-box;
  font-family:Segoe UI, Arial, sans-serif;
  font-size:14px;
}

body{
  margin:0;
  background:#e6ebf2;
}

.workspace{
  background:linear-gradient(to bottom,#cde1ff,#e6f1ff) !important;
}

/* =========================
   CONTAINER
========================= */
.ready-orders-wrap{
  margin:15px;
  background:#fff !important;
  border:1px solid #d1d6de;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  height:calc(100vh - 30px);
  max-height:calc(100vh - 30px);
  overflow:hidden;
  box-sizing:border-box;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.workspace .ready-orders-wrap{
  margin:0 !important;
  height:100% !important;
  max-height:100% !important;
  border-radius:0 !important;
  box-shadow:none !important;
  background:#fff !important;
  border:none !important;
}

/* =========================
   TOOLBAR
========================= */
.ready-toolbar{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:14px;
  padding:18px 20px;
  border-bottom:2px solid #d1d6de;
  background:linear-gradient(to bottom, #fafbfc, #f5f7fa) !important;
  flex-shrink:0;
  box-sizing:border-box;
}

.workspace .ready-orders-wrap .ready-toolbar{
  background:linear-gradient(to bottom, #fafbfc, #f5f7fa) !important;
}

.ready-toolbar h2{
  margin:0;
  font-size:20px;
  font-weight:600;
  color:#1d1d1f !important;
  flex:1;
}

.btn{
  padding:10px 18px;
  border:1px solid #d1d6de;
  background:#fff;
  cursor:pointer;
  border-radius:8px;
  font-size:14px;
  font-weight:500;
  transition:all 0.2s;
  color:#1d1d1f !important;
  box-shadow:0 1px 2px rgba(0,0,0,0.05);
}

.btn:hover{ 
  background:#007aff;
  border-color:#007aff;
  color:#fff !important;
  transform:translateY(-1px);
  box-shadow:0 2px 4px rgba(0,122,255,0.2);
}

.btn:active{
  transform:translateY(0);
  box-shadow:0 1px 2px rgba(0,0,0,0.1);
}

input{
  height:40px;
  padding:8px 14px;
  border:1px solid #d1d6de;
  border-radius:8px;
  font-size:14px;
  background:#fff;
  transition:all 0.2s;
  min-width:200px;
}

input:focus{
  outline:none;
  border-color:#007aff;
  box-shadow:0 0 0 3px rgba(0,122,255,.12);
}

input::placeholder{
  color:#8e8e93;
}

/* =========================
   TABLE
========================= */
.table-wrap{
  flex:1;
  overflow:auto;
  position:relative;
  min-height:0;
  box-sizing:border-box;
  background:#fff !important;
}

.workspace .ready-orders-wrap .table-wrap{
  background:#fff !important;
}

table{
  width:100%;
  min-width:1000px;
  border-collapse:collapse;
  background:#fff !important;
}

.workspace .ready-orders-wrap table{
  background:#fff !important;
}

thead{
  position:sticky;
  top:0;
  z-index:10;
  background:#fff !important;
  box-shadow:0 1px 0 0 #c5c9ce;
}

.workspace .ready-orders-wrap thead{
  background:#fff !important;
}

thead th{
  background:linear-gradient(to bottom, #eef1f5, #e4e8ed) !important;
  border:1px solid #c5c9ce;
  padding:18px;
  white-space:nowrap;
  font-weight:600;
  font-size:13px;
  text-align:left;
  color:#1d1d1f !important;
  text-transform:uppercase;
  letter-spacing:0.04em;
}

.workspace .ready-orders-wrap thead th{
  background:linear-gradient(to bottom, #eef1f5, #e4e8ed) !important;
  color:#1d1d1f !important;
}

thead th.center{ text-align:center; }
thead th.right{ text-align:right; }

tbody td{
  padding:18px;
  border:1px solid #d1d6de;
  font-size:14px;
  vertical-align:middle;
  color:#333 !important;
  background:transparent !important;
  line-height:1.35;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:200px;
}

.workspace .ready-orders-wrap tbody td{
  color:#333 !important;
  background:transparent !important;
}

tbody td:nth-child(5){
  max-width:250px;
  white-space:normal;
  word-break:break-word;
}

tbody tr{
  transition:background 0.2s;
  background:#fff !important;
  cursor:pointer;
}

tbody tr:nth-child(even){
  background:#f8f9fb !important;
}

.workspace .ready-orders-wrap tbody tr:nth-child(even){
  background:#f8f9fb !important;
}

tbody tr:hover{ 
  background:#e8f2ff !important;
}

tbody tr:hover td{
  border-color:#b8d4f0;
}

tbody tr td:first-child{
  padding-left:16px;
}

tbody tr td:last-child{
  padding-right:16px;
}

.center{ 
  text-align:center;
}

.right{ 
  text-align:right;
  font-weight:500;
  color:#1d1d1f !important;
  font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
  font-variant-numeric:tabular-nums;
}

.badge{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  display:inline-block;
}

.ready{
  background:#d1f2eb;
  color:#0f5132;
  border:1px solid #a3cfbb;
}

.action-btn{
  padding:6px 14px;
  border-radius:8px;
  border:none;
  background:#007aff;
  color:#fff;
  font-size:12px;
  cursor:pointer;
  transition:all 0.2s;
  font-weight:500;
}

.action-btn:hover{
  background:#0056b3;
  transform:translateY(-1px);
  box-shadow:0 2px 4px rgba(0,122,255,0.3);
}

.action-btn:active{
  transform:translateY(0);
}

/* Empty state */
.empty-state{
  text-align:center;
  padding:60px 20px;
  color:#6c757d;
}

.empty-state-icon{
  font-size:48px;
  margin-bottom:16px;
  opacity:0.5;
}

.empty-state-text{
  font-size:16px;
  font-weight:500;
  margin-bottom:8px;
}

.empty-state-subtext{
  font-size:13px;
  color:#8e8e93;
}

/* =========================
   FOOTER (Customer Balance style)
========================= */
.footer{
  padding:14px 20px;
  font-size:14px;
  color:#6e6e73 !important;
  border-top:2px solid #d1d6de;
  background:#f5f7fa !important;
  flex-shrink:0;
  box-sizing:border-box;
  font-weight:500;
}

.workspace .ready-orders-wrap .footer{
  background:#f5f7fa !important;
  color:#6e6e73 !important;
}

/* =========================
   SCROLLBAR (Customer Balance style)
========================= */
.table-wrap::-webkit-scrollbar{ width:12px; height:12px; }
.table-wrap::-webkit-scrollbar-track{ background:#f0f2f5; border-radius:6px; }
.table-wrap::-webkit-scrollbar-thumb{ background:#b0b4b8; border-radius:6px; }
.table-wrap::-webkit-scrollbar-thumb:hover{ background:#a1a1a6; }

/* =========================
   RESPONSIVE
========================= */
@media (max-width: 768px) {
  .ready-orders-wrap{
    margin:8px;
    height:calc(100vh - 16px);
    max-height:calc(100vh - 16px);
  }
  
  .workspace .ready-orders-wrap{
    margin:0;
    height:100%;
    max-height:100%;
  }
  
  .ready-toolbar{
    padding:12px;
    gap:8px;
  }
  
  .ready-toolbar h2{
    font-size:16px;
  }
  
  .table-wrap{
    overflow-x:scroll;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  
  table{
    min-width:900px;
  }
  
  tbody td{
    max-width:150px;
    font-size:12px;
    padding:10px;
  }
  
  thead th{
    font-size:11px;
    padding:12px 10px;
  }
  
  input{
    min-width:150px;
  }
}
</style>
</head>

<body>

<div class="ready-orders-wrap">
  <!-- TOOLBAR -->
  <div class="ready-toolbar">
    <h2>📦 Ready Orders</h2>
    <input type="text" id="searchBox" placeholder="🔍 Search ready orders..." onkeyup="searchOrders()">
    <button class="btn" onclick="loadReadyOrders()">🔄 Refresh</button>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Status</th>
          <th>Order Date</th>
          <th>Bill No</th>
          <th>Customer</th>
          <th>Items</th>
          <th class="right">Total Qty</th>
          <th class="right">Weight (g)</th>
          <th class="right">Amount (₹)</th>
          <th class="center">Action</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="footer" id="footerText">
    Loading ready orders...
  </div>
</div>

<script>
/* =========================
   GLOBAL STATE
========================= */
let tbody = null;
let footer = null;
let searchBox = null;

/* =========================
   INITIALIZE ELEMENTS
========================= */
function initElements(){
  console.log("🔧 Initializing elements...");
  
  const workspace = document.querySelector(".workspace");
  
  if(workspace){
    tbody = workspace.querySelector("#tableBody");
    footer = workspace.querySelector("#footerText");
    searchBox = workspace.querySelector("#searchBox");
    
    if(!tbody) tbody = document.getElementById("tableBody");
    if(!footer) footer = document.getElementById("footerText");
    if(!searchBox) searchBox = document.getElementById("searchBox");
  } else {
    tbody = document.getElementById("tableBody");
    footer = document.getElementById("footerText");
    searchBox = document.getElementById("searchBox");
  }
  
  if(!tbody || !footer){
    console.warn("⚠️ Elements not found yet");
    return false;
  }
  
  console.log("✅ Elements initialized");
  return true;
}

/* =========================
   LOAD READY ORDERS
========================= */
function loadReadyOrders(){
  console.log("📋 Loading ready orders...");
  
  // Always re-init elements so we have valid refs when returning to this page (workspace SPA)
  if(!initElements()){
    console.warn("⚠️ Table elements not ready, retrying...");
    setTimeout(loadReadyOrders, 100);
    return;
  }
  // When in workspace, only update the list if we're actually on the Ready Orders page
  const workspace = document.querySelector(".workspace");
  if(workspace){
    const page = (workspace.getAttribute("data-page") || "").trim();
    if(page && page !== "ready-orders"){
      return;
    }
    // Ensure tbody is still in the document (not detached after navigating away)
    if(tbody && !document.contains(tbody)){
      tbody = null;
      footer = null;
      searchBox = null;
      if(!initElements()){
        setTimeout(loadReadyOrders, 100);
        return;
      }
    }
  }
  
  try{
    const orders = JSON.parse(localStorage.getItem("orders") || "[]");
    console.log("📊 Total orders:", orders.length);
    
    tbody.innerHTML = "";

    // Filter orders with READY status
    const readyOrders = orders.filter(o => o && o.status === "READY");
    console.log("✅ Ready orders:", readyOrders.length);

    if(readyOrders.length === 0){
      showEmptyState();
      updateFooter(0);
      return;
    }

    // Sort by date (newest first)
    const sortedReadyOrders = [...readyOrders].sort((a, b) => {
      const dateA = new Date(a.orderDate || a.timestamp || 0);
      const dateB = new Date(b.orderDate || b.timestamp || 0);
      return dateB - dateA;
    });

    sortedReadyOrders.forEach((order, index) => {
      try {
        renderOrderRow(order, index);
      } catch(e) {
        console.error("❌ Error rendering order row:", e, order);
      }
    });
    
    updateFooter(sortedReadyOrders.length);
    console.log("✅ Ready orders loaded successfully");
    
  } catch(e){
    console.error("❌ Error loading ready orders:", e);
    showErrorState(e.message);
  }
}

/* =========================
   RENDER ORDER ROW
========================= */
function renderOrderRow(order, index){
  if(!order || !order.id){
    console.warn("⚠️ Invalid order data:", order);
    return;
  }
  
  // Calculate totals from items
  let totalPc = order.pc || 0;
  let totalGrWt = parseFloat(order.grWt || 0);
  let itemNames = [];
  
  if(order.items && Array.isArray(order.items) && order.items.length > 0){
    order.items.forEach(item => {
      if(!item || !item.values) return;
      
      // Get item name - support multiple structures
      const itemName = item.values[1] || item.values[2] || "";
      if(itemName && itemName.trim()) itemNames.push(itemName.trim());
      
      // Calculate totals if not already stored
      if(!order.pc){
        const pc = parseFloat(item.values[4] || item.values[7] || 0);
        totalPc += pc;
      }
      if(!order.grWt){
        const grWt = parseFloat(item.values[5] || item.values[8] || 0);
        totalGrWt += grWt;
      }
    });
  }
  
  // Format item names
  const itemNamesStr = itemNames.length > 0 ? itemNames.join(", ") : "—";
  const displayItemNames = itemNames.length > 3 
    ? itemNames.slice(0, 3).join(", ") + ` <strong>(+${itemNames.length - 3} more)</strong>`
    : itemNamesStr;
  
  // Get customer name
  const customerName = order.customer || order.customerName || "—";
  
  // Create row
  const tr = document.createElement("tr");
  tr.dataset.orderId = order.id;
  tr.dataset.orderNo = order.orderNo || order.billNo || "";
  tr.dataset.customer = customerName;
  tr.dataset.items = itemNamesStr;
  
  tr.innerHTML = `
    <td><span class="badge ready">✓ READY</span></td>
    <td>${formatDate(order.orderDate || order.date)}</td>
    <td><strong>${order.orderNo || order.billNo || "—"}</strong></td>
    <td>${customerName}</td>
    <td title="${itemNamesStr}" style="max-width:250px;overflow:hidden;text-overflow:ellipsis;">${displayItemNames}</td>
    <td class="right">${totalPc.toFixed(0)}</td>
    <td class="right">${totalGrWt.toFixed(3)}</td>
    <td class="right"><strong>₹${parseFloat(order.netAmount || 0).toFixed(2)}</strong></td>
    <td class="center">
      <button class="action-btn" onclick="editOrder(${order.id}); event.stopPropagation();">✏️ Edit</button>
    </td>
  `;
  
  // Make row clickable
  tr.onclick = function(e){
    if(e.target && e.target.tagName === 'BUTTON') return;
    editOrder(order.id);
  };
  
  tbody.appendChild(tr);
}

/* =========================
   FORMAT DATE
========================= */
function formatDate(dateStr){
  if(!dateStr) return "—";
  
  try{
    const date = new Date(dateStr);
    if(isNaN(date.getTime())) return dateStr;
    
    const options = { year: 'numeric', month: 'short', day: 'numeric' };
    return date.toLocaleDateString('en-IN', options);
  } catch(e){
    return dateStr;
  }
}

/* =========================
   SHOW EMPTY STATE
========================= */
function showEmptyState(){
  tbody.innerHTML = `
    <tr>
      <td colspan="9" style="border:none;">
        <div class="empty-state">
          <div class="empty-state-icon">📦</div>
          <div class="empty-state-text">No Ready Orders</div>
          <div class="empty-state-subtext">Orders marked as "READY" will appear here</div>
        </div>
      </td>
    </tr>
  `;
}

/* =========================
   SHOW ERROR STATE
========================= */
function showErrorState(errorMsg){
  tbody.innerHTML = `
    <tr>
      <td colspan="9" style="border:none;">
        <div class="empty-state">
          <div class="empty-state-icon">⚠️</div>
          <div class="empty-state-text">Error Loading Orders</div>
          <div class="empty-state-subtext">${errorMsg || 'Please try refreshing'}</div>
        </div>
      </td>
    </tr>
  `;
}

/* =========================
   SEARCH ORDERS
========================= */
function searchOrders(){
  if(!tbody || !searchBox) return;
  
  const searchValue = searchBox.value.toLowerCase().trim();
  const rows = tbody.querySelectorAll("tr");
  
  let visibleCount = 0;
  
  rows.forEach(row => {
    // Skip empty state rows
    if(row.querySelector(".empty-state")){
      return;
    }
    
    const orderNo = (row.dataset.orderNo || "").toLowerCase();
    const customer = (row.dataset.customer || "").toLowerCase();
    const items = (row.dataset.items || "").toLowerCase();
    const rowText = row.innerText.toLowerCase();
    
    const matches = !searchValue || 
                    orderNo.includes(searchValue) ||
                    customer.includes(searchValue) ||
                    items.includes(searchValue) ||
                    rowText.includes(searchValue);
    
    row.style.display = matches ? "" : "none";
    if(matches) visibleCount++;
  });
  
  updateFooter(visibleCount);
}

/* =========================
   UPDATE FOOTER
========================= */
function updateFooter(count){
  if(!footer) return;
  
  if(count === undefined){
    if(!tbody) return;
    const allRows = tbody.querySelectorAll("tr");
    const visibleRows = Array.from(allRows).filter(row => 
      row.style.display !== "none" && !row.querySelector(".empty-state")
    );
    count = visibleRows.length;
  }
  
  if(count === 0){
    footer.textContent = "No ready orders available";
  } else {
    footer.textContent = `Showing ${count} ready order${count === 1 ? '' : 's'}`;
  }
}

/* =========================
   EDIT ORDER
========================= */
function editOrder(orderId){
  try {
    console.log("✏️ Editing ready order:", orderId);
    
    // Verify order exists
    const orders = JSON.parse(localStorage.getItem("orders") || "[]");
    const order = orders.find(o => {
      return o && (o.id === orderId || o.id === Number(orderId) || String(o.id) === String(orderId));
    });
    
    if(!order){
      alert("❌ Order not found!");
      console.error("Order not found:", orderId);
      return;
    }
    
    if(order.status !== "READY"){
      console.warn("⚠️ Order status is not READY:", order.status);
    }
    
    console.log("📝 Order found:", order);
    
    // Clear any existing edit state
    localStorage.removeItem("editOrderId");
    localStorage.removeItem("editOrderPayload");
    localStorage.removeItem("editCustomerReadOnly");
    localStorage.removeItem("selectedCustomerData");
    
    // Store order ID for ready-extra-order.html
    localStorage.setItem("editOrderId", String(orderId));
    
    console.log("✅ Edit state prepared, navigating to ready-extra-order.html");
    
    // Navigate to ready-extra-order.html
    navigateToReadyExtraOrder();
    
  } catch(e) {
    console.error("❌ Error editing order:", e);
    alert("Error opening order for editing: " + e.message);
  }
}

/* =========================
   NAVIGATION
========================= */
function navigateToReadyExtraOrder(){
  console.log("🔄 Navigating to ready-extra-order.html");
  
  // Try to use loadPage if available (workspace/dashboard context)
  if(typeof loadPage === 'function'){
    console.log("Using loadPage function");
    loadPage("pages/ready-extra-order.html");
    return;
  }
  
  // Try parent window
  if(window.parent && window.parent !== window && typeof window.parent.loadPage === 'function'){
    console.log("Using parent.loadPage");
    window.parent.loadPage("pages/ready-extra-order.html");
    return;
  }
  
  // Try top window
  if(window.top && window.top !== window && typeof window.top.loadPage === 'function'){
    console.log("Using top.loadPage");
    window.top.loadPage("pages/ready-extra-order.html");
    return;
  }
  
  // Fallback: direct navigation
  console.log("Using direct navigation");
  const currentPath = window.location.pathname;
  if(currentPath.includes('/pages/')){
    window.location.href = "ready-extra-order.html";
  } else {
    window.location.href = "/pages/ready-extra-order.html";
  }
}

/* =========================
   INITIALIZE PAGE
========================= */
function initReadyOrdersPage(){
  console.log("🚀 Initializing Ready Orders page...");
  
  if(!initElements()){
    console.warn("⚠️ Elements not ready, retrying in 100ms...");
    setTimeout(initReadyOrdersPage, 100);
    return;
  }
  
  loadReadyOrders();
  ensureFunctionsGlobal();
  
  console.log("✅ Ready Orders page initialized");
}

/* =========================
   CHECK WORKSPACE
========================= */
function isInWorkspace(){
  return !!document.querySelector(".workspace");
}

/* =========================
   EVENT LISTENERS
========================= */
// Initialize when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(initReadyOrdersPage, isInWorkspace() ? 200 : 0);
  });
} else {
  setTimeout(initReadyOrdersPage, isInWorkspace() ? 200 : 50);
}

// Listen for page refresh event from dashboard (e.g. after loadPage injects this page)
window.addEventListener('pageRefresh', function() {
  console.log("📡 Page refresh event received");
  tbody = null;
  footer = null;
  searchBox = null;
  setTimeout(initReadyOrdersPage, 150);
});

// Listen for order status changes
window.addEventListener('orderStatusChanged', function(e) {
  console.log("📡 Order status changed:", e.detail);
  loadReadyOrders();
});

// Listen for order saved event
window.addEventListener('orderSaved', function() {
  console.log("📡 Order saved event received");
  loadReadyOrders();
});

// Listen for storage changes (cross-tab updates)
window.addEventListener('storage', function(e) {
  if(e.key === 'orders'){
    console.log("📡 Storage changed: orders");
    loadReadyOrders();
  }
});

// Poll for changes (same-window updates)
let lastReadyOrderCount = 0;
setInterval(function() {
  if(!tbody && !initElements()) return;
  
  try{
    const orders = JSON.parse(localStorage.getItem("orders") || "[]");
    const readyOrders = orders.filter(o => o && o.status === "READY");
    
    if(readyOrders.length !== lastReadyOrderCount){
      console.log(`🔄 Ready orders count changed: ${lastReadyOrderCount} → ${readyOrders.length}`);
      lastReadyOrderCount = readyOrders.length;
      loadReadyOrders();
    }
  } catch(e){
    console.error("❌ Error in polling:", e);
  }
}, 2000);

/* =========================
   ENSURE GLOBAL FUNCTIONS
========================= */
function ensureFunctionsGlobal(){
  Object.assign(window, {
    loadReadyOrders,
    editOrder,
    navigateToReadyExtraOrder,
    searchOrders,
    updateFooter,
    initReadyOrdersPage,
    initElements,
    renderOrderRow,
    formatDate,
    showEmptyState,
    showErrorState
  });
}

ensureFunctionsGlobal();

console.log("✅ Ready Orders script loaded");
</script>

</body>
</html>
