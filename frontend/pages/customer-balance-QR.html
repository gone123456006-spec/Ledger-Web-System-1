        // ─── LOAD FROM URL / LOCALSTORAGE ────────────────────────────────────────────
        (function loadFromUrl() {
            const p = new URLSearchParams(window.location.search);
            const paramId = p.get('id') || '';

            // ── Priority 1: sessionStorage (set by customer-balance.html right before navigating)
            //    This is the most reliable method — works even inside iframes where URL params
            //    may not be accessible via window.location.search
            let fromSession = null;
            try {
                const raw = sessionStorage.getItem('stmtCustomer');
                if (raw) {
                    fromSession = JSON.parse(raw);
                    // Only use if the id matches (so stale data from a different customer is ignored)
                    if (!paramId || String(fromSession.id) === String(paramId) || paramId === '') {
                        if (fromSession.name) customerData.name = fromSession.name.trim();
                        if (fromSession.lfno) customerData.lfNo = fromSession.lfno.trim();
                        if (fromSession.station) customerData.station = fromSession.station.trim();
                        if (fromSession.opbal) customerData.openingBalance = parseFloat(fromSession.opbal) || 0;
                        if (fromSession.id) customerData.id = fromSession.id;
                    }
                }
            } catch (e) { }

            // ── Priority 2: URL params (fill any gaps not covered by sessionStorage)
            if (p.get('name') && !customerData.name) customerData.name = decodeURIComponent(p.get('name')).trim();
            if (p.get('lfno') && !customerData.lfNo) customerData.lfNo = decodeURIComponent(p.get('lfno')).trim();
            if (p.get('station') && !customerData.station) customerData.station = decodeURIComponent(p.get('station')).trim();
            if (p.get('opbal') && !customerData.openingBalance) customerData.openingBalance = parseFloat(p.get('opbal')) || 0;
            if (p.get('opdate')) customerData.openingDate = p.get('opdate');
            // Always apply name/station/lfno from URL params if present (override sessionStorage if URL has them)
            if (p.get('name')) customerData.name = decodeURIComponent(p.get('name')).trim() || customerData.name;
            if (p.get('lfno')) customerData.lfNo = decodeURIComponent(p.get('lfno')).trim() || customerData.lfNo;
            if (p.get('station')) customerData.station = decodeURIComponent(p.get('station')).trim() || customerData.station;

            // ── Priority 3: localStorage customers[] lookup by id (fills openingDate & any remaining gaps)
            const id = paramId || (fromSession && fromSession.id ? String(fromSession.id) : '');
            if (id) customerData.id = id;
            if (id) {
                try {
                    const customers = JSON.parse(localStorage.getItem('customers') || '[]');
                    const cust = customers.find(c => String(c.id) === String(id)) ||
                        (id.startsWith('idx-') ? customers[parseInt(id.replace('idx-', ''), 10)] : null);
                    if (cust) {
                        // Only fill fields still empty
                        if (!customerData.name) customerData.name = (cust.name || '').trim();
                        if (!customerData.station) customerData.station = (cust.station || '').trim();
                        if (!customerData.lfNo) customerData.lfNo = (cust.lfno || '').trim();
                        if (!customerData.openingBalance) customerData.openingBalance = parseFloat(cust.openingBalance) || 0;
                        if (!customerData.openingDate) customerData.openingDate = cust.openingDate || '';
                        if (!customerData.id) customerData.id = cust.id;
                    }
                } catch (e) { }
            }

            // ── Step 4: Load saved transactions for this customer from localStorage
            const stmtKey = 'stmt_' + (customerData.lfNo || customerData.name);
            try {
                const saved = localStorage.getItem(stmtKey);
                if (saved) {
                    transactions = JSON.parse(saved);
                    nextId = transactions.length > 0
                        ? Math.max(...transactions.map(t => t.id || 0)) + 1
                        : 1;
                }
            } catch (e) { }
            try {
                const rawMod = localStorage.getItem(stmtKey + '_interestModule');
                if (rawMod) {
                    loadInterestModulePayload(JSON.parse(rawMod));
                } else {
                    const legacy = localStorage.getItem(stmtKey + '_intMap');
                    if (legacy) {
                        rowInterestMap = JSON.parse(legacy);
                        saveInterestModule();
                    }
                }
            } catch (e) { }
        })();

        function addRow() {
            const intSec = document.getElementById('interestSection');
            const intOpen = intSec && intSec.style.display === 'block';
            if (intOpen) {
                interestDraftRows.push({ date: '', nar: '', cr: '', dr: '', int: '' });
                render();
                setTimeout(() => {
                    const allDrafts = document.querySelectorAll('#interestModuleBody tr.today-row');
                    const lastRow = allDrafts[allDrafts.length - 1];
                    if (lastRow) {
                        const sp = lastRow.querySelector('span[contenteditable]');
                        if (sp) {
                            sp.focus();
                            const range = document.createRange();
                            const sel = window.getSelection();
                            range.selectNodeContents(sp);
                            range.collapse(false);
                            sel.removeAllRanges();
                            sel.addRange(range);
                        }
                    }
                }, 60);
                return;
            }
            draftRows.push({ date: '', nar: '', cr: '', dr: '' });
            render();
            setTimeout(() => {
                const allDrafts = document.querySelectorAll('#statementBody tr.today-row');
                const lastRow = allDrafts[allDrafts.length - 1];
                if (lastRow) {
                    const sp = lastRow.querySelector('span[contenteditable]');
                    if (sp) {
                        sp.focus();
                        const range = document.createRange();
                        const sel = window.getSelection();
                        range.selectNodeContents(sp);
                        range.collapse(false);
                        sel.removeAllRanges();
                        sel.addRange(range);
                    }
                }
            }, 60);
        }

        // ─── INIT ────────────────────────────────────────────────────────────────────
        render();

        // ─── EXPORT GLOBALS (FOR DASHBOARD SPA) ───────────────────────────────────────
        window.render = render;
        window.openCalcInterest = openCalcInterest;
        window.calculateAllInterest = calculateAllInterest;
        window.applyInterestInline = applyInterestInline;
        window.doPrint = () => window.print();
        window.deleteSelected = deleteSelected;
        window.saveAndClose = saveAndClose;
        window.closeModal = closeModal;
        window.confirmDelete = confirmDelete;
        window.ctxDelete = ctxDelete;
        window.ctxClearBill = function () { closeCtxMenu(); if (ctxTargetIdx === null) return; const s = [...transactions].sort((a, b) => a.date.localeCompare(b.date)); const tx = s[ctxTargetIdx]; const orig = transactions.find(t => t.id === tx.id); if (orig) { orig.cleared = !orig.cleared; saveTransactions(); } render(); };
        window.clearSelected = clearSelected;
        window.showCtxMenu = showCtxMenu;
        window.closeCtxMenu = closeCtxMenu;
        window.addRow = addRow;
    </script>

</body>

</html>
