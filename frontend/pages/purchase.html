<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Purchase</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #f5f6f8;
            --card: #ffffff;
            --text: #000000;
            --border: #e5e5ea;
        }

        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .page {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            font-weight: 600;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .content-box {
            color: #6e6e73;
            padding: 40px;
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 16px rgba(0, 0, 0, .12);
            width: 100%;
            max-width: 1200px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="page">
        <h2>Purchase</h2>
        <div class="content-box">
            <h3>Purchase Page</h3>
            <p>Module coming soon.</p>
        </div>
    </div>
</body>

</html>
