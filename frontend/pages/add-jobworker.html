<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Job Worker</title>
  <style>
    :root {
      --bg: #e8f0fe;
      --bg-gradient: linear-gradient(160deg, #d4e4f7 0%, #e8f0fe 50%, #f0f6fc 100%);
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #5f6368;
      --border: #dadce0;
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --danger: #d93025;
      --success: #188038;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      font-family: "Google Sans", "Segoe UI", Roboto, Arial, sans-serif;
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg-gradient);
      color: var(--text);
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 24px 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .workspace .page {
      padding: 0;
      min-height: 0;
      background: transparent;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 24px;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      z-index: 10000;
      transform: translateY(100px);
      transition: transform 0.3s ease;
    }

    .toast.show {
      transform: translateY(0);
    }

    .toast.success {
      background: var(--success);
    }

    .toast.error {
      background: var(--danger);
    }

    /* ── Add Job Worker shell (matches Add Customer) ── */
    .erp-form {
      background: var(--card);
      border-radius: 0;
      box-shadow: none;
      border: none;
      padding: 14px 14px 16px;
      display: block;
      max-width: none;
      width: 100%;
      min-width: 0;
      align-self: stretch;
    }

    .ledger-page-shell.customer-add-shell.jw-add-shell {
      width: 100%;
      max-width: min(820px, calc(100vw - 48px));
      align-self: center;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .workspace .ledger-page-shell.customer-add-shell.jw-add-shell {
      margin: 0 auto;
      width: fit-content;
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin-bottom: 0;
    }

    .jw-add-shell .erp-form {
      width: 100%;
      max-width: 100%;
      align-self: stretch;
    }

    .jw-add-shell {
      --jw-input-width: 248px;
    }

    .jw-add-shell .customer-cards-grid {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 100%;
    }

    .jw-add-shell .detail-card {
      width: 100%;
      min-width: 0;
      max-width: 100%;
    }

    .customer-cards-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.12fr);
      gap: 12px;
      width: 100%;
      align-items: stretch;
    }

    .detail-card {
      border: 1px solid #b0bcc9;
      border-radius: 4px;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 440px;
      overflow: hidden;
    }

    .detail-card-head {
      background: linear-gradient(180deg, #e8eaed 0%, #d8dde3 100%);
      color: #3c4043;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      flex-shrink: 0;
      line-height: 1.2;
      border-bottom: 1px solid #b0bcc9;
    }

    .detail-card-body {
      padding: 12px 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .customer-add-shell .inline-field {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 4px 8px;
      align-items: center;
      margin: 0;
      min-height: 36px;
    }

    .customer-add-shell .inline-field label {
      margin: 0;
      font-size: 12px;
      text-align: right;
      line-height: 1.3;
      padding-right: 4px;
      color: #3c4043;
      font-weight: 600;
    }

    label .required {
      color: var(--danger);
      margin-left: 1px;
    }

    .customer-add-shell .inline-field input,
    .customer-add-shell .inline-field select,
    .customer-add-shell .inline-field textarea {
      width: 100%;
      padding: 6px 8px;
      font-size: 13px;
      min-height: 34px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: #fff;
      color: var(--text);
      box-sizing: border-box;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .customer-add-shell .inline-field textarea {
      min-height: 56px;
      resize: none;
      padding-top: 6px;
      padding-bottom: 6px;
      font-family: inherit;
    }

    input::placeholder,
    textarea::placeholder {
      color: #9aa0a6;
    }

    .customer-add-shell .inline-field input:focus,
    .customer-add-shell .inline-field select:focus,
    .customer-add-shell .inline-field textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
    }

    .customer-add-shell .inline-field input[readonly],
    .customer-add-shell .inline-field input:disabled {
      background: #f8f9fa;
      color: var(--muted);
      cursor: default;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: stretch;
      min-width: 0;
    }

    .customer-add-shell .inline-field .row {
      gap: 4px;
    }

    .customer-add-shell .inline-field .row select#jwRelationType {
      width: 56px;
      min-width: 56px;
      flex-shrink: 0;
      padding-left: 4px;
      padding-right: 4px;
    }

    .row input {
      flex: 1;
      min-width: 0;
    }

    .date-wrap {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
    }

    .date-wrap input[type="date"] {
      padding-right: 8px;
    }

    .customer-add-shell .btn-station-add {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      min-width: 34px;
      height: 34px;
      min-height: 34px;
      padding: 0;
      background: #eef1f5;
      border: 1px solid #b0bcc9;
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .customer-add-shell .btn-station-add:hover {
      background: #e2e6eb;
      border-color: #9aa5b5;
    }

    .customer-add-shell .btn-station-add svg {
      width: 14px;
      height: 14px;
      color: #5f6368;
    }

    .ledger-page-shell.customer-add-shell > .ledger-page-titlebar:first-child {
      position: relative;
      background: #f8f9fa;
      color: #1a1a1a;
      text-align: center;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      border-radius: 6px 6px 0 0;
      margin: 0;
      flex-shrink: 0;
    }

    .ledger-page-titlebar-label {
      display: block;
      width: 100%;
      text-align: center;
    }

    .ledger-page-shell.customer-add-shell .erp-form {
      border: none;
      border-radius: 0;
      box-shadow: none;
      margin: 0;
    }

    .customer-add-shell > .form-actions {
      position: static;
      background: #f4f6f8;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 12px;
      margin: 0;
      border-radius: 0 0 6px 6px;
      flex-shrink: 0;
    }

    .customer-add-shell > .form-actions button {
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      min-width: 100px;
      min-height: 32px;
      cursor: pointer;
    }

    .form-actions button:not(.primary) {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
    }

    .form-actions button:not(.primary):hover {
      background: #f8f9fa;
      border-color: #bdc1c6;
    }

    .form-actions button.primary {
      background: var(--primary);
      color: #fff;
      border: 1px solid var(--primary);
    }

    .form-actions button.primary:hover {
      background: var(--primary-hover);
    }

    .jw-add-shell .station-select-wrap {
      flex: 1;
      min-width: 0;
    }

    .jw-add-shell select#jwStation,
    .jw-add-shell .station-select-wrap select {
      width: 100%;
      height: 34px;
      min-height: 34px;
      padding: 6px 28px 6px 8px;
      border: 1px solid #b0bcc9;
      border-radius: 3px;
      font-size: 13px;
      background: #fff;
      cursor: pointer;
      color: var(--text);
      appearance: auto;
    }

    .jw-add-shell select#jwStation:invalid {
      color: #757575;
    }

    .jw-add-shell .row .station-select-wrap select#jwStation {
      width: 100%;
      flex: 1;
      min-width: 0;
      max-width: var(--jw-input-width);
    }

    /* Same-width input bars as Jobworker Id */
    .jw-add-shell .inline-field {
      grid-template-columns: 82px var(--jw-input-width);
      justify-items: stretch;
    }

    .jw-add-shell .inline-field input,
    .jw-add-shell .inline-field select,
    .jw-add-shell .inline-field textarea,
    .jw-add-shell .inline-field .date-wrap,
    .jw-add-shell .inline-field .row {
      width: 100%;
      max-width: var(--jw-input-width);
    }

    .jw-add-shell .inline-field .row input#jwRelationName {
      flex: 1;
      min-width: 0;
      width: auto;
      max-width: none;
    }

    .jw-add-shell .inline-field input.jw-ob-decimal {
      width: 100%;
      max-width: var(--jw-input-width);
      justify-self: stretch;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }

    @media (max-width: 900px) {
      .jw-add-shell .customer-cards-grid {
        grid-template-columns: 1fr;
      }

      .customer-cards-grid {
        grid-template-columns: 1fr;
      }

      .detail-card {
        min-height: 0;
      }
    }

    @media (max-width: 600px) {
      .page {
        padding: 8px;
      }

      .customer-add-shell .inline-field {
        grid-template-columns: 1fr;
      }

      .customer-add-shell .inline-field label {
        text-align: left;
      }
    }

    /* STATION POPUP */
    .stn-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(0, 0, 0, 0.45); display: flex; align-items: center; justify-content: center; }
    .stn-popup { background: #fff; border-radius: 8px; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18); width: 420px; max-width: 95vw; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; animation: fadeIn .2s ease; border: 1px solid #b0bcc9; }
    .stn-header { padding: 8px 12px; border-bottom: 1px solid #b0bcc9; font-weight: 700; font-size: 12px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(180deg, #e8eaed 0%, #d8dde3 100%); color: #3c4043; text-transform: uppercase; letter-spacing: 0.04em; }
    .stn-header .stn-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); line-height: 1; }
    .stn-search { padding: 10px 16px; border-bottom: 1px solid var(--border); }
    .stn-search input { width: 100%; height: 36px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
    .stn-search input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
    .stn-list { flex: 1; overflow-y: auto; padding: 6px 0; }
    .stn-item { padding: 10px 20px; font-size: 14px; cursor: pointer; color: var(--text); transition: background .12s; }
    .stn-item:hover { background: #f0f4ff; color: var(--primary); }
    .stn-add { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .stn-add input { flex: 1; height: 36px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
    .stn-add input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
    .stn-add button { height: 36px; padding: 0 14px; border-radius: 8px; border: none; background: var(--primary); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
    .stn-add button:hover { background: var(--primary-hover); }
    .stn-empty { padding: 24px; text-align: center; color: var(--muted); font-size: 14px; }

  </style>
</head>

<body>

  <div id="toastMsg" class="toast"></div>

  <div class="page">
    <div class="app add-jobworker-page ledger-page-shell customer-add-shell jw-add-shell">

      <div class="ledger-page-titlebar">
        <span class="ledger-page-titlebar-label">Add Job Worker</span>
      </div>

      <form class="erp-form" onsubmit="return false;">
        <div class="customer-cards-grid">

          <div class="detail-card">
            <div class="detail-card-head">Personal Details</div>
            <div class="detail-card-body">
              <div class="inline-field field">
                <label for="jwId">Jobworker Id</label>
                <input id="jwId" readonly tabindex="-1" placeholder="Auto Generated" title="Auto generated on save">
              </div>
              <div class="inline-field field">
                <label for="jwName">Name <span class="required">*</span></label>
                <input id="jwName" placeholder="Enter full name" required autofocus>
              </div>
              <div class="inline-field field">
                <label for="jwRelationType">Relation</label>
                <div class="row">
                  <select id="jwRelationType">
                    <option value="S/O">S/O</option>
                    <option value="W/O">W/O</option>
                    <option value="D/O">D/O</option>
                    <option value="C/O">C/O</option>
                  </select>
                  <input id="jwRelationName" placeholder="Name">
                </div>
              </div>
              <div class="inline-field field">
                <label for="jwLfNo">LF No</label>
                <input id="jwLfNo" type="text" placeholder="Auto Generated" readonly>
              </div>
              <div class="inline-field field">
                <label for="jwObDate">Opening Date</label>
                <div class="date-wrap">
                  <input id="jwObDate" type="date" placeholder="dd-mm-yyyy">
                </div>
              </div>
              <div class="inline-field field">
                <label for="jwObMetal">Metal</label>
                <input id="jwObMetal" type="text" class="jw-ob-decimal" inputmode="decimal" placeholder="0.000" autocomplete="off">
              </div>
              <div class="inline-field field">
                <label for="jwObChain">Chain</label>
                <input id="jwObChain" type="text" class="jw-ob-decimal" inputmode="decimal" placeholder="0.000" autocomplete="off">
              </div>
              <div class="inline-field field">
                <label for="jwObNag">Nag</label>
                <input id="jwObNag" type="text" class="jw-ob-decimal" inputmode="decimal" placeholder="0.000" autocomplete="off">
              </div>
              <div class="inline-field field">
                <label for="jwObMaal">Maal</label>
                <input id="jwObMaal" type="text" class="jw-ob-decimal" inputmode="decimal" placeholder="0.000" autocomplete="off">
              </div>
            </div>
          </div>

          <div class="detail-card">
            <div class="detail-card-head">Contact Details</div>
            <div class="detail-card-body">
              <div class="inline-field field">
                <label for="jwAddress">Address <span class="required">*</span></label>
                <textarea id="jwAddress" placeholder="Enter full address" rows="2"></textarea>
              </div>
              <div class="inline-field field">
                <label for="jwStation">Station <span class="required">*</span></label>
                <div class="row">
                  <div class="station-select-wrap">
                    <select id="jwStation" required>
                      <option value="">— Select station —</option>
                    </select>
                  </div>
                  <button type="button" class="btn-station-add" aria-label="Add New Station" title="Add New Station"
                    onclick="saveJwStationInline()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                      stroke-linejoin="round">
                      <line x1="12" y1="5" x2="12" y2="19"></line>
                      <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="inline-field field">
                <label for="jwPhone">Phone</label>
                <input id="jwPhone" type="tel" placeholder="10-digit" maxlength="10" inputmode="numeric">
              </div>
              <div class="inline-field field">
                <label for="jwMobile">Mobile</label>
                <input id="jwMobile" type="tel" placeholder="10-digit" maxlength="10" inputmode="numeric">
              </div>
              <div class="inline-field field">
                <label for="jwEmail">Email</label>
                <input id="jwEmail" type="email" placeholder="email@example.com">
              </div>
            </div>
          </div>

        </div>
      </form>

      <div class="form-actions">
        <button type="button" class="primary" onclick="saveAndClose()">Save & Close</button>
        <button type="button" onclick="saveAndNew()">Save & New</button>
        <button type="button" onclick="resetForm()">Reset</button>
        <button type="button" onclick="goToJobworkerList()">Job Worker List</button>
      </div>

    </div>
  </div>



  <script>
    (function () {

      // ── TOAST ──────────────────────────────────────
      function showToast(msg, type = 'success') {
        const t = document.getElementById('toastMsg');
        t.textContent = msg;
        t.className = 'toast ' + type + ' show';
        setTimeout(() => t.classList.remove('show'), 3000);
      }

      function numJw(v) {
        const n = parseFloat(v);
        return Number.isFinite(n) ? n : 0;
      }

      /** Upsert jobworkerBalances so new/edited workers appear on Jobworker Balance (same totals as ledger sync). */
      function syncJobworkerBalanceRow(jw) {
        try {
          const entries = JSON.parse(localStorage.getItem('jobworkerEntries') || '[]');
          const jwId = (jw.jwId || '').trim();
          const jwName = (jw.name || '').trim();
          const jwNameLc = jwName.toLowerCase();
          const forJw = entries.filter(function (e) {
            if (!e) return false;
            if (jwId && String(e.jobworkerId || '') === String(jwId)) return true;
            if (jw.id != null && String(e.jobworkerId || '') === String(jw.id)) return true;
            if (jw.jwId && String(e.jobworkerId || '').trim() === String(jw.jwId).trim()) return true;
            if (jwName && (e.jobworkerName || '').trim().toLowerCase() === jwNameLc) return true;
            return false;
          });
          let sumM = 0, sumC = 0, sumN = 0, sumMl = 0;
          forJw.forEach(function (e) {
            sumM += numJw(e.metal); sumC += numJw(e.chain); sumN += numJw(e.nag); sumMl += numJw(e.maal);
          });
          /* Match Job Worker Details column totals (entries only). */
          const finM = sumM, finC = sumC, finN = sumN, finMl = sumMl;
          const relation = [jw.relationType, jw.relationName].filter(Boolean).join(' ').trim();

          let bals = JSON.parse(localStorage.getItem('jobworkerBalances') || '[]');
          const bIdx = bals.findIndex(function (b) {
            return (jwId && String(b.jwId) === String(jwId)) ||
              (jwName && (b.name || '').trim().toLowerCase() === jwName.toLowerCase());
          });
          const row = {
            id: bIdx >= 0 ? bals[bIdx].id : Date.now(),
            mark: bIdx >= 0 ? !!bals[bIdx].mark : false,
            jwId: jw.jwId || '',
            name: jw.name || '',
            lfNo: jw.lfNo || '',
            relation: relation,
            station: jw.station || '',
            metal: finM,
            chain: finC,
            nag: finN,
            maal: finMl
          };
          if (bIdx >= 0) bals[bIdx] = row; else bals.push(row);
          localStorage.setItem('jobworkerBalances', JSON.stringify(bals));
          try {
            window.dispatchEvent(new CustomEvent('jobworkerBalancesUpdated'));
            if (window.parent && window.parent !== window) window.parent.dispatchEvent(new CustomEvent('jobworkerBalancesUpdated'));
            if (window.top && window.top !== window) window.top.dispatchEvent(new CustomEvent('jobworkerBalancesUpdated'));
          } catch (e) { }
        } catch (e) {
          console.error('syncJobworkerBalanceRow', e);
        }
      }

      // ── Metal / Chain / Nag / Maal — always 3 decimal places (e.g. 123 → 123.000) ──
      var JW_OB_DECIMAL_IDS = ['jwObMetal', 'jwObChain', 'jwObNag', 'jwObMaal'];

      function parseJwObDecimal(val) {
        var raw = String(val == null ? '' : val).trim().replace(/,/g, '');
        if (raw === '' || raw === '-' || raw === '.') return NaN;
        return parseFloat(raw);
      }

      function formatJwObDecimalValue(val) {
        var n = typeof val === 'number' ? val : parseJwObDecimal(val);
        if (!Number.isFinite(n)) return '';
        return n.toFixed(3);
      }

      function formatJwObDecimalField(el) {
        if (!el) return;
        var formatted = formatJwObDecimalValue(el.value);
        el.value = formatted;
      }

      function formatAllJwObDecimals(root) {
        var scope = root || document;
        JW_OB_DECIMAL_IDS.forEach(function (id) {
          formatJwObDecimalField(scope.querySelector('#' + id) || document.getElementById(id));
        });
      }

      function bindJwObDecimalInputs() {
        JW_OB_DECIMAL_IDS.forEach(function (id) {
          var el = document.getElementById(id);
          if (!el || el.dataset.jwObFmtBound) return;
          el.dataset.jwObFmtBound = '1';
          el.addEventListener('blur', function () {
            formatJwObDecimalField(el);
          });
        });
      }

      // ── AUTO LF No ─────────────────────────────────
      function generateLfNo() {
        const list = JSON.parse(localStorage.getItem('jobworkers') || '[]');
        if (!list.length) return '1';
        let max = 0;
        list.forEach(function (j) {
          const n = parseInt(j.lfNo, 10);
          if (!isNaN(n) && n > max) max = n;
        });
        return String(max + 1);
      }

      // ── STATION (native select — same as Add Customer) ──
      function resolveJwStationCanonical(stored) {
        var n = (stored == null ? '' : String(stored)).trim();
        if (!n) return '';
        var stations = JSON.parse(localStorage.getItem('stations') || '[]');
        var found = stations.find(function (s) {
          return String(s.name || s).toLowerCase() === n.toLowerCase();
        });
        return found ? (found.name || found) : n;
      }

      function populateJwStationSelect(selectAfter) {
        var sel = document.getElementById('jwStation');
        if (!sel || sel.tagName !== 'SELECT') return;
        var stations = JSON.parse(localStorage.getItem('stations') || '[]');
        var sorted = stations.slice().sort(function (a, b) {
          return String(a.name || a).localeCompare(String(b.name || b), undefined, { sensitivity: 'base' });
        });
        sel.innerHTML = '';
        var ph = document.createElement('option');
        ph.value = '';
        ph.textContent = '— Select station —';
        sel.appendChild(ph);
        sorted.forEach(function (s) {
          var o = document.createElement('option');
          var name = s.name || s;
          o.value = name;
          o.textContent = s.state ? (name + ' (' + s.state + ')') : name;
          sel.appendChild(o);
        });
        var pick = selectAfter != null ? String(selectAfter).trim() : '';
        if (pick) {
          var canon = resolveJwStationCanonical(pick);
          var opts = Array.from(sel.options);
          if (opts.some(function (opt) { return opt.value === canon; })) {
            sel.value = canon;
          } else {
            var byLower = opts.find(function (opt) {
              return opt.value.toLowerCase() === pick.toLowerCase();
            });
            if (byLower) sel.value = byLower.value;
          }
        }
      }

      function loadStations() {
        populateJwStationSelect();
      }

      function openJwStationSelectList(sel) {
        if (!sel || sel.tagName !== 'SELECT') return;
        if (typeof sel.showPicker === 'function') {
          try {
            sel.showPicker();
            return;
          } catch (err) { /* fallback */ }
        }
        sel.focus();
        sel.click();
      }

      window.saveJwStationInline = function () {
        var name = (prompt('Enter station name:') || '').trim();
        if (!name) return;
        var state = (prompt('Enter state (optional):') || '').trim();
        var stations = JSON.parse(localStorage.getItem('stations') || '[]');
        if (stations.some(function (s) {
          return String(s.name || s).toLowerCase() === name.toLowerCase();
        })) {
          showToast('Station already in list', 'error');
          populateJwStationSelect(name);
          document.getElementById('jwStation').value = resolveJwStationCanonical(name);
          return;
        }
        stations.push({ name: name, state: state });
        localStorage.setItem('stations', JSON.stringify(stations));
        populateJwStationSelect(name);
        document.getElementById('jwStation').value = name;
        showToast('Station "' + name + '" saved!', 'success');
      };

      // ── AUTO ID GENERATION ─────────────────────────
      function generateJWId() {
        const last = localStorage.getItem('lastJobworkerId') || '0';
        const next = Number(last) + 1;
        return 'SGJ/Jobworker/' + next;
      }

      // ── SET DATE DEFAULTS ──────────────────────────
      function setDefaults() {
        var root = getFormRoot();
        var dateEl = root.querySelector('#jwObDate');
        var idEl = root.querySelector('#jwId');
        var lfEl = root.querySelector('#jwLfNo');
        if (dateEl) dateEl.value = new Date().toISOString().slice(0, 10);
        if (idEl) idEl.value = generateJWId();
        if (lfEl && !lfEl.value) lfEl.value = generateLfNo();
      }

      // ── VALIDATE ───────────────────────────────────
      function validate() {
        const name = document.getElementById('jwName').value.trim();
        const lfNo = document.getElementById('jwLfNo').value.trim();
        const address = document.getElementById('jwAddress').value.trim();
        const station = document.getElementById('jwStation').value.trim();

        if (!name) { showToast('Name is required', 'error'); return false; }
        if (!lfNo) { showToast('LF No is required', 'error'); return false; }
        if (!address) { showToast('Address is required', 'error'); return false; }
        if (!station) { showToast('Station is required', 'error'); return false; }
        return true;
      }

      // ── EDIT MODE (from Job Worker List) ─────────────
      function getEditPayload() {
        try {
          const id = localStorage.getItem('editJobworkerId');
          const payload = localStorage.getItem('editJobworkerPayload');
          if (id && payload) return { id: id, data: JSON.parse(payload) };
        } catch (e) { }
        return null;
      }

      function jwFormRoot() {
        return document.querySelector('.workspace .app') || document.querySelector('.workspace') || document;
      }

      function fillFormForEdit(editData) {
        const j = editData || {};
        const root = jwFormRoot();
        function field(id) {
          return root.querySelector('#' + id) || document.getElementById(id);
        }
        function setText(id, v) {
          var el = field(id);
          if (el) el.value = v != null && v !== undefined ? String(v) : '';
        }
        function setNum(id, v) {
          var el = field(id);
          if (!el) return;
          if (v == null || v === '') {
            el.value = '';
            return;
          }
          el.value = formatJwObDecimalValue(v);
        }
        var obDateRaw = (j.obDate != null && String(j.obDate).trim() !== '') ? j.obDate : (j.date || '');
        var obDateStr = String(obDateRaw || '').trim();
        if (obDateStr.length >= 10) obDateStr = obDateStr.slice(0, 10);

        setText('jwId', j.jwId || '');
        setText('jwName', j.name || '');
        setText('jwRelationName', j.relationName || '');
        var relSelect = field('jwRelationType');
        if (relSelect) relSelect.value = j.relationType || '';
        setText('jwLfNo', j.lfNo != null ? j.lfNo : '');
        setText('jwObDate', obDateStr);
        setNum('jwObMetal', j.obMetal);
        setNum('jwObChain', j.obChain);
        setNum('jwObNag', j.obNag);
        setNum('jwObMaal', j.obMaal);
        setText('jwAddress', j.address || '');
        populateJwStationSelect(resolveJwStationCanonical(j.station || ''));
        setText('jwPhone', j.phone || '');
        setText('jwMobile', j.mobile || '');
        setText('jwEmail', j.email || '');
      }

      // ── COLLECT DATA ───────────────────────────────
      let editId = null;

      function collectData() {
        const base = {
          jwId: document.getElementById('jwId').value.trim(),
          name: document.getElementById('jwName').value.trim(),
          relationType: document.getElementById('jwRelationType').value,
          relationName: document.getElementById('jwRelationName').value.trim(),
          lfNo: document.getElementById('jwLfNo').value.trim(),
          obDate: document.getElementById('jwObDate').value,
          obMetal: parseJwObDecimal(document.getElementById('jwObMetal').value) || 0,
          obChain: parseJwObDecimal(document.getElementById('jwObChain').value) || 0,
          obNag: parseJwObDecimal(document.getElementById('jwObNag').value) || 0,
          obMaal: parseJwObDecimal(document.getElementById('jwObMaal').value) || 0,
          address: document.getElementById('jwAddress').value.trim(),
          station: document.getElementById('jwStation').value.trim(),
          phone: document.getElementById('jwPhone').value.trim(),
          mobile: document.getElementById('jwMobile').value.trim(),
          email: document.getElementById('jwEmail').value.trim(),
        };
        const id = editId != null ? Number(editId) : Date.now();
        let createdAt = new Date().toISOString();
        if (editId) {
          const ep = getEditPayload();
          if (ep && ep.data && ep.data.createdAt) createdAt = ep.data.createdAt;
        }
        return { id: id, createdAt: createdAt, ...base };
      }

      // ── SAVE ───────────────────────────────────────
      function save() {
        if (!validate()) return null;
        formatAllJwObDecimals(getFormRoot());

        const data = collectData();
        const list = JSON.parse(localStorage.getItem('jobworkers') || '[]');

        // Check duplicate LF No (when adding, or when editing and LF No changed to another's)
        const duplicateLf = list.some(j => j.lfNo === data.lfNo && j.id !== data.id && String(j.id) !== String(data.id));
        if (duplicateLf) {
          showToast('LF No already exists!', 'error');
          return null;
        }

        if (editId != null) {
          const idx = list.findIndex(j => j.id === data.id || String(j.id) === String(data.id));
          if (idx >= 0) {
            list[idx] = data;
            localStorage.setItem('jobworkers', JSON.stringify(list));
            syncJobworkerBalanceRow(data);
            localStorage.removeItem('editJobworkerId');
            localStorage.removeItem('editJobworkerPayload');
            editId = null;
            showToast('Job Worker updated successfully!', 'success');
            return true;
          }
        }

        // New record
        const last = localStorage.getItem('lastJobworkerId') || '0';
        localStorage.setItem('lastJobworkerId', String(Number(last) + 1));
        list.push(data);
        localStorage.setItem('jobworkers', JSON.stringify(list));
        syncJobworkerBalanceRow(data);
        showToast('Job Worker saved successfully!', 'success');
        return true;
      }

      function goToJobworkerList() {
        if (typeof loadPage === 'function') {
          loadPage('pages/jobworker-list.html');
        } else if (window.parent && window.parent !== window && typeof window.parent.loadPage === 'function') {
          window.parent.loadPage('pages/jobworker-list.html');
        } else {
          window.location.href = 'jobworker-list.html';
        }
      }

      // ── RESET / BLANK FORM (use root so we clear the form inside workspace when in dashboard) ─────────────────────────
      function getFormRoot() {
        return jwFormRoot();
      }
      function resetFields() {
        localStorage.removeItem('editJobworkerId');
        localStorage.removeItem('editJobworkerPayload');
        editId = null;
        var root = getFormRoot();
        ['jwName', 'jwRelationName', 'jwObMetal', 'jwObChain', 'jwObNag', 'jwObMaal',
          'jwAddress', 'jwStation', 'jwPhone', 'jwMobile', 'jwEmail'].forEach(function (id) {
            var el = root.querySelector('#' + id);
            if (el) el.value = '';
          });
        var relSelect = root.querySelector('#jwRelationType');
        if (relSelect) relSelect.selectedIndex = 0;
        populateJwStationSelect('');
        var jwIdEl = root.querySelector('#jwId');
        if (jwIdEl) jwIdEl.value = generateJWId();
        var lfEl = root.querySelector('#jwLfNo');
        if (lfEl) lfEl.value = generateLfNo();
        var dateEl = root.querySelector('#jwObDate');
        if (dateEl) dateEl.value = new Date().toISOString().slice(0, 10);

        // Clear persistence so drafts don't reappear on reload
        if (window.FormPersistence) {
          try { window.FormPersistence.getInstance().clear(); } catch (e) { }
        }
      }

      // ── CLOSE / NAVIGATE BACK ──────────────────────
      function goBack() {
        if (typeof loadPage === 'function') {
          loadPage('dashboard.html');
        } else {
          window.history.back();
        }
      }

      // ── KEYBOARD: Arrow Up/Down move between fields; Station dropdown supports Arrow Up/Down + Enter ──
      var JW_ADD_FIELD_CHAIN = ['jwName', 'jwRelationType', 'jwRelationName', 'jwLfNo', 'jwObDate', 'jwObMetal', 'jwObChain', 'jwObNag', 'jwObMaal', 'jwAddress', 'jwStation', 'jwPhone', 'jwMobile', 'jwEmail'];

      function focusJwAddFieldByIndex(idx) {
        var active = document.activeElement;
        if (active && active.classList && active.classList.contains('jw-ob-decimal')) {
          formatJwObDecimalField(active);
        }
        if (idx < 0) idx = JW_ADD_FIELD_CHAIN.length - 1;
        if (idx >= JW_ADD_FIELD_CHAIN.length) idx = 0;
        var root = getFormRoot();
        var id = JW_ADD_FIELD_CHAIN[idx];
        var el = (root && root.querySelector('#' + id)) || document.getElementById(id);
        if (!el || el.disabled) return;
        el.focus();
        try { if (el.select && el.tagName === 'INPUT' && el.type !== 'date') el.select(); } catch (err) { }
      }

      function focusJwNameField() {
        var root = getFormRoot();
        var el = root.querySelector('#jwName') || document.getElementById('jwName');
        if (!el || el.disabled || el.offsetParent === null) return false;
        try {
          el.focus({ preventScroll: false });
        } catch (err) {
          try { el.focus(); } catch (e2) { return false; }
        }
        try {
          if (el.select && el.tagName === 'INPUT' && el.type !== 'date') el.select();
        } catch (errSel) { }
        return document.activeElement === el;
      }

      function scheduleFocusJwNameField() {
        [0, 80, 220, 450].forEach(function (ms) {
          setTimeout(focusJwNameField, ms);
        });
      }
      window.focusJwNameField = focusJwNameField;
      window.scheduleFocusJwNameField = scheduleFocusJwNameField;

      document.addEventListener('keydown', function (e) {
        if (e.altKey || e.ctrlKey || e.metaKey) return;
        var t = e.target;
        if (!t || !t.id) return;

        if (e.key === 'Enter' && t.id === 'jwAddress' && !e.shiftKey) {
          e.preventDefault();
          focusJwAddFieldByIndex(JW_ADD_FIELD_CHAIN.indexOf('jwAddress') + 1);
          var st = document.getElementById('jwStation');
          if (st && st.tagName === 'SELECT' && !st.value) {
            setTimeout(function () { openJwStationSelectList(st); }, 0);
          }
          return;
        }

        if (e.key === 'Enter' && t.id === 'jwStation' && t.tagName === 'SELECT') {
          e.preventDefault();
          if (!t.value) {
            openJwStationSelectList(t);
          } else {
            focusJwAddFieldByIndex(JW_ADD_FIELD_CHAIN.indexOf('jwStation') + 1);
          }
          return;
        }

        if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
        if (t.tagName === 'SELECT') return;
        if (!JW_ADD_FIELD_CHAIN.includes(t.id)) return;
        e.preventDefault();
        focusJwAddFieldByIndex(JW_ADD_FIELD_CHAIN.indexOf(t.id) + (e.key === 'ArrowDown' ? 1 : -1));
      });

      // ── BUTTON HANDLERS: clear form on each action so next visit or new entry is clean ──
      window.saveAndClose = function () {
        if (save()) {
          resetFields();
          goBack();
        }
      };
      window.saveAndNew = function () {
        if (save()) {
          resetFields();
          focusJwNameField();
        }
      };
      window.resetForm = function () {
        if (confirm('Reset all fields? All data will be cleared.')) {
          resetFields();
          focusJwNameField();
        }
      };
      window.closeForm = function () {
        resetFields();
        goBack();
      };
      window.loadStations = loadStations;
      window.goToJobworkerList = goToJobworkerList;

      // ── INIT: when opened from sidebar (jobworkerFormClear) or new visit, clear form; else restore edit if from list ──
      // Clear persistence right away so second pass restore doesn't mess up edits or new forms
      if (window.FormPersistence) {
        try { window.FormPersistence.getInstance().clear(); } catch (e) { }
      }

      /* Consume "left add-jobworker" flag — must not block List→Edit: that flow also has this flag set. */
      var hadFormClearFlag = !!(typeof sessionStorage !== 'undefined' && sessionStorage.getItem('jobworkerFormClear'));
      if (hadFormClearFlag) try { sessionStorage.removeItem('jobworkerFormClear'); } catch (e) { }

      var editPayload = getEditPayload();
      if (editPayload && editPayload.data) {
        editId = editPayload.id;
        fillFormForEdit(editPayload.data);
      } else {
        resetFields();
        setDefaults();
      }
      loadStations();
      bindJwObDecimalInputs();
      scheduleFocusJwNameField();

      function onJwAddPageRefresh() {
        scheduleFocusJwNameField();
      }
      document.addEventListener('pageRefresh', onJwAddPageRefresh);
      if (typeof ledgerNavListen === 'function') {
        ledgerNavListen(document, 'pageRefresh', onJwAddPageRefresh);
      }

      // Refresh customer list if new customer was added in another tab
      window.addEventListener('storage', function (e) {
        if (e.key === 'stations' || e.key === 'customers' || e.key === 'jobworkers') loadStations();
      });

    })();
  </script>
</body>
