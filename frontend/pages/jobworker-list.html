<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Worker List</title>
  <style>
    :root {
      --bg: #f8f9fc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --radius: 12px;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.1);
      --card-pattern:
        radial-gradient(circle at 14px 14px, rgba(0,0,0,0.015) 0 3px, transparent 3.5px),
        linear-gradient(140deg, transparent 0 66%, rgba(255, 178, 0, 0.05) 66% 72%, transparent 72%),
        linear-gradient(140deg, transparent 0 70%, rgba(255,255,255,0.05) 70% 73%, transparent 73%),
        linear-gradient(140deg, transparent 0 74%, rgba(255, 160, 0, 0.05) 74% 82%, transparent 82%),
        linear-gradient(145deg, rgba(255,255,255,0.05) 0 45%, rgba(0,0,0,0.006) 45% 100%);
    }

    * {
      box-sizing: border-box;
      font-family: Calibri, "Segoe UI", Arial, sans-serif;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      background: #fff;
      color: var(--text);
    }

    .app {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0;
    }

    .app.jobworker-list-page {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      max-height: 100vh;
      min-height: 0;
      overflow: hidden;
      background: #fff;
    }

    .workspace .app.jobworker-list-page,
    .workspace[data-page] .app.jobworker-list-page {
      height: 100%;
      max-height: none;
      flex: 1 1 auto;
      padding: 0;
      background: #fff;
    }

    .jobworker-list-page > .ledger-page-titlebar.jw-page-titlebar-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      column-gap: 10px;
      text-align: initial;
      background: #f4f6f8;
      color: #1a3a5c;
      padding: 6px 12px;
      font-size: 14px;
      font-weight: 700;
      border-bottom: 1px solid #a8b4c4;
      margin: 0;
      letter-spacing: 0.02em;
      border-radius: 0;
      flex-shrink: 0;
    }

    .workspace[data-page] .app.jobworker-list-page > .ledger-page-titlebar.jw-page-titlebar-grid:first-child {
      border-radius: 0;
    }

    .jw-page-titlebar-grid .jw-titlebar-left {
      grid-column: 1;
      justify-self: start;
      min-width: 0;
    }

    .jw-page-titlebar-grid .jw-titlebar-heading {
      grid-column: 2;
      justify-self: center;
      text-align: center;
      margin: 0;
      font-size: inherit;
      font-weight: inherit;
    }

    .jw-page-titlebar-grid .jw-titlebar-right {
      grid-column: 3;
      justify-self: end;
      min-width: 0;
    }

    .jw-titlebar-add-btn {
      height: 26px;
      min-height: 26px;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 3px;
      border: 1px solid #6aae6a;
      background: #f0fdf4;
      color: #166534;
      box-shadow: none;
    }

    .jw-titlebar-add-btn:hover,
    .jobworker-list-page button.primary.jw-titlebar-add-btn:hover {
      background: #dcfce7;
      border-color: #4d9a4d;
      color: #14532d;
    }

    .jobworker-list-page button.primary.jw-titlebar-add-btn {
      background: #f0fdf4;
      border-color: #6aae6a;
      color: #166534;
    }

    .jobworker-list-page > .jobworker-list-shell {
      flex: 1 1 auto;
      min-height: 0;
      margin: 0;
      border: none;
      border-radius: 0;
      border-top: none;
    }

    .jobworker-list-shell {
      background: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 0 14px;
      box-sizing: border-box;
    }

    .jobworker-list-toolbar {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 8px 10px;
      width: 100%;
      padding: 6px 0;
      margin: 0;
      background: #fff;
      border: none;
      border-bottom: 1px solid #a8b4c4;
      border-radius: 0;
      flex-shrink: 0;
      overflow-x: auto;
      box-sizing: border-box;
    }

    .jobworker-list-toolbar > * {
      flex-shrink: 0;
    }

    .jobworker-list-toolbar .list-station-filter-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-left: 0;
    }

    .jobworker-list-toolbar #listStationFilter {
      padding: 3px 8px;
      border-radius: 3px;
      border: 1px solid #a8b4c4;
      font-size: 12px;
      min-width: 120px;
      height: 26px;
      min-height: 26px;
      background: #fff;
      color: #1a3a5c;
      cursor: pointer;
      box-sizing: border-box;
    }

    .jobworker-list-toolbar #listStationFilter:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
    }

    .jobworker-list-toolbar .list-search-wrap {
      flex: 0 0 auto;
      width: 200px;
      max-width: min(220px, 28vw);
      min-width: 140px;
      margin: 0;
      margin-right: auto;
      position: relative;
      display: flex;
      align-items: center;
    }

    .jobworker-list-toolbar .jw-toolbar-actions {
      margin-left: auto;
      margin-right: 0;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .jobworker-list-toolbar .jw-toolbar-add-btn {
      height: 26px;
      min-height: 26px;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 3px;
      border: 1px solid #6aae6a;
      background: #f0fdf4;
      color: #166534;
      box-shadow: none;
      white-space: nowrap;
      cursor: pointer;
    }

    .jobworker-list-toolbar .jw-toolbar-add-btn:hover {
      background: #dcfce7;
      border-color: #4d9a4d;
      color: #14532d;
    }

    .jobworker-list-toolbar .list-search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: #5f6368;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .jobworker-list-toolbar .list-search-icon svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .jobworker-list-toolbar .list-search-wrap input {
      width: 100%;
      max-width: none;
      padding: 3px 10px 3px 32px;
      font-size: 12px;
      height: 26px;
      min-height: 26px;
      border-radius: 3px;
      border: 1px solid #a8b4c4;
      background: #fff;
      color: #1a3a5c;
      box-sizing: border-box;
    }

    .jobworker-list-toolbar .list-search-wrap input:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
    }

    .jobworker-list-grid-wrap {
      width: 100%;
      overflow: auto;
      flex: 1 1 auto;
      min-height: 0;
      background: #fff;
      border: none;
      box-sizing: border-box;
    }

    button {
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }

    button:hover {
      background: #f5f5f7;
    }

    button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    button.primary:hover {
      background: var(--primary-hover);
    }

    /* PHP / Excel grid */
    .jw-excel-table {
      width: 100%;
      min-width: max-content;
      border-collapse: collapse;
      border-spacing: 0;
      table-layout: auto;
      background: #fff;
      font-size: 12px;
    }

    .jw-excel-table th,
    .jw-excel-table td {
      border: 1px solid #a8b4c4;
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1.3;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    .jw-excel-table thead th:first-child,
    .jw-excel-table tbody td:first-child {
      padding-left: 12px;
    }

    .jw-excel-table thead th:last-child,
    .jw-excel-table tbody td:last-child {
      padding-right: 12px;
    }

    .jw-excel-table th {
      background: #d6e4f4;
      color: #1a3a5c;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 2;
      box-shadow: 0 1px 0 #a8b4c4;
    }

    .jw-excel-table tbody tr:nth-child(even) td {
      background: #fff;
    }

    .jw-excel-table tbody tr:hover td {
      background: #eaf7ed;
      border-color: #c8e6c9;
    }

    .jw-excel-table .col-num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .jw-excel-table thead th:nth-child(1),
    .jw-excel-table tbody td:nth-child(1) {
      min-width: 118px;
      text-align: center;
    }

    .jw-excel-table thead th:nth-child(2),
    .jw-excel-table tbody td:nth-child(2) {
      min-width: 100px;
      font-weight: 600;
    }

    .jw-excel-table thead th:nth-child(3),
    .jw-excel-table tbody td:nth-child(3) {
      min-width: 120px;
    }

    .jw-excel-table thead th:nth-child(4),
    .jw-excel-table tbody td:nth-child(4) {
      min-width: 88px;
      text-align: center;
    }

    .jw-excel-table thead th:nth-child(5),
    .jw-excel-table tbody td:nth-child(5),
    .jw-excel-table thead th:nth-child(6),
    .jw-excel-table tbody td:nth-child(6),
    .jw-excel-table thead th:nth-child(7),
    .jw-excel-table tbody td:nth-child(7),
    .jw-excel-table thead th:nth-child(8),
    .jw-excel-table tbody td:nth-child(8) {
      min-width: 72px;
      text-align: right;
    }

    .jw-excel-table thead th:nth-child(9),
    .jw-excel-table tbody td:nth-child(9) {
      min-width: 180px;
      max-width: 280px;
      white-space: normal;
      word-break: break-word;
      text-align: left;
    }

    .jw-excel-table thead th:nth-child(10),
    .jw-excel-table tbody td:nth-child(10) {
      min-width: 100px;
      white-space: normal;
      word-break: break-word;
    }

    .jw-excel-table thead th:nth-child(11),
    .jw-excel-table tbody td:nth-child(11),
    .jw-excel-table thead th:nth-child(12),
    .jw-excel-table tbody td:nth-child(12) {
      min-width: 88px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .jw-excel-table thead th:nth-child(13),
    .jw-excel-table tbody td:nth-child(13) {
      min-width: 64px;
      width: 64px;
      text-align: center;
      padding-left: 4px;
      padding-right: 4px;
    }

    .jw-excel-table tbody td:nth-child(13) .btn-edit {
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 3px;
      border: 1px solid #a8b4c4;
      background: #fff;
      color: #1a3a5c;
      cursor: pointer;
      line-height: 1.2;
      min-height: 0;
    }

    .jw-excel-table tbody td:nth-child(13) .btn-edit:hover {
      background: #d6e4f4;
      border-color: #7a8da6;
      color: #1a3a5c;
    }

    .jobworker-list-shell .empty-list {
      text-align: center;
      padding: 12px;
      color: #5f6368;
      font-size: 11px;
      font-weight: 600;
      border: none;
      border-top: 1px solid #a8b4c4;
      flex-shrink: 0;
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div class="app jobworker-list-page">
    <div class="ledger-page-titlebar jw-page-titlebar-grid">
      <div class="jw-titlebar-left" aria-hidden="true"></div>
      <span class="jw-titlebar-heading">Job Worker List</span>
      <div class="jw-titlebar-right" aria-hidden="true"></div>
    </div>

    <div class="jobworker-list-shell">
      <div class="jobworker-list-toolbar">
        <div class="list-station-filter-wrap">
          <select id="listStationFilter" aria-label="Filter by station" onchange="filterList()">
            <option value="">All Stations</option>
          </select>
        </div>
        <div class="list-search-wrap">
          <span class="list-search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
            </svg>
          </span>
          <input type="search" id="searchInput" placeholder="Search by name, id, station, phone..."
            oninput="filterList()" autocomplete="off">
        </div>
        <div class="jw-toolbar-actions">
          <button type="button" class="jw-toolbar-add-btn" onclick="goToAddJobworker()">Add Job Worker</button>
        </div>
      </div>
      <div class="jobworker-list-grid-wrap">
        <table id="jobworkerListTable" class="jw-excel-table">
          <thead>
            <tr>
              <th class="col-id">Jobworker Id</th>
              <th class="col-name">Name</th>
              <th class="col-relation">Relation with Name</th>
              <th class="col-num">Date</th>
              <th class="col-num">Metal</th>
              <th class="col-num">Chain</th>
              <th class="col-num">Neg</th>
              <th class="col-num">Maal</th>
              <th class="col-address">Address</th>
              <th class="col-station">Station</th>
              <th class="col-phone">Phone No</th>
              <th class="col-phone">Mobile No</th>
              <th class="col-action">Action</th>
            </tr>
          </thead>
          <tbody id="jobworkerTableBody"></tbody>
        </table>
      </div>
      <div id="jobworkerListEmpty" class="empty-list" style="display:none;">No job workers yet. Add one from Add Job
        Worker page.</div>
    </div>
  </div>

  <script>
    (function () {
      function getList() {
        return JSON.parse(localStorage.getItem('jobworkers') || '[]');
      }

      function resolveStationCanonical(stored) {
        var n = (stored == null ? '' : String(stored)).trim();
        if (!n) return '';
        var stations = JSON.parse(localStorage.getItem('stations') || '[]');
        var found = stations.find(function (s) {
          return String((s && s.name) || s).toLowerCase() === n.toLowerCase();
        });
        return found ? (found.name || found) : n;
      }

      function populateListStationFilter() {
        var sel = document.getElementById('listStationFilter');
        if (!sel) return;
        var keep = sel.value;
        var names = {};
        try {
          JSON.parse(localStorage.getItem('stations') || '[]').forEach(function (s) {
            var n = (s && s.name) ? String(s.name).trim() : '';
            if (n) names[n] = true;
          });
        } catch (e) { /* ignore */ }
        getList().forEach(function (j) {
          var c = resolveStationCanonical(j.station || '');
          if (c) names[c] = true;
        });
        var sorted = Object.keys(names).sort(function (a, b) {
          return a.localeCompare(b, undefined, { sensitivity: 'base' });
        });
        sel.innerHTML = '';
        var allOpt = document.createElement('option');
        allOpt.value = '';
        allOpt.textContent = 'All Stations';
        sel.appendChild(allOpt);
        sorted.forEach(function (name) {
          var o = document.createElement('option');
          o.value = name;
          o.textContent = name;
          sel.appendChild(o);
        });
        if (keep && [].slice.call(sel.options).some(function (o) { return o.value === keep; })) {
          sel.value = keep;
        }
      }

      function recordMatchesListStationFilter(record) {
        var filterSel = document.getElementById('listStationFilter');
        var filterVal = filterSel && filterSel.value ? String(filterSel.value).trim() : '';
        if (!filterVal) return true;
        var stored = record && record.station != null ? String(record.station).trim() : '';
        if (!stored) return false;
        var canon = resolveStationCanonical(stored);
        var norm = function (s) { return (s || '').trim().toLowerCase(); };
        return norm(canon) === norm(filterVal) || norm(stored) === norm(filterVal);
      }

      function relText(j) {
        var t = (j.relationType || '').trim();
        var n = (j.relationName || '').trim();
        return (t && n) ? t + ' ' + n : (n || t || '—');
      }

      function dateText(j) {
        var d = j.obDate || j.date || '';
        return d ? d.slice(0, 10) : '—';
      }

      function renderRows(list) {
        var tbody = document.getElementById('jobworkerTableBody');
        var emptyEl = document.getElementById('jobworkerListEmpty');
        if (!tbody) return;

        if (list.length === 0) {
          tbody.innerHTML = '';
          if (emptyEl) emptyEl.style.display = 'block';
          return;
        }
        if (emptyEl) emptyEl.style.display = 'none';

        tbody.innerHTML = list.map(function (j) {
          var payload = encodeURIComponent(JSON.stringify(j));
          return '<tr>' +
            '<td class="col-id">' + (j.jwId || '—') + '</td>' +
            '<td class="col-name">' + (j.name || '—') + '</td>' +
            '<td class="col-relation">' + relText(j) + '</td>' +
            '<td class="col-num">' + dateText(j) + '</td>' +
            '<td class="col-num">' + (j.obMetal != null ? Number(j.obMetal).toFixed(3) : '—') + '</td>' +
            '<td class="col-num">' + (j.obChain != null ? Number(j.obChain).toFixed(3) : '—') + '</td>' +
            '<td class="col-num">' + (j.obNag != null ? Number(j.obNag).toFixed(3) : '—') + '</td>' +
            '<td class="col-num">' + (j.obMaal != null ? Number(j.obMaal).toFixed(3) : '—') + '</td>' +
            '<td class="col-address" title="' + (j.address || '').replace(/"/g, '&quot;') + '">' + (j.address || '—') + '</td>' +
            '<td class="col-station">' + (j.station || '—') + '</td>' +
            '<td class="col-phone">' + (j.phone || '—') + '</td>' +
            '<td class="col-phone">' + (j.mobile || '—') + '</td>' +
            '<td class="col-action"><button type="button" class="btn-edit" onclick="editJobworker(\'' + (j.id || '') + '\')" title="Edit">Edit</button></td>' +
            '</tr>';
        }).join('');
      }

      function filterList() {
        var q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
        var list = getList().filter(recordMatchesListStationFilter);
        if (q) {
          list = list.filter(function (j) {
            var name = (j.name || '').toLowerCase();
            var jwId = (j.jwId || '').toLowerCase();
            var station = (j.station || '').toLowerCase();
            var phone = (j.phone || '').toLowerCase();
            var mobile = (j.mobile || '').toLowerCase();
            var address = (j.address || '').toLowerCase();
            var rel = (j.relationType || '').toLowerCase() + ' ' + (j.relationName || '').toLowerCase();
            return name.indexOf(q) !== -1 || jwId.indexOf(q) !== -1 || station.indexOf(q) !== -1 ||
              phone.indexOf(q) !== -1 || mobile.indexOf(q) !== -1 || address.indexOf(q) !== -1 || rel.indexOf(q) !== -1;
          });
        }
        renderRows(list);
      }

      function loadList() {
        populateListStationFilter();
        filterList();
      }

      function goToAddJobworker() {
        try { localStorage.removeItem('editJobworkerId'); localStorage.removeItem('editJobworkerPayload'); } catch (e) { }
        if (typeof loadPage === 'function') {
          loadPage('pages/add-jobworker.html');
        } else if (window.parent && window.parent !== window && typeof window.parent.loadPage === 'function') {
          window.parent.loadPage('pages/add-jobworker.html');
        } else {
          window.location.href = 'add-jobworker.html';
        }
      }

      function editJobworker(id) {
        var list = getList();
        var j = list.filter(function (x) { return x.id === id || String(x.id) === String(id); })[0];
        if (!j) return;
        try {
          localStorage.setItem('editJobworkerId', String(id));
          localStorage.setItem('editJobworkerPayload', JSON.stringify(j));
        } catch (e) { return; }
        if (typeof loadPage === 'function') {
          loadPage('pages/add-jobworker.html');
        } else if (window.parent && window.parent !== window && typeof window.parent.loadPage === 'function') {
          window.parent.loadPage('pages/add-jobworker.html');
        } else {
          window.location.href = 'add-jobworker.html';
        }
      }

      window.filterList = filterList;
      window.goToAddJobworker = goToAddJobworker;
      window.editJobworker = editJobworker;
      window.loadJobworkerList = loadList;

      loadList();
      window.addEventListener('storage', function (e) {
        if (e.key === 'jobworkers' || e.key === 'stations') loadList();
      });
    })();
  </script>
</body>

</html>
