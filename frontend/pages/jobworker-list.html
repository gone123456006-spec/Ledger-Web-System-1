<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Worker List</title>
  <style>
    :root {
      --bg: #f8f9fc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --radius: 12px;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.1);
    }
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    .app { width: 100%; max-width: none; margin: 0; padding: 16px 12px; }
    .page-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .box { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); padding: 16px; }
    .box-title { font-size: 15px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    button { padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border); background: #fff; font-size: 14px; cursor: pointer; font-weight: 500; }
    button:hover { background: #f5f5f7; }
    button.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    button.primary:hover { background: var(--primary-hover); }
    .list-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
    .list-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
    }
    .list-table th,
    .list-table td {
      padding: 12px 14px;
      text-align: left;
      border: 1px solid var(--border);
      vertical-align: middle;
    }
    .list-table th { background: #f1f5f9; color: var(--muted); font-weight: 600; white-space: nowrap; }
    .list-table tbody tr:hover { background: #f8faff; }
    .list-table .col-id { width: 10%; }
    .list-table .col-name { width: 10%; }
    .list-table .col-relation { width: 10%; }
    .list-table .col-num { width: 6%; text-align: right; }
    .list-table .col-address { width: 14%; overflow: hidden; text-overflow: ellipsis; }
    .list-table .col-station { width: 8%; }
    .list-table .col-phone { width: 8%; }
    .list-table .col-action { width: 7%; text-align: center; }
    .btn-edit { padding: 6px 12px; font-size: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--primary); color: #fff; cursor: pointer; }
    .btn-edit:hover { background: var(--primary-hover); }
    .empty-list { text-align: center; padding: 32px; color: var(--muted); }
    .search-wrap { margin-bottom: 12px; }
    .search-wrap input { width: 100%; max-width: 320px; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; }
    .search-wrap input:focus { outline: none; border-color: var(--primary); }
  </style>
</head>
<body>
  <div class="app">
    <div class="page-title">
      <span>Job Worker List</span>
      <button type="button" class="primary" onclick="goToAddJobworker()">Add Job Worker</button>
    </div>

    <div class="box">
      <div class="box-title">All job workers (saved with full details)</div>
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search by name, id, station, phone..." oninput="filterList()">
      </div>
      <div class="list-table-wrap">
        <table class="list-table">
          <thead>
            <tr>
              <th class="col-id">Jobworker Id</th>
              <th class="col-name">Name</th>
              <th class="col-relation">Relation with Name</th>
              <th class="col-num">Date</th>
              <th class="col-num">Metal</th>
              <th class="col-num">Chain</th>
              <th class="col-num">Neg</th>
              <th class="col-num">Maal</th>
              <th class="col-address">Address</th>
              <th class="col-station">Station</th>
              <th class="col-phone">Phone No</th>
              <th class="col-phone">Mobile No</th>
              <th class="col-action">Action</th>
            </tr>
          </thead>
          <tbody id="jobworkerTableBody"></tbody>
        </table>
      </div>
      <div id="jobworkerListEmpty" class="empty-list" style="display:none;">No job workers yet. Add one from Add Job Worker page.</div>
    </div>
  </div>

  <script>
    (function () {
      function getList() {
        return JSON.parse(localStorage.getItem('jobworkers') || '[]');
      }

      function relText(j) {
        var t = (j.relationType || '').trim();
        var n = (j.relationName || '').trim();
        return (t && n) ? t + ' ' + n : (n || t || '—');
      }

      function dateText(j) {
        var d = j.obDate || j.date || '';
        return d ? d.slice(0, 10) : '—';
      }

      function renderRows(list) {
        var tbody = document.getElementById('jobworkerTableBody');
        var emptyEl = document.getElementById('jobworkerListEmpty');
        if (!tbody) return;

        if (list.length === 0) {
          tbody.innerHTML = '';
          if (emptyEl) emptyEl.style.display = 'block';
          return;
        }
        if (emptyEl) emptyEl.style.display = 'none';

        tbody.innerHTML = list.map(function (j) {
          var payload = encodeURIComponent(JSON.stringify(j));
          return '<tr>' +
            '<td class="col-id">' + (j.jwId || '—') + '</td>' +
            '<td class="col-name">' + (j.name || '—') + '</td>' +
            '<td class="col-relation">' + relText(j) + '</td>' +
            '<td class="col-num">' + dateText(j) + '</td>' +
            '<td class="col-num">' + (j.obMetal != null ? Number(j.obMetal).toFixed(3) : '—') + '</td>' +
            '<td class="col-num">' + (j.obChain != null ? Number(j.obChain).toFixed(3) : '—') + '</td>' +
            '<td class="col-num">' + (j.obNag != null ? Number(j.obNag).toFixed(3) : '—') + '</td>' +
            '<td class="col-num">' + (j.obMaal != null ? Number(j.obMaal).toFixed(3) : '—') + '</td>' +
            '<td class="col-address" title="' + (j.address || '').replace(/"/g, '&quot;') + '">' + (j.address || '—') + '</td>' +
            '<td class="col-station">' + (j.station || '—') + '</td>' +
            '<td class="col-phone">' + (j.phone || '—') + '</td>' +
            '<td class="col-phone">' + (j.mobile || '—') + '</td>' +
            '<td class="col-action"><button type="button" class="btn-edit" onclick="editJobworker(' + (j.id || 0) + ')" title="Edit">Edit</button></td>' +
            '</tr>';
        }).join('');
      }

      function filterList() {
        var q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
        var list = getList();
        if (q) {
          list = list.filter(function (j) {
            var name = (j.name || '').toLowerCase();
            var jwId = (j.jwId || '').toLowerCase();
            var station = (j.station || '').toLowerCase();
            var phone = (j.phone || '').toLowerCase();
            var mobile = (j.mobile || '').toLowerCase();
            var address = (j.address || '').toLowerCase();
            var rel = (j.relationType || '').toLowerCase() + ' ' + (j.relationName || '').toLowerCase();
            return name.indexOf(q) !== -1 || jwId.indexOf(q) !== -1 || station.indexOf(q) !== -1 ||
              phone.indexOf(q) !== -1 || mobile.indexOf(q) !== -1 || address.indexOf(q) !== -1 || rel.indexOf(q) !== -1;
          });
        }
        renderRows(list);
      }

      function loadList() {
        renderRows(getList());
      }

      function goToAddJobworker() {
        try { localStorage.removeItem('editJobworkerId'); localStorage.removeItem('editJobworkerPayload'); } catch (e) {}
        if (typeof loadPage === 'function') {
          loadPage('pages/add-jobworker.html');
        } else if (window.parent && window.parent !== window && typeof window.parent.loadPage === 'function') {
          window.parent.loadPage('pages/add-jobworker.html');
        } else {
          window.location.href = 'add-jobworker.html';
        }
      }

      function editJobworker(id) {
        var list = getList();
        var j = list.filter(function (x) { return x.id === id || String(x.id) === String(id); })[0];
        if (!j) return;
        try {
          localStorage.setItem('editJobworkerId', String(id));
          localStorage.setItem('editJobworkerPayload', JSON.stringify(j));
        } catch (e) { return; }
        if (typeof loadPage === 'function') {
          loadPage('pages/add-jobworker.html');
        } else if (window.parent && window.parent !== window && typeof window.parent.loadPage === 'function') {
          window.parent.loadPage('pages/add-jobworker.html');
        } else {
          window.location.href = 'add-jobworker.html';
        }
      }

      window.filterList = filterList;
      window.goToAddJobworker = goToAddJobworker;
      window.editJobworker = editJobworker;
      window.loadJobworkerList = loadList;

      loadList();
      window.addEventListener('storage', function (e) {
        if (e.key === 'jobworkers') loadList();
      });
    })();
  </script>
</body>
</html>
