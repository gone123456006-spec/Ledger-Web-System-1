<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recover All Data - Ledger</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .recovery-container {
      max-width: 600px;
      margin: 80px auto;
      padding: 40px;
      text-align: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      color: white;
    }

    .recovery-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .recovery-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .recovery-description {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 10px;
      opacity: 0.95;
    }

    .recovery-status {
      background: rgba(255, 255, 255, 0.15);
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
      font-size: 14px;
    }

    .deleted-count {
      font-size: 32px;
      font-weight: bold;
      color: #ffeb3b;
      margin: 10px 0;
    }

    .btn-recover-all {
      background: white;
      color: #667eea;
      border: none;
      padding: 16px 40px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin: 20px 0;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .btn-recover-all:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .btn-recover-all:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .success-msg {
      background: #4caf50;
      color: white;
    }

    .error-msg {
      background: #f44336;
      color: white;
    }

    .no-deleted {
      background: rgba(255, 255, 255, 0.2);
      padding: 30px;
      border-radius: 8px;
      font-size: 16px;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="recovery-container">
    <div class="recovery-icon">🔄</div>
    <div class="recovery-title">Recover All Data</div>
    <div class="recovery-description">
      Accidentally deleted something? Restore all deleted records with one click.
    </div>

    <div class="recovery-status">
      <div style="opacity: 0.9;">Deleted records found:</div>
      <div class="deleted-count" id="deletedCount">-</div>
    </div>

    <button class="btn-recover-all" id="recoverBtn" onclick="recoverAllData()" disabled>
      🔄 Recover All Data
    </button>

    <div id="messageContainer"></div>

    <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.2); font-size: 12px; opacity: 0.8;">
      ℹ️ All deleted data is kept for 90 days and can be recovered anytime.
    </div>
  </div>

  <script src="../api-config.js"></script>
  <script src="../auth.js"></script>
  <script>
    const API_BASE = window.LEDGER_API_BASE || (
      (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:5001/api/v1'
        : location.origin + '/api/v1'
    );

    async function checkDeletedCount() {
      try {
        const token = window.ledgerAuth.getToken();
        const res = await fetch(`${API_BASE}/recovery/deleted-count`, {
          headers: { Authorization: `Bearer ${token}` },
          credentials: 'include',
        });
        const data = await res.json();

        const countEl = document.getElementById('deletedCount');
        const btn = document.getElementById('recoverBtn');

        if (res.ok && data.totalDeleted > 0) {
          countEl.textContent = data.totalDeleted;
          btn.disabled = false;
        } else {
          countEl.textContent = '0';
          document.querySelector('.recovery-status').innerHTML = `
            <div class="no-deleted">
              ✅ No deleted data found. Everything is safe!
            </div>
          `;
          btn.disabled = true;
        }
      } catch (err) {
        document.getElementById('deletedCount').textContent = 'Error loading...';
      }
    }

    async function recoverAllData() {
      const btn = document.getElementById('recoverBtn');
      const msg = document.getElementById('messageContainer');

      if (!confirm('🔄 Are you sure you want to recover ALL deleted data?\n\nThis action will restore all deleted records from all collections.')) {
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="loading-spinner" style="margin-right: 8px; vertical-align: middle; display: inline-block;"></div> Recovering...';

      try {
        const token = window.ledgerAuth.getToken();
        const res = await fetch(`${API_BASE}/recovery/recover-all`, {
          method: 'PUT',
          headers: { Authorization: `Bearer ${token}` },
          credentials: 'include',
        });
        const data = await res.json();

        if (res.ok) {
          msg.innerHTML = `
            <div class="message success-msg">
              ✅ ${data.message}<br>
              <small>Recovered: ${data.totalRestored} records</small>
            </div>
          `;
          setTimeout(() => {
            checkDeletedCount();
          }, 2000);
        } else {
          msg.innerHTML = `<div class="message error-msg">❌ ${data.message || 'Recovery failed'}</div>`;
        }
      } catch (err) {
        msg.innerHTML = `<div class="message error-msg">❌ Error: ${err.message}</div>`;
      }

      btn.disabled = false;
      btn.innerHTML = '🔄 Recover All Data';
    }

    // Load on page load
    if (window.ledgerAuth && window.ledgerAuth.isLoggedIn()) {
      checkDeletedCount();
    } else {
      window.location.replace('../login.html');
    }
  </script>
</body>
</html>
