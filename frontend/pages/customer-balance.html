<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Customer Balance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; }
    body { margin: 0; background: #e6ebf2; }
    .workspace { background: linear-gradient(to bottom, #cde1ff, #e6f1ff) !important; }

    .customer-balance-wrap {
      margin: 15px;
      background: #fff;
      border: 1px solid #d1d6de;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 30px);
      max-height: calc(100vh - 30px);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    .workspace .customer-balance-wrap { margin: 0; height: 100%; max-height: 100%; border-radius: 0; box-shadow: none; }

    .balance-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 2px solid #d1d6de;
      background: linear-gradient(to bottom, #fafbfc, #f5f7fa);
      flex-shrink: 0;
    }
    .balance-toolbar h2 { margin: 0; font-size: 20px; font-weight: 600; color: #1d1d1f; flex: 1; }
    .balance-toolbar .toolbar-subtitle { font-size: 14px; color: #6e6e73; }
    .btn {
      padding: 10px 18px;
      border: 1px solid #d1d6de;
      background: #fff;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #1d1d1f;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      transition: all 0.2s;
    }
    .btn:hover { background: #007aff; border-color: #007aff; color: #fff; transform: translateY(-1px); box-shadow: 0 2px 4px rgba(0, 122, 255, 0.2); }
    .btn:active { transform: translateY(0); }
    label { font-size: 14px; color: #3a3a3c; font-weight: 500; white-space: nowrap; }
    input {
      height: 40px;
      padding: 8px 14px;
      border: 1px solid #d1d6de;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      min-width: 180px;
    }
    input:focus { outline: none; border-color: #007aff; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12); }
    input::placeholder { color: #8e8e93; }

    .table-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
      background: #fff;
    }
    table { width: 100%; min-width: 920px; border-collapse: collapse; background: #fff; table-layout: fixed; }
    thead { position: sticky; top: 0; z-index: 10; background: #fff; box-shadow: 0 1px 0 0 #c5c9ce; }
    thead th {
      background: linear-gradient(to bottom, #eef1f5, #e4e8ed);
      border: 1px solid #c5c9ce;
      padding: 18px;
      white-space: nowrap;
      font-weight: 600;
      font-size: 13px;
      text-align: left;
      color: #1d1d1f;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    thead th.center { text-align: center; }
    thead th.right { text-align: right; }
    tbody td {
      padding: 18px;
      border: 1px solid #d1d6de;
      font-size: 14px;
      vertical-align: middle;
      color: #333;
      line-height: 1.35;
    }
    tbody td:nth-child(4), tbody td:nth-child(5) { white-space: normal; word-break: break-word; }
    tbody tr { transition: background 0.2s; background: #fff; }
    tbody tr:nth-child(even) { background: #f8f9fb; }
    tbody tr:hover { background: #e8f2ff; }
    tbody tr:hover td { border-color: #b8d4f0; }
    .center { text-align: center; }
    .right { text-align: right; font-weight: 500; font-variant-numeric: tabular-nums; }
    .amount-rate-diff { font-size: 13px; font-weight: 600; color: #28a745; }
    .empty-state { padding: 48px 24px; text-align: center; color: #6e6e73; font-size: 15px; line-height: 1.5; }
    .footer { padding: 14px 20px; font-size: 14px; color: #6e6e73; border-top: 2px solid #d1d6de; background: #f5f7fa; flex-shrink: 0; }
    .mark-cell { display: flex; align-items: center; justify-content: center; }
    .mark-cell input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: #007aff; margin: 0; }
    .table-wrap::-webkit-scrollbar { width: 12px; height: 12px; }
    .table-wrap::-webkit-scrollbar-track { background: #f0f2f5; border-radius: 6px; }
    .table-wrap::-webkit-scrollbar-thumb { background: #b0b4b8; border-radius: 6px; }
    @media (max-width: 768px) {
      .customer-balance-wrap { margin: 8px; height: calc(100vh - 16px); max-height: calc(100vh - 16px); }
      .workspace .customer-balance-wrap { margin: 0; height: 100%; max-height: 100%; }
      .balance-toolbar { padding: 14px; gap: 10px; }
      .balance-toolbar h2 { font-size: 18px; }
      input { min-width: 140px; font-size: 14px; }
      tbody td, thead th { padding: 14px; font-size: 13px; }
    }
  </style>
</head>

<body>
  <div class="customer-balance-wrap">
    <div class="balance-toolbar">
      <h2>Customer Balance</h2>
      <span class="toolbar-subtitle">One row per customer — balance from Add Customer / Transfers</span>
      <button type="button" class="btn" onclick="loadTable()">🔄 Refresh</button>
      <label for="customerBalanceSearch">Search</label>
      <input id="customerBalanceSearch" type="text" placeholder="Name, phone, mobile, station…" onkeyup="filterRows()">
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="center" style="width:8%;">Serial No.</th>
            <th class="center" style="width:7%;">Marks</th>
            <th style="width:8%;">LF No.</th>
            <th style="width:12%;">Name</th>
            <th style="width:14%;">Relation and Name</th>
            <th style="width:12%;">Station</th>
            <th style="width:11%;">Phone no.</th>
            <th style="width:11%;">Mobile</th>
            <th class="right" style="width:17%;">Amount</th>
          </tr>
        </thead>
        <tbody id="customerBalanceTableBody"></tbody>
      </table>
    </div>

    <div class="footer" id="customerBalanceFooter">Customer Balance — one row per customer. Add customers in Add Customer; balances update when you use Transfers in Ready Order.</div>
  </div>

  <script>
    // CUSTOMER BALANCE: Uses "customers" list — one row per customer. Balance from Add Customer / Transfers.
    // When a bill is transferred from Ready Order with Rate Diff, Amount column shows Amount − Rate Diff in green.
    const CUSTOMERS_KEY = "customers";
    const BALANCES_KEY = "customerBalances";

    let tbody = null;
    let footer = null;

    function getRoot() {
      const wrap = document.querySelector(".customer-balance-wrap");
      return wrap || document.querySelector(".workspace") || document;
    }

    function initElements() {
      const root = getRoot();
      tbody = root.querySelector("#customerBalanceTableBody");
      footer = root.querySelector("#customerBalanceFooter");
      if (!tbody) tbody = document.getElementById("customerBalanceTableBody");
      if (!footer) footer = document.getElementById("customerBalanceFooter");
      return !!(tbody && footer);
    }

    function getCustomers() {
      try {
        return JSON.parse(localStorage.getItem(CUSTOMERS_KEY) || "[]");
      } catch (e) {
        return [];
      }
    }

    function getCustomerBalances() {
      try {
        return JSON.parse(localStorage.getItem(BALANCES_KEY) || "[]");
      } catch (e) {
        return [];
      }
    }

    function saveCustomers(customers) {
      localStorage.setItem(CUSTOMERS_KEY, JSON.stringify(customers));
      window.dispatchEvent(new CustomEvent("customersUpdated"));
      if (window.parent && window.parent !== window) window.parent.dispatchEvent(new CustomEvent("customersUpdated"));
      if (window.top && window.top !== window) window.top.dispatchEvent(new CustomEvent("customersUpdated"));
    }

    function relationAndName(c) {
      const r = (c.relation || "").trim();
      const n = (c.relationName || "").trim();
      if (!r && !n) return "—";
      return (r + " " + n).trim();
    }

    function formatAmount(n) {
      if (n == null || n === "") return "—";
      const num = typeof n === "number" ? n : Number(n);
      if (Number.isNaN(num)) return "—";
      return num.toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function loadTable() {
      tbody = null;
      footer = null;
      if (!initElements()) {
        setTimeout(loadTable, 100);
        return;
      }
      const balances = getCustomerBalances();
      const customers = getCustomers();
      const norm = (s) => (s || "").trim().toLowerCase();

      // One row per customer from Add Customer list — data saves and shows here
      const rows = customers.map((c) => {
        const name = (c.name || "").trim();
        const customerEntries = balances.filter((b) => norm(b.customer) === norm(name));
        const amount = (c.openingBalance != null && c.openingBalance !== "") ? Number(c.openingBalance) : 0;
        const amountMinusRateDiffSum = customerEntries.reduce((sum, b) => {
          const v = b.amountMinusRateDiff != null && b.amountMinusRateDiff !== "" ? Number(b.amountMinusRateDiff) : NaN;
          return Number.isNaN(v) ? sum : sum + v;
        }, 0);
        const amountMinusRateDiff = (amountMinusRateDiffSum > 0 || amountMinusRateDiffSum < 0) ? amountMinusRateDiffSum : null;
        return {
          name,
          lfno: c.lfno || "—",
          relation: c.relation || "—",
          relationName: c.relationName || "—",
          station: c.station || "—",
          phone: c.phone || "—",
          mobile: c.mobile || "—",
          amount,
          amountMinusRateDiff,
          mark: c.mark || "—",
          id: c.id != null ? c.id : null
        };
      });

      const sorted = [...rows].sort((a, b) => ((a.name || "").toLowerCase() > (b.name || "").toLowerCase() ? 1 : -1));

      if (sorted.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty-state">No customers yet. Add customers in <strong>Add Customer</strong>. Balances update when you use <strong>Transfers</strong> in Ready Order.</td></tr>';
        if (footer) footer.textContent = "Customer Balance — add customers in Add Customer; use Transfers in Ready Order to update balances.";
        return;
      }

      tbody.innerHTML = "";
      sorted.forEach((r, i) => {
        const sn = i + 1;
        const markVal = r.mark || "—";
        const isChecked = markVal !== "—" && markVal !== "" && markVal;
        const id = (r.id != null ? String(r.id) : "idx-" + i).replace(/"/g, "&quot;");
        const relName = (r.relation + " " + (r.relationName || "")).trim() || "—";
        const tr = document.createElement("tr");
        tr.dataset.customerId = r.id != null ? r.id : i;
        const amountCell = r.amountMinusRateDiff != null
          ? '<span class="amount-rate-diff">₹ ' + formatAmount(r.amountMinusRateDiff) + "</span>"
          : formatAmount(r.amount);
        tr.innerHTML =
          '<td class="center">' + sn + "</td>" +
          '<td class="mark-cell"><input type="checkbox" class="mark-checkbox" data-customer-id="' + id + '" onchange="saveMarkCheckbox(this)" ' + (isChecked ? "checked" : "") + ' title="Mark"></td>' +
          "<td>" + (r.lfno || "—") + "</td>" +
          "<td>" + (r.name || "—") + "</td>" +
          "<td>" + relName + "</td>" +
          "<td>" + (r.station || "—") + "</td>" +
          "<td>" + (r.phone || "—") + "</td>" +
          "<td>" + (r.mobile || "—") + "</td>" +
          '<td class="right">' + amountCell + "</td>";
        tbody.appendChild(tr);
      });

      if (footer) footer.textContent = "Customer Balance — " + sorted.length + " customers. Amount = balance (updated by Transfers in Ready Order).";
    }

    function saveMarkCheckbox(checkbox) {
      const idStr = checkbox.getAttribute("data-customer-id");
      const customers = getCustomers();
      let idx = customers.findIndex((c) => String(c.id) === idStr);
      if (idx < 0 && idStr.indexOf("idx-") === 0) idx = parseInt(idStr.replace("idx-", ""), 10);
      if (idx < 0 || idx >= customers.length) return;
      customers[idx].mark = checkbox.checked ? "✓" : "—";
      saveCustomers(customers);
    }

    function filterRows() {
      if (!tbody) return;
      const root = getRoot();
      const searchEl = root.querySelector("#customerBalanceSearch") || document.getElementById("customerBalanceSearch");
      const q = (searchEl ? searchEl.value || "" : "").toLowerCase().trim();
      const rows = tbody.querySelectorAll("tr");
      if (rows.length === 0) return;
      let visible = 0;
      rows.forEach(row => {
        if (row.querySelector(".empty-state")) {
          row.style.display = q ? "none" : "";
          if (!q) visible = 1;
          return;
        }
        const text = row.innerText.toLowerCase();
        const show = !q || text.includes(q);
        row.style.display = show ? "" : "none";
        if (show) visible++;
      });
      const total = rows.length;
      if (footer && !q) footer.textContent = "Customer Balance — " + total + " customers.";
      else if (footer && q) footer.textContent = "Customer Balance — showing " + visible + " of " + total + " customers.";
    }

    window.saveMarkCheckbox = saveMarkCheckbox;
    window.loadTable = loadTable;
    window.filterRows = filterRows;

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", loadTable);
    } else {
      loadTable();
    }
    window.addEventListener("pageRefresh", function () { setTimeout(loadTable, 100); });
    window.addEventListener("customersUpdated", function () { setTimeout(loadTable, 100); });
    window.addEventListener("customerBalancesUpdated", function () { setTimeout(loadTable, 100); });
  </script>
</body>

</html>
