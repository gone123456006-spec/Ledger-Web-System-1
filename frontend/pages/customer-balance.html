<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Customer Balance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 14px;
    }

    body {
      margin: 0;
      background: #e6ebf2;
    }

    .workspace {
      background: linear-gradient(to bottom, #cde1ff, #e6f1ff) !important;
    }

    .customer-balance-wrap {
      margin: 15px;
      background: #fff;
      border: 1px solid #d1d6de;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 30px);
      max-height: calc(100vh - 30px);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .workspace .customer-balance-wrap {
      margin: 0;
      height: 100%;
      max-height: 100%;
      border-radius: var(--ledger-ws-r, 10px);
      box-shadow: none;
    }

    .customer-balance-wrap > .ledger-page-titlebar:first-child {
      border-radius: 12px 12px 0 0;
    }

    .workspace .customer-balance-wrap > .ledger-page-titlebar:first-child {
      border-radius: var(--ledger-ws-r, 10px) var(--ledger-ws-r, 10px) 0 0;
    }

    .balance-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 2px solid #d1d6de;
      background: linear-gradient(to bottom, #fafbfc, #f5f7fa);
      flex-shrink: 0;
    }

    .balance-toolbar .toolbar-subtitle {
      font-size: 14px;
      color: #6e6e73;
      flex: 1;
      min-width: 200px;
    }

    .btn {
      padding: 10px 18px;
      border: 1px solid #d1d6de;
      background: #fff;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #1d1d1f;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      transition: all 0.2s;
    }

    .btn:hover {
      background: #007aff;
      border-color: #007aff;
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 2px 4px rgba(0, 122, 255, 0.2);
    }

    .btn:active {
      transform: translateY(0);
    }

    label {
      font-size: 14px;
      color: #3a3a3c;
      font-weight: 500;
      white-space: nowrap;
    }

    input {
      height: 40px;
      padding: 8px 14px;
      border: 1px solid #d1d6de;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      min-width: 180px;
    }

    input:focus {
      outline: none;
      border-color: #007aff;
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12);
    }

    input::placeholder {
      color: #8e8e93;
    }

    .table-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 1080px;
      border-collapse: collapse;
      table-layout: fixed;
    }


    select {
      height: 40px;
      padding: 8px 14px;
      border: 1px solid #d1d6de;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      color: #1d1d1f;
      cursor: pointer;
      min-width: 140px;
      outline: none;
      transition: all 0.2s;
    }

    select:focus {
      border-color: #007aff;
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12);
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      box-shadow: 0 1px 0 0 #c5c9ce;
    }

    thead th {
      background: linear-gradient(to bottom, #eef1f5, #e4e8ed);
      border: 1px solid #c5c9ce;
      padding: 18px;
      white-space: nowrap;
      font-weight: 600;
      font-size: 13px;
      text-align: left;
      color: #1d1d1f;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    thead th.center {
      text-align: center;
    }

    thead th.right {
      text-align: right;
    }

    tbody td {
      padding: 18px;
      border: 1px solid #d1d6de;
      font-size: 14px;
      vertical-align: middle;
      color: #333;
      line-height: 1.35;
    }

    tbody td:nth-child(4),
    tbody td:nth-child(5) {
      white-space: normal;
      word-break: break-word;
    }

    tbody tr {
      transition: background 0.2s;
      background: #fff;
    }

    tbody tr:nth-child(even) {
      background: #f8f9fb;
    }

    tbody tr:hover {
      background: #e8f2ff;
    }

    tbody tr:hover td {
      border-color: #b8d4f0;
    }

    .center {
      text-align: center;
    }

    .right {
      text-align: right;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .amount-rate-diff {
      font-size: 13px;
      font-weight: 600;
      color: #28a745;
    }

    .empty-state {
      padding: 48px 24px;
      text-align: center;
      color: #6e6e73;
      font-size: 15px;
      line-height: 1.5;
    }

    .footer {
      padding: 14px 20px;
      font-size: 14px;
      color: #6e6e73;
      border-top: 2px solid #d1d6de;
      background: #f5f7fa;
      flex-shrink: 0;
    }

    .mark-cell {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mark-cell input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #007aff;
      margin: 0;
    }

    .customer-link {
      color: #007aff;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }

    .customer-link:hover {
      text-decoration: underline;
    }

    .table-wrap::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    .table-wrap::-webkit-scrollbar-track {
      background: #f0f2f5;
      border-radius: 6px;
    }

    .table-wrap::-webkit-scrollbar-thumb {
      background: #b0b4b8;
      border-radius: 6px;
    }

    @media (max-width: 768px) {
      .customer-balance-wrap {
        margin: 8px;
        height: calc(100vh - 16px);
        max-height: calc(100vh - 16px);
      }

      .workspace .customer-balance-wrap {
        margin: 0;
        height: 100%;
        max-height: 100%;
      }

      .balance-toolbar {
        padding: 14px;
        gap: 10px;
      }

      input {
        min-width: 140px;
        font-size: 14px;
      }

      tbody td,
      thead th {
        padding: 14px;
        font-size: 13px;
      }
    }

    .filter-btn {
      padding: 8px 14px;
      border: 1.5px solid #d1d6de;
      background: #fff;
      cursor: pointer;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #3a3a3c;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: #007aff;
      color: #007aff;
      background: #f0f7ff;
    }

    .filter-btn.active {
      background: #007aff;
      border-color: #007aff;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0, 122, 255, 0.22);
    }

    .filter-sep {
      width: 1px;
      height: 28px;
      background: #d1d6de;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <div class="customer-balance-wrap">
    <div class="ledger-page-titlebar">Customer Balance</div>
    <div class="balance-toolbar">
      <span class="toolbar-subtitle">One row per bill — balance is isolated by Bill / Order No (same customer name is not merged)</span>
      <button type="button" class="btn" onclick="loadTable()">🔄 Refresh</button>
      <label for="customerBalanceSearch">Search</label>
      <input id="customerBalanceSearch" type="text" placeholder="Name, phone, mobile…" onkeyup="filterRows()">

      <select id="stationFilter" onchange="filterRows()">
        <option value="">All Stations</option>
      </select>

      <div class="filter-sep"></div>
      <button type="button" class="filter-btn active" id="filterAll" onclick="setFilter('all')">All</button>
      <button type="button" class="filter-btn" id="filterNonzero" onclick="setFilter('nonzero')">With
        Balance</button>
      <button type="button" class="filter-btn" id="filterZero" onclick="setFilter('zero')">Zero Balance</button>

      <div class="filter-sep"></div>
      <button type="button" class="filter-btn" id="markAllBtn" onclick="markAll()"
        style="background:#34c759;border-color:#34c759;color:#fff;" title="Check all visible rows">✓ Mark All</button>
      <button type="button" class="filter-btn" id="unmarkAllBtn" onclick="unmarkAll()"
        style="background:#ff3b30;border-color:#ff3b30;color:#fff;" title="Uncheck all visible rows">✕ Unmark
        All</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="center" style="width:8%;">Serial No.</th>
            <th class="center" style="width:7%;">Marks</th>
            <th style="width:8%;">LF No.</th>
            <th style="width:12%;">Bill No.</th>
            <th style="width:10%;">Name</th>
            <th style="width:12%;">Relation and Name</th>
            <th style="width:10%;">Station</th>
            <th style="width:9%;">Phone no.</th>
            <th style="width:9%;">Mobile</th>
            <th class="right" style="width:22%;">Balance</th>
          </tr>
        </thead>
        <tbody id="customerBalanceTableBody"></tbody>
      </table>
    </div>

    <div class="footer" id="customerBalanceFooter">Customer Balance — one row per bill. Same customer name with different bills is not merged.</div>
  </div>

  <script>
    // CUSTOMER BALANCE: One row per bill (customerBalances). Same customer name, different bills = separate rows.
    // When a bill is transferred from Ready Order with Rate Diff, Amount column shows Amount − Rate Diff in green.
    const CUSTOMERS_KEY = "customers";
    const BALANCES_KEY = "customerBalances";

    let tbody = null;
    let footer = null;

    function getRoot() {
      const wrap = document.querySelector(".customer-balance-wrap");
      return wrap || document.querySelector(".workspace") || document;
    }

    function initElements() {
      const root = getRoot();
      tbody = root.querySelector("#customerBalanceTableBody");
      footer = root.querySelector("#customerBalanceFooter");
      if (!tbody) tbody = document.getElementById("customerBalanceTableBody");
      if (!footer) footer = document.getElementById("customerBalanceFooter");
      return !!(tbody && footer);
    }

    function getCustomers() {
      try {
        return JSON.parse(localStorage.getItem(CUSTOMERS_KEY) || "[]");
      } catch (e) {
        return [];
      }
    }

    function getCustomerBalances() {
      try {
        return JSON.parse(localStorage.getItem(BALANCES_KEY) || "[]");
      } catch (e) {
        return [];
      }
    }

    function stripObsoleteCustomerRegisterRows(balances) {
      if (!balances || !balances.length) return balances;
      try {
        const idsWithReal = new Set();
        balances.forEach(function (b) {
          if (!b || b.orderSource === "customer-register") return;
          var id = String(b.customerId || "").trim();
          if (id) idsWithReal.add(id);
        });
        var changed = false;
        var next = balances.filter(function (b) {
          if (!b) return false;
          if (b.orderSource !== "customer-register") return true;
          var id = String(b.customerId || "").trim();
          if (idsWithReal.has(id)) {
            changed = true;
            return false;
          }
          return true;
        });
        if (changed) {
          localStorage.setItem(BALANCES_KEY, JSON.stringify(next));
          try {
            window.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
            if (window.parent && window.parent !== window) window.parent.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
            if (window.top && window.top !== window) window.top.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
          } catch (e) { }
        }
        return changed ? next : balances;
      } catch (e2) {
        return balances;
      }
    }

    /** Same line-total rules as All Bill (`readyExtraLineTotalFromValues`). */
    function allBillLineTotalFromValues(vals) {
      if (!vals || vals.length < 16) {
        if (vals && vals.length >= 13) {
          return parseFloat(vals[12] || 0) || 0;
        }
        return 0;
      }
      var fin = 0;
      if (vals.length >= 17) {
        fin = parseFloat(vals[16] || 0) || 0;
        if (fin !== 0) return fin;
      } else {
        fin = parseFloat(vals[15] || 0) || 0;
        if (fin !== 0) return fin;
      }
      var est = parseFloat(vals[9] || 0) || 0;
      return est;
    }

    function allBillPurchaseSheetRowAmount(r) {
      if (!r) return 0;
      if (r.amount != null && String(r.amount).trim() !== "") {
        var a = parseFloat(String(r.amount).replace(/[^0-9.-]/g, ""));
        if (!isNaN(a)) return a;
      }
      var net = parseFloat(r.netWt) || 0;
      var rate = parseFloat(r.rate) || 0;
      return net * rate;
    }

    function allBillPurchaseSheetRecordTotal(rec) {
      if (!rec) return 0;
      if (rec.rows && rec.rows.length > 0) {
        return rec.rows.reduce(function (s, r) { return s + allBillPurchaseSheetRowAmount(r); }, 0);
      }
      if (rec.total != null && String(rec.total).trim() !== "") {
        var t = parseFloat(rec.total);
        return isNaN(t) ? 0 : t;
      }
      return 0;
    }

    function allBillGetPurchaseSheetTotalsBySource(billNoVal) {
      if (!billNoVal) return { newOrder: 0, readyExtra: 0 };
      try {
        var key = String(billNoVal).trim();
        var mapNew = JSON.parse(localStorage.getItem("newOrderPurchaseSheets") || "{}") || {};
        var mapReady = JSON.parse(localStorage.getItem("readyExtraOrderPurchaseSheets") || "{}") || {};
        var rec1 = mapNew[key] || mapNew[billNoVal];
        var rec2 = mapReady[key] || mapReady[billNoVal];
        return {
          newOrder: allBillPurchaseSheetRecordTotal(rec1),
          readyExtra: allBillPurchaseSheetRecordTotal(rec2)
        };
      } catch (e) {
        return { newOrder: 0, readyExtra: 0 };
      }
    }

    /** One row: same Balance (₹) formula as All Bill `loadBalances`. */
    function allBillComputeRowBalance(balance) {
      if (!balance) return NaN;
      var billKey = String(balance.orderNo || balance.billNo || "").trim();
      if (!billKey) return NaN;
      var allOrders = [];
      var allBillsArray = [];
      try { allOrders = JSON.parse(localStorage.getItem("orders") || "[]"); } catch (e2) { allOrders = []; }
      try { allBillsArray = JSON.parse(localStorage.getItem("bills") || "[]"); } catch (e3) { allBillsArray = []; }

      var linkedOrder = allBillsArray.find(function (o) {
        return o && (String(o.orderNo || "").trim() === billKey || String(o.billNo || "").trim() === billKey);
      });
      if (!linkedOrder) {
        linkedOrder = allOrders.find(function (o) {
          return o && (String(o.orderNo || "").trim() === billKey || String(o.billNo || "").trim() === billKey);
        });
      }

      var orderTotal = 0, purchaseTotal = 0, saleTotal = 0;
      var linkedItems = linkedOrder ? (linkedOrder.items || linkedOrder.rows || []) : [];
      if (linkedItems && linkedItems.length > 0) {
        linkedItems.forEach(function (it) {
          var vals = it.values || [];
          var type = it.type || "Order";
          var valTotal = allBillLineTotalFromValues(vals);
          if (type === "Purchase") purchaseTotal += valTotal;
          else if (type === "Sale") saleTotal += valTotal;
          else orderTotal += valTotal;
        });
      }

      var sheetBySource = allBillGetPurchaseSheetTotalsBySource(billKey);
      var purchaseSheetTotal = sheetBySource.newOrder + sheetBySource.readyExtra;
      var advanceAmt = getPaidAmount(billKey, "Advanced");
      var paidAmt = getPaidAmount(billKey, "Paid");

      var rateDiffResult = 0;
      var rateDiffStored = (linkedOrder && linkedOrder.rateBookDiffSummary) ? linkedOrder.rateBookDiffSummary : (balance.rateBookDiffSummary || "");
      if (rateDiffStored) {
        var match = rateDiffStored.match(/=\s*([-\u2212]?\s*[\d.]+)/);
        if (match) {
          var numStr = match[1].replace(/\u2212/g, "-").replace(/\s/g, "");
          rateDiffResult = parseFloat(numStr) || 0;
        }
      }

      var netOrderSale = orderTotal + saleTotal;
      var billNetBeforePayments;
      if (netOrderSale > 0 || purchaseTotal > 0 || purchaseSheetTotal > 0) {
        billNetBeforePayments = netOrderSale - purchaseTotal - purchaseSheetTotal;
      } else {
        billNetBeforePayments = parseFloat(balance.netAmount || balance.amount || (linkedOrder && (linkedOrder.totalAmount || linkedOrder.netAmount)) || 0) || 0;
      }
      return billNetBeforePayments - advanceAmt - paidAmt - Math.abs(rateDiffResult);
    }

    function syncBalancesFromBills() {
      let balances = [];
      let bills = [];
      try { balances = JSON.parse(localStorage.getItem(BALANCES_KEY) || "[]"); } catch (e) { balances = []; }
      try { bills = JSON.parse(localStorage.getItem("bills") || "[]"); } catch (e) { bills = []; }
      if (!balances.length || !bills.length) return;

      const billMap = new Map();
      bills.forEach(b => {
        const key = String((b && (b.billNo || b.orderNo)) || "").trim();
        if (key) billMap.set(key, b);
      });

      let changed = false;
      const nextBalances = balances.map(row => {
        if (!row) return row;
        const key = String(row.orderNo || row.billNo || "").trim();
        if (!key) return row;
        const bill = billMap.get(key);
        if (!bill) return row;

        const next = { ...row };
        const billAmountNum = parseFloat(bill.amount != null ? bill.amount : bill.totalAmount);
        const billAmount = Number.isFinite(billAmountNum) ? billAmountNum.toFixed(2) : "";
        const billCustomerId = bill.customerId != null ? String(bill.customerId).trim() : "";
        const billCustomer = String(bill.customer || "").trim();
        const billDate = String(bill.date || bill.billDate || "").trim();

        if (billAmount && String(next.amount || "").trim() !== billAmount) { next.amount = billAmount; changed = true; }
        if (billAmount && String(next.netAmount || "").trim() !== billAmount) { next.netAmount = billAmount; changed = true; }
        if (billCustomerId && String(next.customerId || "").trim() !== billCustomerId) { next.customerId = billCustomerId; changed = true; }
        if (billCustomer && String(next.customer || "").trim() !== billCustomer) { next.customer = billCustomer; changed = true; }
        if (billDate && String(next.date || "").trim() !== billDate) { next.date = billDate; changed = true; }
        if (String(next.billNo || "").trim() !== key) { next.billNo = key; changed = true; }
        if (String(next.orderNo || "").trim() !== key) { next.orderNo = key; changed = true; }
        return next;
      });

      if (changed) localStorage.setItem(BALANCES_KEY, JSON.stringify(nextBalances));
    }

    function saveCustomers(customers) {
      localStorage.setItem(CUSTOMERS_KEY, JSON.stringify(customers));
      window.dispatchEvent(new CustomEvent("customersUpdated"));
      if (window.parent && window.parent !== window) window.parent.dispatchEvent(new CustomEvent("customersUpdated"));
      if (window.top && window.top !== window) window.top.dispatchEvent(new CustomEvent("customersUpdated"));
    }

    function relationAndName(c) {
      const r = (c.relation || "").trim();
      const n = (c.relationName || "").trim();
      if (!r && !n) return "—";
      return (r + " " + n).trim();
    }

    function getPaidAmount(billNo, typeFilter = null) {
      if (!billNo) return 0;
      const key = String(billNo).trim();
      const payments = JSON.parse(localStorage.getItem("payments") || "[]");
      return payments
        .filter(p => {
          const billMatch = p && String(p.billNo || "").trim() === key;
          if (!billMatch) return false;
          if (typeFilter === 'Paid') return p.type === 'Paid';
          if (typeFilter === 'Advanced') return p.type !== 'Paid';
          return true;
        })
        .reduce((sum, p) => sum + (Number(p.amount) || 0), 0);
    }

    function formatAmount(n) {
      if (n == null || n === "") return "—";
      const num = typeof n === "number" ? n : Number(n);
      if (Number.isNaN(num)) return "—";
      if (num === 0) return "0";
      return num.toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    /** Master opening from Add Customer (unsigned amount + Dr/Cr) for Customer Balance grid */
    function formatOpeningBalanceCell(rawAmt, typeStr) {
      if (rawAmt == null || rawAmt === "") return "—";
      const n = typeof rawAmt === "number" ? rawAmt : Number(rawAmt);
      if (Number.isNaN(n)) return "—";
      const t = String(typeStr || "Dr").trim().toLowerCase() === "cr" ? "Cr" : "Dr";
      const tagColor = t === "Cr" ? "#1a73e8" : "#d93025";
      if (n === 0) return "0";
      const abs = Math.abs(n);
      const txt = abs.toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return txt + ' <span style="font-size:11px;font-weight:700;color:' + tagColor + '">' + t + "</span>";
    }

    function openingMagnitudeForFilter(rawAmt) {
      if (rawAmt == null || rawAmt === "") return 0;
      const n = Number(rawAmt);
      return Number.isFinite(n) ? Math.abs(n) : 0;
    }

    function hasStoredOpBal(v) {
      if (v == null) return false;
      if (typeof v === "string" && v.trim() === "") return false;
      return true;
    }

    function pickBalanceRowTime(b) {
      if (!b) return 0;
      var t = Date.parse(b.timestamp || b.createdAt || "");
      if (Number.isFinite(t)) return t;
      var d = String(b.date || b.billDate || "").trim();
      var p = Date.parse(d);
      return Number.isFinite(p) ? p : 0;
    }

    function resolveCustomerRowForBalance(b, customers, norm, nameCounts) {
      if (!b) return {};
      var c = null;
      if (b.customerId != null && String(b.customerId).trim() !== "") {
        c = customers.find(function (x) { return String(x.id) === String(b.customerId); }) || null;
      }
      if (!c && b.cid) c = customers.find(function (x) { return x.cid && norm(x.cid) === norm(b.cid); }) || null;
      // If multiple customers share the same name, NEVER resolve by name (prevents mixing balances).
      if (!c && b.customer) {
        var key = norm(b.customer);
        var dup = nameCounts && nameCounts.get ? (nameCounts.get(key) || 0) : 0;
        if (dup <= 1) {
          c = customers.find(function (x) { return norm(x.name) === key; }) || null;
        }
      }
      return c || {};
    }

    /**
     * customers[] may carry statement‑synced currentBalance / currentBalanceType (e.g. from Customer Statement).
     * For Add Customer register rows (no real bill), show that in the Balance column when present.
     */
    function customerMasterCurrentBalanceDisplay(c) {
      if (!c || c.currentBalance == null || String(c.currentBalance).trim() === "") return null;
      const n = Number(c.currentBalance);
      if (!Number.isFinite(n)) return null;
      const tRaw = c.currentBalanceType != null && String(c.currentBalanceType).trim() !== ""
        ? String(c.currentBalanceType).trim() : (n < 0 ? "Cr" : "Dr");
      const isCr = tRaw.toLowerCase() === "cr";
      return {
        displayAmount: Math.abs(n),
        displayType: isCr ? "Cr" : "Dr"
      };
    }

    function pickBillKeyFromBalance(b) {
      return String((b && (b.orderNo || b.billNo)) || "").trim();
    }

    function loadTable() {
      tbody = null;
      footer = null;
      if (!initElements()) {
        setTimeout(loadTable, 100);
        return;
      }
      syncBalancesFromBills();
      let balances = getCustomerBalances();
      balances = stripObsoleteCustomerRegisterRows(balances);
      const customers = getCustomers();
      const norm = (s) => (s || "").trim().toLowerCase();
      const nameCounts = (function () {
        const m = new Map();
        (customers || []).forEach(function (c) {
          if (!c || !c.name) return;
          const k = norm(c.name);
          if (!k) return;
          m.set(k, (m.get(k) || 0) + 1);
        });
        return m;
      })();

      const skipUnregisteredBalanceRow = (b) => {
        if (!b) return true;
        const id = String(b.customerId || "").trim();
        const cid = String(b.cid || "").trim();
        if (id.startsWith("__unregistered__") || cid.startsWith("__unregistered__")) return true;
        // Gold Invoice: only list-selected customers appear on Customer Balance.
        if (b.orderSource === "gold-invoice") {
          if (b.goldInvoiceRegisteredCustomer === true) { /* show */ }
          else if (b.goldInvoiceRegisteredCustomer === false) return true;
          else if (!String(b.customerId || "").trim()) return true;
        }
        if (b.orderSource !== "gold-invoice" && String(b.readyMetal || "").trim() === "Gold" && !id) return true;
        return false;
      };

      const isUnregisteredCustomer = (c) => {
        if (!c || !c.id) return false;
        const id = c.id != null ? String(c.id).trim() : "";
        if (id.startsWith("__unregistered__")) return true;
        if (c.unregistered === true || c.isUnregistered === true) return true;
        const cid = c.cid != null ? String(c.cid).trim() : "";
        if (cid.startsWith("__unregistered__")) return true;
        return false;
      };

      const byBill = new Map();
      balances.forEach(function (b) {
        if (!b || skipUnregisteredBalanceRow(b)) return;
        const billNo = pickBillKeyFromBalance(b);
        if (!billNo) return;
        const k = billNo.toLowerCase();
        const prev = byBill.get(k);
        if (!prev || pickBalanceRowTime(b) >= pickBalanceRowTime(prev)) byBill.set(k, b);
      });

      const rows = [];
      byBill.forEach(function (b) {
        const billNo = pickBillKeyFromBalance(b);
        const c = resolveCustomerRowForBalance(b, customers, norm, nameCounts);
        if (c && c.id != null && isUnregisteredCustomer(c)) return;
        const name = (b.customer || c.name || "").trim() || "—";
        const stored = b.finalBalanceAmount != null && String(b.finalBalanceAmount).trim() !== ""
          ? parseFloat(b.finalBalanceAmount) : null;
        const v = (stored != null && Number.isFinite(stored)) ? stored : allBillComputeRowBalance(b);
        let displayAmount = Math.abs(Number(v) || 0);
        let displayType = (Number(v) || 0) < 0 ? "Cr" : "Dr";
        const rawOpeningType = (c.masterOpeningBalance != null && String(c.masterOpeningBalance).trim() !== "")
          ? (c.masterOpeningBalanceType || c.openingBalanceType || "Dr")
          : (c.openingBalanceType || "Dr");
        const isRegisterStub = String(b.orderSource || "").trim() === "customer-register";
        if (isRegisterStub) {
          const masterCur = customerMasterCurrentBalanceDisplay(c);
          if (masterCur) {
            displayAmount = masterCur.displayAmount;
            displayType = masterCur.displayType;
          }
        }
        const hasMasterOp = c.masterOpeningBalance != null && String(c.masterOpeningBalance).trim() !== "";
        const stmtOpBalNum = hasMasterOp ? (parseFloat(c.masterOpeningBalance) || 0) : (parseFloat(c.openingBalance) || 0);
        const stmtOpTypeStr = hasMasterOp ? (c.masterOpeningBalanceType || c.openingBalanceType || "Dr") : (c.openingBalanceType || "Dr");
        rows.push({
          billNo: billNo,
          isRegisterStub: isRegisterStub,
          name: name,
          lfno: c.lfno || b.lfno || "—",
          relation: c.relation || b.relation || "—",
          relationName: c.relationName || b.relationName || "—",
          station: c.station || b.station || "—",
          phone: c.phone || b.phone || "—",
          mobile: c.mobile || b.mobile || "—",
          amount: displayAmount,
          balanceType: displayType,
          originalOpBal: 0,
          amountMinusRateDiff: null,
          mark: b.mark || "—",
          id: c.id != null ? c.id : null,
          originalOpType: rawOpeningType || "Dr",
          currentBal: displayAmount,
          currentBalType: displayType,
          statementOpeningBal: stmtOpBalNum,
          statementOpeningType: stmtOpTypeStr
        });
      });

      const sorted = rows.slice().sort(function (a, b) {
        const ra = a.isRegisterStub ? 1 : 0;
        const rb = b.isRegisterStub ? 1 : 0;
        if (ra !== rb) return ra - rb;
        return String(a.billNo || "").localeCompare(String(b.billNo || ""), undefined, { sensitivity: "base" });
      });

      if (sorted.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="empty-state">No bill balances yet. Finalize bills (Ready Order / All Bill) so each Bill / Order No appears as its own row.</td></tr>';
        if (footer) footer.textContent = "Customer Balance — no bill-linked rows in customerBalances.";
        return;
      }

      tbody.innerHTML = "";
      sorted.forEach((r, i) => {
        const sn = i + 1;
        const markVal = r.mark || "—";
        const isChecked = markVal !== "—" && markVal !== "" && markVal;
        const masterId = (r.id != null ? String(r.id) : "").replace(/"/g, "&quot;");
        const relName = (r.relation + " " + (r.relationName || "")).trim() || "—";
        const tr = document.createElement("tr");
        tr.dataset.customerId = r.id != null ? r.id : i;
        tr.dataset.billNo = (r.billNo || "").toLowerCase();
        tr.dataset.amount = String(Number(r.amount) || 0);
        tr.dataset.marked = r.mark && r.mark !== "—" ? "1" : "0";
        tr.dataset.station = (r.station || "—").trim().toLowerCase();
        const drCrTag = r.balanceType ? ` <span style="font-size:11px;font-weight:700;color:${r.balanceType === "Dr" ? "#d93025" : "#1a73e8"}">${r.balanceType}</span>` : "";
        const amountCell = r.amountMinusRateDiff != null
          ? '<span class="amount-rate-diff">₹ ' + formatAmount(r.amountMinusRateDiff) + "</span>" + drCrTag
          : formatAmount(r.amount) + drCrTag;
        const safeName = encodeURIComponent(r.name || "");
        const safeLfno = encodeURIComponent(r.lfno || "");
        const safeStation = encodeURIComponent(r.station || "");
        const safeOpBal = encodeURIComponent(r.statementOpeningBal != null ? r.statementOpeningBal : 0);
        const safeOpType = encodeURIComponent(r.statementOpeningType || "Dr");
        const safeCurBal = encodeURIComponent(r.currentBal != null ? r.currentBal : 0);
        const safeCurType = encodeURIComponent(r.currentBalType || "Dr");
        const safeBill = encodeURIComponent(r.isRegisterStub ? "" : (r.billNo || ""));
        const encBillAttr = encodeURIComponent(r.billNo || "").replace(/'/g, "%27");
        const billNoShown = r.isRegisterStub ? "\u2014" : String(r.billNo || "\u2014");
        tr.innerHTML =
          '<td class="center">' + sn + "</td>" +
          '<td class="mark-cell"><input type="checkbox" class="mark-checkbox" data-bill-no="' + encBillAttr + '" onchange="saveMarkCheckbox(this)" ' + (isChecked ? "checked" : "") + ' title="Mark"></td>' +
          "<td>" + (r.lfno || "—") + "</td>" +
          "<td><strong>" + billNoShown.replace(/</g, "&lt;").replace(/"/g, "&quot;") + "</strong></td>" +
          `<td><a href="#" onclick="openCustomerStatement('${masterId}','${safeName}','${safeLfno}','${safeStation}','${safeOpBal}','${safeOpType}','${safeCurBal}','${safeCurType}','${safeBill}'); return false;" class="customer-link">${(r.name || "—")}</a></td>` +
          "<td>" + relName + "</td>" +
          "<td>" + (r.station || "—") + "</td>" +
          "<td>" + (r.phone || "—") + "</td>" +
          "<td>" + (r.mobile || "—") + "</td>" +
          `<td class="right">${amountCell}</td>`;
        tbody.appendChild(tr);
      });

      // Populate Station Dropdown
      const stationSelect = document.getElementById("stationFilter");
      if (stationSelect) {
        const currentVal = stationSelect.value;
        const stations = [...new Set(sorted.map(r => (r.station || "—").trim()))].filter(s => s !== "—" && s !== "").sort();
        stationSelect.innerHTML = '<option value="">All Stations</option>' +
          stations.map(s => `<option value="${s.toLowerCase()}">${s}</option>`).join("");
        // Restore previous selection if it still exists
        if (Array.from(stationSelect.options).some(opt => opt.value === currentVal)) {
          stationSelect.value = currentVal;
        }
      }

      filterRows(); // apply any active filters

      if (footer) footer.textContent = "Customer Balance — " + sorted.length + " bills (one row per Bill / Order No).";
    }

    function saveMarkCheckbox(checkbox) {
      const enc = checkbox.getAttribute("data-bill-no");
      const billNo = enc ? decodeURIComponent(enc) : "";
      if (!billNo) return;
      const balances = getCustomerBalances();
      const idx = balances.findIndex(function (b) {
        return b && String(b.orderNo || b.billNo || "").trim() === billNo;
      });
      if (idx < 0) return;
      balances[idx].mark = checkbox.checked ? "✓" : "—";
      localStorage.setItem(BALANCES_KEY, JSON.stringify(balances));
      try {
        window.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
        if (window.parent && window.parent !== window) window.parent.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
        if (window.top && window.top !== window) window.top.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
      } catch (e) { }
    }

    let activeFilter = 'all';   // 'all' (default) | 'nonzero' | 'marked' | 'zero'

    function setFilter(mode) {
      activeFilter = mode;
      // Toggle active class on buttons
      ['all', 'nonzero', 'marked', 'zero'].forEach(m => {
        const btn = document.getElementById('filter' + m.charAt(0).toUpperCase() + m.slice(1));
        if (btn) btn.classList.toggle('active', m === mode);
      });
      filterRows();
    }

    function filterRows() {
      if (!tbody) return;
      const root = getRoot();
      const searchEl = root.querySelector("#customerBalanceSearch") || document.getElementById("customerBalanceSearch");
      const q = (searchEl ? searchEl.value || "" : "").toLowerCase().trim();
      const rows = tbody.querySelectorAll("tr");
      if (rows.length === 0) return;
      let visible = 0;
      rows.forEach(row => {
        if (row.querySelector(".empty-state")) {
          row.style.display = q ? "none" : "";
          if (!q) visible = 1;
          return;
        }
        // Search filter
        const text = row.innerText.toLowerCase();
        const matchesSearch = !q || text.includes(q);
        // Amount filter (epsilon so ₹0 opening / register stub matches Zero Balance)
        const amt = parseFloat(row.dataset.amount || '0') || 0;
        const AMT_EPS = 0.000001;
        const isZeroBalance = Math.abs(amt) < AMT_EPS;
        const isMarked = row.dataset.marked === '1';
        const rowStation = row.dataset.station || "";

        let matchesFilter = true;
        if (activeFilter === 'nonzero') matchesFilter = !isZeroBalance;
        else if (activeFilter === 'marked') matchesFilter = isMarked;
        else if (activeFilter === 'zero') matchesFilter = isZeroBalance;
        // 'all' shows everything

        // Station filter
        const stationEl = document.getElementById("stationFilter");
        const selStation = stationEl ? stationEl.value : "";
        const matchesStation = !selStation || rowStation === selStation;

        const show = matchesSearch && matchesFilter && matchesStation;
        row.style.display = show ? "" : "none";
        if (show) visible++;
      });
      if (footer) {
        const total = rows.length;
        const filterLabel = activeFilter === 'marked' ? ' (Marked)' : activeFilter === 'zero' ? ' (Zero Balance)' : activeFilter === 'all' ? ' (All bills)' : '';
        if (!q && activeFilter === 'nonzero') footer.textContent = "Customer Balance — " + visible + " bills (zero balance hidden)";
        else if (!q && activeFilter === 'zero') footer.textContent = "Customer Balance — " + visible + " bills (non-zero hidden)";
        else footer.textContent = "Customer Balance — showing " + visible + " of " + total + " bills" + filterLabel + ".";
      }
    }

    function markAll() {
      if (!tbody) return;
      const balances = getCustomerBalances();
      tbody.querySelectorAll('tr').forEach(row => {
        if (row.style.display === 'none') return;
        const cb = row.querySelector('.mark-checkbox');
        if (!cb || cb.checked) return;
        cb.checked = true;
        const enc = cb.getAttribute("data-bill-no");
        const billNo = enc ? decodeURIComponent(enc) : "";
        if (!billNo) return;
        const idx = balances.findIndex(function (b) {
          return b && String(b.orderNo || b.billNo || "").trim() === billNo;
        });
        if (idx >= 0) {
          balances[idx].mark = "\u2713";
          row.dataset.marked = "1";
        }
      });
      localStorage.setItem(BALANCES_KEY, JSON.stringify(balances));
      try {
        window.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
        if (window.parent && window.parent !== window) window.parent.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
        if (window.top && window.top !== window) window.top.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
      } catch (e) { }
    }

    function unmarkAll() {
      if (!tbody) return;
      const balances = getCustomerBalances();
      tbody.querySelectorAll('tr').forEach(row => {
        if (row.style.display === 'none') return;
        const cb = row.querySelector('.mark-checkbox');
        if (!cb || !cb.checked) return;
        cb.checked = false;
        const enc = cb.getAttribute("data-bill-no");
        const billNo = enc ? decodeURIComponent(enc) : "";
        if (!billNo) return;
        const idx = balances.findIndex(function (b) {
          return b && String(b.orderNo || b.billNo || "").trim() === billNo;
        });
        if (idx >= 0) {
          balances[idx].mark = "\u2014";
          row.dataset.marked = "0";
        }
      });
      localStorage.setItem(BALANCES_KEY, JSON.stringify(balances));
      try {
        window.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
        if (window.parent && window.parent !== window) window.parent.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
        if (window.top && window.top !== window) window.top.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
      } catch (e) { }
    }

    function openCustomerStatement(id, name, lfno, station, opbal, opType, curbal, curType, billNo) {
      // Decode the encoded params back to plain strings
      const plainName = name ? decodeURIComponent(name) : '';
      const plainLfno = lfno ? decodeURIComponent(lfno) : '';
      const plainStation = station ? decodeURIComponent(station) : '';
      const plainOpbal = opbal ? decodeURIComponent(opbal) : '0';
      const plainOpType = opType ? decodeURIComponent(opType) : 'Dr';
      const plainCurbal = curbal ? decodeURIComponent(curbal) : '0';
      const plainCurType = curType ? decodeURIComponent(curType) : 'Dr';
      const plainBill = billNo ? decodeURIComponent(billNo) : '';

      // Save to sessionStorage so QR page can always read it — even inside iframe
      try {
        sessionStorage.setItem('stmtCustomer', JSON.stringify({
          id, name: plainName, lfno: plainLfno, station: plainStation, opbal: plainOpbal, opType: plainOpType, curbal: plainCurbal, curType: plainCurType,
          billNo: plainBill
        }));
      } catch (e) { }

      // Also build a URL with params as backup
      const params = new URLSearchParams();
      params.set('id', id);
      if (plainName) params.set('name', plainName);
      if (plainLfno) params.set('lfno', plainLfno);
      if (plainStation) params.set('station', plainStation);
      if (plainOpbal) params.set('opbal', plainOpbal);
      if (plainOpType) params.set('optype', plainOpType);
      if (plainCurbal) params.set('curbal', plainCurbal);
      if (plainCurType) params.set('curtype', plainCurType);
      if (plainBill) params.set('billNo', plainBill);
      const qs = params.toString();

      if (window.parent && window.parent.loadPage) {
        window.parent.loadPage('pages/customer-balance-QR.html?' + qs);
      } else {
        window.location.href = 'customer-balance-QR.html?' + qs;
      }
    }

    window.saveMarkCheckbox = saveMarkCheckbox;
    window.loadTable = loadTable;
    window.filterRows = filterRows;
    window.setFilter = setFilter;
    window.markAll = markAll;
    window.unmarkAll = unmarkAll;
    window.openCustomerStatement = openCustomerStatement;

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", loadTable);
    } else {
      loadTable();
    }
    window.addEventListener("pageRefresh", function () { setTimeout(loadTable, 100); });
    window.addEventListener("customersUpdated", function () { setTimeout(loadTable, 100); });
    window.addEventListener("customerBalancesUpdated", function () { setTimeout(loadTable, 100); });

    // Also listen on parent and top windows (for workspace iframe setup)
    if (window.parent && window.parent !== window) {
      window.parent.addEventListener("customersUpdated", function () { setTimeout(loadTable, 100); });
      window.parent.addEventListener("customerBalancesUpdated", function () { setTimeout(loadTable, 100); });
    }
    if (window.top && window.top !== window) {
      window.top.addEventListener("customersUpdated", function () { setTimeout(loadTable, 100); });
      window.top.addEventListener("customerBalancesUpdated", function () { setTimeout(loadTable, 100); });
    }

    // Poll localStorage for changes (catches same-window updates)
    let lastCustomersHash = "";
    let lastBalancesHash = "";
    let lastBillsHash = "";
    let lastOrdersHash = "";
    setInterval(function () {
      try {
        const custStr = localStorage.getItem("customers") || "";
        const balStr = localStorage.getItem("customerBalances") || "";
        const billsStr = localStorage.getItem("bills") || "";
        const ordersStr = localStorage.getItem("orders") || "";
        if (custStr !== lastCustomersHash || balStr !== lastBalancesHash || billsStr !== lastBillsHash || ordersStr !== lastOrdersHash) {
          lastCustomersHash = custStr;
          lastBalancesHash = balStr;
          lastBillsHash = billsStr;
          lastOrdersHash = ordersStr;
          loadTable();
        }
      } catch (e) { }
    }, 1500);

    // React to storage changes from other tabs/windows
    window.addEventListener("storage", function (e) {
      if (e.key === "customers" || e.key === "customerBalances" || e.key === "bills" || e.key === "orders" || e.key === "payments") {
        setTimeout(loadTable, 100);
      }
    });
  </script>
</body>
