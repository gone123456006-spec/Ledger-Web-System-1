<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Customer Balance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; font-family: Segoe UI, Arial, sans-serif; font-size: 13px; }
    body { margin: 0; background: #e6ebf2; }
    .workspace { background: linear-gradient(to bottom, #cde1ff, #e6f1ff) !important; }

    .customer-balance-wrap {
      margin: 15px;
      background: #fff;
      border: 1px solid #d1d6de;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 30px);
      max-height: calc(100vh - 30px);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    .workspace .customer-balance-wrap { margin: 0; height: 100%; max-height: 100%; border-radius: 0; box-shadow: none; }

    .balance-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
      background: linear-gradient(to bottom, #fafbfc, #f5f7fa);
      flex-shrink: 0;
    }
    .balance-toolbar h2 { margin: 0; font-size: 18px; font-weight: 600; color: #1d1d1f; flex: 1; }
    .btn {
      padding: 8px 16px;
      border: 1px solid #d1d6de;
      background: #fff;
      cursor: pointer;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #1d1d1f;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      transition: all 0.2s;
    }
    .btn:hover { background: #007aff; border-color: #007aff; color: #fff; transform: translateY(-1px); box-shadow: 0 2px 4px rgba(0, 122, 255, 0.2); }
    .btn:active { transform: translateY(0); }
    label { font-size: 13px; color: #3a3a3c; font-weight: 500; white-space: nowrap; }
    input {
      height: 36px;
      padding: 6px 12px;
      border: 1px solid #d1d6de;
      border-radius: 8px;
      font-size: 13px;
      background: #fff;
      min-width: 160px;
    }
    input:focus { outline: none; border-color: #007aff; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12); }
    input::placeholder { color: #8e8e93; }

    .table-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
      background: #fff;
    }
    table { width: 100%; min-width: 900px; border-collapse: separate; border-spacing: 0; background: #fff; }
    thead { position: sticky; top: 0; z-index: 10; background: #fff; }
    thead th {
      background: linear-gradient(to bottom, #f8f9fb, #f0f2f5);
      border-bottom: 2px solid #d1d6de;
      padding: 12px 10px;
      white-space: nowrap;
      font-weight: 600;
      font-size: 12px;
      text-align: left;
      color: #1d1d1f;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    thead th.center { text-align: center; }
    thead th.right { text-align: right; }
    tbody td {
      padding: 10px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
      vertical-align: middle;
      color: #333;
    }
    tbody td:nth-child(4), tbody td:nth-child(5) { max-width: 160px; white-space: normal; word-break: break-word; line-height: 1.4; }
    tbody tr { transition: background 0.2s; background: #fff; }
    tbody tr:nth-child(even) { background: #fafbfc; }
    tbody tr:hover { background: #e8f2ff; }
    tbody tr:hover td { border-bottom-color: #d1e7ff; }
    .center { text-align: center; }
    .right { text-align: right; font-weight: 500; font-variant-numeric: tabular-nums; }
    .empty-state { padding: 40px 20px; text-align: center; color: #8e8e93; font-size: 14px; }
    .footer { padding: 12px 16px; font-size: 13px; color: #6e6e73; border-top: 1px solid #e5e7eb; background: #fafbfc; flex-shrink: 0; }
    .mark-cell { display: flex; align-items: center; justify-content: center; }
    .mark-cell input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #007aff; margin: 0; }
    .table-wrap::-webkit-scrollbar { width: 10px; height: 10px; }
    .table-wrap::-webkit-scrollbar-track { background: #f5f5f7; border-radius: 5px; }
    .table-wrap::-webkit-scrollbar-thumb { background: #c1c1c6; border-radius: 5px; }
    @media (max-width: 768px) {
      .customer-balance-wrap { margin: 8px; height: calc(100vh - 16px); max-height: calc(100vh - 16px); }
      .workspace .customer-balance-wrap { margin: 0; height: 100%; max-height: 100%; }
      .balance-toolbar { padding: 12px; gap: 8px; }
      input { min-width: 120px; }
    }
  </style>
</head>

<body>
  <div class="customer-balance-wrap">
    <div class="balance-toolbar">
      <h2>Customer Balance</h2>
      <span style="font-size:12px; color:#6e6e73;">One row per customer — balance from Add Customer / Transfers</span>
      <button type="button" class="btn" onclick="loadTable()">🔄 Refresh</button>
      <label for="customerBalanceSearch">Search</label>
      <input id="customerBalanceSearch" type="text" placeholder="Name, phone, mobile, station…" onkeyup="filterRows()">
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="center" style="width:50px;">Serial No.</th>
            <th class="center" style="width:60px;">Marks</th>
            <th style="width:80px;">LF No.</th>
            <th>Name</th>
            <th>Relation and Name</th>
            <th style="width:100px;">Station</th>
            <th style="width:100px;">Phone no.</th>
            <th style="width:100px;">Mobile</th>
            <th class="right" style="width:100px;">Amount</th>
          </tr>
        </thead>
        <tbody id="customerBalanceTableBody"></tbody>
      </table>
    </div>

    <div class="footer" id="customerBalanceFooter">Customer Balance — one row per customer. Add customers in Add Customer; balances update when you use Transfers in Ready Order.</div>
  </div>

  <script>
    // CUSTOMER BALANCE: Uses "customers" only. One row per customer. Separate page from All Bill.
    const CUSTOMERS_KEY = "customers";

    let tbody = null;
    let footer = null;

    function getRoot() {
      const wrap = document.querySelector(".customer-balance-wrap");
      return wrap || document.querySelector(".workspace") || document;
    }

    function initElements() {
      const root = getRoot();
      tbody = root.querySelector("#customerBalanceTableBody");
      footer = root.querySelector("#customerBalanceFooter");
      if (!tbody) tbody = document.getElementById("customerBalanceTableBody");
      if (!footer) footer = document.getElementById("customerBalanceFooter");
      return !!(tbody && footer);
    }

    function getCustomers() {
      try {
        return JSON.parse(localStorage.getItem(CUSTOMERS_KEY) || "[]");
      } catch (e) {
        return [];
      }
    }

    function saveCustomers(customers) {
      localStorage.setItem(CUSTOMERS_KEY, JSON.stringify(customers));
      window.dispatchEvent(new CustomEvent("customersUpdated"));
      if (window.parent && window.parent !== window) window.parent.dispatchEvent(new CustomEvent("customersUpdated"));
      if (window.top && window.top !== window) window.top.dispatchEvent(new CustomEvent("customersUpdated"));
    }

    function relationAndName(c) {
      const r = (c.relation || "").trim();
      const n = (c.relationName || "").trim();
      if (!r && !n) return "—";
      return (r + " " + n).trim();
    }

    function formatAmount(n) {
      if (n == null || n === "") return "—";
      const num = typeof n === "number" ? n : Number(n);
      if (Number.isNaN(num)) return "—";
      return num.toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function loadTable() {
      tbody = null;
      footer = null;
      if (!initElements()) {
        setTimeout(loadTable, 100);
        return;
      }
      const customers = getCustomers();
      const sorted = [...customers].sort((a, b) => ((a.name || "").toLowerCase() > (b.name || "").toLowerCase() ? 1 : -1));

      function getCustomerIndex(cust) {
        const k = customers.findIndex(c => c === cust || (c.id != null && c.id === cust.id));
        return k >= 0 ? k : 0;
      }

      if (sorted.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty-state">No customers yet. Add customers in <strong>Add Customer</strong>. Balances update when you use <strong>Transfers</strong> in Ready Order.</td></tr>';
        if (footer) footer.textContent = "Customer Balance — add customers in Add Customer; use Transfers in Ready Order to update balances.";
        return;
      }

      tbody.innerHTML = "";
      sorted.forEach((c, i) => {
        const sn = i + 1;
        const markVal = c.mark || "—";
        const isChecked = markVal !== "—" && markVal !== "" && markVal;
        const origIdx = getCustomerIndex(c);
        const id = (c.id != null ? String(c.id) : "idx-" + origIdx).replace(/"/g, "&quot;");
        const relName = relationAndName(c);
        const tr = document.createElement("tr");
        tr.dataset.customerId = c.id != null ? c.id : i;
        tr.innerHTML =
          '<td class="center">' + sn + "</td>" +
          '<td class="mark-cell"><input type="checkbox" class="mark-checkbox" data-customer-id="' + id + '" onchange="saveMarkCheckbox(this)" ' + (isChecked ? "checked" : "") + ' title="Mark"></td>' +
          "<td>" + (c.lfno || "—") + "</td>" +
          "<td>" + (c.name || "—") + "</td>" +
          "<td>" + relName + "</td>" +
          "<td>" + (c.station || "—") + "</td>" +
          "<td>" + (c.phone || "—") + "</td>" +
          "<td>" + (c.mobile || "—") + "</td>" +
          '<td class="right">' + formatAmount(c.openingBalance) + "</td>";
        tbody.appendChild(tr);
      });

      if (footer) footer.textContent = "Customer Balance — " + sorted.length + " customers. Amount = balance (updated by Transfers in Ready Order).";
    }

    function saveMarkCheckbox(checkbox) {
      const idStr = checkbox.getAttribute("data-customer-id");
      const customers = getCustomers();
      let idx = customers.findIndex(c => String(c.id) === idStr);
      if (idx < 0 && idStr.indexOf("idx-") === 0) idx = parseInt(idStr.replace("idx-", ""), 10);
      if (idx < 0 || idx >= customers.length) return;
      customers[idx].mark = checkbox.checked ? "✓" : "—";
      saveCustomers(customers);
    }

    function filterRows() {
      if (!tbody) return;
      const root = getRoot();
      const searchEl = root.querySelector("#customerBalanceSearch") || document.getElementById("customerBalanceSearch");
      const q = (searchEl ? searchEl.value || "" : "").toLowerCase().trim();
      const rows = tbody.querySelectorAll("tr");
      if (rows.length === 0) return;
      let visible = 0;
      rows.forEach(row => {
        if (row.querySelector(".empty-state")) {
          row.style.display = q ? "none" : "";
          if (!q) visible = 1;
          return;
        }
        const text = row.innerText.toLowerCase();
        const show = !q || text.includes(q);
        row.style.display = show ? "" : "none";
        if (show) visible++;
      });
      const total = rows.length;
      if (footer && !q) footer.textContent = "Customer Balance — " + total + " customers.";
      else if (footer && q) footer.textContent = "Customer Balance — showing " + visible + " of " + total + " customers.";
    }

    window.saveMarkCheckbox = saveMarkCheckbox;
    window.loadTable = loadTable;
    window.filterRows = filterRows;

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", loadTable);
    } else {
      loadTable();
    }
    window.addEventListener("pageRefresh", function () { setTimeout(loadTable, 100); });
    window.addEventListener("customersUpdated", function () { setTimeout(loadTable, 100); });
  </script>
</body>

</html>
