<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Customer Balance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 14px;
    }

    body {
      margin: 0;
      background: #e6ebf2;
    }

    .workspace {
      background: linear-gradient(to bottom, #cde1ff, #e6f1ff) !important;
    }

    .customer-balance-wrap {
      margin: 15px;
      background: #fff;
      border: 1px solid #d1d6de;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 30px);
      max-height: calc(100vh - 30px);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .workspace .customer-balance-wrap {
      margin: 0;
      height: 100%;
      max-height: 100%;
      border-radius: 0;
      box-shadow: none;
    }

    .balance-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 2px solid #d1d6de;
      background: linear-gradient(to bottom, #fafbfc, #f5f7fa);
      flex-shrink: 0;
    }

    .balance-toolbar h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      color: #1d1d1f;
      flex: 1;
    }

    .balance-toolbar .toolbar-subtitle {
      font-size: 14px;
      color: #6e6e73;
    }

    .btn {
      padding: 10px 18px;
      border: 1px solid #d1d6de;
      background: #fff;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #1d1d1f;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      transition: all 0.2s;
    }

    .btn:hover {
      background: #007aff;
      border-color: #007aff;
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 2px 4px rgba(0, 122, 255, 0.2);
    }

    .btn:active {
      transform: translateY(0);
    }

    label {
      font-size: 14px;
      color: #3a3a3c;
      font-weight: 500;
      white-space: nowrap;
    }

    input {
      height: 40px;
      padding: 8px 14px;
      border: 1px solid #d1d6de;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      min-width: 180px;
    }

    input:focus {
      outline: none;
      border-color: #007aff;
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12);
    }

    input::placeholder {
      color: #8e8e93;
    }

    .table-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 920px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    select {
      height: 40px;
      padding: 8px 14px;
      border: 1px solid #d1d6de;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      color: #1d1d1f;
      cursor: pointer;
      min-width: 140px;
      outline: none;
      transition: all 0.2s;
    }

    select:focus {
      border-color: #007aff;
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12);
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      box-shadow: 0 1px 0 0 #c5c9ce;
    }

    thead th {
      background: linear-gradient(to bottom, #eef1f5, #e4e8ed);
      border: 1px solid #c5c9ce;
      padding: 18px;
      white-space: nowrap;
      font-weight: 600;
      font-size: 13px;
      text-align: left;
      color: #1d1d1f;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    thead th.center {
      text-align: center;
    }

    thead th.right {
      text-align: right;
    }

    tbody td {
      padding: 18px;
      border: 1px solid #d1d6de;
      font-size: 14px;
      vertical-align: middle;
      color: #333;
      line-height: 1.35;
    }

    tbody td:nth-child(4),
    tbody td:nth-child(5) {
      white-space: normal;
      word-break: break-word;
    }

    tbody tr {
      transition: background 0.2s;
      background: #fff;
    }

    tbody tr:nth-child(even) {
      background: #f8f9fb;
    }

    tbody tr:hover {
      background: #e8f2ff;
    }

    tbody tr:hover td {
      border-color: #b8d4f0;
    }

    .center {
      text-align: center;
    }

    .right {
      text-align: right;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .amount-rate-diff {
      font-size: 13px;
      font-weight: 600;
      color: #28a745;
    }

    .empty-state {
      padding: 48px 24px;
      text-align: center;
      color: #6e6e73;
      font-size: 15px;
      line-height: 1.5;
    }

    .footer {
      padding: 14px 20px;
      font-size: 14px;
      color: #6e6e73;
      border-top: 2px solid #d1d6de;
      background: #f5f7fa;
      flex-shrink: 0;
    }

    .mark-cell {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mark-cell input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #007aff;
      margin: 0;
    }

    .customer-link {
      color: #007aff;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }

    .customer-link:hover {
      text-decoration: underline;
    }

    .table-wrap::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    .table-wrap::-webkit-scrollbar-track {
      background: #f0f2f5;
      border-radius: 6px;
    }

    .table-wrap::-webkit-scrollbar-thumb {
      background: #b0b4b8;
      border-radius: 6px;
    }

    @media (max-width: 768px) {
      .customer-balance-wrap {
        margin: 8px;
        height: calc(100vh - 16px);
        max-height: calc(100vh - 16px);
      }

      .workspace .customer-balance-wrap {
        margin: 0;
        height: 100%;
        max-height: 100%;
      }

      .balance-toolbar {
        padding: 14px;
        gap: 10px;
      }

      .balance-toolbar h2 {
        font-size: 18px;
      }

      input {
        min-width: 140px;
        font-size: 14px;
      }

      tbody td,
      thead th {
        padding: 14px;
        font-size: 13px;
      }
    }

    .filter-btn {
      padding: 8px 14px;
      border: 1.5px solid #d1d6de;
      background: #fff;
      cursor: pointer;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #3a3a3c;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: #007aff;
      color: #007aff;
      background: #f0f7ff;
    }

    .filter-btn.active {
      background: #007aff;
      border-color: #007aff;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0, 122, 255, 0.22);
    }

    .filter-sep {
      width: 1px;
      height: 28px;
      background: #d1d6de;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <div class="customer-balance-wrap">
    <div class="balance-toolbar">
      <h2>Customer Balance</h2>
      <span class="toolbar-subtitle">One row per customer — balance from Add Customer / Transfers</span>
      <button type="button" class="btn" onclick="loadTable()">🔄 Refresh</button>
      <label for="customerBalanceSearch">Search</label>
      <input id="customerBalanceSearch" type="text" placeholder="Name, phone, mobile…" onkeyup="filterRows()">

      <select id="stationFilter" onchange="filterRows()">
        <option value="">All Stations</option>
      </select>

      <div class="filter-sep"></div>
      <button type="button" class="filter-btn active" id="filterNonzero" onclick="setFilter('nonzero')">With
        Balance</button>
      <button type="button" class="filter-btn" id="filterZero" onclick="setFilter('zero')">Zero Balance</button>

      <div class="filter-sep"></div>
      <button type="button" class="filter-btn" id="markAllBtn" onclick="markAll()"
        style="background:#34c759;border-color:#34c759;color:#fff;" title="Check all visible rows">✓ Mark All</button>
      <button type="button" class="filter-btn" id="unmarkAllBtn" onclick="unmarkAll()"
        style="background:#ff3b30;border-color:#ff3b30;color:#fff;" title="Uncheck all visible rows">✕ Unmark
        All</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="center" style="width:8%;">Serial No.</th>
            <th class="center" style="width:7%;">Marks</th>
            <th style="width:8%;">LF No.</th>
            <th style="width:12%;">Name</th>
            <th style="width:14%;">Relation and Name</th>
            <th style="width:12%;">Station</th>
            <th style="width:11%;">Phone no.</th>
            <th style="width:11%;">Mobile</th>
            <th class="right" style="width:17%;">Balance</th>
          </tr>
        </thead>
        <tbody id="customerBalanceTableBody"></tbody>
      </table>
    </div>

    <div class="footer" id="customerBalanceFooter">Customer Balance — one row per customer. Add customers in Add
      Customer; balances update when you use Transfers in Ready Order.</div>
  </div>

  <script>
    // CUSTOMER BALANCE: Uses "customers" list — one row per customer. Balance from Add Customer / Transfers.
    // When a bill is transferred from Ready Order with Rate Diff, Amount column shows Amount − Rate Diff in green.
    const CUSTOMERS_KEY = "customers";
    const BALANCES_KEY = "customerBalances";

    let tbody = null;
    let footer = null;

    function getRoot() {
      const wrap = document.querySelector(".customer-balance-wrap");
      return wrap || document.querySelector(".workspace") || document;
    }

    function initElements() {
      const root = getRoot();
      tbody = root.querySelector("#customerBalanceTableBody");
      footer = root.querySelector("#customerBalanceFooter");
      if (!tbody) tbody = document.getElementById("customerBalanceTableBody");
      if (!footer) footer = document.getElementById("customerBalanceFooter");
      return !!(tbody && footer);
    }

    function getCustomers() {
      try {
        return JSON.parse(localStorage.getItem(CUSTOMERS_KEY) || "[]");
      } catch (e) {
        return [];
      }
    }

    function getCustomerBalances() {
      try {
        return JSON.parse(localStorage.getItem(BALANCES_KEY) || "[]");
      } catch (e) {
        return [];
      }
    }

    function syncBalancesFromBills() {
      let balances = [];
      let bills = [];
      try { balances = JSON.parse(localStorage.getItem(BALANCES_KEY) || "[]"); } catch (e) { balances = []; }
      try { bills = JSON.parse(localStorage.getItem("bills") || "[]"); } catch (e) { bills = []; }
      if (!balances.length || !bills.length) return;

      const billMap = new Map();
      bills.forEach(b => {
        const key = String((b && (b.billNo || b.orderNo)) || "").trim();
        if (key) billMap.set(key, b);
      });

      let changed = false;
      const nextBalances = balances.map(row => {
        if (!row) return row;
        const key = String(row.orderNo || row.billNo || "").trim();
        if (!key) return row;
        const bill = billMap.get(key);
        if (!bill) return row;

        const next = { ...row };
        const billAmountNum = parseFloat(bill.amount != null ? bill.amount : bill.totalAmount);
        const billAmount = Number.isFinite(billAmountNum) ? billAmountNum.toFixed(2) : "";
        const billCustomerId = bill.customerId != null ? String(bill.customerId).trim() : "";
        const billCustomer = String(bill.customer || "").trim();
        const billDate = String(bill.date || bill.billDate || "").trim();

        if (billAmount && String(next.amount || "").trim() !== billAmount) { next.amount = billAmount; changed = true; }
        if (billAmount && String(next.netAmount || "").trim() !== billAmount) { next.netAmount = billAmount; changed = true; }
        if (billCustomerId && String(next.customerId || "").trim() !== billCustomerId) { next.customerId = billCustomerId; changed = true; }
        if (billCustomer && String(next.customer || "").trim() !== billCustomer) { next.customer = billCustomer; changed = true; }
        if (billDate && String(next.date || "").trim() !== billDate) { next.date = billDate; changed = true; }
        if (String(next.billNo || "").trim() !== key) { next.billNo = key; changed = true; }
        if (String(next.orderNo || "").trim() !== key) { next.orderNo = key; changed = true; }
        return next;
      });

      if (changed) localStorage.setItem(BALANCES_KEY, JSON.stringify(nextBalances));
    }

    function saveCustomers(customers) {
      localStorage.setItem(CUSTOMERS_KEY, JSON.stringify(customers));
      window.dispatchEvent(new CustomEvent("customersUpdated"));
      if (window.parent && window.parent !== window) window.parent.dispatchEvent(new CustomEvent("customersUpdated"));
      if (window.top && window.top !== window) window.top.dispatchEvent(new CustomEvent("customersUpdated"));
    }

    function relationAndName(c) {
      const r = (c.relation || "").trim();
      const n = (c.relationName || "").trim();
      if (!r && !n) return "—";
      return (r + " " + n).trim();
    }

    function getPaidAmount(billNo, typeFilter = null) {
      if (!billNo) return 0;
      const payments = JSON.parse(localStorage.getItem("payments") || "[]");
      return payments
        .filter(p => {
          const billMatch = p.billNo === billNo;
          if (!billMatch) return false;
          if (typeFilter === 'Paid') return p.type === 'Paid';
          if (typeFilter === 'Advanced') return p.type !== 'Paid';
          return true;
        })
        .reduce((sum, p) => sum + (Number(p.amount) || 0), 0);
    }

    function formatAmount(n) {
      if (n == null || n === "") return "—";
      const num = typeof n === "number" ? n : Number(n);
      if (Number.isNaN(num)) return "—";
      if (num === 0) return "0";
      return num.toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function loadTable() {
      tbody = null;
      footer = null;
      if (!initElements()) {
        setTimeout(loadTable, 100);
        return;
      }
      syncBalancesFromBills();
      const balances = getCustomerBalances();
      const customers = getCustomers();
      const norm = (s) => (s || "").trim().toLowerCase();

      // One row per customer from Add Customer list — data saves and shows here
      const rows = customers.map((c) => {
        const name = (c.name || "").trim();
        // Match by strong id first, then cid, then name.
        const customerEntries = balances.filter((b) => {
          const byCustomerId =
            c.id != null &&
            b.customerId != null &&
            String(c.id).trim() !== "" &&
            String(b.customerId).trim() !== "" &&
            String(c.id) === String(b.customerId);
          const byCid = c.cid && b.cid && norm(b.cid) === norm(c.cid);
          const byName = norm(b.customer) === norm(name);
          return byCustomerId || byCid || byName;
        });

        // Customer Balance table must match All Bill "Balance (₹)" totals (sum of per-bill balances).
        // Opening Balance is shown/used in Customer Statement, not added here (prevents "random" extra amounts).
        let openingBal = (c.openingBalance != null && c.openingBalance !== "") ? Number(c.openingBalance) : 0;
        if ((c.openingBalanceType || "").toLowerCase() === "cr") openingBal = -Math.abs(openingBal);
        if ((c.openingBalanceType || "").toLowerCase() === "dr") openingBal = Math.abs(openingBal);
        let dynamicSum = 0;

        if (customerEntries.length > 0) {
          // Use computedBalAmt written by All Bill (guaranteed identical values)
          // Falls back to simple calc if All Bill hasn't been loaded yet
          customerEntries.forEach(balance => {
            if (balance.computedBalAmt != null) {
              // All Bill already computed this — use it directly
              dynamicSum += Number(balance.computedBalAmt);
            } else {
              // Fallback: simple calc using stored amount minus payments
              const billNoVal = balance.orderNo || balance.billNo || "";
              const netAmt = parseFloat(balance.amount || balance.netAmount || 0);
              const advanceAmt = getPaidAmount(billNoVal, 'Advanced');
              const paidAmt = getPaidAmount(billNoVal, 'Paid');
              let rateDiffResult = 0;
              if (balance.amountMinusRateDiff != null && balance.amount != null) {
                rateDiffResult = Math.abs(parseFloat(balance.amount) - parseFloat(balance.amountMinusRateDiff));
              }
              const computed = netAmt - advanceAmt - paidAmt - rateDiffResult;
              // Persist so Customer Balance matches All Bill exactly, even before opening All Bill.
              balance.computedBalAmt = computed;
              dynamicSum += computed;
            }
          });
        }

        const originalOpBal = openingBal;

        return {
          name,
          lfno: c.lfno || "—",
          relation: c.relation || "—",
          relationName: c.relationName || "—",
          station: c.station || "—",
          phone: c.phone || "—",
          mobile: c.mobile || "—",
          amount: Math.abs(dynamicSum),
          balanceType: dynamicSum >= 0 ? 'Dr' : 'Cr',
          originalOpBal,
          amountMinusRateDiff: null,
          mark: c.mark || "—",
          id: c.id != null ? c.id : null,
          originalOpType: c.openingBalanceType || "Dr",
          currentBal: Math.abs(dynamicSum),
          currentBalType: dynamicSum >= 0 ? 'Dr' : 'Cr'
        };
      });

      const sorted = [...rows].sort((a, b) => ((a.name || "").toLowerCase() > (b.name || "").toLowerCase() ? 1 : -1));

      if (sorted.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty-state">No customers yet. Add customers in <strong>Add Customer</strong>. Balances update when you use <strong>Transfers</strong> in Ready Order.</td></tr>';
        if (footer) footer.textContent = "Customer Balance — add customers in Add Customer; use Transfers in Ready Order to update balances.";
        return;
      }

      tbody.innerHTML = "";
      sorted.forEach((r, i) => {
        const sn = i + 1;
        const markVal = r.mark || "—";
        const isChecked = markVal !== "—" && markVal !== "" && markVal;
        const id = (r.id != null ? String(r.id) : "idx-" + i).replace(/"/g, "&quot;");
        const relName = (r.relation + " " + (r.relationName || "")).trim() || "—";
        const tr = document.createElement("tr");
        tr.dataset.customerId = r.id != null ? r.id : i;
        tr.dataset.amount = r.amount;   // store raw amount for filter
        tr.dataset.marked = r.mark && r.mark !== '—' ? '1' : '0';
        tr.dataset.station = (r.station || "—").trim().toLowerCase();
        const drCrTag = r.balanceType ? ` <span style="font-size:11px;font-weight:700;color:${r.balanceType === 'Dr' ? '#d93025' : '#1a73e8'}">${r.balanceType}</span>` : '';
        const amountCell = r.amountMinusRateDiff != null
          ? '<span class="amount-rate-diff">₹ ' + formatAmount(r.amountMinusRateDiff) + '</span>' + drCrTag
          : formatAmount(r.amount) + drCrTag;
        const safeName = encodeURIComponent(r.name || '');
        const safeLfno = encodeURIComponent(r.lfno || '');
        const safeStation = encodeURIComponent(r.station || '');
        const safeOpBal = encodeURIComponent(r.originalOpBal != null ? r.originalOpBal : 0);
        const safeOpType = encodeURIComponent(r.originalOpType || 'Dr');
        const safeCurBal = encodeURIComponent(r.currentBal != null ? r.currentBal : 0);
        const safeCurType = encodeURIComponent(r.currentBalType || 'Dr');
        tr.innerHTML =
          '<td class="center">' + sn + "</td>" +
          '<td class="mark-cell"><input type="checkbox" class="mark-checkbox" data-customer-id="' + id + '" onchange="saveMarkCheckbox(this)" ' + (isChecked ? "checked" : "") + ' title="Mark"></td>' +
          "<td>" + (r.lfno || "—") + "</td>" +
          `<td><a href="#" onclick="openCustomerStatement('${id}','${safeName}','${safeLfno}','${safeStation}','${safeOpBal}','${safeOpType}','${safeCurBal}','${safeCurType}'); return false;" class="customer-link">${(r.name || "—")}</a></td>` +
          "<td>" + relName + "</td>" +
          "<td>" + (r.station || "—") + "</td>" +
          "<td>" + (r.phone || "—") + "</td>" +
          "<td>" + (r.mobile || "—") + "</td>" +
          `<td class="right">${amountCell}</td>`;
        tbody.appendChild(tr);
      });

      // Populate Station Dropdown
      const stationSelect = document.getElementById("stationFilter");
      if (stationSelect) {
        const currentVal = stationSelect.value;
        const stations = [...new Set(sorted.map(r => (r.station || "—").trim()))].filter(s => s !== "—" && s !== "").sort();
        stationSelect.innerHTML = '<option value="">All Stations</option>' +
          stations.map(s => `<option value="${s.toLowerCase()}">${s}</option>`).join("");
        // Restore previous selection if it still exists
        if (Array.from(stationSelect.options).some(opt => opt.value === currentVal)) {
          stationSelect.value = currentVal;
        }
      }

      filterRows(); // apply any active filters

      if (footer) footer.textContent = "Customer Balance — " + sorted.length + " customers. Amount = balance (updated by Transfers in Ready Order).";
    }

    function saveMarkCheckbox(checkbox) {
      const idStr = checkbox.getAttribute("data-customer-id");
      const customers = getCustomers();
      let idx = customers.findIndex((c) => String(c.id) === idStr);
      if (idx < 0 && idStr.indexOf("idx-") === 0) idx = parseInt(idStr.replace("idx-", ""), 10);
      if (idx < 0 || idx >= customers.length) return;
      customers[idx].mark = checkbox.checked ? "✓" : "—";
      saveCustomers(customers);
    }

    let activeFilter = 'nonzero';   // 'nonzero' (default) | 'all' | 'marked' | 'zero'

    function setFilter(mode) {
      activeFilter = mode;
      // Toggle active class on buttons
      ['all', 'nonzero', 'marked', 'zero'].forEach(m => {
        const btn = document.getElementById('filter' + m.charAt(0).toUpperCase() + m.slice(1));
        if (btn) btn.classList.toggle('active', m === mode);
      });
      filterRows();
    }

    function filterRows() {
      if (!tbody) return;
      const root = getRoot();
      const searchEl = root.querySelector("#customerBalanceSearch") || document.getElementById("customerBalanceSearch");
      const q = (searchEl ? searchEl.value || "" : "").toLowerCase().trim();
      const rows = tbody.querySelectorAll("tr");
      if (rows.length === 0) return;
      let visible = 0;
      rows.forEach(row => {
        if (row.querySelector(".empty-state")) {
          row.style.display = q ? "none" : "";
          if (!q) visible = 1;
          return;
        }
        // Search filter
        const text = row.innerText.toLowerCase();
        const matchesSearch = !q || text.includes(q);
        // Amount filter
        const amt = parseFloat(row.dataset.amount || '0') || 0;
        const isMarked = row.dataset.marked === '1';
        const rowStation = row.dataset.station || "";

        let matchesFilter = true;
        if (activeFilter === 'nonzero') matchesFilter = amt > 0;
        else if (activeFilter === 'marked') matchesFilter = isMarked;
        else if (activeFilter === 'zero') matchesFilter = amt <= 0;
        // 'all' shows everything

        // Station filter
        const stationEl = document.getElementById("stationFilter");
        const selStation = stationEl ? stationEl.value : "";
        const matchesStation = !selStation || rowStation === selStation;

        const show = matchesSearch && matchesFilter && matchesStation;
        row.style.display = show ? "" : "none";
        if (show) visible++;
      });
      if (footer) {
        const total = rows.length;
        const filterLabel = activeFilter === 'marked' ? ' (Marked)' : activeFilter === 'zero' ? ' (Zero Balance)' : activeFilter === 'all' ? ' (All Customers)' : '';
        if (!q && activeFilter === 'nonzero') footer.textContent = "Customer Balance — " + visible + " customers (zero balance hidden)";
        else footer.textContent = "Customer Balance — showing " + visible + " of " + total + " customers" + filterLabel + ".";
      }
    }

    function markAll() {
      if (!tbody) return;
      const customers = getCustomers();
      tbody.querySelectorAll('tr').forEach(row => {
        if (row.style.display === 'none') return;
        const cb = row.querySelector('.mark-checkbox');
        if (!cb || cb.checked) return;
        cb.checked = true;
        // Save to localStorage
        const idStr = cb.getAttribute('data-customer-id');
        let idx = customers.findIndex(c => String(c.id) === idStr);
        if (idx < 0 && idStr && idStr.indexOf('idx-') === 0) idx = parseInt(idStr.replace('idx-', ''), 10);
        if (idx >= 0 && idx < customers.length) {
          customers[idx].mark = '\u2713';
          row.dataset.marked = '1';
        }
      });
      saveCustomers(customers);
    }

    function unmarkAll() {
      if (!tbody) return;
      const customers = getCustomers();
      tbody.querySelectorAll('tr').forEach(row => {
        if (row.style.display === 'none') return;
        const cb = row.querySelector('.mark-checkbox');
        if (!cb || !cb.checked) return;
        cb.checked = false;
        const idStr = cb.getAttribute('data-customer-id');
        let idx = customers.findIndex(c => String(c.id) === idStr);
        if (idx < 0 && idStr && idStr.indexOf('idx-') === 0) idx = parseInt(idStr.replace('idx-', ''), 10);
        if (idx >= 0 && idx < customers.length) {
          customers[idx].mark = '\u2014';
          row.dataset.marked = '0';
        }
      });
      saveCustomers(customers);
    }

    function openCustomerStatement(id, name, lfno, station, opbal, opType, curbal, curType) {
      // Decode the encoded params back to plain strings
      const plainName = name ? decodeURIComponent(name) : '';
      const plainLfno = lfno ? decodeURIComponent(lfno) : '';
      const plainStation = station ? decodeURIComponent(station) : '';
      const plainOpbal = opbal ? decodeURIComponent(opbal) : '0';
      const plainOpType = opType ? decodeURIComponent(opType) : 'Dr';
      const plainCurbal = curbal ? decodeURIComponent(curbal) : '0';
      const plainCurType = curType ? decodeURIComponent(curType) : 'Dr';

      // Save to sessionStorage so QR page can always read it — even inside iframe
      try {
        sessionStorage.setItem('stmtCustomer', JSON.stringify({
          id, name: plainName, lfno: plainLfno, station: plainStation, opbal: plainOpbal, opType: plainOpType, curbal: plainCurbal, curType: plainCurType
        }));
      } catch (e) { }

      // Also build a URL with params as backup
      const params = new URLSearchParams();
      params.set('id', id);
      if (plainName) params.set('name', plainName);
      if (plainLfno) params.set('lfno', plainLfno);
      if (plainStation) params.set('station', plainStation);
      if (plainOpbal) params.set('opbal', plainOpbal);
      if (plainOpType) params.set('optype', plainOpType);
      if (plainCurbal) params.set('curbal', plainCurbal);
      if (plainCurType) params.set('curtype', plainCurType);
      const qs = params.toString();

      if (window.parent && window.parent.loadPage) {
        window.parent.loadPage('pages/customer-balance-QR.html?' + qs);
      } else {
        window.location.href = 'customer-balance-QR.html?' + qs;
      }
    }

    window.saveMarkCheckbox = saveMarkCheckbox;
    window.loadTable = loadTable;
    window.filterRows = filterRows;
    window.setFilter = setFilter;
    window.markAll = markAll;
    window.unmarkAll = unmarkAll;
    window.openCustomerStatement = openCustomerStatement;

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", loadTable);
    } else {
      loadTable();
    }
    window.addEventListener("pageRefresh", function () { setTimeout(loadTable, 100); });
    window.addEventListener("customersUpdated", function () { setTimeout(loadTable, 100); });
    window.addEventListener("customerBalancesUpdated", function () { setTimeout(loadTable, 100); });

    // Also listen on parent and top windows (for workspace iframe setup)
    if (window.parent && window.parent !== window) {
      window.parent.addEventListener("customersUpdated", function () { setTimeout(loadTable, 100); });
      window.parent.addEventListener("customerBalancesUpdated", function () { setTimeout(loadTable, 100); });
    }
    if (window.top && window.top !== window) {
      window.top.addEventListener("customersUpdated", function () { setTimeout(loadTable, 100); });
      window.top.addEventListener("customerBalancesUpdated", function () { setTimeout(loadTable, 100); });
    }

    // Poll localStorage for changes (catches same-window updates)
    let lastCustomersHash = "";
    let lastBalancesHash = "";
    setInterval(function () {
      try {
        const custStr = localStorage.getItem("customers") || "";
        const balStr = localStorage.getItem("customerBalances") || "";
        if (custStr !== lastCustomersHash || balStr !== lastBalancesHash) {
          lastCustomersHash = custStr;
          lastBalancesHash = balStr;
          loadTable();
        }
      } catch (e) { }
    }, 1500);

    // React to storage changes from other tabs/windows
    window.addEventListener("storage", function (e) {
      if (e.key === "customers" || e.key === "customerBalances" || e.key === "bills" || e.key === "payments") {
        setTimeout(loadTable, 100);
      }
    });
  </script>
</body>
