<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Ledger Management System</title>
    <!-- FontAwesome for professional icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-gray: #5f6368;
            --google-light-gray: #f8f9fa;
            --text-dark: #202124;
            --border-color: #dadce0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header img {
            height: 40px;
            margin-right: 15px;
            object-fit: contain;
        }

        .header-title {
            font-size: 20px;
            color: var(--google-gray);
            font-weight: 400;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px 60px;
        }

        h2 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 24px;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h2 i {
            color: var(--google-blue);
            font-size: 20px;
        }

        .section {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
        }

        /* Keyboard Shortcuts Table */
        .shortcut-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        .shortcut-table th, .shortcut-table td {
            text-align: left;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .shortcut-table th {
            color: var(--google-gray);
            font-weight: 500;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .key-badge {
            background: var(--google-light-gray);
            border: 1px solid var(--border-color);
            border-bottom: 2px solid #ccc;
            border-radius: 4px;
            padding: 4px 8px;
            font-family: monospace;
            font-weight: bold;
            font-size: 13px;
            color: #333;
            margin-right: 4px;
        }

        .shortcut-desc {
            color: var(--google-gray);
            font-size: 15px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 24px;
            max-width: 500px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: var(--google-gray);
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--google-blue);
        }

        .hint {
            display: block;
            margin-top: 4px;
            font-size: 12px;
            color: #888;
        }

        .btn-save {
            background: var(--google-blue);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-save:hover {
            background: #1765cc;
        }

        @media (max-width: 600px) {
            .section { padding: 20px; }
            .shortcut-table th, .shortcut-table td { padding: 12px 8px; }
        }
    </style>
</head>
<body>

    <div class="header" onclick="location.reload()" style="cursor:pointer">
        <div class="header-title">Settings</div>
    </div>

    <div class="container">
        <!-- Keyboard Shortcuts Section -->
        <div class="section">
            <h2><i class="fas fa-keyboard"></i> Keyboard Shortcuts</h2>
            <p style="color: var(--google-gray); font-size: 14px; margin-bottom: 20px;">Use these shortcuts to navigate the application faster.</p>
            
            <table class="shortcut-table">
                <thead>
                    <tr>
                        <th>Action</th>
                        <th>Shortcut</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="shortcut-desc">Move to Next Field / Submit Form</td>
                        <td><span class="key-badge">Enter</span></td>
                    </tr>
                    <tr>
                        <td class="shortcut-desc">Navigate Between Input Fields</td>
                        <td><span class="key-badge">Tab</span></td>
                    </tr>
                    <tr>
                        <td class="shortcut-desc">Close Modal / Cancel Action</td>
                        <td><span class="key-badge">Esc</span></td>
                    </tr>
                    <tr>
                        <td class="shortcut-desc">Quick Search (Proposed)</td>
                        <td><span class="key-badge">F2</span></td>
                    </tr>
                    <tr>
                        <td class="shortcut-desc">Print Current View (Standard)</td>
                        <td><span class="key-badge">Ctrl</span> + <span class="key-badge">P</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
