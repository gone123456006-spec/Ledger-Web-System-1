<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobworker Entry</title>
  <style>
    :root {
      --bg: #e8f0fe;
      --bg-gradient: linear-gradient(160deg, #d4e4f7 0%, #e8f0fe 50%, #f0f6fc 100%);
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #5f6368;
      --border: #dadce0;
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --danger: #d93025;
      --success: #188038;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      font-family: "Google Sans", "Segoe UI", Roboto, Arial, sans-serif;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg-gradient);
      color: var(--text);
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      min-height: 100%;
      padding: 24px 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .workspace .page {
      padding: 0;
      min-height: 0;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 24px;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      z-index: 10000;
      transform: translateY(100px);
      transition: transform 0.3s ease;
    }

    .toast.show {
      transform: translateY(0);
    }

    .toast.success {
      background: var(--success);
    }

    .toast.error {
      background: var(--danger);
    }

    .erp-form {
      padding: 14px 14px 16px;
      display: block;
      width: fit-content;
      max-width: 100%;
      align-self: center;
    }

    .ledger-page-shell.customer-add-shell.jwe-entry-shell {
      width: fit-content;
      max-width: min(640px, calc(100vw - 48px));
      align-self: center;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .workspace .ledger-page-shell.customer-add-shell.jwe-entry-shell {
      margin: 0 auto;
      width: fit-content;
      max-width: 100%;
      border-radius: 6px;
    }

    .jwe-entry-shell {
      --jw-input-width: 248px;
    }

    .jwe-entry-shell .customer-cards-grid {
      display: grid;
      grid-template-columns: max-content max-content;
      gap: 10px;
      width: fit-content;
      max-width: 100%;
    }

    .jwe-entry-shell .detail-card {
      width: max-content;
      max-width: 100%;
      min-height: 0;
    }

    .customer-cards-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
      width: 100%;
    }

    .detail-card {
      border: 1px solid #b0bcc9;
      border-radius: 4px;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 380px;
      overflow: hidden;
    }

    .detail-card-head {
      background: linear-gradient(180deg, #e8eaed 0%, #d8dde3 100%);
      color: #3c4043;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-bottom: 1px solid #b0bcc9;
    }

    .detail-card-body {
      padding: 12px 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .customer-add-shell .inline-field {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 4px 8px;
      align-items: center;
      min-height: 36px;
    }

    .customer-add-shell .inline-field label {
      margin: 0;
      font-size: 12px;
      text-align: right;
      color: #3c4043;
      font-weight: 600;
      padding-right: 4px;
    }

    label .required {
      color: var(--danger);
    }

    .customer-add-shell .inline-field input,
    .customer-add-shell .inline-field select,
    .customer-add-shell .inline-field textarea {
      width: 100%;
      padding: 6px 8px;
      font-size: 13px;
      min-height: 34px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: #fff;
      color: var(--text);
      box-sizing: border-box;
    }

    .customer-add-shell .inline-field textarea {
      min-height: 56px;
      resize: none;
      font-family: inherit;
    }

    .customer-add-shell .inline-field input:focus,
    .customer-add-shell .inline-field select:focus,
    .customer-add-shell .inline-field textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
    }

    .customer-add-shell .inline-field input[readonly] {
      background: #f8f9fa;
      color: var(--muted);
      cursor: default;
    }

    .row {
      display: flex;
      gap: 4px;
      align-items: stretch;
      min-width: 0;
      width: 100%;
      max-width: var(--jw-input-width);
    }

    .jwe-entry-shell .inline-field {
      grid-template-columns: 82px var(--jw-input-width);
      justify-items: stretch;
    }

    .jwe-entry-shell .inline-field input,
    .jwe-entry-shell .inline-field select,
    .jwe-entry-shell .inline-field textarea,
    .jwe-entry-shell .inline-field .date-wrap,
    .jwe-entry-shell .inline-field .row {
      width: 100%;
      max-width: var(--jw-input-width);
    }

    .date-wrap {
      position: relative;
      display: flex;
      width: 100%;
    }

    .date-wrap input[type="date"] {
      width: 100%;
      padding-right: 8px;
    }

    .jw-select-wrap {
      flex: 1;
      min-width: 0;
    }

    .jwe-entry-shell select#jwName,
    .jwe-entry-shell .jw-select-wrap select {
      width: 100%;
      height: 34px;
      min-height: 34px;
      padding: 6px 28px 6px 8px;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 13px;
      background: #fff;
      cursor: pointer;
      color: var(--text);
      appearance: auto;
    }

    .jwe-entry-shell select#jwName:invalid {
      color: #757575;
    }

    .jwe-entry-shell .row .jw-select-wrap select#jwName {
      width: 100%;
      flex: 1;
      min-width: 0;
      max-width: var(--jw-input-width);
    }

    .btn-station-add {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      min-width: 34px;
      height: 34px;
      padding: 0;
      background: #eef1f5;
      border: 1px solid #b0bcc9;
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .btn-station-add:hover {
      background: #e2e6eb;
    }

    .btn-station-add svg {
      width: 14px;
      height: 14px;
      color: #5f6368;
    }

    .ledger-page-shell.customer-add-shell > .ledger-page-titlebar:first-child {
      background: #f8f9fa;
      color: #1a1a1a;
      text-align: center;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    .ledger-page-titlebar-label {
      display: block;
      width: 100%;
      text-align: center;
    }

    .jwe-entry-shell > .form-actions {
      width: 100%;
      box-sizing: border-box;
    }

    .customer-add-shell > .form-actions {
      background: #f4f6f8;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 12px;
    }

    .customer-add-shell > .form-actions button {
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      min-width: 100px;
      min-height: 32px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
    }

    .form-actions button.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .form-actions button.primary:hover {
      background: var(--primary-hover);
    }

    .form-actions button:not(.primary):hover {
      background: #f8f9fa;
    }

    @media (max-width: 900px) {
      .jwe-entry-shell .customer-cards-grid {
        grid-template-columns: max-content;
        justify-content: center;
      }

      .customer-cards-grid {
        grid-template-columns: 1fr;
      }

      .detail-card {
        min-height: 0;
      }
    }

    @media (max-width: 600px) {
      .page {
        padding: 8px;
      }

      .customer-add-shell .inline-field {
        grid-template-columns: 1fr;
      }

      .customer-add-shell .inline-field label {
        text-align: left;
      }
    }
  </style>
</head>

<body>

  <div id="toastMsg" class="toast"></div>

  <div class="page">
    <div class="ledger-page-shell customer-add-shell jwe-entry-shell jobworker-entry-page">

      <div class="ledger-page-titlebar">
        <span class="ledger-page-titlebar-label">Jobworker Entry</span>
      </div>

      <div class="erp-form">
        <div class="customer-cards-grid">

          <div class="detail-card">
            <div class="detail-card-head">Jobworker Details</div>
            <div class="detail-card-body">
              <div class="inline-field field">
                <label for="jwName">Name <span class="required">*</span></label>
                <div class="row">
                  <div class="jw-select-wrap">
                    <select id="jwName" required>
                      <option value="">— Select job worker —</option>
                    </select>
                  </div>
                  <button type="button" class="btn-station-add" title="Add new Job Worker" onclick="addJobworker()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                      stroke-linejoin="round">
                      <line x1="12" y1="5" x2="12" y2="19"></line>
                      <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="inline-field field">
                <label for="jwRelation">Relation</label>
                <input id="jwRelation" readonly placeholder="—">
              </div>
              <div class="inline-field field">
                <label for="jwAddress">Address</label>
                <textarea id="jwAddress" readonly placeholder="—" rows="2"></textarea>
              </div>
              <div class="inline-field field">
                <label for="jwStation">Station</label>
                <input id="jwStation" readonly placeholder="—">
              </div>
              <div class="inline-field field">
                <label for="jwPhone">Phone</label>
                <input id="jwPhone" readonly placeholder="—">
              </div>
              <div class="inline-field field">
                <label for="jwMobile">Mobile</label>
                <input id="jwMobile" readonly placeholder="—">
              </div>
            </div>
          </div>

          <div class="detail-card">
            <div class="detail-card-head">Entry Details</div>
            <div class="detail-card-body">
              <div class="inline-field field">
                <label for="entryDate">Date <span class="required">*</span></label>
                <div class="date-wrap">
                  <input id="entryDate" type="date" required>
                </div>
              </div>
              <div class="inline-field field">
                <label for="entryMetal">Metal</label>
                <input id="entryMetal" type="text" class="jw-ob-decimal" inputmode="decimal" placeholder="0.000" autocomplete="off">
              </div>
              <div class="inline-field field">
                <label for="entryChain">Chain</label>
                <input id="entryChain" type="text" class="jw-ob-decimal" inputmode="decimal" placeholder="0.000" autocomplete="off">
              </div>
              <div class="inline-field field">
                <label for="entryNag">Nag</label>
                <input id="entryNag" type="text" class="jw-ob-decimal" inputmode="decimal" placeholder="0.000" autocomplete="off">
              </div>
              <div class="inline-field field">
                <label for="entryMaal">Maal</label>
                <input id="entryMaal" type="text" class="jw-ob-decimal" inputmode="decimal" placeholder="0.000" autocomplete="off">
              </div>
              <div class="inline-field field">
                <label for="entryNarration">Narration</label>
                <textarea id="entryNarration" placeholder="Enter narration" rows="2"></textarea>
              </div>
            </div>
          </div>

        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="primary" onclick="saveAndClose()">Save & Close</button>
        <button type="button" onclick="saveAndNew()">Save & New</button>
        <button type="button" onclick="resetForm()">Reset</button>
        <button type="button" onclick="closeForm()">Close</button>
      </div>

    </div>
  </div>

  <script>
    (function () {

      // ── TOAST ──────────────────────────────────────
      function showToast(msg, type = 'success') {
        const t = document.getElementById('toastMsg');
        t.textContent = msg;
        t.className = 'toast ' + type + ' show';
        setTimeout(() => t.classList.remove('show'), 3000);
      }

      // ── Job worker select (native dropdown — same as Station on Add Customer) ───
      let _jwData = [];

      function loadJobworkers() {
        _jwData = JSON.parse(localStorage.getItem('jobworkers') || '[]');
      }

      function populateJwNameSelect(selectAfter) {
        var sel = document.getElementById('jwName');
        if (!sel || sel.tagName !== 'SELECT') return;
        loadJobworkers();
        var sorted = _jwData.slice().sort(function (a, b) {
          return String(a.name || '').localeCompare(String(b.name || ''), undefined, { sensitivity: 'base' });
        });
        sel.innerHTML = '';
        var ph = document.createElement('option');
        ph.value = '';
        ph.textContent = '— Select job worker —';
        sel.appendChild(ph);
        sorted.forEach(function (jw) {
          var name = (jw.name || '').trim();
          if (!name) return;
          var o = document.createElement('option');
          o.value = name;
          var st = (jw.station || '').trim();
          o.textContent = st ? name + ' (' + st + ')' : name;
          sel.appendChild(o);
        });
        var pick = selectAfter != null ? String(selectAfter).trim() : '';
        if (pick) {
          var opts = Array.from(sel.options);
          var match = opts.find(function (o) {
            return o.value === pick || o.value.toLowerCase() === pick.toLowerCase();
          });
          if (match) sel.value = match.value;
        }
        onJwNameInput();
      }

      function refreshJobworkerList() {
        var sel = document.getElementById('jwName');
        var keep = sel ? sel.value : '';
        populateJwNameSelect(keep);
      }
      window.refreshJobworkerList = refreshJobworkerList;

      function openJwNameSelectList(sel) {
        if (!sel || sel.tagName !== 'SELECT') return;
        if (typeof sel.showPicker === 'function') {
          try {
            sel.showPicker();
            return;
          } catch (err) { /* fallback */ }
        }
        sel.focus();
        sel.click();
      }

      function wireJwNameSelect() {
        var sel = document.getElementById('jwName');
        if (!sel || sel.dataset.jwSelBound) return;
        sel.dataset.jwSelBound = '1';
        sel.addEventListener('change', onJwNameInput);
      }

      // ── ON NAME SELECT/TYPE: FETCH DETAILS FROM JOB WORKER LIST ─────────
      function onJwNameInput() {
        var nameEl = document.getElementById('jwName');
        var name = (nameEl && nameEl.value) ? nameEl.value.trim() : '';
        var jw = _jwData.find(function (j) {
          return (j.name || '').trim().toLowerCase() === name.toLowerCase();
        });

        if (jw) {
          var rel = [jw.relationType, jw.relationName].filter(Boolean).join(' ').trim() || '—';
          document.getElementById('jwRelation').value = rel;
          document.getElementById('jwAddress').value = jw.address || '—';
          document.getElementById('jwStation').value = jw.station || '—';
          document.getElementById('jwPhone').value = jw.phone || '—';
          document.getElementById('jwMobile').value = jw.mobile || '—';
        } else {
          clearJWFields();
        }
      }
      window.onJwNameInput = onJwNameInput;

      function getFormRoot() {
        return document.querySelector('.workspace .jwe-entry-shell') ||
          document.querySelector('.workspace .ledger-page-shell') ||
          document.querySelector('.workspace') || document;
      }

      var JW_ENTRY_DECIMAL_IDS = ['entryMetal', 'entryChain', 'entryNag', 'entryMaal'];

      function parseJwEntryDecimal(val) {
        var raw = String(val == null ? '' : val).trim().replace(/,/g, '');
        if (raw === '' || raw === '-' || raw === '.') return NaN;
        return parseFloat(raw);
      }

      function formatJwEntryDecimalValue(val) {
        var n = typeof val === 'number' ? val : parseJwEntryDecimal(val);
        if (!Number.isFinite(n)) return '';
        return n.toFixed(3);
      }

      function formatJwEntryDecimalField(el) {
        if (!el) return;
        el.value = formatJwEntryDecimalValue(el.value);
      }

      function formatAllJwEntryDecimals(root) {
        var scope = root || document;
        JW_ENTRY_DECIMAL_IDS.forEach(function (id) {
          formatJwEntryDecimalField(scope.querySelector('#' + id) || document.getElementById(id));
        });
      }

      function bindJwEntryDecimalInputs() {
        JW_ENTRY_DECIMAL_IDS.forEach(function (id) {
          var el = document.getElementById(id);
          if (!el || el.dataset.jwEntryFmtBound) return;
          el.dataset.jwEntryFmtBound = '1';
          el.addEventListener('blur', function () {
            formatJwEntryDecimalField(el);
          });
        });
      }
      function clearJWFields() {
        var root = getFormRoot();
        ['jwRelation', 'jwAddress', 'jwStation', 'jwPhone', 'jwMobile'].forEach(function (id) {
          var el = root.querySelector('#' + id);
          if (el) el.value = '';
        });
      }

      // ── ADD JOBWORKER ──────────────────────────────
      function addJobworker() {
        if (typeof loadPage === 'function') {
          loadPage('pages/add-jobworker.html');
        } else {
          window.open('/pages/add-jobworker.html', 'AddJobworker', 'width=900,height=620');
        }
      }
      window.addJobworker = addJobworker;

      // ── VALIDATE ───────────────────────────────────
      function validate() {
        const name = document.getElementById('jwName').value.trim();
        const date = document.getElementById('entryDate').value;
        const jw = _jwData.find(function (j) {
          return (j.name || '').trim().toLowerCase() === name.toLowerCase();
        });

        if (!name) { showToast('Please select a Job Worker', 'error'); return false; }
        if (!jw) { showToast('Job Worker not found. Add them first.', 'error'); return false; }
        if (!date) { showToast('Date is required', 'error'); return false; }
        return jw;
      }

      // ── COLLECT DATA ───────────────────────────────
      function collectData(jw) {
        return {
          id: Date.now(),
          jobworkerId: jw.id,
          jobworkerName: jw.name,
          date: document.getElementById('entryDate').value,
          metal: parseJwEntryDecimal(document.getElementById('entryMetal').value) || 0,
          chain: parseJwEntryDecimal(document.getElementById('entryChain').value) || 0,
          nag: parseJwEntryDecimal(document.getElementById('entryNag').value) || 0,
          maal: parseJwEntryDecimal(document.getElementById('entryMaal').value) || 0,
          narration: document.getElementById('entryNarration').value.trim(),
          createdAt: new Date().toISOString()
        };
      }

      // ── SYNC TO JOBWORKER BALANCE (on save, update balance row with opening + all entries) ──
      var BALANCE_STORE = 'jobworkerBalances';
      function num(v) { var n = parseFloat(v); return Number.isFinite(n) ? n : 0; }
      function syncToJobworkerBalance(jw) {
        var entries = JSON.parse(localStorage.getItem('jobworkerEntries') || '[]');
        var jwIdStr = String(jw.jwId || '').trim();
        var jwNameStr = String(jw.name || '').trim();
        var jn = jwNameStr.toLowerCase();
        var forJw = entries.filter(function (e) {
          if (!e) return false;
          if (jwIdStr && String(e.jobworkerId || '') === jwIdStr) return true;
          if (jw.id != null && String(e.jobworkerId || '') === String(jw.id)) return true;
          if (jw.jwId && String(e.jobworkerId || '').trim() === String(jw.jwId).trim()) return true;
          if (jn && String(e.jobworkerName || '').trim().toLowerCase() === jn) return true;
          return false;
        });
        var sumMetal = forJw.reduce(function (a, e) { return a + num(e.metal); }, 0);
        var sumChain = forJw.reduce(function (a, e) { return a + num(e.chain); }, 0);
        var sumNag = forJw.reduce(function (a, e) { return a + num(e.nag); }, 0);
        var sumMaal = forJw.reduce(function (a, e) { return a + num(e.maal); }, 0);
        /* Same four columns as Job Worker Details total row (ledger lines only, no opening balance). */
        var metal = sumMetal;
        var chain = sumChain;
        var nag = sumNag;
        var maal = sumMaal;
        var relation = [jw.relationType, jw.relationName].filter(Boolean).join(' ').trim() || '';
        var jwId = (jw.jwId || '').trim();
        var name = (jw.name || '').trim();
        var lfNo = (jw.lfNo != null && jw.lfNo !== '') ? String(jw.lfNo) : '';
        var station = (jw.station || '').trim();
        var balances = JSON.parse(localStorage.getItem(BALANCE_STORE) || '[]');
        var existing = balances.filter(function (r) {
          return (jwId && (r.jwId || '').trim() === jwId) || (name && (r.name || '').trim().toLowerCase() === name.toLowerCase());
        })[0];
        if (existing) {
          existing.jwId = jwId;
          existing.name = name;
          existing.lfNo = lfNo;
          existing.relation = relation;
          existing.station = station;
          existing.metal = metal;
          existing.chain = chain;
          existing.nag = nag;
          existing.maal = maal;
        } else {
          balances.push({
            id: Date.now(),
            mark: false,
            jwId: jwId,
            name: name,
            lfNo: lfNo,
            relation: relation,
            station: station,
            metal: metal,
            chain: chain,
            nag: nag,
            maal: maal
          });
        }
        localStorage.setItem(BALANCE_STORE, JSON.stringify(balances));
      }

      // ── SAVE ───────────────────────────────────────
      function save() {
        var jw = validate();
        if (!jw) return false;
        formatAllJwEntryDecimals(getFormRoot());
        var data = collectData(jw);
        // Don't create an empty row in Jobworker Details when user skipped filling values.
        // Require at least one numeric value > 0 OR a non-empty narration; else: no save, no balance row.
        var hasValue = (num(data.metal) > 0) || (num(data.chain) > 0) || (num(data.nag) > 0) || (num(data.maal) > 0);
        var hasNarration = (data.narration || '').toString().trim() !== '';
        if (!hasValue && !hasNarration) {
          showToast('Enter Metal / Chain / Nag / Maal or a narration before saving.', 'error');
          return false;
        }
        var list = JSON.parse(localStorage.getItem('jobworkerEntries') || '[]');
        list.push(data);
        localStorage.setItem('jobworkerEntries', JSON.stringify(list));
        syncToJobworkerBalance(jw);
        showToast('Entry saved! Saved to Jobworker Balance too.');
        return true;
      }

      // ── RESET ENTRY FIELDS (keep JW info) ─────────
      function resetEntryFields() {
        var root = getFormRoot();
        var set = function (id, val) { var el = root.querySelector('#' + id); if (el) el.value = val; };
        set('entryDate', new Date().toISOString().slice(0, 10));
        set('entryMetal', '');
        set('entryChain', '');
        set('entryNag', '');
        set('entryMaal', '');
        set('entryNarration', '');
      }

      function resetAll() {
        var root = getFormRoot();
        clearJWFields();
        resetEntryFields();
        populateJwNameSelect('');
        var nameEl = root.querySelector('#jwName');
        if (nameEl) nameEl.focus();

        // Clear persistence so drafts don't reappear on reload
        if (window.FormPersistence) {
          try { window.FormPersistence.getInstance().clear(); } catch (e) { }
        }
      }

      // ── CLOSE ──────────────────────────────────────
      function goBack() {
        // [MOD] If in assignment mode (parent is listening), notify parent instead of navigating
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'assignment') {
          window.parent.postMessage({ type: 'jwEntryClosed' }, '*');
          return;
        }

        if (typeof loadPage === 'function') loadPage('dashboard.html');
        else window.history.back();
      }

      // ── BUTTON HANDLERS ──
      window.saveAndClose = function () {
        const urlParams = new URLSearchParams(window.location.search);
        const isAssignmentMode = urlParams.get('mode') === 'assignment';

        if (save()) {
          if (isAssignmentMode) {
            // Get name to send back
            const name = document.getElementById('jwName').value.trim();
            const jw = _jwData.find(function (j) {
          return (j.name || '').trim().toLowerCase() === name.toLowerCase();
        });

            window.parent.postMessage({
              type: 'jwEntrySaved',
              jobworkerId: jw ? jw.id : null,
              jobworkerName: name
            }, '*');
            return;
          }

          resetAll();
          goBack();
        }
      };
      window.saveAndNew = function () {
        const urlParams = new URLSearchParams(window.location.search);
        const isAssignmentMode = urlParams.get('mode') === 'assignment';
        if (save()) {
          if (isAssignmentMode) {
            const name = document.getElementById('jwName').value.trim();
            const jw = _jwData.find(function (j) {
          return (j.name || '').trim().toLowerCase() === name.toLowerCase();
        });
            window.parent.postMessage({
              type: 'jwEntrySaved',
              stayOpen: true,
              jobworkerId: jw ? jw.id : null,
              jobworkerName: name
            }, '*');
          }
          resetAll();
          document.getElementById('jwName').focus();
        }
      };
      window.resetForm = function () {
        if (confirm('Reset all fields? All data will be cleared.')) resetAll();
      };
      window.closeForm = function () {
        resetAll();
        goBack();
      };

      // ── NARRATION: first letter of each word capital, rest lowercase (on space / input) ──
      function formatJwNarrationTitleCase(value) {
        if (value == null) return '';
        return String(value).replace(/[^\s]+/g, function (word) {
          if (!word) return word;
          return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
        });
      }

      function onJwNarrationTitleCaseInput(e) {
        var el = e.target;
        if (!el || el.id !== 'entryNarration' || el.disabled || el.readOnly) return;
        var start = el.selectionStart;
        var end = el.selectionEnd;
        var raw = el.value;
        var next = formatJwNarrationTitleCase(raw);
        if (next === raw) return;
        el.value = next;
        var lenDiff = next.length - raw.length;
        if (typeof start === 'number' && typeof end === 'number') {
          try {
            el.setSelectionRange(
              Math.max(0, Math.min(next.length, start + lenDiff)),
              Math.max(0, Math.min(next.length, end + lenDiff))
            );
          } catch (err) { }
        }
      }

      function onJwNarrationTitleCaseBlur(e) {
        var el = e.target;
        if (!el || el.id !== 'entryNarration') return;
        var next = formatJwNarrationTitleCase(el.value);
        if (next !== el.value) el.value = next;
      }

      function wireJwNarrationTitleCase() {
        var root = getFormRoot();
        var el = (root && root.querySelector('#entryNarration')) || document.getElementById('entryNarration');
        if (!el) return;
        el.removeEventListener('input', onJwNarrationTitleCaseInput);
        el.removeEventListener('blur', onJwNarrationTitleCaseBlur);
        el.addEventListener('input', onJwNarrationTitleCaseInput);
        el.addEventListener('blur', onJwNarrationTitleCaseBlur);
      }

      // ── KEYBOARD: Ctrl+M = Add Jobworker; Arrow Up/Down = move between entry fields ──
      var JW_ENTRY_FIELD_CHAIN = ['jwName', 'entryDate', 'entryMetal', 'entryChain', 'entryNag', 'entryMaal', 'entryNarration'];

      function focusJwFieldByIndex(idx) {
        var active = document.activeElement;
        if (active && active.classList && active.classList.contains('jw-ob-decimal')) {
          formatJwEntryDecimalField(active);
        }
        if (idx < 0) idx = JW_ENTRY_FIELD_CHAIN.length - 1;
        if (idx >= JW_ENTRY_FIELD_CHAIN.length) idx = 0;
        var root = getFormRoot();
        var id = JW_ENTRY_FIELD_CHAIN[idx];
        var el = root.querySelector('#' + id) || document.getElementById(id);
        if (!el || el.disabled) return;
        el.focus();
        try {
          if (el.select && el.tagName === 'INPUT' && el.type !== 'date') el.select();
        } catch (err) { }
      }

      function jwEntryFieldIndex(el) {
        if (!el || !el.id) return -1;
        return JW_ENTRY_FIELD_CHAIN.indexOf(el.id);
      }

      document.addEventListener('keydown', function (e) {
        if (e.ctrlKey && e.key.toLowerCase() === 'm') {
          e.preventDefault();
          addJobworker();
          return;
        }

        var t = e.target;
        if (e.key === 'Enter' && t.id === 'jwName' && t.tagName === 'SELECT') {
          e.preventDefault();
          if (!t.value) {
            openJwNameSelectList(t);
          } else {
            focusJwFieldByIndex(JW_ENTRY_FIELD_CHAIN.indexOf('jwName') + 1);
          }
          return;
        }

        if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
        if (e.altKey || e.ctrlKey || e.metaKey) return;
        var ix = jwEntryFieldIndex(t);
        if (ix === -1) return;
        e.preventDefault();
        if (e.key === 'ArrowDown') focusJwFieldByIndex(ix + 1);
        else focusJwFieldByIndex(ix - 1);
      });

      // ── INIT: when opened from sidebar or any visit, clear form so data is reset ──
      try { sessionStorage.removeItem('jobworkerFormClear'); } catch (e) { }
      resetAll();
      bindJwEntryDecimalInputs();
      wireJwNarrationTitleCase();
      wireJwNameSelect();
      populateJwNameSelect();
      document.getElementById('entryDate').value = new Date().toISOString().slice(0, 10);
      setTimeout(function () {
        var ed = document.getElementById('entryDate');
        if (!ed || typeof ed.focus !== 'function') return;
        try { ed.focus({ preventScroll: true }); } catch (eF) {
          try { ed.focus(); } catch (e2) {}
        }
      }, 0);

      // Refresh if a new JW was added in another tab
      window.addEventListener('storage', function (e) {
        if (e.key === 'jobworkers') refreshJobworkerList();
      });

    })();
  </script>

</body>
