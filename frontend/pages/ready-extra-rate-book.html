<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Rate Book History</title>

    <style>
        /* =====================================================
           PREMIUM APPLE-STYLE ERP UI
        ===================================================== */
        :root {
            --bg: #f8f9fc;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --primary-soft: rgba(59, 130, 246, 0.1);
            --danger: #ef4444;
            --success: #10b981;
            --radius: 12px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        /* Hide number input arrows */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        body {
            margin: 0;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* WINDOW CONTAINER */
        .window {
            background: var(--card);
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-width: 98%;
            width: 98%;
            margin: 0 auto;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        /* TITLE BAR */
        .title-bar {
            background: #fff;
            padding: 16px 24px;
            font-weight: 600;
            font-size: 18px;
            text-align: center;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .close-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: #ffe5e5;
            color: var(--danger);
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            line-height: 1;
            padding: 0;
        }

        .close-btn:hover {
            background: var(--danger);
            color: white;
            transform: scale(1.05);
        }

        /* CONTENT AREA */
        .window-content {
            flex: 1;
            padding: 0;
            background: var(--bg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* TOOLBAR */
        .toolbar {
            padding: 16px 24px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .toolbar-left,
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        .diff-badge {
            background: #eff6ff;
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid var(--border);
        }

        /* TABLE CONTAINER */
        .table-container {
            flex: 1;
            overflow: auto;
            padding: 0;
        }

        /* PREMIUM TABLE */
        /* TABLE STYLES - Matched to Order Details */
        .history-table {
            width: 100%;
            min-width: 1600px;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 13.5px;
        }

        .history-table th {
            background: #f5f6fa;
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--text);
            font-size: 13.5px;
            text-transform: none;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .history-table td {
            border-bottom: 1px solid var(--border);
            padding: 8px 10px;
            white-space: nowrap;
            background: #fff;
            vertical-align: middle;
        }

        .history-table tr:hover td {
            background: #f8faff;
        }

        /* INPUTS IN TABLE - Matched EXACTLY to Order Details */
        .history-table input,
        .history-table select {
            width: 100%;
            height: 30px;
            border-radius: 8px;
            border: 1px solid var(--border);
            padding: 4px 6px;
            font-size: 13px;
            background: #fff;
            color: var(--text);
            font-family: inherit;
            transition: .2s;
        }

        .history-table input:focus,
        .history-table select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-soft);
        }

        .history-table select {
            cursor: pointer;
        }

        /* FOOTER */
        .footer {
            padding: 16px 24px;
            background: #fff;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* Utility classes */
        .text-right {
            text-align: right;
        }

        .text-center {
            text-align: center;
        }

        .font-bold {
            font-weight: 600;
        }

        /* New Type Colors */
        .type-badge-order {
            color: #3b82f6;
            font-weight: 600;
        }

        .type-badge-repair {
            color: #f59e0b;
            font-weight: 600;
        }

        .type-badge-sale {
            color: #10b981;
            font-weight: 600;
        }

        .type-badge-purchase {
            color: #ef4444;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="window">

        <div class="title-bar">
            <span>Rate Book History</span>
            <button class="close-btn" onclick="closeSelf()" title="Close">×</button>
        </div>

        <div class="window-content">

            <!-- Toolbar -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <button id="btnCalcDiff" onclick="calculateComparison()" class="btn btn-primary"
                        style="display:none;">
                        Calculate Diff
                    </button>
                    <div class="diff-badge" id="compareDisplay">
                        Diff: <span id="compareVal">0.00</span>
                    </div>
                </div>
                <div class="toolbar-right">
                    <button onclick="addHistoryRow()" class="btn btn-primary">
                        + Add New Row
                    </button>
                </div>
            </div>

            <!-- Applied formula: (Cur.Rate - Rate Book) × [F3] Adj Wt = Diff Amount -->
            <div class="diff-formula-note" style="padding:8px 12px; margin-bottom:8px; background:var(--primary-soft); border-radius:var(--radius); font-size:13px; color:var(--text);">
                <strong>Applied formula:</strong> (Cur.Rate − Rate Book) × [F3] Adj Wt = Diff Amount
            </div>
            <!-- Table -->
            <div class="table-container">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th style="width:40px; text-align:center;">
                                <input type="checkbox" disabled style="width:16px;">
                            </th>
                            <th style="width:130px;">Date</th>
                            <th style="width:110px;">Type</th>
                            <th style="width:100px;">Metal</th>
                            <th style="width:100px;">Stamp</th>
                            <th style="width:150px;">Remark</th>
                            <th class="text-right" style="width:100px;">Weight</th>
                            <th class="text-right" style="width:100px;">Rate</th>
                            <th class="text-right" style="width:100px;">Bal Wt.</th>
                            <th class="text-right" style="width:100px;">Adj Wt.</th>
                            <th style="width:100px;">Cur Stamp</th>
                            <th class="text-right" style="width:100px;">Cur Wt</th>
                            <th class="text-right" style="width:100px;">Cur Rate</th>
                            <th class="text-right" style="width:110px;" title="(Cur.Rate − Rate Book) × [F3] Adj Wt = Diff Amount">Amt Diff</th>
                            <th style="width:130px;">Del Date</th>
                            <th style="width:150px;">Narration</th>
                            <th style="width:80px; text-align:center;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="rateBookHistoryBody">
                        <!-- Rows will be injected here -->
                    </tbody>
                </table>
            </div>

        </div>

        <div class="footer">
            <button id="btnSaveRates" class="btn btn-primary" onclick="saveRateBookFromTable()">
                Save
            </button>
            <button class="btn" onclick="closeSelf()">Close</button>
        </div>

    </div>

    <script>
        function safeNumber(val, fallback = 0) {
            const n = Number(val);
            return Number.isFinite(n) ? n : fallback;
        }

        /* LOAD RATE BOOK HISTORY (FILLABLE) */
        function loadRateBookHistory() {
            try {
                const rates = JSON.parse(localStorage.getItem("rateBook") || "[]");
                const tbody = document.getElementById("rateBookHistoryBody");

                if (!tbody) {
                    console.error("History table body not found");
                    return;
                }

                if (rates.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="17" style="text-align:center; padding:40px; color:var(--muted); font-size:14px;">
                                No rate book entries found. Click "Add New Row" to start.
                            </td>
                        </tr>
                    `;
                    return;
                }

                // Sort by date (newest first)
                const sortedRates = [...rates].sort((a, b) => {
                    const dateA = new Date(a.timestamp || a.date || 0);
                    const dateB = new Date(b.timestamp || b.date || 0);
                    return dateB - dateA;
                });

                tbody.innerHTML = "";

                // Global Current Rate is removed, so default to 0
                const globalCurrentRate = 0;

                sortedRates.forEach((entry) => {
                    const tr = document.createElement("tr");
                    tr.dataset.id = entry.id;

                    // Data points
                    const entryWeight = safeNumber(entry.weight, 0);
                    const entryRate = safeNumber(entry.rate, 0);
                    const entryCurrentRate = safeNumber(entry.currentRate, 0);

                    // Bal Wt: use stored balWt if exists, else default to entryWeight
                    const balWt = entry.balWt !== undefined ? safeNumber(entry.balWt, 0) : entryWeight;

                    // Adj Wt: use stored adjWt if exists, else 0
                    const adjWt = entry.adjWt !== undefined ? safeNumber(entry.adjWt, 0) : 0;

                    // Effective Current Rate
                    const effectiveCurrentRate = entryCurrentRate || globalCurrentRate;

                    // Calculate Diff Amt dynamically
                    let diffAmt = 0;
                    if (effectiveCurrentRate > 0) {
                        diffAmt = (effectiveCurrentRate - entryRate) * balWt;
                    }

                    // Format Diff Amount for display
                    const displayDiff = effectiveCurrentRate > 0 ? diffAmt.toFixed(2) : "0.00";
                    const diffColor = diffAmt >= 0 ? "var(--success)" : "var(--danger)";

                    // Determine if using Legacy Type (S,P,O,R) or New Type (order, repair...)
                    // Mapping for legacy display
                    const type = entry.type || "Order";

                    // Helper to check selection
                    const isSel = (val) => (type === val || type === val[0]) ? 'selected' : '';

                    tr.innerHTML = `
                        <td style="text-align:center;">
                            <input type="checkbox" onchange="handleCompare(this, ${entry.id})" class="compare-chk" style="width:16px; height:16px;">
                        </td>
                        <td><input type="date" value="${entry.date || ""}" onchange="updateHistoryRow(this, 'date')"></td>
                        <td>
                            <select onchange="updateHistoryRow(this, 'type')" class="${getTypeClass(type)}">
                                <option value="Order" ${type === 'Order' || type === 'O' ? 'selected' : ''}>Order</option>
                                <option value="Repair" ${type === 'Repair' || type === 'R' ? 'selected' : ''}>Repair</option>
                                <option value="Sale" ${type === 'Sale' || type === 'S' ? 'selected' : ''}>Sale</option>
                                <option value="Purchase" ${type === 'Purchase' || type === 'P' ? 'selected' : ''}>Purchase</option>
                            </select>
                        </td>
                        <td><input value="${entry.metal || ""}" placeholder="Gold/Silver" onchange="updateHistoryRow(this, 'metal')"></td>
                        <td><input value="${entry.stamp || ""}" placeholder="916" onchange="updateHistoryRow(this, 'stamp')"></td>
                        <td><input value="${entry.narration || ""}" placeholder="-" onchange="updateHistoryRow(this, 'narration')"></td>
                        <td><input type="number" step="0.001" value="${entryWeight > 0 ? entryWeight.toFixed(3) : ''}" style="text-align:right;" onchange="updateHistoryRow(this, 'weight')"></td>
                        <td><input type="number" step="0.01" value="${entryRate > 0 ? entryRate.toFixed(2) : ''}" style="text-align:right;" onchange="updateHistoryRow(this, 'rate')" oninput="calcDiff(this)"></td>
                        
                        <td><input type="number" step="0.001" value="${balWt > 0 ? balWt.toFixed(3) : ''}" style="text-align:right;" onchange="updateHistoryRow(this, 'balWt')"></td>
                        <td><input type="number" step="0.001" value="${adjWt !== 0 ? adjWt.toFixed(3) : ''}" style="text-align:right;" onchange="updateHistoryRow(this, 'adjWt')" oninput="calcDiff(this)"></td>

                        <!-- New Columns -->
                        <td><input value="${entry.curStamp || ""}" placeholder="Stamp" onchange="updateHistoryRow(this, 'curStamp')"></td>
                        <td><input type="number" step="0.001" value="${safeNumber(entry.curWt, 0) > 0 ? safeNumber(entry.curWt, 0).toFixed(3) : ''}" style="text-align:right;" onchange="updateHistoryRow(this, 'curWt')" oninput="calcDiff(this)"></td>
                        <td><input type="number" step="0.01" value="${safeNumber(entry.curRate, 0) > 0 ? safeNumber(entry.curRate, 0).toFixed(2) : ''}" style="text-align:right;" onchange="updateHistoryRow(this, 'curRate')" oninput="calcDiff(this)"></td>
                        <td>
                            <input type="text" readonly 
                                   value="${calculateDiff(entry, balWt, entryRate)}" 
                                   style="text-align:right; font-weight:bold; color:${getDiffColor(entry, balWt, entryRate)}; cursor:default; border:none; background:transparent;">
                        </td>
                        <td><input type="date" value="${entry.delDate || ""}" onchange="updateHistoryRow(this, 'delDate')"></td>
                        <td><input value="${entry.curNarration || ""}" onchange="updateHistoryRow(this, 'curNarration')"></td>
                        <td style="text-align:center;">
                            <button onclick="removeHistoryRow(${entry.id})" 
                                    style="background:none; border:none; cursor:pointer; color:var(--text); opacity:0.5; font-size:16px; transition:0.2s;" 
                                    title="Remove Entry"
                                    onmouseover="this.style.opacity=1; this.style.color=var(--danger)"
                                    onmouseout="this.style.opacity=0.5; this.style.color=var(--text)">
                                🗑️
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error("Error loading history:", e);
            }
        }

        function getTypeClass(type) {
            if (type === 'Order' || type === 'O') return 'type-badge-order';
            if (type === 'Repair' || type === 'R') return 'type-badge-repair';
            if (type === 'Sale' || type === 'S') return 'type-badge-sale';
            if (type === 'Purchase' || type === 'P') return 'type-badge-purchase';
            return '';
        }

        /* UPDATE HISTORY ROW */
        window.updateHistoryRow = function (input, field) {
            const tr = input.closest("tr");
            if (!tr || !tr.dataset.id) return;

            const id = parseInt(tr.dataset.id);
            let val = input.value;

            if (['weight', 'rate', 'balWt', 'adjWt', 'curWt', 'curRate'].includes(field)) {
                val = parseFloat(val) || 0;
            }

            try {
                const rates = JSON.parse(localStorage.getItem("rateBook") || "[]");
                const idx = rates.findIndex(r => r.id === id);
                if (idx >= 0) {
                    rates[idx][field] = val;
                    localStorage.setItem("rateBook", JSON.stringify(rates));

                    // If simple text update, no need to reload entire table, just calc diff if needed
                    if (['curWt', 'curRate', 'balWt', 'rate'].includes(field)) {
                        loadRateBookHistory();
                    } else if (field === 'type') {
                        // Reload to update color
                        loadRateBookHistory();
                    } else {
                        // For non-calc fields, also reload to ensure consistency/saving logic is robust
                        // (User won't mind a quick blink for data safety)
                        loadRateBookHistory();
                    }

                    // Notify other windows
                    try {
                        window.dispatchEvent(new CustomEvent('ratebookUpdated'));
                        if (window.opener) window.opener.dispatchEvent(new CustomEvent('ratebookUpdated'));
                    } catch (e) { }
                }
            } catch (e) { console.error(e); }
        };

        /* Diff Amount = (Cur.Rate - Rate Book) × [F3] Adj Wt */
        function calculateDiff(entry, balWt, bookedRate) {
            const curRate = safeNumber(entry.curRate, 0);
            const adjWt = safeNumber(entry.adjWt, 0);
            const rateBook = safeNumber(bookedRate, 0);
            const rateDiff = curRate - rateBook;
            const diff = rateDiff * adjWt;
            return diff.toFixed(2);
        }

        function getDiffColor(entry, balWt, bookedRate) {
            const diff = parseFloat(calculateDiff(entry, balWt, bookedRate));
            if (diff > 0) return 'var(--success)'; // Green
            if (diff < 0) return 'var(--danger)';  // Red
            return 'inherit';
        }

        /* LIVE CALC ON INPUT */
        window.calcDiff = function (input) {
            const tr = input.closest('tr');
            if (!tr) return;

            // Get live values from DOM
            const bookedRate = parseFloat(tr.cells[7].querySelector('input').value) || 0; // Index 7 is Rate
            const adjWtInput = tr.cells[9].querySelector('input'); // Index 9 is Adj Wt
            const curRateInput = tr.cells[12].querySelector('input'); // Index 12 is Cur Rate
            const diffInput = tr.cells[13].querySelector('input'); // Index 13 is Diff

            const adjWt = parseFloat(adjWtInput.value) || 0;
            const curRate = parseFloat(curRateInput.value) || 0;
            // (Cur.Rate - Rate Book) × [F3] Adj Wt = Diff Amount
            const rateDiff = curRate - bookedRate;
            const diff = rateDiff * adjWt;

            diffInput.value = diff.toFixed(2);
            if (diff > 0) diffInput.style.color = 'var(--success)';
            else if (diff < 0) diffInput.style.color = 'var(--danger)';
            else diffInput.style.color = 'inherit';
        };

        /* COMPARE RATES LOGIC */
        let selectedForCompare = [];

        window.handleCompare = function (chk, id) {
            if (chk.checked) {
                selectedForCompare.push(id);
            } else {
                selectedForCompare = selectedForCompare.filter(sid => sid !== id);
            }
            calculateComparison();
        };

        function calculateComparison() {
            const display = document.getElementById("compareDisplay");
            const ValSpan = document.getElementById("compareVal");

            // Update Button Visibility
            const btn = document.getElementById("btnCalcDiff");
            if (btn) {
                if (selectedForCompare.length >= 2) {
                    btn.style.display = "inline-flex";
                    btn.innerHTML = `Calculate Diff <span style="background:rgba(255,255,255,0.2); px-2; border-radius:4px; font-size:11px; padding:2px 6px;">${selectedForCompare.length}</span>`;
                } else {
                    btn.style.display = "none";
                }
            }

            if (selectedForCompare.length < 2) {
                ValSpan.innerText = "0.00";
                localStorage.removeItem("rateComparingDiff");
                notifyDiffUpdate();
                return;
            }

            try {
                const rates = JSON.parse(localStorage.getItem("rateBook") || "[]");

                // Get all selected objects with LOOSE comparison
                const selectedObjs = rates.filter(r => selectedForCompare.some(sid => String(sid) === String(r.id)));

                if (selectedObjs.length >= 2) {
                    // Sort by date (Newest first)
                    const sorted = selectedObjs.sort((a, b) => new Date(b.date) - new Date(a.date));
                    const newest = sorted[0];
                    const oldest = sorted[sorted.length - 1]; // Compare Newest vs Oldest

                    // New Logic: (New Rate - Old Rate) * New Weight
                    // Wait, logic in original was:
                    // const rateDiff = (parseFloat(newest.rate) || 0) - (parseFloat(oldest.rate) || 0);
                    // const weight = parseFloat(newest.weight) || 0;
                    // const totalDiff = rateDiff * weight;

                    const rateDiff = (parseFloat(newest.rate) || 0) - (parseFloat(oldest.rate) || 0);
                    const weight = parseFloat(newest.weight) || 0;

                    const totalDiff = rateDiff * weight;

                    ValSpan.innerText = totalDiff.toFixed(2);
                    if (totalDiff >= 0) {
                        ValSpan.style.color = 'var(--success)';
                    } else {
                        ValSpan.style.color = 'var(--danger)';
                    }

                    localStorage.setItem("rateComparingDiff", totalDiff.toFixed(2));
                    notifyDiffUpdate();
                }
            } catch (e) { console.error(e); }
        }

        function notifyDiffUpdate() {
            try {
                window.dispatchEvent(new CustomEvent('rateDiffUpdated'));
                if (window.opener) window.opener.dispatchEvent(new CustomEvent('rateDiffUpdated'));
            } catch (e) { }
        }

        /* REMOVE ROW */
        window.removeHistoryRow = function (id) {
            if (!confirm("Are you sure you want to remove this entry?")) return;

            try {
                let rates = JSON.parse(localStorage.getItem("rateBook") || "[]");
                rates = rates.filter(r => r.id !== id);
                localStorage.setItem("rateBook", JSON.stringify(rates));

                // If removed item was in compare list
                if (selectedForCompare.includes(id)) {
                    selectedForCompare = selectedForCompare.filter(sid => sid !== id);
                    calculateComparison();
                }

                loadRateBookHistory();

                // Notify other windows
                try {
                    window.dispatchEvent(new CustomEvent('ratebookUpdated'));
                    if (window.opener) window.opener.dispatchEvent(new CustomEvent('ratebookUpdated'));
                } catch (e) { }
            } catch (e) { console.error(e); }
        };

        /* ADD NEW ROW */
        window.addHistoryRow = function () {
            try {
                const rates = JSON.parse(localStorage.getItem("rateBook") || "[]");

                const newEntry = {
                    id: Date.now(),
                    date: new Date().toISOString().split('T')[0],
                    type: 'Order', // Default to Order
                    metal: '',
                    stamp: '',
                    narration: '',
                    weight: 0,
                    rate: 0,
                    balWt: 0,
                    adjWt: 0,
                    curStamp: '',
                    curWt: 0,
                    curRate: 0,
                    delDate: '',
                    curNarration: ''
                };

                // Add to array
                rates.push(newEntry);
                localStorage.setItem("rateBook", JSON.stringify(rates));

                loadRateBookHistory();

                // Notify other windows
                try {
                    window.dispatchEvent(new CustomEvent('ratebookUpdated'));
                    if (window.opener) window.opener.dispatchEvent(new CustomEvent('ratebookUpdated'));
                } catch (e) { }
            } catch (e) { console.error(e); }
        };

        /* SAVE RATE BOOK FROM TABLE (explicit save) */
        window.saveRateBookFromTable = function () {
            const tbody = document.getElementById("rateBookHistoryBody");
            if (!tbody) return;

            const rows = tbody.querySelectorAll("tr[data-id]");
            if (rows.length === 0) {
                localStorage.setItem("rateBook", "[]");
                showSaveFeedback("Saved");
                return;
            }

            const existingRates = JSON.parse(localStorage.getItem("rateBook") || "[]");
            const rates = [];
            rows.forEach((tr) => {
                const id = parseInt(tr.dataset.id, 10);
                const cells = tr.cells;
                const getVal = (idx, num) => {
                    const input = cells[idx] && cells[idx].querySelector("input, select");
                    if (!input) return num ? 0 : "";
                    const v = input.value.trim();
                    return num ? (parseFloat(v) || 0) : v;
                };
                const oldEntry = existingRates.find(e => Number(e.id) === Number(id));
                const entry = {
                    id,
                    date: getVal(1, false),
                    type: (cells[2] && cells[2].querySelector("select")) ? cells[2].querySelector("select").value : "Order",
                    metal: getVal(3, false),
                    stamp: getVal(4, false),
                    narration: getVal(5, false),
                    weight: getVal(6, true),
                    rate: getVal(7, true),
                    balWt: getVal(8, true),
                    adjWt: getVal(9, true),
                    curStamp: getVal(10, false),
                    curWt: getVal(11, true),
                    curRate: getVal(12, true),
                    delDate: getVal(14, false),
                    curNarration: getVal(15, false)
                };
                if (oldEntry && oldEntry.billNo) entry.billNo = oldEntry.billNo;
                rates.push(entry);
            });

            try {
                localStorage.setItem("rateBook", JSON.stringify(rates));
                const ratebookBillNo = localStorage.getItem("ratebookBillNo") || "";
                const forBill = rates.find(r => r.billNo === ratebookBillNo);
                if (ratebookBillNo && forBill) {
                    const weight = Number(forBill.weight) || 0;
                    const rateBookVal = Number(forBill.rate) || 0;
                    const curRate = Number(forBill.curRate) || 0;
                    const adjWt = Number(forBill.adjWt) || 0;
                    const diffAmount = (curRate - rateBookVal) * adjWt;
                    const line = `${weight.toFixed(3)} @(${rateBookVal.toFixed(2)} - ${curRate.toFixed(2)}) = ${Math.round(diffAmount)}`;
                    localStorage.setItem("rateBookDiffSummary_" + ratebookBillNo, line);
                }
                showSaveFeedback("Saved");
                try {
                    window.dispatchEvent(new CustomEvent("ratebookUpdated"));
                    if (window.opener) window.opener.dispatchEvent(new CustomEvent("ratebookUpdated"));
                } catch (e) {}
            } catch (e) {
                console.error(e);
                showSaveFeedback("Save failed", true);
            }
        };

        function showSaveFeedback(message, isError) {
            const btn = document.getElementById("btnSaveRates");
            if (!btn) return;
            const origText = btn.textContent;
            btn.textContent = message;
            if (isError) btn.style.background = "var(--danger)";
            setTimeout(() => {
                btn.textContent = origText;
                btn.style.background = "";
            }, 1500);
        }

        function closeSelf() {
            const returnTarget = localStorage.getItem("ratebookReturnTarget") || "pages/new-order.html";

            try {
                // Dashboard workspace navigation
                let loadPageFunc = null;
                if (typeof loadPage === 'function') {
                    loadPageFunc = loadPage;
                } else if (window.parent && typeof window.parent.loadPage === 'function') {
                    loadPageFunc = window.parent.loadPage.bind(window.parent);
                } else if (window.top && typeof window.top.loadPage === 'function') {
                    loadPageFunc = window.top.loadPage.bind(window.top);
                }

                if (loadPageFunc) {
                    loadPageFunc(returnTarget);
                    return;
                }

                if (window.opener && window.close) {
                    window.close();
                }
            } catch (e) {
                console.error(e);
                window.close();
            }
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            loadRateBookHistory();
        });

        // Listen for updates from other windows
        window.addEventListener('storage', (e) => {
            if (e.key === 'rateBook') {
                loadRateBookHistory();
            }
        });
    </script>

</body>
