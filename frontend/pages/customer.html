<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Add Customer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #000000;
      --muted: #6e6e73;
      --border: #e5e5ea;
      --primary: #007aff;
      --danger: #ff3b30;
      --radius: 14px;
    }
    * { box-sizing: border-box; font-family: "Segoe UI", Roboto, Arial, sans-serif; }
    html, body { margin: 0; padding: 0; height: 100%; background: transparent; color: var(--text); }

    .page {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      align-items: stretch;
      justify-content: flex-start;
      box-sizing: border-box;
    }
    h2 { font-weight: 600; margin: 0 0 15px 0; font-size: 20px; flex-shrink: 0; width: 100%; max-width: none; }

    .erp-form {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 4px 16px rgba(0, 0, 0, .12);
      border: 1px solid var(--border);
      padding: 22px 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
      max-width: none;
      width: 100%;
      align-self: stretch;
    }
    .form-left, .form-right { display: flex; flex-direction: column; gap: 0; }
    .form-left h4, .form-right h4 { margin: 0 0 6px 0; font-size: 15px; color: var(--muted); font-weight: 600; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
    .form-left h4:not(:first-child), .form-right h4:not(:first-child) { margin-top: 8px; }
    label { font-size: 12px; color: var(--muted); margin-top: 4px; margin-bottom: 2px; display: block; font-weight: 500; }
    input, textarea, select {
      width: 100%;
      max-width: 100%;
      padding: 6px 10px;
      margin-top: 2px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 13px;
      box-sizing: border-box;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); }
    textarea { resize: none; height: 55px; font-family: inherit; }
    .row { display: flex; gap: 8px; align-items: flex-end; }
    .row select { max-width: 75px; flex-shrink: 0; }

    .form-actions {
      position: sticky; bottom: 0; left: 0; right: 0;
      background: rgba(255, 255, 255, .98);
      border-top: 1px solid var(--border);
      display: flex; justify-content: center; gap: 10px; padding: 12px 15px; z-index: 100;
      box-shadow: 0 -2px 8px rgba(0, 0, 0, .05); margin-top: auto; flex-shrink: 0; width: 100%;
    }
    button { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: #cae8ff; cursor: pointer; font-size: 13px; min-width: 120px; }
    button:hover { background: #b0d9f0; }
    button.primary { background: var(--primary); color: #fff; border: none; }
    button.primary:hover { background: #0056cc; }

    #customerListSection {
      display: none;
      flex: 1;
      width: 100%;
      max-width: none;
      overflow: hidden;
      flex-direction: column;
      min-height: 0;
      align-self: stretch;
    }
    #customerListSection[style*="flex"] { display: flex !important; }
    #customerListSection .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }
    #customerListSection h2 { margin: 0; }
    #customerListSection .back-btn { padding: 8px 16px; font-size: 13px; white-space: nowrap; }
    #customerListSection input { margin-bottom: 12px; max-width: 300px; }
    .table-wrap { width: 100%; overflow: auto; border-radius: 12px; flex: 1; min-height: 0; }
    table { width: 100%; min-width: 800px; border-collapse: collapse; background: #fff; border: 1px solid var(--border); }
    th, td { padding: 12px 14px; font-size: 14px; text-align: left; border: 1px solid var(--border); white-space: nowrap; }
    th { background: #f2f2f7; font-weight: 600; font-size: 15px; position: sticky; top: 0; z-index: 10; }
    tbody tr:hover { background: #f9fafc; }
    #customerListSection table button { padding: 6px 12px; font-size: 13px; margin: 0 2px; }
    .erp-form[style*="none"] { display: none !important; }

    @media (max-width: 900px) {
      .erp-form { grid-template-columns: 1fr; }
      #customerListSection .list-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>

<body>
  <div class="page">
    <h2 id="pageTitle">Add Customer</h2>

    <form id="customerForm" class="erp-form">
      <div class="form-left">
        <h4>Personal Details</h4>
        <label>Customer ID</label>
        <input id="cid" placeholder="Auto Generated">
        <label>Name *</label>
        <input id="name" required>
        <label>Relation</label>
        <div class="row">
          <select id="relation">
            <option>S/O</option>
            <option>W/O</option>
            <option>D/O</option>
            <option>C/O</option>
          </select>
          <input id="relationName" placeholder="Name">
        </div>
        <label>Type</label>
        <select id="type">
          <option value="Customer">Customer</option>
          <option value="Jeweller">Jeweller</option>
          <option value="Agent">Agent</option>
        </select>
        <label>LF No</label>
        <input id="lfno">
        <label>Opening Date</label>
        <input type="date" id="openingDate">
        <h4 style="margin-top:16px">Account</h4>
        <label>Opening Balance</label>
        <input type="number" id="openingBalance" step="0.01">
        <label>Gold Balance</label>
        <div class="row">
          <input type="number" id="goldBalance" step="0.001">
          <select><option>gm</option></select>
        </div>
        <label>Silver Balance</label>
        <div class="row">
          <input type="number" id="silverBalance" step="0.001">
          <select><option>gm</option></select>
        </div>
        <label>Max Credit Limit</label>
        <input type="number" id="maxLimit" step="0.01">
        <label>Aadhar No</label>
        <input id="aadhar">
        <label>PAN No</label>
        <input id="pan">
      </div>
      <div class="form-right">
        <h4>Contact Details</h4>
        <label>Address</label>
        <textarea id="address"></textarea>
        <label>Station</label>
        <select id="station">
          <option value="">-- Select Station --</option>
          <option>Visakhapatnam</option>
          <option>Vijayawada</option>
          <option>Guntur</option>
          <option>Hyderabad</option>
          <option>Chennai</option>
          <option>Bengaluru</option>
          <option>Mumbai</option>
          <option>New Delhi</option>
          <option>Kolkata</option>
        </select>
        <label>Phone *</label>
        <input id="phone" required placeholder="10-digit">
        <label>Mobile</label>
        <input id="mobile" placeholder="10-digit">
        <label>Email</label>
        <input type="email" id="email">
      </div>
    </form>

    <div id="customerListSection">
      <div class="list-header">
        <h2 style="margin:0;" id="listSectionTitle">Customer List</h2>
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
          <label style="margin:0;">Show list:</label>
          <select id="listTypeSelect" onchange="switchListType()" style="margin:0; max-width:140px; padding:6px 10px;">
            <option value="Customer">Customer</option>
            <option value="Jeweller">Jeweller</option>
            <option value="Agent">Agent</option>
          </select>
          <button type="button" class="primary back-btn" onclick="goBackToAddCustomer()">← Add New</button>
        </div>
      </div>
      <input id="searchCustomer" placeholder="Search Name / Mobile" onkeyup="renderCustomerList()"
        style="padding:8px 10px;width:300px;font-size:13px;margin-bottom:10px;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>CID</th>
              <th>Name</th>
              <th>Mobile</th>
              <th>Station</th>
              <th>Balance</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="customerTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="form-actions">
    <button type="button" class="primary" onclick="submitForm(event)">Save & Close</button>
    <button type="button" onclick="saveAndNew(event)">Save & New</button>
    <button type="button" onclick="resetForm()">Reset</button>
    <button type="button" onclick="openList()">Customer List</button>
  </div>

  <script>
    const STORE_KEY = "customers";
    const STORE_KEY_JEWELLERS = "jewellers";
    const STORE_KEY_AGENTS = "agents";
    const EDIT_KEY = "editCustomerId";
    const EDIT_KEY_JEWELLER = "editJewellerId";
    const EDIT_KEY_AGENT = "editAgentId";
    const $ = id => document.getElementById(id);
    let form = null;
    let fields = {};

    function initElements() {
      form = $("customerForm");
      if (!form) return false;
      fields = {
        cid: $("cid"),
        name: $("name"),
        relation: $("relation"),
        relationName: $("relationName"),
        type: $("type"),
        lfno: $("lfno"),
        openingDate: $("openingDate"),
        openingBalance: $("openingBalance"),
        goldBalance: $("goldBalance"),
        silverBalance: $("silverBalance"),
        maxLimit: $("maxLimit"),
        aadhar: $("aadhar"),
        pan: $("pan"),
        address: $("address"),
        station: $("station"),
        phone: $("phone"),
        mobile: $("mobile"),
        email: $("email")
      };
      if (!fields.name || !fields.phone) return false;
      return true;
    }

    function initCustomerPage() {
      if (!initElements()) { setTimeout(initCustomerPage, 100); return; }
      if (form) form.addEventListener("submit", e => e.preventDefault());
      if (localStorage.getItem('showCustomerList') === 'true') {
        localStorage.removeItem('showCustomerList');
        setTimeout(openList, 100);
      }
      const editId = localStorage.getItem(EDIT_KEY);
      const editJewellerId = localStorage.getItem(EDIT_KEY_JEWELLER);
      const editAgentId = localStorage.getItem(EDIT_KEY_AGENT);
      if (editId) loadForEdit("Customer", editId);
      else if (editJewellerId) loadForEdit("Jeweller", editJewellerId);
      else if (editAgentId) loadForEdit("Agent", editAgentId);
      else resetForm();
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initCustomerPage);
    else setTimeout(initCustomerPage, 50);
    window.addEventListener('pageRefresh', () => setTimeout(initCustomerPage, 100));

    function num(v) { return Number(v) || 0; }

    function validateForm() {
      if (!fields.name.value.trim()) { alert("Customer name is required"); fields.name.focus(); return false; }
      if (!/^\d{10}$/.test((fields.phone.value || "").trim())) {
        alert("Enter valid 10-digit phone number");
        fields.phone.focus();
        return false;
      }
      if (fields.mobile.value.trim() && !/^\d{10}$/.test(fields.mobile.value.trim())) {
        alert("Enter valid 10-digit mobile number");
        fields.mobile.focus();
        return false;
      }
      const entryType = (fields.type && fields.type.value) ? fields.type.value : "Customer";
      const editId = entryType === "Customer" ? localStorage.getItem(EDIT_KEY) : entryType === "Jeweller" ? localStorage.getItem(EDIT_KEY_JEWELLER) : localStorage.getItem(EDIT_KEY_AGENT);
      if (fields.mobile.value.trim()) {
        const list = entryType === "Customer" ? getCustomers() : entryType === "Jeweller" ? getJewellers() : getAgents();
        const duplicate = list.find(c => (c.mobile || "").trim() === fields.mobile.value.trim() && String(c.id) !== String(editId));
        if (duplicate) { alert("This mobile number already exists in " + entryType + " list"); return false; }
      }
      return true;
    }

    function submitForm(e) { if (e) e.preventDefault(); if (!form || !fields.name) return; if (!validateForm()) return; saveCustomer(); openList(); }
    function saveAndNew(e) { if (e) e.preventDefault(); if (!form || !fields.name) return; if (!validateForm()) return; saveCustomer(); resetForm(true); }

    function resetForm(focusName) {
      if (!form) return;
      form.reset();
      localStorage.removeItem(EDIT_KEY);
      localStorage.removeItem(EDIT_KEY_JEWELLER);
      localStorage.removeItem(EDIT_KEY_AGENT);
      if (fields.cid) { fields.cid.value = ""; fields.cid.placeholder = "Auto Generated"; }
      if (fields.type && fields.type.options.length) fields.type.value = "Customer";
      if (focusName && fields.name) fields.name.focus();
    }

    function saveCustomer() {
      if (!form || !fields.name) return;
      const entryType = (fields.type && fields.type.value) ? fields.type.value : "Customer";
      if (entryType === "Agent") { saveAsAgent(); return; }
      if (entryType === "Jeweller") { saveAsJeweller(); return; }

      let customers = getCustomers();
      const editId = localStorage.getItem(EDIT_KEY);
      const isEdit = !!editId;
      const id = isEdit ? Number(editId) : (customers.length ? Math.max(...customers.map(c => c.id)) + 1 : 1001);
      const data = {
        id,
        cid: isEdit ? fields.cid.value : (fields.cid.value.trim() || "CUST-" + id),
        name: fields.name.value.trim(),
        relation: fields.relation.value,
        relationName: fields.relationName.value.trim(),
        type: "Customer",
        lfno: fields.lfno.value.trim(),
        openingDate: fields.openingDate.value,
        openingBalance: num(fields.openingBalance.value),
        goldBalance: num(fields.goldBalance.value),
        silverBalance: num(fields.silverBalance.value),
        maxLimit: num(fields.maxLimit.value),
        aadhar: fields.aadhar.value.trim(),
        pan: fields.pan.value.trim(),
        address: fields.address.value.trim(),
        station: fields.station.value.trim(),
        phone: fields.phone.value.trim(),
        mobile: fields.mobile.value.trim(),
        email: fields.email.value.trim()
      };
      if (isEdit) {
        const index = customers.findIndex(c => c.id === id);
        if (index === -1) { alert("Customer not found"); return; }
        customers[index] = data;
        localStorage.removeItem(EDIT_KEY);
      } else customers.push(data);
      localStorage.setItem(STORE_KEY, JSON.stringify(customers));
      alert("Customer saved successfully");
    }

    function saveAsJeweller() {
      let jewellers = getJewellers();
      const editId = localStorage.getItem(EDIT_KEY_JEWELLER);
      const isEdit = !!editId;
      const id = isEdit ? Number(editId) : (jewellers.length ? Math.max(...jewellers.map(j => j.id)) + 1 : 1001);
      const data = {
        id,
        cid: isEdit ? fields.cid.value : (fields.cid.value.trim() || "JEW-" + id),
        name: fields.name.value.trim(),
        relation: fields.relation.value,
        relationName: fields.relationName.value.trim(),
        type: "Jeweller",
        lfno: fields.lfno.value.trim(),
        openingDate: fields.openingDate.value,
        openingBalance: num(fields.openingBalance.value),
        goldBalance: num(fields.goldBalance.value),
        silverBalance: num(fields.silverBalance.value),
        maxLimit: num(fields.maxLimit.value),
        aadhar: fields.aadhar.value.trim(),
        pan: fields.pan.value.trim(),
        address: fields.address.value.trim(),
        station: fields.station.value.trim(),
        phone: fields.phone.value.trim(),
        mobile: fields.mobile.value.trim(),
        email: fields.email.value.trim()
      };
      if (isEdit) {
        const index = jewellers.findIndex(j => j.id === id);
        if (index === -1) { alert("Jeweller not found"); return; }
        jewellers[index] = data;
        localStorage.removeItem(EDIT_KEY_JEWELLER);
      } else jewellers.push(data);
      localStorage.setItem(STORE_KEY_JEWELLERS, JSON.stringify(jewellers));
      alert("Jeweller saved successfully");
    }

    function saveAsAgent() {
      let agents = getAgents();
      const editId = localStorage.getItem(EDIT_KEY_AGENT);
      const isEdit = !!editId;
      const id = isEdit ? Number(editId) : (agents.length ? Math.max(...agents.map(a => a.id)) + 1 : 1001);
      const data = {
        id,
        agentId: isEdit ? (fields.cid ? fields.cid.value : "") : (fields.cid.value.trim() || "AGT-" + id),
        cid: isEdit ? (fields.cid ? fields.cid.value : "") : (fields.cid.value.trim() || "AGT-" + id),
        name: fields.name.value.trim(),
        mobile: fields.mobile.value.trim(),
        email: fields.email.value.trim(),
        notes: (fields.address && fields.address.value) ? fields.address.value.trim() : "",
        station: fields.station.value.trim(),
        openingBalance: num(fields.openingBalance.value)
      };
      if (isEdit) {
        const index = agents.findIndex(a => a.id === id);
        if (index === -1) { alert("Agent not found"); return; }
        agents[index] = { ...agents[index], ...data };
        localStorage.removeItem(EDIT_KEY_AGENT);
      } else agents.push(data);
      localStorage.setItem(STORE_KEY_AGENTS, JSON.stringify(agents));
      alert("Agent saved successfully");
    }

    function getListType() { const sel = $("listTypeSelect"); return (sel && sel.value) ? sel.value : "Customer"; }
    function switchListType() { const t = getListType(); const title = $("listSectionTitle"); if (title) title.textContent = t + " List"; renderCustomerList(); }

    function openList() {
      const formEl = document.querySelector(".erp-form");
      const listSection = $("customerListSection");
      const actionButtons = document.querySelector(".form-actions");
      const listTypeSelect = $("listTypeSelect");
      if (formEl) formEl.style.display = "none";
      if (listSection) { listSection.style.display = "flex"; listSection.style.flexDirection = "column"; }
      if (actionButtons) actionButtons.style.display = "none";
      if (listTypeSelect && fields.type && fields.type.value) listTypeSelect.value = fields.type.value;
      switchListType();
    }

    function goBackToAddCustomer() {
      const formEl = document.querySelector(".erp-form");
      const listSection = $("customerListSection");
      const actionButtons = document.querySelector(".form-actions");
      if (formEl) { formEl.style.display = "grid"; formEl.style.flex = "1"; }
      if (listSection) listSection.style.display = "none";
      if (actionButtons) actionButtons.style.display = "flex";
      resetForm();
      const title = $("pageTitle"); if (title) title.innerText = "Add Customer";
      if (fields && fields.name) setTimeout(() => fields.name.focus(), 100);
    }

    function renderCustomerList() {
      const tbody = $("customerTableBody");
      const searchBox = $("searchCustomer");
      if (!tbody) return;
      const search = (searchBox ? searchBox.value || "" : "").toLowerCase();
      const listType = getListType();
      tbody.innerHTML = "";

      if (listType === "Customer") {
        const title = $("listSectionTitle"); if (title) title.textContent = "Customer List";
        getCustomers()
          .filter(c => (c.name || "").toLowerCase().includes(search) || (c.mobile || "").includes(search))
          .forEach(c => {
            const nameEsc = (c.name || "").replace(/'/g, "&#39;");
            tbody.innerHTML += `<tr ondblclick="selectCustomerForOrder('${nameEsc}')">
    <td>${c.cid || ""}</td><td>${c.name || ""}</td><td>${c.mobile || ""}</td><td>${c.station || ""}</td><td>${c.openingBalance != null ? c.openingBalance : ""}</td>
    <td><button onclick="editCustomer(${c.id})">Edit</button><button onclick="deleteCustomer(${c.id})">Delete</button><button onclick="selectCustomerForOrder('${nameEsc}')">Select</button></td></tr>`;
          });
      } else if (listType === "Jeweller") {
        const title = $("listSectionTitle"); if (title) title.textContent = "Jeweller List";
        getJewellers()
          .filter(j => (j.name || "").toLowerCase().includes(search) || (j.mobile || "").includes(search))
          .forEach(j => {
            tbody.innerHTML += `<tr>
    <td>${j.cid || ""}</td><td>${j.name || ""}</td><td>${j.mobile || ""}</td><td>${j.station || ""}</td><td>${j.openingBalance != null ? j.openingBalance : ""}</td>
    <td><button onclick="editJeweller(${j.id})">Edit</button><button onclick="deleteJeweller(${j.id})">Delete</button></td></tr>`;
          });
      } else {
        const title = $("listSectionTitle"); if (title) title.textContent = "Agent List";
        getAgents()
          .filter(a => (a.name || "").toLowerCase().includes(search) || (a.mobile || "").includes(search) || (a.email || "").toLowerCase().includes(search))
          .forEach(a => {
            tbody.innerHTML += `<tr>
    <td>${a.cid || a.agentId || a.id}</td><td>${a.name || ""}</td><td>${a.mobile || ""}</td><td>${a.station || a.email || ""}</td><td>${a.openingBalance != null ? a.openingBalance : "—"}</td>
    <td><button onclick="editAgent(${a.id})">Edit</button><button onclick="deleteAgent(${a.id})">Delete</button></td></tr>`;
          });
      }
    }

    function editCustomer(id) { localStorage.removeItem(EDIT_KEY_JEWELLER); localStorage.removeItem(EDIT_KEY_AGENT); localStorage.setItem(EDIT_KEY, id); loadForEdit("Customer", id); }
    function editJeweller(id) { localStorage.removeItem(EDIT_KEY); localStorage.removeItem(EDIT_KEY_AGENT); localStorage.setItem(EDIT_KEY_JEWELLER, id); loadForEdit("Jeweller", id); }
    function editAgent(id) { localStorage.removeItem(EDIT_KEY); localStorage.removeItem(EDIT_KEY_JEWELLER); localStorage.setItem(EDIT_KEY_AGENT, id); loadForEdit("Agent", id); }

    function deleteCustomer(id) { if (!confirm("Delete this customer?")) return; const customers = getCustomers().filter(c => c.id !== id); localStorage.setItem(STORE_KEY, JSON.stringify(customers)); renderCustomerList(); }
    function deleteJeweller(id) { if (!confirm("Delete this jeweller?")) return; const jewellers = getJewellers().filter(j => j.id !== id); localStorage.setItem(STORE_KEY_JEWELLERS, JSON.stringify(jewellers)); renderCustomerList(); }
    function deleteAgent(id) { if (!confirm("Delete this agent?")) return; const agents = getAgents().filter(a => a.id !== id); localStorage.setItem(STORE_KEY_AGENTS, JSON.stringify(agents)); renderCustomerList(); }

    function loadForEdit(entryType, id) {
      if (!form || !fields.name) { setTimeout(() => loadForEdit(entryType, id), 100); return; }
      let record = null;
      if (entryType === "Customer") record = getCustomers().find(c => String(c.id) === String(id));
      else if (entryType === "Jeweller") record = getJewellers().find(j => String(j.id) === String(id));
      else record = getAgents().find(a => String(a.id) === String(id));
      if (!record) return;

      const formEl = document.querySelector(".erp-form");
      const listSection = $("customerListSection");
      const actionButtons = document.querySelector(".form-actions");
      if (formEl) { formEl.style.display = "grid"; formEl.style.flex = "1"; }
      if (listSection) listSection.style.display = "none";
      if (actionButtons) actionButtons.style.display = "flex";

      const title = $("pageTitle");
      if (title) title.innerText = "Edit " + entryType;

      if (entryType === "Agent") {
        if (fields.cid) { fields.cid.value = record.cid || record.agentId || record.id; fields.cid.disabled = true; }
        if (fields.name) fields.name.value = record.name || "";
        if (fields.mobile) fields.mobile.value = record.mobile || "";
        if (fields.email) fields.email.value = record.email || "";
        if (fields.address) fields.address.value = record.notes || "";
        if (fields.type) fields.type.value = "Agent";
      } else {
        ["cid","name","relation","relationName","lfno","openingDate","openingBalance","goldBalance","silverBalance","maxLimit","aadhar","pan","address","station","phone","mobile","email"].forEach(k => {
          if (fields[k] && record[k] !== undefined) fields[k].value = record[k];
        });
        if (fields.type) fields.type.value = entryType;
        if (fields.cid) { fields.cid.value = record.cid; fields.cid.disabled = true; }
      }
    }

    function getCustomers() { return JSON.parse(localStorage.getItem(STORE_KEY) || "[]"); }
    function getJewellers() { return JSON.parse(localStorage.getItem(STORE_KEY_JEWELLERS) || "[]"); }
    function getAgents() { return JSON.parse(localStorage.getItem(STORE_KEY_AGENTS) || "[]"); }

    function selectCustomerForOrder(name) {
      if (typeof loadPage === 'function') {
        const workspace = document.querySelector(".workspace");
        if (workspace) {
          const custNameSelect = workspace.querySelector("#custName");
          if (custNameSelect) {
            const options = Array.from(custNameSelect.options);
            const option = options.find(opt => opt.textContent === name);
            if (option) { custNameSelect.value = option.value; custNameSelect.dispatchEvent(new Event('change')); alert(`Customer "${name}" selected`); return; }
          }
        }
      }
      if (window.opener && window.opener.setCustomerName) { window.opener.setCustomerName(name); window.close(); return; }
      localStorage.setItem("selectedCustomerName", name);
      alert(`Customer "${name}" selected. Please go to New Order page.`);
    }

    window.submitForm = submitForm;
    window.saveAndNew = saveAndNew;
    window.resetForm = resetForm;
    window.openList = openList;
    window.goBackToAddCustomer = goBackToAddCustomer;
    window.editCustomer = editCustomer;
    window.editJeweller = editJeweller;
    window.editAgent = editAgent;
    window.deleteCustomer = deleteCustomer;
    window.deleteJeweller = deleteJeweller;
    window.deleteAgent = deleteAgent;
    window.switchListType = switchListType;
    window.selectCustomerForOrder = selectCustomerForOrder;
    window.renderCustomerList = renderCustomerList;
    window.initCustomerPage = initCustomerPage;
  </script>
</body>
</html>
