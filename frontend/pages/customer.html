<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Add Customer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #e8f0fe;
      --bg-gradient: linear-gradient(160deg, #d4e4f7 0%, #e8f0fe 50%, #f0f6fc 100%);
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #5f6368;
      --border: #dadce0;
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --danger: #d93025;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    * {
      box-sizing: border-box;
      font-family: "Google Sans", "Segoe UI", Roboto, Arial, sans-serif;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg-gradient);
      color: var(--text);
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 24px 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    h2 {
      font-weight: 600;
      margin: 0 0 20px 0;
      font-size: 22px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .erp-form {
      background: var(--card);
      border-radius: 0;
      box-shadow: none;
      border: none;
      padding: 14px 14px 16px;
      display: block;
      max-width: none;
      width: 100%;
      min-width: 0;
      align-self: stretch;
    }

    .erp-form:hover {
      box-shadow: none;
    }

    .ledger-page-shell.customer-add-shell {
      width: 100%;
      max-width: 1180px;
      align-self: center;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .customer-cards-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.12fr);
      gap: 12px;
      width: 100%;
      align-items: stretch;
    }

    .detail-card {
      border: 1px solid #b0bcc9;
      border-radius: 4px;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 440px;
      overflow: hidden;
    }

    .detail-card-head {
      background: linear-gradient(180deg, #e8eaed 0%, #d8dde3 100%);
      color: #3c4043;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      flex-shrink: 0;
      line-height: 1.2;
      border-bottom: 1px solid #b0bcc9;
    }

    .detail-card-body {
      padding: 12px 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .customer-add-shell .inline-field {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 4px 8px;
      align-items: center;
      margin: 0;
      min-height: 36px;
    }

    .customer-add-shell .inline-field label {
      margin: 0;
      font-size: 12px;
      text-align: right;
      line-height: 1.3;
      padding-right: 4px;
      color: #3c4043;
      font-weight: 600;
    }

    .customer-add-shell .inline-field input,
    .customer-add-shell .inline-field select,
    .customer-add-shell .inline-field textarea {
      padding: 6px 8px;
      font-size: 13px;
      min-height: 34px;
      border-radius: 3px;
      line-height: 1.3;
    }

    .customer-add-shell .inline-field textarea {
      min-height: 56px;
      resize: none;
      padding-top: 6px;
      padding-bottom: 6px;
    }

    .customer-add-shell .inline-field .row {
      gap: 4px;
      min-width: 0;
    }

    .customer-add-shell .inline-field .row select#relation {
      width: 56px;
      min-width: 56px;
      padding-left: 4px;
      padding-right: 4px;
    }

    .customer-add-shell .inline-field select#openingBalanceType {
      width: 48px;
      min-width: 48px;
      flex-shrink: 0;
      padding-left: 4px;
      padding-right: 4px;
    }

    .customer-add-shell .inline-field .date-wrap input[type="date"] {
      padding-right: 8px;
    }

    .customer-add-shell .station-select-wrap select,
    .customer-add-shell select#station {
      min-height: 34px;
      height: 34px;
      padding: 6px 28px 6px 8px;
      font-size: 13px;
    }

    .customer-add-shell .btn-station-add {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      min-width: 34px;
      height: 34px;
      min-height: 34px;
      padding: 0;
      background: #eef1f5;
      border: 1px solid #b0bcc9;
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .customer-add-shell .btn-station-add:hover {
      background: #e2e6eb;
      border-color: #9aa5b5;
    }

    .customer-add-shell .btn-station-add svg {
      width: 14px;
      height: 14px;
      color: #5f6368;
    }

    /* Station popup — PHP-style compact card (matches Add Customer) */
    #stationPopupOverlay.station-popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    #stationPopupOverlay.station-popup-overlay[style*="flex"] {
      display: flex !important;
    }

    .station-popup-modal {
      background: #fff;
      width: 520px;
      max-width: calc(100vw - 24px);
      border-radius: 4px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
      font-family: "Google Sans", "Segoe UI", Roboto, Arial, sans-serif;
      overflow: hidden;
      border: 1px solid #b0bcc9;
      display: flex;
      flex-direction: column;
    }

    .station-popup-head {
      background: linear-gradient(180deg, #e8eaed 0%, #d8dde3 100%);
      color: #3c4043;
      padding: 7px 10px;
      font-weight: 700;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      flex-shrink: 0;
      line-height: 1.2;
      border-bottom: 1px solid #b0bcc9;
    }

    .station-popup-card {
      border: none;
      background: #f8fafc;
      flex: 1;
      min-height: 0;
    }

    .station-popup-card-body {
      padding: 10px 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .station-popup-inline {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 4px 8px;
      align-items: center;
      min-height: 34px;
    }

    .station-popup-inline label {
      margin: 0;
      font-size: 12px;
      font-weight: 600;
      text-align: right;
      color: #3c4043;
      padding-right: 4px;
      line-height: 1.3;
    }

    .station-popup-inline label .required {
      color: var(--danger);
    }

    .station-popup-inline input,
    .station-popup-inline select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 13px;
      min-height: 34px;
      color: var(--text);
      background: #fff;
      box-sizing: border-box;
    }

    .station-popup-inline input[readonly] {
      background: #f1f3f4;
      color: var(--muted);
      cursor: not-allowed;
    }

    .station-popup-inline select {
      cursor: pointer;
    }

    .station-popup-actions {
      background: #f4f6f8;
      padding: 10px 12px;
      display: flex;
      justify-content: stretch;
      align-items: stretch;
      flex-wrap: nowrap;
      gap: 8px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .station-popup-actions button {
      flex: 1 1 0;
      min-width: 0;
      padding: 9px 10px;
      min-height: 38px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      white-space: nowrap;
      line-height: 1.25;
      transition: background 0.15s ease;
    }

    .station-popup-actions button:hover {
      background: #e8eaed;
      border-color: #bdc1c6;
    }

    /* Same header treatment as the Station modal (#stationPopupOverlay) */
    .ledger-page-shell.customer-add-shell > .ledger-page-titlebar:first-child {
      position: relative;
      background: #f8f9fa;
      color: #1a1a1a;
      text-align: center;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      border-radius: 6px 6px 0 0;
      margin: 0;
      flex-shrink: 0;
    }

    .customer-add-shell .erp-form label {
      margin-bottom: 0;
    }

    .customer-add-shell .erp-form input,
    .customer-add-shell .erp-form select,
    .customer-add-shell .erp-form textarea {
      padding: 6px 8px;
      font-size: 13px;
      min-height: 34px;
    }

    .customer-add-shell .erp-form textarea {
      min-height: 56px;
      resize: none;
    }

    .ledger-page-titlebar-label {
      display: block;
      width: 100%;
      text-align: center;
    }

    .ledger-page-titlebar-close {
      display: none;
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      margin: 0;
      padding: 0;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #5f6368;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    .ledger-page-titlebar-close:hover {
      background: #e8eaed;
      color: #1a1a1a;
    }

    body.popup-mode .ledger-page-shell.customer-add-shell > .ledger-page-titlebar:first-child {
      padding-left: 12px;
      padding-right: 48px;
    }

    body.popup-mode .ledger-page-titlebar-close {
      display: flex;
    }

    .ledger-page-shell.customer-add-shell .erp-form {
      border: none;
      border-radius: 0;
      box-shadow: none;
      margin: 0;
    }

    .ledger-page-shell.customer-add-shell .erp-form:hover {
      box-shadow: none;
    }

    .customer-add-shell .field {
      margin-bottom: 0;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
      font-weight: 500;
    }

    label .required {
      color: var(--danger);
      margin-left: 1px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      font-size: 14px;
      color: var(--text);
      background: #fff;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input::placeholder,
    textarea::placeholder {
      color: #9aa0a6;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
    }

    input[readonly],
    input:disabled {
      background: #f8f9fa;
      color: var(--muted);
      cursor: default;
    }

    textarea {
      resize: vertical;
      min-height: 72px;
      font-family: inherit;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .row select {
      width: 80px;
      flex-shrink: 0;
    }

    .row input {
      flex: 1;
      min-width: 0;
    }

    .date-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .date-wrap input[type="date"] {
      padding-right: 8px;
    }

    /* Popup mode overrides for a more compact look */
    body.popup-mode {
      background: #fff !important;
      min-height: 0 !important;
      height: auto !important;
      overflow-x: hidden;
      overflow-y: hidden;
    }
    html.popup-mode {
      background: #fff !important;
      overflow: hidden;
      min-height: 0 !important;
      height: auto !important;
    }
    body.popup-mode .page {
      padding: 0;
      min-height: 0 !important;
      background: #fff !important;
      overflow: visible;
      align-items: stretch;
    }
    body.popup-mode .customer-add-shell {
      margin-bottom: 0;
      max-width: none;
      width: 100%;
      align-self: stretch;
    }
    body.popup-mode .customer-add-shell {
      border-radius: 0;
      box-shadow: none;
      border: none;
    }
    body.popup-mode .erp-form {
      padding: 10px 10px 12px;
      background: #fff !important;
    }
    body.popup-mode .customer-cards-grid {
      gap: 10px;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.08fr);
    }
    body.popup-mode .detail-card {
      min-height: 400px;
    }
    body.popup-mode .detail-card-head {
      padding: 6px 8px;
      font-size: 11px;
    }
    body.popup-mode .detail-card-body {
      padding: 10px 8px 12px;
      gap: 8px;
    }
    body.popup-mode .customer-add-shell .inline-field {
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 3px 6px;
      min-height: 32px;
    }
    body.popup-mode .customer-add-shell .inline-field label {
      font-size: 11px;
    }
    body.popup-mode .customer-add-shell .inline-field input,
    body.popup-mode .customer-add-shell .inline-field select,
    body.popup-mode .customer-add-shell .inline-field textarea {
      padding: 5px 7px;
      font-size: 12px;
      min-height: 30px;
    }
    body.popup-mode .customer-add-shell .inline-field textarea {
      min-height: 48px;
    }
    body.popup-mode .customer-add-shell .station-select-wrap select,
    body.popup-mode .customer-add-shell select#station {
      height: 30px;
      min-height: 30px;
    }
    body.popup-mode .customer-add-shell .btn-station-add {
      width: 30px;
      min-width: 30px;
      height: 30px;
      min-height: 30px;
    }
    body.popup-mode .form-actions {
      position: static;
      box-shadow: none;
      border-top: 1px solid var(--border);
      margin-top: 0;
      backdrop-filter: none;
      padding: 6px 8px;
      gap: 6px;
    }
    body.popup-mode .form-actions button {
      padding: 5px 12px;
      font-size: 12px;
      min-width: 96px;
    }

    .ledger-page-shell.customer-add-shell > .form-actions {
      border-radius: 0 0 6px 6px;
    }

    .customer-add-shell > .form-actions {
      position: static;
      background: #f4f6f8;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 12px;
      flex-shrink: 0;
    }

    .customer-add-shell > .form-actions button {
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      min-width: 100px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.05s ease;
    }

    .form-actions button:active {
      transform: scale(0.98);
    }

    .form-actions button:not(.primary) {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
    }

    .form-actions button:not(.primary):hover {
      background: #f8f9fa;
      border-color: #bdc1c6;
    }

    .form-actions button.primary {
      background: var(--primary);
      color: #fff;
      border: none;
    }

    .form-actions button.primary:hover {
      background: var(--primary-hover);
    }

    /* Customer list — PHP shell + Excel-style grid */
    #customerListSection.customer-list-shell {
      display: none;
      flex: 1;
      width: 100%;
      max-width: none;
      align-self: stretch;
      overflow: hidden;
      flex-direction: column;
      min-height: 0;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #b0bcc9;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      padding: 0;
    }

    #customerListSection.customer-list-shell.customer-list-open {
      display: flex !important;
    }

    #customerListSection .customer-list-head {
      background: linear-gradient(180deg, #e8eaed 0%, #d8dde3 100%);
      color: #3c4043;
      text-align: center;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-bottom: 1px solid #b0bcc9;
      border-radius: 8px 8px 0 0;
      flex-shrink: 0;
      margin: 0;
    }

    #customerListSection .customer-list-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      padding: 8px 10px;
      background: #f4f6f8;
      border-bottom: 1px solid #b0bcc9;
      flex-shrink: 0;
    }

    #customerListSection .list-toolbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    #customerListSection .list-controls label {
      margin: 0;
      font-size: 12px;
      font-weight: 600;
      color: #3c4043;
    }

    #customerListSection .list-controls select,
    #customerListSection #listStationFilter {
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid #b0bcc9;
      font-size: 12px;
      min-width: 120px;
      min-height: 30px;
      background: #fff;
      cursor: pointer;
    }

    #customerListSection .list-station-filter-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    #customerListSection .list-controls select:focus {
      outline: none;
      border-color: var(--primary);
    }

    #customerListSection .list-back-btn {
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      border-radius: 6px;
      border: 1px solid #466690;
      background: linear-gradient(180deg, #5a7ca8 0%, #466690 100%);
      color: #fff;
      cursor: pointer;
      min-height: 30px;
    }

    #customerListSection .list-back-btn:hover {
      filter: brightness(1.05);
    }

    #customerListSection .list-search-wrap {
      flex: 1 1 200px;
      min-width: 160px;
      margin: 0;
      position: relative;
      display: flex;
      align-items: center;
    }

    #customerListSection .list-search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: #5f6368;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    #customerListSection .list-search-icon svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    #customerListSection #searchCustomer {
      width: 100%;
      max-width: none;
      padding: 5px 10px 5px 32px;
      font-size: 12px;
      min-height: 30px;
      border-radius: 6px;
      border: 1px solid #b0bcc9;
      background: #fff;
      box-sizing: border-box;
    }

    #customerListSection #searchCustomer:focus {
      outline: none;
      border-color: var(--primary);
    }

    #customerListSection .customer-list-grid-wrap {
      width: 100%;
      overflow: auto;
      flex: 1;
      min-height: 0;
      background: #fff;
      border: none;
      border-radius: 0;
      box-shadow: none;
    }

    #customerListSection .customer-excel-table {
      width: 100%;
      min-width: max-content;
      border-collapse: collapse;
      border-spacing: 0;
      table-layout: auto;
      background: #fff;
      font-size: 12px;
    }

    #customerListSection .customer-excel-table th,
    #customerListSection .customer-excel-table td {
      border: 1px solid #a8b4c4;
      padding: 5px 7px;
      font-size: 12px;
      line-height: 1.3;
      text-align: left;
      vertical-align: middle;
      overflow: visible;
      white-space: nowrap;
    }

    #customerListSection .customer-excel-table th {
      background: #d6e4f4;
      color: #1a3a5c;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 2;
      box-shadow: 0 1px 0 #a8b4c4;
    }

    #customerListSection .customer-excel-table tbody tr:nth-child(even) td {
      background: #f8fafc;
    }

    #customerListSection .customer-excel-table tbody tr:hover td {
      background: #e8f0fe;
    }

    #customerListSection .customer-excel-table tbody td:last-child {
      white-space: nowrap;
      text-align: center;
      overflow: visible;
      min-width: 118px;
      width: 118px;
      padding-left: 4px;
      padding-right: 4px;
    }

    #customerListSection .customer-excel-table thead th:last-child {
      min-width: 118px;
      width: 118px;
    }

    #customerListTable[data-list="Customer"] thead th:nth-child(1),
    #customerListTable[data-list="Customer"] tbody td:nth-child(1) {
      width: 42px;
      min-width: 42px;
      max-width: 42px;
      text-align: center;
      font-weight: 600;
    }

    /* Customer id — show full value */
    #customerListTable[data-list="Customer"] thead th:nth-child(2),
    #customerListTable[data-list="Customer"] tbody td:nth-child(2) {
      min-width: 96px;
      text-align: center;
      overflow: visible;
    }

    #customerListTable[data-list="Customer"] thead th:nth-child(3),
    #customerListTable[data-list="Customer"] tbody td:nth-child(3) {
      width: 12%;
      font-weight: 600;
      white-space: normal;
      word-break: break-word;
    }

    /* LF no. — compact but fully visible */

  <script>
    const STORE_KEY = "customers";
    const STORE_KEY_JEWELLERS = "jewellers";
    const STORE_KEY_AGENTS = "agents";
    const EDIT_KEY = "editCustomerId";
    const EDIT_KEY_JEWELLER = "editJewellerId";
    const EDIT_KEY_AGENT = "editAgentId";
    const $ = id => document.getElementById(id);
    let form = null;
    let fields = {};

    /** Each word: first letter capital, rest lowercase; spaces unchanged (Add Customer — Name). */
    function formatCustomerNameTitleCase(value) {
      if (value == null) return "";
      return String(value).replace(/[^\s]+/g, function (word) {
        if (!word) return word;
        return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
      });
    }

    function onCustomerNameFieldTitleCaseInput(e) {
      const el = e.target;
      if (!el || el.id !== "name" || el.readOnly || el.disabled) return;
      const start = el.selectionStart;
      const end = el.selectionEnd;
      const raw = el.value;
      const next = formatCustomerNameTitleCase(raw);
      if (next === raw) return;
      el.value = next;
      const lenDiff = next.length - raw.length;
      if (typeof start === "number" && typeof end === "number") {
        try {
          el.setSelectionRange(
            Math.max(0, Math.min(next.length, start + lenDiff)),
            Math.max(0, Math.min(next.length, end + lenDiff))
          );
        } catch (err) { /* ignore */ }
      }
    }

    function onCustomerNameFieldTitleCaseBlur(e) {
      const el = e.target;
      if (!el || el.id !== "name") return;
      const next = formatCustomerNameTitleCase(el.value);
      if (next !== el.value) el.value = next;
    }

    function wireCustomerNameTitleCase() {
      const el = $("name");
      if (!el) return;
      el.removeEventListener("input", onCustomerNameFieldTitleCaseInput);
      el.removeEventListener("blur", onCustomerNameFieldTitleCaseBlur);
      el.addEventListener("input", onCustomerNameFieldTitleCaseInput);
      el.addEventListener("blur", onCustomerNameFieldTitleCaseBlur);
    }

    function openStationPopup() {
      $("stationPopupOverlay").style.display = "flex";
      resetStationPopup();
      setTimeout(() => { $("popStationName").focus(); }, 100);
    }
    function closeStationPopup() {
      $("stationPopupOverlay").style.display = "none";
    }
    function resetStationPopup() {
      $("popStationName").value = "";
      $("popStationState").value = "";
      $("popStationCity").value = "";
      $("popStationPin").value = "";
    }
    function saveStationFromPopup(closeAfter) {
      const name = $("popStationName").value.trim();
      const state = $("popStationState").value.trim();
      if (!name) { alert("Station name is required."); $("popStationName").focus(); return; }
      if (!state) { alert("State is required."); $("popStationState").focus(); return; }

      let stations = JSON.parse(localStorage.getItem("stations") || "[]");
      if (stations.some(s => s.name.toLowerCase() === name.toLowerCase())) {
        alert("Station already exists.");
        $("popStationName").focus();
        return;
      }

      const newStation = {
        name: name,
        country: $("popStationCountry").value.trim(),
        state: state,
        city: $("popStationCity").value.trim(),
        pincode: $("popStationPin").value.trim()
      };

      stations.push(newStation);
      localStorage.setItem("stations", JSON.stringify(stations));
      populateStationSelect(name);
      populateListStationFilter();

      if (closeAfter) {
        closeStationPopup();
      } else {
        resetStationPopup();
        $("popStationName").focus();
      }
    }

    function getStationForSave() {
      return fields.station ? String(fields.station.value || '').trim() : '';
    }

    function isStationInMasterList(name) {
      const n = (name || '').trim();
      if (!n) return false;
      const stations = JSON.parse(localStorage.getItem("stations") || "[]");
      return stations.some(s => String(s.name).toLowerCase() === n.toLowerCase());
    }

    function resolveStationCanonical(stored) {
      const n = (stored == null ? '' : String(stored)).trim();
      if (!n) return '';
      const stations = JSON.parse(localStorage.getItem("stations") || "[]");
      const found = stations.find(s => String(s.name).toLowerCase() === n.toLowerCase());
      return found ? found.name : n;
    }

    /** Rebuild station dropdown from localStorage; optionally select a station by name after building. */
    function populateStationSelect(selectAfter) {
      const sel = $("station");
      if (!sel || sel.tagName !== 'SELECT') return;
      const stations = JSON.parse(localStorage.getItem("stations") || "[]");
      const sorted = [...stations].sort((a, b) => String(a.name).localeCompare(String(b.name), undefined, { sensitivity: 'base' }));
      sel.innerHTML = '';
      const ph = document.createElement('option');
      ph.value = '';
      ph.textContent = '— Select station —';
      sel.appendChild(ph);
      sorted.forEach(s => {
        const o = document.createElement('option');
        o.value = s.name;
        o.textContent = s.state ? `${s.name} (${s.state})` : s.name;
        sel.appendChild(o);
      });
      const pick = selectAfter != null ? String(selectAfter).trim() : '';
      if (pick) {
        const canon = resolveStationCanonical(pick);
        if ([...sel.options].some(opt => opt.value === canon)) {
          sel.value = canon;
        } else {
          const byLower = [...sel.options].find(opt => opt.value.toLowerCase() === pick.toLowerCase());
          if (byLower) sel.value = byLower.value;
        }
      }
    }

    function initElements() {
      form = $("customerForm");
      if (!form) return false;
      fields = {
        cid: $("cid"),
        name: $("name"),
        relation: $("relation"),
        relationName: $("relationName"),
        type: $("type"),
        lfno: $("lfno"),
        openingDate: $("openingDate"),
        openingBalance: $("openingBalance"),
        openingBalanceType: $("openingBalanceType"),
        maxLimit: $("maxLimit"),
        aadhar: $("aadhar"),
        pan: $("pan"),
        address: $("address"),
        station: $("station"),
        phone: $("phone"),
        mobile: $("mobile"),
        email: $("email")
      };
      if (!fields.name || !fields.phone) return false;
      return true;
    }

    function initCustomerPage() {
      if (!initElements()) { setTimeout(initCustomerPage, 100); return; }
      if (form) form.addEventListener("submit", e => e.preventDefault());
      if (localStorage.getItem('showCustomerList') === 'true') {
        localStorage.removeItem('showCustomerList');
        setTimeout(openList, 100);
      }
      loadStations();
      const editId = localStorage.getItem(EDIT_KEY);
      const editJewellerId = localStorage.getItem(EDIT_KEY_JEWELLER);
      const editAgentId = localStorage.getItem(EDIT_KEY_AGENT);
      if (editId) loadForEdit("Customer", editId);
      else if (editJewellerId) loadForEdit("Jeweller", editJewellerId);
      else if (editAgentId) loadForEdit("Agent", editAgentId);
      else { resetForm(); if (fields.name) setTimeout(() => fields.name.focus(), 100); }

      function openSelectOptionsList(sel) {
        if (!sel || sel.tagName !== "SELECT") return;
        if (typeof sel.showPicker === "function") {
          try {
            sel.showPicker();
            return;
          } catch (err) { /* fallback below */ }
        }
        sel.focus();
        sel.click();
      }

      // Keyboard navigation: Enter and Arrow keys to move between fields
      form.addEventListener("keydown", e => {
        const isControl = e.target.tagName === "BUTTON" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT";
        const isNumber = e.target.type === "number";

        const fields = Array.from(form.elements).filter(el =>
          !el.readOnly && !el.disabled && el.tagName !== "FIELDSET" && el.type !== "hidden" && el.tagName !== "BUTTON"
        );
        const idx = fields.indexOf(e.target);

        if (e.key === "Enter" && e.target.tagName !== "BUTTON" &&
          (e.target.tagName !== "TEXTAREA" || e.target.id === "address")) {
          e.preventDefault();
          if (e.target.id === "station" && e.target.tagName === "SELECT") {
            if (!e.target.value) {
              openSelectOptionsList(e.target);
            } else if (idx > -1 && idx < fields.length - 1) {
              fields[idx + 1].focus();
            }
            return;
          }
          if (idx > -1 && idx < fields.length - 1) {
            const next = fields[idx + 1];
            next.focus();
            if (next.id === "station" && next.tagName === "SELECT" && !next.value) {
              setTimeout(() => openSelectOptionsList(next), 0);
            }
          }
        } else if (e.key === "ArrowDown" && !isControl && !isNumber) {
          e.preventDefault();
          if (idx > -1 && idx < fields.length - 1) fields[idx + 1].focus();
        } else if (e.key === "ArrowUp" && !isControl && !isNumber) {
          e.preventDefault();
          if (idx > -1 && idx > 0) fields[idx - 1].focus();
        }

        if ((e.ctrlKey || e.metaKey) && e.key === "s") {
          e.preventDefault();
          submitForm();
        }
      });

      wireCustomerNameTitleCase();

      const urlParams = new URL(window.location.href).searchParams;
      if (urlParams.get('popup') === '1') {
        document.documentElement.classList.add('popup-mode');
        document.body.classList.add('popup-mode');

        const page = document.querySelector('.page');
        if (page) {
          page.style.padding = '0';
          page.style.boxShadow = 'none';
          page.style.border = 'none';
          page.style.background = '#ffffff';
          page.style.maxWidth = '100%';
        }
        document.body.style.background = '#ffffff';
        document.documentElement.style.background = '#ffffff';

        const actions = document.querySelector('.form-actions');
        if (actions) {
          const btns = actions.querySelectorAll('button');
          btns.forEach(b => {
            if (b.innerText.includes('List') || b.innerText.includes('New')) {
              b.style.display = 'none';
            }
          });
        }

        function reportLedgerCustomerPopupHeight() {

              { type: 'ledger-customer-popup-height', height: h },

            );
          } catch (e) { /* ignore */ }
        }
        function scheduleLedgerCustomerPopupHeightReports() {

    function populateListStationFilter() {
      const sel = $("listStationFilter");
      if (!sel) return;
      const keep = sel.value;
      const names = new Set();
      try {
        const stations = JSON.parse(localStorage.getItem("stations") || "[]");
        stations.forEach(s => {
          const n = (s && s.name) ? String(s.name).trim() : "";
          if (n) names.add(n);
        });
      } catch (e) { /* ignore */ }
      getCustomers().forEach(c => {
        const n = resolveStationCanonical(c.station || "");
        if (n) names.add(n);
      });
      getJewellers().forEach(j => {
        const n = resolveStationCanonical(j.station || "");
        if (n) names.add(n);
      });
      getAgents().forEach(a => {
        const n = resolveStationCanonical(a.station || "");
        if (n) names.add(n);
      });
      const sorted = [...names].sort((a, b) => a.localeCompare(b, undefined, { sensitivity: "base" }));
      sel.innerHTML = "";
      const allOpt = document.createElement("option");
      allOpt.value = "";
      allOpt.textContent = "All Stations";
      sel.appendChild(allOpt);
      sorted.forEach(name => {
        const o = document.createElement("option");
        o.value = name;
        o.textContent = name;
        sel.appendChild(o);
      });
      if (keep && [...sel.options].some(o => o.value === keep)) sel.value = keep;
    }

    function recordMatchesListStationFilter(record) {
      const filterSel = $("listStationFilter");
      const filterVal = filterSel && filterSel.value ? String(filterSel.value).trim() : "";
      if (!filterVal) return true;
      const stored = record && record.station != null ? String(record.station).trim() : "";
      if (!stored) return false;
      const canon = resolveStationCanonical(stored);
      const n = (s) => (s || "").trim().toLowerCase();
      return n(canon) === n(filterVal) || n(stored) === n(filterVal);
    }

      const jewellers = getJewellers();
      const all = [...customers, ...jewellers];

    function num(v) { return Number(v) || 0; }

    const CUSTOMER_REGISTER_ORDER_SOURCE = "customer-register";

    function customerRegisterBalanceKey(customerId) {
      return "CUSTREG-" + String(customerId);
    }

    /** Keeps Customer Balance in sync: one hidden-key row per customer until a real bill exists. */
    function syncCustomerRegisterBalanceRow(savedCustomer) {
      try {
        const id = savedCustomer && savedCustomer.id;
        if (id == null || String(id).trim() === "") return;
        const BAL_KEY = "customerBalances";
        let balances = JSON.parse(localStorage.getItem(BAL_KEY) || "[]");
        if (!Array.isArray(balances)) balances = [];
        const sid = String(id);
        const regKey = customerRegisterBalanceKey(id);

        const hasRealBillRow = balances.some(function (b) {
          if (!b || String(b.customerId || "").trim() !== sid) return false;
          if (b.orderSource === CUSTOMER_REGISTER_ORDER_SOURCE) return false;
          return !!String(b.orderNo || b.billNo || "").trim();
        });

        balances = balances.filter(function (b) {
          if (!b) return false;
          if (b.orderSource !== CUSTOMER_REGISTER_ORDER_SOURCE) return true;
          return String(b.customerId || "").trim() !== sid;
        });

        if (hasRealBillRow) {
          localStorage.setItem(BAL_KEY, JSON.stringify(balances));
          try {
            window.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
            if (window.parent && window.parent !== window) window.parent.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
            if (window.top && window.top !== window) window.top.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
          } catch (e) { }
          return;
        }

        const hasMaster = savedCustomer.masterOpeningBalance != null && String(savedCustomer.masterOpeningBalance).trim() !== "";
        const rawOp = hasMaster ? savedCustomer.masterOpeningBalance : savedCustomer.openingBalance;
        const opAmt = Number(rawOp) || 0;
        const opTypeStr = hasMaster
          ? (savedCustomer.masterOpeningBalanceType || savedCustomer.openingBalanceType || "Dr")
          : (savedCustomer.openingBalanceType || "Dr");
        const isCr = String(opTypeStr || "Dr").trim().toLowerCase() === "cr";
        const signed = isCr ? -Math.abs(opAmt) : Math.abs(opAmt);
        const magStr = Math.abs(signed).toFixed(2);
        const dateStr = savedCustomer.openingDate || new Date().toISOString().split("T")[0];
        const ts = new Date().toISOString();

        balances.push({
          orderNo: regKey,
          billNo: regKey,
          orderSource: CUSTOMER_REGISTER_ORDER_SOURCE,
          customer: (savedCustomer.name || "").trim(),
          customerId: sid,
          cid: (savedCustomer.cid || "").trim(),
          amount: magStr,
          netAmount: magStr,
          finalBalanceAmount: signed.toFixed(2),
          date: dateStr,
          timestamp: ts,
          phone: (savedCustomer.phone || "").trim() || "—",
          mobile: (savedCustomer.mobile || savedCustomer.phone || "").trim() || "—",
          station: (savedCustomer.station || "").trim() || "—",
          relation: (savedCustomer.relation || "").trim() || "—",
          relationName: (savedCustomer.relationName || "").trim() || "—",
          lfno: (savedCustomer.lfno || "").trim() || "—",
          mark: "—",
          payment: "Pending",
          narration: "Customer register",
          transferred: false,
          neg: 0
        });

        localStorage.setItem(BAL_KEY, JSON.stringify(balances));
        try {
          window.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
          if (window.parent && window.parent !== window) window.parent.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
          if (window.top && window.top !== window) window.top.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
        } catch (e) { }
      } catch (err) {
        console.warn("syncCustomerRegisterBalanceRow", err);
      }
    }

    function validateForm() {
      if (!fields.name.value.trim()) { alert("Customer name is required"); fields.name.focus(); return false; }
      const stationSave = getStationForSave();
      if (!stationSave) {
        alert("Please select a station from the dropdown (use + to add a new station if needed).");
        fields.station.focus();
        return false;
      }
      if (!isStationInMasterList(stationSave)) {
        alert("Choose a valid station from the dropdown or add one with +.");
        fields.station.focus();
        return false;
      }
      if (!/^\d{10}$/.test((fields.phone.value || "").trim())) {
        alert("Enter valid 10-digit phone number");
        fields.phone.focus();
        return false;
      }
      if (fields.mobile.value.trim() && !/^\d{10}$/.test(fields.mobile.value.trim())) {
        alert("Enter valid 10-digit mobile number");
        fields.mobile.focus();
        return false;
      }
      const entryType = (fields.type && fields.type.value) ? fields.type.value : "Customer";
      const editId = entryType === "Customer" ? localStorage.getItem(EDIT_KEY) : entryType === "Jeweller" ? localStorage.getItem(EDIT_KEY_JEWELLER) : localStorage.getItem(EDIT_KEY_AGENT);
      if (fields.mobile.value.trim() || fields.phone.value.trim()) {
        const phoneVal = fields.phone.value.trim();
        const mobileVal = fields.mobile.value.trim();
        const list = entryType === "Customer" ? getCustomers() : entryType === "Jeweller" ? getJewellers() : getAgents();
        const duplicate = list.find(c => {
          if (String(c.id) === String(editId)) return false;
          const cPhone = (c.phone || "").trim();
          const cMobile = (c.mobile || "").trim();
          if (phoneVal && (cPhone === phoneVal || cMobile === phoneVal)) return true;
          if (mobileVal && (cPhone === mobileVal || cMobile === mobileVal)) return true;
          return false;
        });
        if (duplicate) { alert("This customer with this mobile or Phone no, already exists"); return false; }
      }
      return true;
    }

      if (!form || !fields.name) return;
      const entryType = (fields.type && fields.type.value) ? fields.type.value : "Customer";
      if (entryType === "Agent") { saveAsAgent(); return; }
      if (entryType === "Jeweller") { saveAsJeweller(); return; }

      let customers = getCustomers();
      const editId = localStorage.getItem(EDIT_KEY);
      const isEdit = !!editId;
      const id = isEdit ? Number(editId) : (customers.length ? Math.max(...customers.map(c => c.id)) + 1 : 1001);
      const data = {
        id,
        cid: isEdit ? fields.cid.value : (fields.cid.value.trim() || "CUST-" + id),
        name: fields.name.value.trim(),
        relation: fields.relation.value,
        relationName: fields.relationName.value.trim(),

        openingDate: fields.openingDate.value,

        mobile: fields.mobile.value.trim(),
        email: fields.email.value.trim()
      };
      if (isEdit) {
        const index = customers.findIndex(c => c.id === id);
        if (index === -1) { alert("Customer not found"); return; }
        const prev = customers[index] || {};
        customers[index] = { ...prev, ...data };
        localStorage.removeItem(EDIT_KEY);
      } else customers.push(data);
      localStorage.setItem(STORE_KEY, JSON.stringify(customers));
      const savedRecord = customers.find(c => c.id === id);

    function renderCustomerList() {
      const tbody = $("customerTableBody");
      const searchBox = $("searchCustomer");
      const headRow = $("customerTableHeadRow");
      const listTable = $("customerListTable");
      if (!tbody) return;
      const search = (searchBox ? searchBox.value || "" : "").toLowerCase();
      const listType = getListType();
      tbody.innerHTML = "";
      if (listTable) listTable.setAttribute("data-list", listType || "");

      const fmtDate = (d) => { if (!d) return "—"; const x = new Date(d); return isNaN(x.getTime()) ? d : x.toLocaleDateString(); };

      const balances = JSON.parse(localStorage.getItem("customerBalances") || "[]");
      const norm = (s) => (s || "").trim().toLowerCase();

      const getCalculatedBalance = (name, opBal, opType, currentBal, currentBalType) => {
        // If a statement-synced currentBalance exists, use it directly
        if (currentBal != null && currentBal !== '') {
          const val = Number(currentBal);
          if (val === 0) return '0';
          const t = currentBalType || (val > 0 ? 'Dr' : 'Cr');
          return Math.abs(val) + ' (' + t + ')';
        }
        let baseAmount = (opBal != null && opBal !== '') ? Number(opBal) : 0;
        if (opType === 'Cr') baseAmount = -baseAmount;
        const customerEntries = balances.filter((b) => norm(b.customer) === norm(name));
        const amountMinusRateDiffSum = customerEntries.reduce((sum, b) => {
          const v = b.amountMinusRateDiff != null && b.amountMinusRateDiff !== '' ? Number(b.amountMinusRateDiff) : NaN;
          return Number.isNaN(v) ? sum : sum + v;
        }, 0);
        let finalBal = baseAmount;
        if (amountMinusRateDiffSum > 0 || amountMinusRateDiffSum < 0) finalBal = amountMinusRateDiffSum;
        if (finalBal === 0 && baseAmount !== 0) return Math.abs(baseAmount) + (opType ? ' (' + opType + ')' : '');
        if (finalBal === 0) return '\u2014';
        const isDr = finalBal > 0;
        return Math.abs(finalBal) + (isDr ? ' (Dr)' : ' (Cr)');
      };

      if (listType === "Customer") {
        const title = $("listSectionTitle"); if (title) title.textContent = "Customer List";
        if (headRow) headRow.innerHTML = `
          <th>S.N</th>
          <th>Customer id</th>
          <th>Name</th>
          <th>Lf no.</th>
          <th>Relation</th>
          <th>Relation name</th>
          <th>Address</th>
          <th>Station</th>
          <th>Phone</th>
          <th>Mobile</th>
          <th>Actions</th>
        `;
        getCustomers()
          .filter(c => ((c.name || "").toLowerCase().includes(search) || (c.mobile || "").includes(search)) && recordMatchesListStationFilter(c))
          .forEach((c, idx) => {
            const nameEsc = (c.name || "").replace(/'/g, "&#39;");
            tbody.innerHTML += `<tr ondblclick="selectCustomerForOrder('${nameEsc}')">
    <td>${idx + 1}</td>
    <td>${c.cid || ""}</td>
    <td>${c.name || ""}</td>
    <td>${c.lfno || ""}</td>
    <td>${c.relationType || c.relation || ""}</td>
    <td>${c.relationName || ""}</td>
    <td>${c.address || ""}</td>
    <td>${c.station || ""}</td>
    <td>${c.phone || ""}</td>
    <td>${c.mobile || ""}</td>
    <td><button onclick="editCustomer(${c.id})">Edit</button><button onclick="deleteCustomer(${c.id})">Delete</button></td></tr>`;
          });
      } else if (listType === "Jeweller") {
        const title = $("listSectionTitle"); if (title) title.textContent = "Jeweller List";
        if (headRow) headRow.innerHTML = `
          <th>CID</th>
          <th>Name</th>
          <th>Mobile</th>
          <th>Station</th>
          <th>Balance</th>
          <th>Opening Date</th>
          <th>Aadhar Number</th>
          <th>PAN Number</th>
          <th>Actions</th>
        `;
        getJewellers()
          .filter(j => ((j.name || "").toLowerCase().includes(search) || (j.mobile || "").includes(search)) && recordMatchesListStationFilter(j))
          .forEach(j => {
            const dispBal = getCalculatedBalance(j.name, j.openingBalance, j.openingBalanceType, j.currentBalance, j.currentBalanceType);
            tbody.innerHTML += `<tr>
    <td>${j.cid || ""}</td><td>${j.name || ""}</td><td>${j.mobile || ""}</td><td>${j.station || ""}</td><td>${dispBal}</td><td>${fmtDate(j.openingDate)}</td><td>${j.aadhar || "—"}</td><td>${j.pan || "—"}</td>
    <td><button onclick="editJeweller(${j.id})">Edit</button><button onclick="deleteJeweller(${j.id})">Delete</button></td></tr>`;
          });
      } else {
        const title = $("listSectionTitle"); if (title) title.textContent = "Agent List";
        if (headRow) headRow.innerHTML = `
          <th>CID</th>
          <th>Name</th>
          <th>Mobile</th>
          <th>Station</th>
          <th>Balance</th>
          <th>Opening Date</th>
          <th>Aadhar Number</th>
          <th>PAN Number</th>
          <th>Actions</th>
        `;
        getAgents()
          .filter(a => ((a.name || "").toLowerCase().includes(search) || (a.mobile || "").includes(search) || (a.email || "").toLowerCase().includes(search)) && recordMatchesListStationFilter(a))
          .forEach(a => {
            const dispBal = getCalculatedBalance(a.name, a.openingBalance, a.openingBalanceType, a.currentBalance, a.currentBalanceType);
            tbody.innerHTML += `<tr>
    <td>${a.cid || a.agentId || ""}</td><td>${a.name || ""}</td><td>${a.mobile || ""}</td><td>${a.station || a.email || "—"}</td><td>${dispBal}</td><td>${fmtDate(a.openingDate)}</td><td>${a.aadhar || "—"}</td><td>${a.pan || "—"}</td>
    <td><button onclick="editAgent(${a.id})">Edit</button><button onclick="deleteAgent(${a.id})">Delete</button></td></tr>`;
          });
      }
    }

    function editCustomer(id) { localStorage.removeItem(EDIT_KEY_JEWELLER); localStorage.removeItem(EDIT_KEY_AGENT); localStorage.setItem(EDIT_KEY, id); loadForEdit("Customer", id); }
    function editJeweller(id) { localStorage.removeItem(EDIT_KEY); localStorage.removeItem(EDIT_KEY_AGENT); localStorage.setItem(EDIT_KEY_JEWELLER, id); loadForEdit("Jeweller", id); }
    function editAgent(id) { localStorage.removeItem(EDIT_KEY); localStorage.removeItem(EDIT_KEY_JEWELLER); localStorage.setItem(EDIT_KEY_AGENT, id); loadForEdit("Agent", id); }

    function deleteCustomer(id) {
      const customers = getCustomers();
      const cust = customers.find(c => String(c.id) === String(id));
      if (!cust) return;
      const name = (cust.name || "").trim();
      const norm = n => (n || "").toLowerCase().trim();
      const orders = JSON.parse(localStorage.getItem("orders") || "[]");
      const balances = JSON.parse(localStorage.getItem("customerBalances") || "[]");
      const sameNameCount = customers.filter(c => norm(c.name) === norm(name)).length;
      const hasOrder = orders.some(o => {
        if (String(o.customerId) === String(id)) return true;
        if (sameNameCount <= 1 && norm(o.customer || o.customerName) === norm(name)) return true;
        return false;
      });
      const hasBalance = balances.some(b => {
        if (!b || b.orderSource === CUSTOMER_REGISTER_ORDER_SOURCE) return false;
        if (String(b.customerId || "") === String(id)) return true;
        if (sameNameCount <= 1) return norm(b.customer) === norm(name);
        return false;
      });
      if (hasOrder || hasBalance) {
        alert("Cannot delete. This customer has orders or balance entries (New Order → Orders → Pending/Ready → All Bill → Customer Balance). Remove or transfer them first.");
        return;
      }
      if (!confirm("Delete this customer?")) return;
      try {
        let bal = JSON.parse(localStorage.getItem("customerBalances") || "[]");
        const rk = customerRegisterBalanceKey(id);
        bal = bal.filter(b => {
          if (!b) return false;
          const k = String(b.orderNo || b.billNo || "").trim();
          if (k === rk) return false;
          if (b.orderSource === CUSTOMER_REGISTER_ORDER_SOURCE && String(b.customerId || "") === String(id)) return false;
          return true;
        });
        localStorage.setItem("customerBalances", JSON.stringify(bal));
        try {
          window.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
          if (window.parent && window.parent !== window) window.parent.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
          if (window.top && window.top !== window) window.top.dispatchEvent(new CustomEvent("customerBalancesUpdated"));
        } catch (e) { }
      } catch (e2) { }
      const next = customers.filter(c => c.id !== id);
      localStorage.setItem(STORE_KEY, JSON.stringify(next));
      renderCustomerList();
    }
    function deleteJeweller(id) { if (!confirm("Delete this jeweller?")) return; const jewellers = getJewellers().filter(j => j.id !== id); localStorage.setItem(STORE_KEY_JEWELLERS, JSON.stringify(jewellers)); renderCustomerList(); }
    function deleteAgent(id) { if (!confirm("Delete this agent?")) return; const agents = getAgents().filter(a => a.id !== id); localStorage.setItem(STORE_KEY_AGENTS, JSON.stringify(agents)); renderCustomerList(); }

    function loadForEdit(entryType, id) {
      if (!form || !fields.name) { setTimeout(() => loadForEdit(entryType, id), 100); return; }
      let record = null;
      if (entryType === "Customer") record = getCustomers().find(c => String(c.id) === String(id));
      else if (entryType === "Jeweller") record = getJewellers().find(j => String(j.id) === String(id));
      else record = getAgents().find(a => String(a.id) === String(id));
      if (!record) {
        alert(entryType + " record not found.");
        return;
      }

      showCustomerFormView();
      applyRecordToEditForm(record, entryType);

      try {
        const ws = document.querySelector(".workspace");
        if (ws && typeof ws.scrollTo === "function") ws.scrollTo({ top: 0, behavior: "auto" });
        else window.scrollTo({ top: 0, behavior: "auto" });
      } catch (e) { /* ignore */ }
      if (fields.name) setTimeout(() => { try { fields.name.focus(); } catch (e) { } }, 50);
    }

    function getCustomers() { return JSON.parse(localStorage.getItem(STORE_KEY) || "[]"); }
    function getJewellers() { return JSON.parse(localStorage.getItem(STORE_KEY_JEWELLERS) || "[]"); }
    function getAgents() { return JSON.parse(localStorage.getItem(STORE_KEY_AGENTS) || "[]"); }

    function selectCustomerForOrder(name) {
      if (typeof loadPage === 'function') {
        const workspace = document.querySelector(".workspace");
        if (workspace) {
          const custNameSelect = workspace.querySelector("#custName");
          if (custNameSelect) {
            const options = Array.from(custNameSelect.options);
            const option = options.find(opt => opt.textContent === name);
            if (option) { custNameSelect.value = option.value; custNameSelect.dispatchEvent(new Event('change')); alert(`Customer "${name}" selected`); return; }
          }
        }
      }
      if (window.opener && window.opener.setCustomerName) { window.opener.setCustomerName(name); window.close(); return; }
      localStorage.setItem("selectedCustomerName", name);
      alert(`Customer "${name}" selected. Please go to New Order page.`);
    }

    window.submitForm = submitForm;
    window.saveAndNew = saveAndNew;
    window.resetForm = resetForm;
    window.openList = openList;
    window.goBackToAddCustomer = goBackToAddCustomer;
    window.editCustomer = editCustomer;
    window.editJeweller = editJeweller;
    window.editAgent = editAgent;
    window.deleteCustomer = deleteCustomer;
    window.deleteJeweller = deleteJeweller;
    window.deleteAgent = deleteAgent;
    window.switchListType = switchListType;
    window.selectCustomerForOrder = selectCustomerForOrder;
    window.renderCustomerList = renderCustomerList;
    window.initCustomerPage = initCustomerPage;
    window.openStationPopup = openStationPopup;
    window.closeStationPopup = closeStationPopup;
    window.resetStationPopup = resetStationPopup;
    window.saveStationFromPopup = saveStationFromPopup;
    window.populateStationSelect = populateStationSelect;
    window.loadStations = loadStations;
  </script>
</body>
