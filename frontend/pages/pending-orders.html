<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Pending Orders</title>

  <style>
    /* =========================
   BASE
========================= */
    * {
      box-sizing: border-box;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 14px;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      background: #fff;
    }

    /* =========================
   CONTAINER — full screen
========================= */
    .pending-orders-wrap {
      margin: 0;
      background: #fff !important;
      border: none;
      border-radius: 0;
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      max-height: 100vh;
      min-height: 0;
      overflow: hidden;
      box-sizing: border-box;
      box-shadow: none;
    }

    .workspace .pending-orders-wrap {
      margin: 0 !important;
      height: 100% !important;
      max-height: 100% !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      background: #fff !important;
      border: none !important;
    }

    .pending-orders-wrap > .ledger-page-titlebar:first-child {
      border-radius: 0;
      flex-shrink: 0;
      background: #f4f6f8;
      border-bottom: 1px solid #a8b4c4;
      color: #1a3a5c;
      font-weight: 700;
    }

    .workspace .pending-orders-wrap > .ledger-page-titlebar:first-child {
      border-radius: 0;
    }

    /* =========================
   TOOLBAR (compact — aligned with Orders list)
========================= */
    .pending-toolbar {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 8px 10px;
      width: calc(100% - 28px);
      margin: 0 14px;
      padding: 6px 0;
      border: none;
      border-bottom: 1px solid #a8b4c4;
      background: #fff !important;
      flex-shrink: 0;
      box-sizing: border-box;
      overflow-x: auto;
    }

    .workspace .pending-orders-wrap .pending-toolbar {
      background: #fff !important;
    }

    .pending-toolbar select.pending-order-filter-select,
    .pending-toolbar input[type="text"] {
      flex-shrink: 0;
    }

    .pending-toolbar .btn {
      flex-shrink: 0;
      margin-left: auto;
    }

    .pending-toolbar .btn {
      padding: 4px 10px;
      min-height: 26px;
      height: 26px;
      border: 1px solid #a8b4c4;
      background: #fff;
      cursor: pointer;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.2;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      color: #1a3a5c !important;
      box-shadow: none;
    }

    .pending-toolbar .btn:hover {
      background: #d6e4f4;
      border-color: #7a8da6;
      color: #1a3a5c !important;
      transform: none;
      box-shadow: none;
    }

    .pending-toolbar .btn:active {
      transform: none;
    }

    .pending-toolbar input[type="text"] {
      height: 26px;
      min-height: 26px;
      padding: 3px 8px;
      border: 1px solid #a8b4c4;
      border-radius: 3px;
      font-size: 12px;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      min-width: 160px;
      max-width: 280px;
      line-height: 1.2;
      box-sizing: border-box;
    }

    .pending-toolbar input[type="text"]:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
    }

    .pending-toolbar input::placeholder {
      color: #8e8e93;
      font-size: 12px;
    }

    .pending-toolbar select.pending-order-filter-select {
      height: 26px;
      min-height: 26px;
      min-width: 120px;
      max-width: 180px;
      padding: 3px 24px 3px 8px;
      border: 1px solid #a8b4c4;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 600;
      background: #fff;
      cursor: pointer;
      color: #1a3a5c;
      box-sizing: border-box;
      line-height: 1.2;
    }

    .pending-toolbar select.pending-order-filter-select:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
    }

    /* =========================
   TABLE — Microsoft Excel–style grid
========================= */
    .pending-orders-wrap > .table-wrap {
      flex: 1 1 auto;
      overflow: auto;
      position: relative;
      min-height: 0;
      width: calc(100% - 28px);
      margin: 0 14px;
      box-sizing: border-box;
      background: #fff !important;
      border: none;
    }

    .workspace .pending-orders-wrap .table-wrap {
      background: #fff !important;
    }

    #pendingOrdersTable {
      width: 100%;
      min-width: max-content;
      border-collapse: collapse;
      border-spacing: 0;
      table-layout: fixed;
      background: #fff !important;
      font-family: Calibri, "Segoe UI", Arial, sans-serif;
      font-size: 12px;
    }

    #pendingOrdersTable thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #pendingOrdersTable thead th {
      background: #d6e4f4 !important;
      color: #1a3a5c !important;
      border: 1px solid #a8b4c4;
      padding: 6px 10px;
      white-space: nowrap;
      font-weight: 700;
      font-size: 11px;
      text-align: left;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      vertical-align: middle;
      line-height: 1.25;
      box-shadow: 0 1px 0 #a8b4c4;
    }

    #pendingOrdersTable thead th.center {
      text-align: center;
    }

    #pendingOrdersTable thead th.right {
      text-align: right;
    }

    #pendingOrdersTable tbody td {
      padding: 6px 10px;
      border: 1px solid #d4d4d4;
      font-size: 12px;
      vertical-align: middle;
      color: #000 !important;
      background: transparent !important;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }

    #pendingOrdersTable tbody td:nth-child(3),
    #pendingOrdersTable tbody td:nth-child(4) {
      white-space: normal;
      word-break: break-word;
    }

    #pendingOrdersTable tbody td:nth-child(5),
    #pendingOrdersTable tbody td:nth-child(6) {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    #pendingOrdersTable tbody tr .btn {
      padding: 2px 10px;
      min-height: 22px;
      height: 22px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 2px;
      border: 1px solid #a8b4c4;
      background: #fff;
      color: #1a3a5c;
      box-shadow: none;
      transform: none;
    }

    #pendingOrdersTable tbody tr .btn:hover {
      background: #d6e4f4;
      border-color: #7a8da6;
      color: #1a3a5c;
      transform: none;
      box-shadow: none;
    }

    /* Row backgrounds — orange sides (subtle), white centre */
    #pendingOrdersTable tbody tr:not(.pending-orders-row-overdue),
    .workspace .pending-orders-wrap #pendingOrdersTable tbody tr:not(.pending-orders-row-overdue) {
      transition: background 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      cursor: pointer;
      background: linear-gradient(
        90deg,
        rgba(255, 130, 50, 0.48) 0%,
        rgba(255, 155, 85, 0.31) 8%,
        rgba(255, 185, 120, 0.17) 18%,
        rgba(255, 215, 175, 0.095) 28%,
        #ffffff 40%,
        #ffffff 50%,
        #ffffff 60%,
        rgba(255, 215, 175, 0.095) 72%,
        rgba(255, 185, 120, 0.17) 82%,
        rgba(255, 155, 85, 0.31) 92%,
        rgba(255, 130, 50, 0.48) 100%
      ) !important;
    }

    #pendingOrdersTable tbody tr:not(.pending-orders-row-overdue):nth-child(even),
    .workspace .pending-orders-wrap #pendingOrdersTable tbody tr:not(.pending-orders-row-overdue):nth-child(even) {
      background: linear-gradient(
        90deg,
        rgba(255, 125, 45, 0.42) 0%,
        rgba(255, 150, 78, 0.28) 8%,
        rgba(255, 180, 115, 0.16) 18%,
        rgba(255, 210, 170, 0.09) 28%,
        #fffefb 40%,
        #fffefb 50%,
        #fffefb 60%,
        rgba(255, 210, 170, 0.09) 72%,
        rgba(255, 180, 115, 0.16) 82%,
        rgba(255, 150, 78, 0.28) 92%,
        rgba(255, 125, 45, 0.42) 100%
      ) !important;
    }

    #pendingOrdersTable tbody tr:not(.pending-orders-row-overdue):hover,
    .workspace .pending-orders-wrap #pendingOrdersTable tbody tr:not(.pending-orders-row-overdue):hover {
      background: linear-gradient(
        90deg,
        rgba(255, 150, 75, 0.4) 0%,
        rgba(255, 185, 125, 0.22) 14%,
        #fff3e8 44%,
        #fff7ef 50%,
        #fff3e8 56%,
        rgba(255, 185, 125, 0.22) 86%,
        rgba(255, 150, 75, 0.4) 100%
      ) !important;
      box-shadow: inset 0 0 0 1px rgba(255, 130, 50, 0.28);
    }

    #pendingOrdersTable tbody tr:not(.pending-orders-row-overdue):hover td,
    .workspace .pending-orders-wrap #pendingOrdersTable tbody tr:not(.pending-orders-row-overdue):hover td {
      border-color: #ffd4b3;
    }

    #pendingOrdersTable tbody tr.pending-orders-row-overdue,
    #pendingOrdersTable tbody tr.pending-orders-row-overdue:nth-child(even),
    .workspace .pending-orders-wrap #pendingOrdersTable tbody tr.pending-orders-row-overdue,
    .workspace .pending-orders-wrap #pendingOrdersTable tbody tr.pending-orders-row-overdue:nth-child(even) {
      background: linear-gradient(
        90deg,
        rgba(254, 202, 202, 0.75) 0%,
        rgba(254, 215, 215, 0.5) 10%,
        rgba(254, 226, 226, 0.28) 24%,
        rgba(255, 255, 255, 0.98) 36%,
        #fffafa 50%,
        rgba(255, 255, 255, 0.98) 64%,
        rgba(254, 226, 226, 0.28) 76%,
        rgba(254, 215, 215, 0.5) 90%,
        rgba(254, 202, 202, 0.75) 100%
      ) !important;
    }

    #pendingOrdersTable tbody tr.pending-orders-row-overdue:hover,
    .workspace .pending-orders-wrap #pendingOrdersTable tbody tr.pending-orders-row-overdue:hover {
      /* Solid full row on hover — red */
      background: #fee2e2 !important;
      box-shadow: inset 0 0 0 1px rgba(252, 165, 165, 0.22);
    }

    #pendingOrdersTable tbody tr.pending-orders-row-overdue:hover td,
    .workspace .pending-orders-wrap #pendingOrdersTable tbody tr.pending-orders-row-overdue:hover td {
      border-color: #fca5a5;
    }

    /* Due date column: keep blue (workspace td color must not wash this out) */
    #pendingOrdersTable tbody td:nth-child(6),
    .workspace .pending-orders-wrap #pendingOrdersTable tbody td:nth-child(6) {
      color: #007aff !important;
      font-weight: 400;
    }

    .center {
      text-align: center;
    }

    .right {
      text-align: right;
      font-weight: 400;
      color: #1d1d1f !important;
      font-variant-numeric: tabular-nums;
    }

    .badge {
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      display: inline-block;
      line-height: 1.2;
      white-space: nowrap;
    }

    .pending {
      /* Light, low-chroma orange — softer, less saturated */
      background: linear-gradient(180deg, #fff2ea 0%, #ffeadd 40%, #ffdfcf 100%);
      color: #8f5c38;
      border: 1px solid #e5d0c4;
      text-shadow: none;
    }

    .badge.direct-bill {
      background: #e8f4fd;
      color: #0b57d0;
      border: 1px solid #a8c7fa;
    }

    .action-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      background: #28a745;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .action-btn:hover {
      background: #218838;
      transform: translateY(-1px);
      box-shadow: 0 2px 4px rgba(40, 167, 69, 0.3);
    }

    .action-btn:active {
      transform: translateY(0);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6c757d;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .empty-state-subtext {
      font-size: 13px;
      color: #8e8e93;
    }

    /* Shared column widths — main grid + footer totals row align */
    #pendingOrdersTable,
    #pendingFooterTable {
      table-layout: fixed;
    }

    #pendingOrdersTable col.col-status,
    #pendingFooterTable col.col-status { width: 100px; }

    #pendingOrdersTable col.col-order-no,
    #pendingFooterTable col.col-order-no { width: 92px; }

    #pendingOrdersTable col.col-customer,
    #pendingFooterTable col.col-customer { width: 120px; }

    #pendingOrdersTable col.col-relation,
    #pendingFooterTable col.col-relation { width: 110px; }

    #pendingOrdersTable col.col-date,
    #pendingFooterTable col.col-date { width: 88px; }

    #pendingOrdersTable col.col-num,
    #pendingFooterTable col.col-num { width: 88px; }

    #pendingOrdersTable col.col-action,
    #pendingFooterTable col.col-action { width: 56px; }

    /* Footer totals row — lines up under Gr.Wt … Balance columns */
    .pending-footer-align {
      flex-shrink: 0;
      overflow-x: auto;
      overflow-y: hidden;
      width: calc(100% - 28px);
      margin: 0 14px;
      border-top: 1px solid #a8b4c4;
      background: #eef1f5;
      scrollbar-width: none;
      box-sizing: border-box;
    }

    .pending-footer-align::-webkit-scrollbar {
      display: none;
    }

    #pendingFooterTable {
      width: 100%;
      min-width: max-content;
      border-collapse: collapse;
      border-spacing: 0;
      font-family: Calibri, "Segoe UI", Arial, sans-serif;
      font-size: 12px;
      background: #eef1f5;
    }

    #pendingFooterTable td {
      border: 1px solid #d4d4d4;
      padding: 4px 7px;
      vertical-align: middle;
      line-height: 1.25;
      box-sizing: border-box;
    }

    #pendingFooterTable .pending-footer-count-cell {
      font-size: 11px;
      font-weight: 600;
      color: #5f6368;
      text-align: left;
      background: #eef1f5;
    }

    #pendingFooterTable .pending-footer-sum-cell {
      text-align: right;
      vertical-align: top;
      background: #eef1f5;
      padding: 3px 6px;
    }

    #pendingFooterTable .pending-footer-sum-k {
      display: block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: #1a3a5c;
      line-height: 1.15;
      margin-bottom: 2px;
    }

    #pendingFooterTable .pending-footer-sum-v {
      display: block;
      font-size: 12px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #000;
      line-height: 1.2;
    }

    #pendingFooterTable .pending-footer-action-cell {
      background: #eef1f5;
      border-left: none;
    }

    /* =========================
   SCROLLBAR (Customer Balance style)
========================= */
    .table-wrap::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    .table-wrap::-webkit-scrollbar-track {
      background: #f0f2f5;
      border-radius: 6px;
    }

    .table-wrap::-webkit-scrollbar-thumb {
      background: #b0b4b8;
      border-radius: 6px;
    }

    .table-wrap::-webkit-scrollbar-thumb:hover {
      background: #a1a1a6;
    }

    /* =========================
   RESPONSIVE
========================= */
    @media (max-width: 768px) {
      .pending-orders-wrap {
        margin: 0;
        height: 100vh;
        max-height: 100vh;
      }

      .workspace .pending-orders-wrap {
        margin: 0;
        height: 100%;
        max-height: 100%;
      }

      .pending-toolbar,
      .pending-orders-wrap > .table-wrap,
      .pending-footer-align {
        width: calc(100% - 16px);
        margin-left: 8px;
        margin-right: 8px;
      }

      .pending-toolbar {
        padding: 6px 0;
        gap: 8px;
        flex-wrap: wrap;
      }

      .pending-orders-wrap > .table-wrap {
        overflow-x: scroll;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      #pendingOrdersTable {
        min-width: 900px;
      }

      #pendingOrdersTable tbody td {
        max-width: 150px;
        font-size: 11px;
        padding: 4px 6px;
      }

      #pendingOrdersTable thead th {
        font-size: 10px;
        padding: 4px 6px;
      }

      .pending-toolbar input[type="text"] {
        min-width: 120px;
      }
    }
  </style>
</head>

<body>

  <div class="pending-orders-wrap">
    <div class="ledger-page-titlebar">Pending Orders</div>
    <!-- TOOLBAR -->
    <div class="pending-toolbar">
      <select id="filterPendingOrderNo" class="pending-order-filter-select" onchange="searchOrders()"
        aria-label="Filter by order number">
        <option value="">All order numbers</option>
      </select>
      <input type="text" id="searchBox" placeholder="🔍 Search pending orders..." onkeyup="searchOrders()">
      <button class="btn" onclick="loadPendingOrders()">🔄 Refresh</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap" id="pendingOrdersTableScroll">
      <table id="pendingOrdersTable">
        <colgroup>
          <col class="col-status">
          <col class="col-order-no">
          <col class="col-customer">
          <col class="col-relation">
          <col class="col-date">
          <col class="col-date">
          <col class="col-num">
          <col class="col-num">
          <col class="col-num">
          <col class="col-num">
          <col class="col-num">
          <col class="col-action">
        </colgroup>
        <thead>
          <tr>
            <th>Status</th>
            <th>Order No</th>
            <th>Customer</th>
            <th>Relation Name</th>
            <th>Order Date</th>
            <th>Due Date</th>
            <th class="right">Gr.Wt</th>
            <th class="right" title="Same as Orders list Order Total (gross non-Purchase lines)">Net (Rs)</th>
            <th class="right" title="Purchase lines + Purchase sheet total">Total Purchase</th>
            <th class="right" title="Non-Paid payments + purchase line totals">Advance (Rs)</th>
            <th class="right" title="Net bill after purchases − all payments (same as Orders list Balance)">Balance</th>
            <th class="center">Edit</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="pending-footer-align" id="pendingFooter" aria-label="Pending order list totals">
      <table id="pendingFooterTable">
        <colgroup>
          <col class="col-status">
          <col class="col-order-no">
          <col class="col-customer">
          <col class="col-relation">
          <col class="col-date">
          <col class="col-date">
          <col class="col-num">
          <col class="col-num">
          <col class="col-num">
          <col class="col-num">
          <col class="col-num">
          <col class="col-action">
        </colgroup>
        <tbody>
          <tr>
            <td colspan="6" class="pending-footer-count-cell" id="footerCount">Loading pending orders...</td>
            <td class="pending-footer-sum-cell">
              <span class="pending-footer-sum-k">Gr.Wt</span>
              <span class="pending-footer-sum-v" id="footerTotalGrWt">0.000</span>
            </td>
            <td class="pending-footer-sum-cell">
              <span class="pending-footer-sum-k">Net (Rs)</span>
              <span class="pending-footer-sum-v" id="footerTotalNet">0.00</span>
            </td>
            <td class="pending-footer-sum-cell">
              <span class="pending-footer-sum-k">Total Purchase</span>
              <span class="pending-footer-sum-v" id="footerTotalPurchase">0.00</span>
            </td>
            <td class="pending-footer-sum-cell">
              <span class="pending-footer-sum-k">Advance</span>
              <span class="pending-footer-sum-v" id="footerTotalAdvance">0.00</span>
            </td>
            <td class="pending-footer-sum-cell">
              <span class="pending-footer-sum-k">Balance</span>
              <span class="pending-footer-sum-v" id="footerTotalBalance">0.00</span>
            </td>
            <td class="pending-footer-action-cell"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="../script/order-processing.js"></script>
  <script>
    /* =========================
       GLOBAL STATE
    ========================= */
    let tbody = null;
    let footer = null;
    let footerCount = null;
    let footerTotalGrWt = null;
    let footerTotalNet = null;
    let footerTotalPurchase = null;
    let footerTotalAdvance = null;
    let footerTotalBalance = null;
    let searchBox = null;
    let filterPendingOrderNoEl = null;

    /* =========================
       INITIALIZE ELEMENTS
    ========================= */
    function initElements() {
      console.log("🔧 Initializing elements...");

      const workspace = document.querySelector(".workspace");

      if (workspace) {
        tbody = workspace.querySelector("#tableBody");
        footer = workspace.querySelector("#pendingFooter");
        footerCount = workspace.querySelector("#footerCount");
        footerTotalGrWt = workspace.querySelector("#footerTotalGrWt");
        footerTotalNet = workspace.querySelector("#footerTotalNet");
        footerTotalPurchase = workspace.querySelector("#footerTotalPurchase");
        footerTotalAdvance = workspace.querySelector("#footerTotalAdvance");
        footerTotalBalance = workspace.querySelector("#footerTotalBalance");
        searchBox = workspace.querySelector("#searchBox");
        filterPendingOrderNoEl = workspace.querySelector("#filterPendingOrderNo");
      } else {
        tbody = document.getElementById("tableBody");
        footer = document.getElementById("pendingFooter");
        footerCount = document.getElementById("footerCount");
        footerTotalGrWt = document.getElementById("footerTotalGrWt");
        footerTotalNet = document.getElementById("footerTotalNet");
        footerTotalPurchase = document.getElementById("footerTotalPurchase");
        footerTotalAdvance = document.getElementById("footerTotalAdvance");
        footerTotalBalance = document.getElementById("footerTotalBalance");
        searchBox = document.getElementById("searchBox");
        filterPendingOrderNoEl = document.getElementById("filterPendingOrderNo");
      }

      if (!tbody) tbody = document.getElementById("tableBody");
      if (!footer) footer = document.getElementById("pendingFooter");
      if (!footerCount) footerCount = document.getElementById("footerCount");
      if (!footerTotalGrWt) footerTotalGrWt = document.getElementById("footerTotalGrWt");
      if (!footerTotalNet) footerTotalNet = document.getElementById("footerTotalNet");
      if (!footerTotalPurchase) footerTotalPurchase = document.getElementById("footerTotalPurchase");
      if (!footerTotalAdvance) footerTotalAdvance = document.getElementById("footerTotalAdvance");
      if (!footerTotalBalance) footerTotalBalance = document.getElementById("footerTotalBalance");
      if (!searchBox) searchBox = document.getElementById("searchBox");
      if (!filterPendingOrderNoEl) filterPendingOrderNoEl = document.getElementById("filterPendingOrderNo");

      if (!tbody || !footer) {
        console.warn("⚠️ Elements not found yet");
        return false;
      }

      console.log("✅ Elements initialized");
      return true;
    }

    function getPaidAmountForBill(billNo) {
      if (!billNo) return 0;
      try {
        const payments = JSON.parse(localStorage.getItem("payments") || "[]");
        const key = String(billNo).trim();
        return payments
          .filter(p => p && String(p.billNo || "").trim() === key)
          .reduce((sum, p) => sum + (parseFloat(p.amount) || 0), 0);
      } catch (e) {
        return 0;
      }
    }

    /** Same as orders.html: advances = payments where type is not Paid. */
    function getAdvancePaymentsForBill(billNo) {
      if (!billNo) return 0;
      try {
        const payments = JSON.parse(localStorage.getItem("payments") || "[]");
        const key = String(billNo).trim();
        return payments
          .filter(p => p && String(p.billNo || "").trim() === key && p.type !== "Paid")
          .reduce((sum, p) => sum + (parseFloat(p.amount) || 0), 0);
      } catch (e) {
        return 0;
      }
    }

    function readyExtraItemLineTotalFromValues(vals) {
      if (!vals || vals.length < 16) return 0;
      const fin = parseFloat(vals[15] || 0) || 0;
      const est = parseFloat(vals[9] || 0) || 0;
      return fin !== 0 ? fin : est;
    }

    function readyExtraItemReadyWeightGrams(vals) {
      if (!vals || vals.length < 16) return 0;
      return parseFloat(vals[12] || 0) || 0;
    }

    /** Purchase line amount: 16-col Ready Extra uses Final/Est.; legacy uses col 12 / 9. */
    function orderItemLineAmount(item) {
      const v = item.values || [];
      if (!v.length) return 0;
      if (v.length >= 16) {
        return readyExtraItemLineTotalFromValues(v);
      }
      if (v[12] !== undefined && v[12] !== "" && v[12] !== null) {
        const n = parseFloat(v[12]);
        if (!isNaN(n)) return n;
      }
      const n9 = parseFloat(v[9]);
      return isNaN(n9) ? 0 : n9;
    }

    function sumStoredPurchaseSheetRows(rows) {
      if (!rows || !rows.length) return 0;
      return rows.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
    }

    function purchaseSheetTotalFromOrder(order) {
      if (!order || order.purchaseSheet == null) return null;
      const n = parseFloat(order.purchaseSheet.total);
      if (!isNaN(n)) return n;
      const rs = sumStoredPurchaseSheetRows(order.purchaseSheet.rows);
      return rs !== 0 ? rs : null;
    }

    function purchaseSheetRecordTotalFromMaps(rec) {
      if (!rec) return 0;
      if (rec.rows && rec.rows.length > 0) {
        return rec.rows.reduce((s, r) => {
          if (r && r.amount != null && String(r.amount).trim() !== "") {
            const a = parseFloat(String(r.amount).replace(/[^0-9.-]/g, ""));
            if (!isNaN(a)) return s + a;
          }
          const net = parseFloat(r.netWt) || 0;
          const rate = parseFloat(r.rate) || 0;
          return s + net * rate;
        }, 0);
      }
      if (rec.total != null && String(rec.total).trim() !== "") {
        const n = parseFloat(rec.total);
        return isNaN(n) ? 0 : n;
      }
      return 0;
    }

    function getSavedPurchaseSheetTotalForBill(billNo) {
      if (!billNo) return 0;
      try {
        const key = String(billNo).trim();
        const map1 = JSON.parse(localStorage.getItem("newOrderPurchaseSheets") || "{}");
        const map2 = JSON.parse(localStorage.getItem("readyExtraOrderPurchaseSheets") || "{}");
        const rec1 = map1[key] || map1[billNo];
        const rec2 = map2[key] || map2[billNo];
        return purchaseSheetRecordTotalFromMaps(rec1) + purchaseSheetRecordTotalFromMaps(rec2);
      } catch (e) {
        return 0;
      }
    }

    function purchaseSheetTotalResolved(order, billNo) {
      const fromOrder = purchaseSheetTotalFromOrder(order);
      if (fromOrder !== null) return fromOrder;
      return getSavedPurchaseSheetTotalForBill(billNo);
    }

    /* =========================
       LOAD PENDING ORDERS
    ========================= */
    function loadPendingOrders() {
      console.log("📋 Loading pending orders...");

      if (!tbody && !initElements()) {
        console.warn("⚠️ Table elements not ready, retrying...");
        setTimeout(loadPendingOrders, 100);
        return;
      }

      try {
        const orders = JSON.parse(localStorage.getItem("orders") || "[]");
        console.log("📊 Total orders:", orders.length);

        tbody.innerHTML = "";

        const OP = window.OrderProcessing;
        const pending = orders.filter(o => {
          if (!o) return false;
          if (OP && typeof OP.orderShowsOnPendingOrdersPage === "function") {
            return OP.orderShowsOnPendingOrdersPage(o);
          }
          if (String(o.orderSource || "").toLowerCase() === "gold-invoice") return false;
          const on = String(o.orderNo != null ? o.orderNo : o.billNo != null ? o.billNo : "").trim();
          if (/^SGJ\/GI\//i.test(on)) return false;
          return o.status === "PENDING";
        });
        console.log("⏳ Pending orders:", pending.length);

        if (pending.length === 0) {
          showEmptyState();
          populatePendingOrderNoDropdown([]);
          searchOrders();
          return;
        }

        // Sort by date (newest first)
        const sortedPending = [...pending].sort((a, b) => {
          const dateA = new Date(a.orderDate || a.timestamp || 0);
          const dateB = new Date(b.orderDate || b.timestamp || 0);
          return dateB - dateA;
        });

        sortedPending.forEach((order, index) => {
          try {
            renderOrderRow(order, index);
          } catch (e) {
            console.error("❌ Error rendering order row:", e, order);
          }
        });

        populatePendingOrderNoDropdown(sortedPending);
        searchOrders();
        console.log("✅ Pending orders loaded successfully");

      } catch (e) {
        console.error("❌ Error loading pending orders:", e);
        showErrorState(e.message);
      }
    }

    /* =========================
       RENDER ORDER ROW
    ========================= */
    function renderOrderRow(order, index) {
      if (!order || !order.id) {
        console.warn("⚠️ Invalid order data:", order);
        return;
      }

      let displayGrWt = 0;
      let orderSideTotal = 0;
      let purchaseTotal = 0;

      if (order.items && Array.isArray(order.items) && order.items.length > 0) {
        order.items.forEach(item => {
          if (!item || !item.values) return;
          const vals = item.values;
          const type = item.type || vals[0] || "Order";

          if (vals.length >= 16) {
            const grWt = readyExtraItemReadyWeightGrams(vals);
            const net = readyExtraItemLineTotalFromValues(vals);
            if (type === "Purchase") {
              purchaseTotal += net;
            } else {
              displayGrWt += grWt;
              orderSideTotal += net;
            }
            return;
          }

          const grWt = parseFloat(vals[9] || vals[5] || vals[8] || 0);
          const net = type === "Purchase" ? orderItemLineAmount(item) : (parseFloat(vals[12] || vals[13] || 0) || 0);

          if (type === "Purchase") {
            purchaseTotal += net;
          } else {
            displayGrWt += grWt;
            orderSideTotal += net;
          }
        });
      } else {
        displayGrWt = parseFloat(order.grWt || 0);
        const storedGross = order.orderTotal != null && order.orderTotal !== ""
          ? parseFloat(order.orderTotal)
          : NaN;
        orderSideTotal = Number.isFinite(storedGross)
          ? storedGross
          : parseFloat(order.netAmount || 0);
      }

      const billNo = order.orderNo || order.billNo;
      const sheetPurchaseTotal = purchaseSheetTotalResolved(order, billNo);
      const fullPurchase = purchaseTotal + sheetPurchaseTotal;

      const hasItems = order.items && Array.isArray(order.items) && order.items.length > 0;
      const netBill = hasItems
        ? orderSideTotal - fullPurchase
        : parseFloat(order.netAmount || 0);

      let advanceOnly = getAdvancePaymentsForBill(billNo);
      if (!advanceOnly) advanceOnly = parseFloat(order.advance || 0) || 0;

      let totalPaymentsForBalance = getPaidAmountForBill(billNo);
      if (!totalPaymentsForBalance) totalPaymentsForBalance = parseFloat(order.advance || 0) || 0;

      /** Net (Rs) column = same as Orders list Order Total (gross non-Purchase lines). */
      const displayOrderTotalGross = orderSideTotal;
      const displayAdvance = advanceOnly + purchaseTotal;
      const displayBalance = netBill - totalPaymentsForBalance;
      const totalPurchaseDisplay = fullPurchase;

      // Get type from order or from first item
      let orderType = order.type || "Order";
      if (!orderType && order.items && order.items.length > 0 && order.items[0]) {
        const firstItemType = order.items[0].type || order.items[0].values[0];
        if (firstItemType) orderType = firstItemType;
      }

      // Get customer name
      const customerName = order.customer || order.customerName || "—";

      // Row is view-only here (does not open Ready Extra Order)
      const tr = document.createElement("tr");
      tr.dataset.orderId = order.id;
      tr.dataset.orderNo = order.orderNo || order.billNo || "";
      tr.dataset.customer = customerName;
      tr.dataset.sumGrwt = String(displayGrWt);
      tr.dataset.sumOrderTotal = String(displayOrderTotalGross);
      tr.dataset.sumPurchase = String(totalPurchaseDisplay);
      tr.dataset.sumAdvance = String(displayAdvance);
      tr.dataset.sumBalance = String(displayBalance);

      let itemProcessPo = [];
      try {
        itemProcessPo = JSON.parse(localStorage.getItem("itemProcess") || "[]");
        if (!Array.isArray(itemProcessPo)) itemProcessPo = [];
      } catch (eIp) {
        itemProcessPo = [];
      }
      let ordersSnap = [];
      try {
        ordersSnap = JSON.parse(localStorage.getItem("orders") || "[]");
        if (!Array.isArray(ordersSnap)) ordersSnap = [];
      } catch (eOr) {
        ordersSnap = [];
      }
      const OPdue = window.OrderProcessing;
      if (OPdue && typeof OPdue.orderIsPastDueAndNotReadyForReadyOrders === "function" &&
          OPdue.orderIsPastDueAndNotReadyForReadyOrders(order, ordersSnap, itemProcessPo)) {
        tr.classList.add("pending-orders-row-overdue");
      }

      const OPb = window.OrderProcessing;
      const isDirectBillStaging = OPb && typeof OPb.orderIsDirectBillStagingQueue === "function" &&
        OPb.orderIsDirectBillStagingQueue(order) && String(order.status || "").trim().toUpperCase() === "READY";
      const statusBadge = isDirectBillStaging
        ? '<span class="badge direct-bill">📋 Direct bill</span>'
        : '<span class="badge pending">⏳ PENDING</span>';

      tr.innerHTML = `
        <td>${statusBadge}</td>
        <td>${escapeHtml(order.orderNo || order.billNo)}</td>
        <td>${escapeHtml(customerName)}</td>
        <td>${escapeHtml(order.customerRelation)}</td>
        <td>${formatDate(order.orderDate)}</td>
        <td>${formatDate(order.dueDate)}</td>
        <td class="right">${displayGrWt.toFixed(3)}</td>
        <td class="right">₹${displayOrderTotalGross.toFixed(2)}</td>
        <td class="right">₹${totalPurchaseDisplay.toFixed(2)}</td>
        <td class="right">₹${displayAdvance.toFixed(2)}</td>
        <td class="right">₹${displayBalance.toFixed(2)}</td>
        <td class="center">
          <button type="button" class="btn" onclick="editOrder(${order.id}); event.stopPropagation();">Edit</button>
        </td>
      `;

      tr.style.cursor = "pointer";
      tr.onclick = function (e) {
        if (e.target && (e.target.tagName === "BUTTON" || e.target.tagName === "INPUT")) return;
        editOrder(order.id);
      };

      tbody.appendChild(tr);
    }

    /* =========================
       FORMAT DATE
    ========================= */
    function formatDate(dateStr) {
      if (!dateStr) return "—";

      try {
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return dateStr;

        const options = { year: 'numeric', month: 'short', day: 'numeric' };
        return date.toLocaleDateString('en-IN', options);
      } catch (e) {
        return dateStr;
      }
    }

    function escapeHtml(str) {
      if (str == null || str === '') return '—';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    /* =========================
       ORDER NO. DROPDOWN (PENDING list)
    ========================= */
    function populatePendingOrderNoDropdown(pendingOrders) {
      let sel = filterPendingOrderNoEl || document.getElementById("filterPendingOrderNo");
      if (!sel) return;
      const prev = sel.value;
      const seen = new Set();
      const orderNos = [];
      (pendingOrders || []).forEach(function (o) {
        if (!o) return;
        const ono = String(o.orderNo != null ? o.orderNo : o.billNo != null ? o.billNo : "").trim();
        if (!ono) return;
        const k = ono.toLowerCase();
        if (seen.has(k)) return;
        seen.add(k);
        orderNos.push(ono);
      });
      orderNos.sort(function (a, b) {
        return a.localeCompare(b, undefined, { numeric: true, sensitivity: "base" });
      });
      sel.innerHTML = "";
      const opt0 = document.createElement("option");
      opt0.value = "";
      opt0.textContent = "All order numbers";
      sel.appendChild(opt0);
      orderNos.forEach(function (n) {
        const opt = document.createElement("option");
        opt.value = n;
        opt.textContent = n;
        sel.appendChild(opt);
      });
      if (prev && orderNos.some(function (x) { return x === prev; })) {
        sel.value = prev;
      }
    }

    /* =========================
       SEARCH ORDERS
    ========================= */
    function searchOrders() {
      if (!tbody) return;
      if (!searchBox) searchBox = document.getElementById("searchBox");
      if (!filterPendingOrderNoEl) filterPendingOrderNoEl = document.getElementById("filterPendingOrderNo");

      const searchValue = (searchBox && searchBox.value) ? searchBox.value.toLowerCase().trim() : "";
      const selOrder = (filterPendingOrderNoEl && filterPendingOrderNoEl.value) ? filterPendingOrderNoEl.value.trim() : "";

      const rows = tbody.querySelectorAll("tr");

      let visibleCount = 0;

      rows.forEach(row => {
        // Skip empty state rows
        if (row.querySelector(".empty-state")) {
          return;
        }

        const orderNoLc = (row.dataset.orderNo || "").toLowerCase();
        const customer = (row.dataset.customer || "").toLowerCase();
        const rowText = row.innerText.toLowerCase();

        const textOk = !searchValue ||
          orderNoLc.includes(searchValue) ||
          customer.includes(searchValue) ||
          rowText.includes(searchValue);

        const rowOrder = (row.dataset.orderNo || "").trim();
        const orderDropdownOk = !selOrder || rowOrder.toLowerCase() === selOrder.toLowerCase();

        const matches = textOk && orderDropdownOk;

        row.style.display = matches ? "" : "none";
        if (matches) visibleCount++;
      });

      updateFooter();
    }

    /* =========================
       UPDATE FOOTER
    ========================= */
    function updateFooter() {
      if (!tbody || !footer) {
        if (!initElements()) return;
      }

      const allRows = tbody.querySelectorAll("tr");
      const visibleRows = Array.from(allRows).filter(row =>
        row.style.display !== "none" && !row.querySelector(".empty-state")
      );
      const count = visibleRows.length;
      const total = allRows.length;

      let sumGrWt = 0;
      let sumOrderTotal = 0;
      let sumPurchase = 0;
      let sumAdvance = 0;
      let sumBalance = 0;
      visibleRows.forEach(function (row) {
        sumGrWt += parseFloat(row.dataset.sumGrwt || "0") || 0;
        sumOrderTotal += parseFloat(row.dataset.sumOrderTotal || "0") || 0;
        sumPurchase += parseFloat(row.dataset.sumPurchase || "0") || 0;
        sumAdvance += parseFloat(row.dataset.sumAdvance || "0") || 0;
        sumBalance += parseFloat(row.dataset.sumBalance || "0") || 0;
      });

      const countEl = footerCount || footer;
      if (count === 0) {
        countEl.textContent = "No pending orders available";
      } else if (count < total && total > 0) {
        countEl.textContent = "Showing " + count + " of " + total + " pending orders";
      } else {
        countEl.textContent = "Showing " + count + " pending order" + (count === 1 ? "" : "s");
      }

      if (footerTotalGrWt) footerTotalGrWt.textContent = sumGrWt.toFixed(3);
      if (footerTotalNet) footerTotalNet.textContent = sumOrderTotal.toFixed(2);
      if (footerTotalPurchase) footerTotalPurchase.textContent = sumPurchase.toFixed(2);
      if (footerTotalAdvance) footerTotalAdvance.textContent = sumAdvance.toFixed(2);
      if (footerTotalBalance) footerTotalBalance.textContent = sumBalance.toFixed(2);
    }

    /* =========================
       MARK READY
    ========================= */
    function markReady(orderId) {
      try {
        console.log("✓ Marking order as ready:", orderId);

        const orders = JSON.parse(localStorage.getItem("orders") || "[]");
        const itemProcess = JSON.parse(localStorage.getItem("itemProcess") || "[]");
        const orderIndex = orders.findIndex(o => {
          return o && (o.id === orderId || o.id === Number(orderId) || String(o.id) === String(orderId));
        });

        if (orderIndex === -1) {
          alert("❌ Order not found!");
          console.error("Order not found:", orderId);
          return;
        }

        const order = orders[orderIndex];
        console.log("📝 Order found:", order);

        const orderLabel = order.orderNo || order.billNo || `#${orderId}`;
        const OP = window.OrderProcessing;

        if (OP && typeof OP.orderHasUnassignedPendingLines === "function" && OP.orderHasUnassignedPendingLines(order, itemProcess, orderId)) {
          alert(`Cannot move order ${orderLabel} to Ready Orders.\n\nSome items are still in Pending Items (not assigned to a job worker). Assign every line first.`);
          return;
        }
        if (OP && typeof OP.orderHasNonTerminalProcessRows === "function" && OP.orderHasNonTerminalProcessRows(itemProcess, orderId)) {
          alert(`Cannot move order ${orderLabel} to Ready Orders.\n\nSome items are still In Process (Item Process). Complete all quantities there first.`);
          return;
        }
        if (!OP || typeof OP.isOrderReadyForReadyOrdersList !== "function" || !OP.isOrderReadyForReadyOrdersList(orders, itemProcess, orderId)) {
          alert(`Cannot move order ${orderLabel} to Ready Orders.\n\nEvery line must be workshop-complete, then finalized in Ready Items using “Move to Ready Orders” (full quantity in finalized state).`);
          return;
        }

        if (!confirm(`Mark order ${orderLabel} as READY?\n\nThis will move it to Ready Orders (all items are complete, none pending or in process).`)) {
          console.log("❌ User cancelled");
          return;
        }

        order.status = "READY";
        order.readyDate = new Date().toISOString().split("T")[0];

        // Update the order in the array
        orders[orderIndex] = order;

        // Save updated orders back to localStorage
        localStorage.setItem("orders", JSON.stringify(orders));

        console.log("✅ Order marked as READY");

        // Immediately reload pending orders to remove it from the list
        loadPendingOrders();

        // Dispatch event to refresh ready orders page if it's open
        const refreshEvent = new CustomEvent('orderStatusChanged', {
          detail: { orderId: orderId, status: "READY" }
        });

        window.dispatchEvent(refreshEvent);

        if (window.parent && window.parent !== window) {
          window.parent.dispatchEvent(refreshEvent);
        }

        if (window.top && window.top !== window) {
          window.top.dispatchEvent(refreshEvent);
        }

        // Show success message
        alert(`✅ Order ${orderLabel} marked as READY!\n\nIt will now appear in Ready Orders.`);

        console.log("📡 Events dispatched");

      } catch (e) {
        console.error("❌ Error marking order as ready:", e);
        alert("Error updating order status: " + e.message);
      }
    }

    /* =========================
       EDIT ORDER (same routing as Orders list: New Order vs Ready Extra)
    ========================= */
    function formatCustomerForPayload(customer, fallbackName) {
      const rel = customer.relation || "";
      const relName = customer.relationName || "";
      return {
        id: customer.id,
        name: customer.name || customer.customerName || fallbackName || "",
        openingBalance: customer.openingBalance ?? customer.currentBal ?? customer.balance ?? "",
        currentBal: customer.openingBalance ?? customer.currentBal ?? customer.balance ?? "",
        relation: (rel && relName ? rel + " " + relName : rel || relName) || "",
        relationName: relName || "",
        station: customer.station || customer.city || customer.location || ""
      };
    }

    function getCustomerDataById(customerId) {
      if (customerId == null || customerId === "") return null;
      try {
        const customers = JSON.parse(localStorage.getItem("customers") || "[]");
        const customer = customers.find(c =>
          c && (c.id == customerId || String(c.id) === String(customerId))
        );
        if (customer) return formatCustomerForPayload(customer, customer.name);
      } catch (e) {
        console.error("Error fetching customer by ID:", e);
      }
      return null;
    }

    function _customerNameMatchKey(name) {
      return (name || "").toString().trim().toLowerCase();
    }
    function _countCustomersByNormalizedName(customers) {
      const m = new Map();
      (customers || []).forEach(function (c) {
        if (!c) return;
        const k = _customerNameMatchKey(c.name || c.customerName || "");
        if (!k) return;
        m.set(k, (m.get(k) || 0) + 1);
      });
      return m;
    }
    function getCustomerData(customerName) {
      if (!customerName) return null;
      try {
        const customers = JSON.parse(localStorage.getItem("customers") || "[]");
        const key = _customerNameMatchKey(customerName);
        if (!key) return null;
        if ((_countCustomersByNormalizedName(customers).get(key) || 0) > 1) {
          return null;
        }
        let customer = customers.find(c =>
          c && (c.name === customerName || c.customerName === customerName)
        );
        if (!customer) {
          const lowerName = customerName.toLowerCase().trim();
          customer = customers.find(c =>
            c && (
              (c.name || "").toLowerCase().trim() === lowerName ||
              (c.customerName || "").toLowerCase().trim() === lowerName
            )
          );
        }
        if (customer) return formatCustomerForPayload(customer, customerName);
      } catch (e) {
        console.error("Error fetching customer data:", e);
      }
      return null;
    }

      }
      if (window.parent && window.parent !== window && typeof window.parent.loadPage === "function") {

      }
      if (window.top && window.top !== window && typeof window.top.loadPage === "function") {

      }
      const path = window.location.pathname || "";
      const rel = path.includes("/pages/") ? "ready-extra-order.html" : "pages/ready-extra-order.html";
      try {
        window.location.href = new URL(rel, window.location.href).href;
      } catch (eNav) {
        window.location.href = rel;
      }
    }

    function editOrder(orderId) {
      try {
        const keysToRemove = [
          "editOrderId",
          "editOrderPayload",
          "ratebookOpened",
          "receiptOpened",
          "newOrderState",
          "editCustomerReadOnly",
          "returnToOrders",
          "selectedCustomerData"
        ];
        keysToRemove.forEach(key => {
          try {
            localStorage.removeItem(key);
          } catch (eRm) { }
        });

        const orders = JSON.parse(localStorage.getItem("orders") || "[]");
        const order = orders.find(o => o && (o.id == orderId || String(o.id) === String(orderId)));

        if (!order) {
          alert("Order not found. Please try again.");
          return;
        }

        const OP = window.OrderProcessing;
        const isDirectBillStaging = OP && typeof OP.orderIsDirectBillStagingQueue === "function" &&
          OP.orderIsDirectBillStagingQueue(order);

        if (isDirectBillStaging) {
          try {
            localStorage.setItem("editOrderId", String(orderId));
            localStorage.setItem("lastOrderPage", "ready-extra");
          } catch (eLs) { }
          navigateToReadyExtraOrder();
          return;
        }

        const customerId = order.customerId != null && order.customerId !== "" ? order.customerId : null;
        const customerName = (order.customer || order.customerName || "").toString().trim();
        let customerData = null;
        if (customerId) {
          customerData = getCustomerDataById(customerId);
        }
        if (!customerData && customerName) {
          customerData = getCustomerData(customerName);
        }

        const customerInfo = customerData || {
          id: order.customerId || "",
          name: customerName,
          openingBalance: order.customerOpeningBalance ?? order.currentBal ?? order.customerBalance ?? "",
          currentBal: order.customerOpeningBalance ?? order.currentBal ?? order.customerBalance ?? "",
          relation: order.customerRelation || order.relation || "",
          station: order.customerStation || order.station || ""
        };

        const orderSnapshot = {
          ...order,
          isEditMode: true,
          id: order.id,
          orderNo: order.orderNo || order.billNo || "",
          billNo: order.billNo || order.orderNo || "",
          customerId: customerInfo.id || order.customerId || "",
          customer: customerInfo.name || (order.customer || order.customerName || "").toString().trim(),
          customerName: customerInfo.name || (order.customerName || order.customer || "").toString().trim(),
          currentBal: customerInfo.currentBal,
          customerOpeningBalance: customerInfo.openingBalance ?? customerInfo.currentBal ?? "",
          relation: customerInfo.relation,
          customerRelation: customerInfo.relation,
          station: customerInfo.station,
          customerStation: customerInfo.station,
          customerPhone: order.customerPhone || "",
          customerEmail: order.customerEmail || "",
          customerAddress: order.customerAddress || "",
          orderDate: order.orderDate || "",
          dueDate: order.dueDate || "",
          hallmark: order.hallmark || "",
          type: order.type || "Order",
          items: order.items || [],
          netAmount: order.netAmount || 0,
          advance: order.advance || 0,
          balance: order.balance || 0,
          pc: order.pc || 0,
          grWt: order.grWt || 0,
          status: order.status || "",
          timestamp: order.timestamp || new Date().toISOString()
        };

        try {
          localStorage.setItem("editOrderId", String(orderId));
          localStorage.setItem("editOrderPayload", JSON.stringify(orderSnapshot));
          localStorage.setItem("returnToOrders", "true");
          localStorage.setItem("lastOrderPage", "new-order");
        } catch (eSet) { }

        navigateToNewOrder();
      } catch (e) {
        console.error("Error opening order for edit:", e);
        alert("Error loading order for editing. Please try again.");
      }
    }

    /* =========================
       INITIALIZE PAGE
    ========================= */
    function bindPendingFooterScrollSync() {
      if (window.__pendingFooterScrollWired) return;
      window.__pendingFooterScrollWired = true;
      const scrollEl = document.getElementById("pendingOrdersTableScroll");
      const footEl = document.getElementById("pendingFooter");
      if (!scrollEl || !footEl) return;
      scrollEl.addEventListener("scroll", function () {
        footEl.scrollLeft = scrollEl.scrollLeft;
      }, { passive: true });
    }

    function initPendingOrdersPage() {
      console.log("🚀 Initializing Pending Orders page...");

      if (!initElements()) {
        console.warn("⚠️ Elements not ready, retrying in 100ms...");
        setTimeout(initPendingOrdersPage, 100);
        return;
      }

      bindPendingFooterScrollSync();
      loadPendingOrders();
      ensureFunctionsGlobal();

      console.log("✅ Pending Orders page initialized");
    }

    /* =========================
       CHECK WORKSPACE
    ========================= */
    function isInWorkspace() {
      return !!document.querySelector(".workspace");
    }

    /* =========================
       EVENT LISTENERS
    ========================= */
    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      if (typeof ledgerNavListen === 'function') {
        ledgerNavListen(document, 'DOMContentLoaded', function () {
          setTimeout(initPendingOrdersPage, isInWorkspace() ? 200 : 0);
        });
      } else {
        document.addEventListener('DOMContentLoaded', function () {
          setTimeout(initPendingOrdersPage, isInWorkspace() ? 200 : 0);
        });
      }
    } else {
      setTimeout(initPendingOrdersPage, isInWorkspace() ? 200 : 50);
    }

    function wirePendingOrdersWindowListeners() {
      if (typeof ledgerNavListen === 'function') {
        ledgerNavListen(window, 'pageRefresh', function () {
          console.log("📡 Page refresh event received");
          setTimeout(initPendingOrdersPage, 150);
        });
        ledgerNavListen(window, 'orderStatusChanged', function (e) {
          console.log("📡 Order status changed:", e.detail);
          loadPendingOrders();
        });
        ledgerNavListen(window, 'orderSaved', function () {
          console.log("📡 Order saved event received");
          loadPendingOrders();
        });
        ledgerNavListen(window, 'storage', function (e) {
          if (e.key === 'orders') {
            console.log("📡 Storage changed: orders");
            loadPendingOrders();
          }
        });
      } else {
        window.addEventListener('pageRefresh', function () {
          console.log("📡 Page refresh event received");
          setTimeout(initPendingOrdersPage, 150);
        });
        window.addEventListener('orderStatusChanged', function (e) {
          console.log("📡 Order status changed:", e.detail);
          loadPendingOrders();
        });
        window.addEventListener('orderSaved', function () {
          console.log("📡 Order saved event received");
          loadPendingOrders();
        });
        window.addEventListener('storage', function (e) {
          if (e.key === 'orders') {
            console.log("📡 Storage changed: orders");
            loadPendingOrders();
          }
        });
      }
    }
    wirePendingOrdersWindowListeners();

    // Poll for changes (same-window updates)
    let lastPendingOrderCount = 0;
    var pendingOrdersPollId = setInterval(function () {
      if (!tbody && !initElements()) return;

      try {
        const orders = JSON.parse(localStorage.getItem("orders") || "[]");
        const OPp = window.OrderProcessing;
        const pendingOrders = orders.filter(o => {
          if (!o) return false;
          if (OPp && typeof OPp.orderShowsOnPendingOrdersPage === "function") {
            return OPp.orderShowsOnPendingOrdersPage(o);
          }
          if (String(o.orderSource || "").toLowerCase() === "gold-invoice") return false;
          const onp = String(o.orderNo != null ? o.orderNo : o.billNo != null ? o.billNo : "").trim();
          if (/^SGJ\/GI\//i.test(onp)) return false;
          return o.status === "PENDING";
        });

        if (pendingOrders.length !== lastPendingOrderCount) {
          console.log(`🔄 Pending orders count changed: ${lastPendingOrderCount} → ${pendingOrders.length}`);
          lastPendingOrderCount = pendingOrders.length;
          loadPendingOrders();
        }
      } catch (e) {
        console.error("❌ Error in polling:", e);
      }
    }, 2000);

    window.__currentPageCleanup = function () {
      try {
        if (pendingOrdersPollId) clearInterval(pendingOrdersPollId);
      } catch (e) { }
      pendingOrdersPollId = null;
    };

    /* =========================
       ENSURE GLOBAL FUNCTIONS
    ========================= */
    function ensureFunctionsGlobal() {
      Object.assign(window, {
        loadPendingOrders,
        markReady,
        editOrder,
        navigateToReadyExtraOrder,
        searchOrders,
        updateFooter,
        initPendingOrdersPage,
        initElements,
        renderOrderRow,
        formatDate,
        showEmptyState,
        showErrorState
      });
    }

    ensureFunctionsGlobal();

    console.log("✅ Pending Orders script loaded");
  </script>

</body>
