<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Orders</title>

  <style>
    /* =========================
   BASE (Customer Balance–style design)
========================= */
    * {
      box-sizing: border-box;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 14px;
    }

    body {
      margin: 0;
      background: #e6ebf2;
    }

    /* =========================
   CONTAINER
========================= */
    .orders-wrap {
      margin: 15px;
      background: #fff;
      border: 1px solid #d1d6de;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 30px);
      max-height: calc(100vh - 30px);
      overflow: hidden;
      box-sizing: border-box;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    /* Workspace integration */
    .workspace .orders-wrap {
      margin: 0;
      height: 100%;
      max-height: 100%;
      border-radius: 0;
      box-shadow: none;
    }

    /* =========================
   TOOLBAR (Customer Balance style)
========================= */
    .orders-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 2px solid #d1d6de;
      background: linear-gradient(to bottom, #fafbfc, #f5f7fa);
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .orders-toolbar h2 { font-size: 20px; font-weight: 600; }

    .btn {
      padding: 10px 18px;
      border: 1px solid #d1d6de;
      background: #fff;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      color: #1d1d1f;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .btn:hover {
      background: #007aff;
      border-color: #007aff;
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 2px 4px rgba(0, 122, 255, 0.2);
    }

    .btn:active { transform: translateY(0); }

    label {
      font-size: 14px;
      color: #3a3a3c;
      font-weight: 500;
      white-space: nowrap;
    }

    input,
    select {
      height: 40px;
      padding: 8px 14px;
      border: 1px solid #d1d6de;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      transition: all 0.2s;
      min-width: 140px;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #007aff;
      box-shadow: 0 0 0 3px rgba(0, 122, 255, .12);
      background: #fff;
    }

    input::placeholder { color: #8e8e93; }

    /* =========================
   TABLE (Customer Balance style)
========================= */
    .table-wrap {
      flex: 1;
      overflow: auto;
      position: relative;
      min-height: 0;
      box-sizing: border-box;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 1000px;
      border-collapse: collapse;
      background: #fff;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      box-shadow: 0 1px 0 0 #c5c9ce;
    }

    thead th {
      background: linear-gradient(to bottom, #eef1f5, #e4e8ed);
      border: 1px solid #c5c9ce;
      padding: 18px;
      white-space: nowrap;
      font-weight: 600;
      font-size: 13px;
      text-align: left;
      color: #1d1d1f;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    thead th.center { text-align: center; }
    thead th.right { text-align: right; }

    tbody td {
      padding: 18px;
      border: 1px solid #d1d6de;
      font-size: 14px;
      vertical-align: middle;
      color: #333;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    tbody td:nth-child(3) {
      white-space: normal;
      word-break: break-word;
    }

    tbody td:nth-child(6) {
      text-align: center;
      font-weight: 500;
      color: #007aff;
      text-transform: capitalize;
    }

    tbody tr { transition: background 0.2s; background: #fff; }
    tbody tr:nth-child(even) { background: #f8f9fb; }
    tbody tr:hover { background: #e8f2ff; }
    tbody tr:hover td { border-color: #b8d4f0; }

    tbody tr.selected {
      background: #ffe6e6 !important;
      border-left: 3px solid #ff3b30;
    }

    tbody tr.selected td { border-color: #ffcccc; }

    .center { text-align: center; }
    .right {
      text-align: right;
      font-weight: 500;
      color: #1d1d1f;
      font-variant-numeric: tabular-nums;
    }

    /* Checkbox styling */
    tbody input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #007aff;
    }

    /* =========================
   FOOTER (Customer Balance style)
========================= */
    .footer {
      padding: 14px 20px;
      font-size: 14px;
      color: #6e6e73;
      border-top: 2px solid #d1d6de;
      background: #f5f7fa;
      flex-shrink: 0;
      box-sizing: border-box;
      font-weight: 500;
    }

    /* =========================
   SCROLLBAR (Customer Balance style)
========================= */
    .table-wrap::-webkit-scrollbar { width: 12px; height: 12px; }
    .table-wrap::-webkit-scrollbar-track { background: #f0f2f5; border-radius: 6px; }
    .table-wrap::-webkit-scrollbar-thumb { background: #b0b4b8; border-radius: 6px; }
    .table-wrap::-webkit-scrollbar-thumb:hover { background: #a1a1a6; }

    /* =========================
   RESPONSIVE
========================= */
    @media (max-width: 768px) {
      .orders-wrap {
        margin: 8px;
        height: calc(100vh - 16px);
        max-height: calc(100vh - 16px);
      }

      .workspace .orders-wrap {
        margin: 0;
        height: 100%;
        max-height: 100%;
      }

      .orders-toolbar {
        padding: 12px;
        gap: 8px;
      }

      .orders-toolbar label {
        font-size: 12px;
      }

      .orders-toolbar input,
      .orders-toolbar select {
        height: 32px;
        font-size: 12px;
        min-width: 100px;
      }

      .btn {
        padding: 6px 12px;
        font-size: 12px;
      }

      .table-wrap {
        overflow-x: scroll;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 900px;
      }

      tbody td {
        max-width: 150px;
        font-size: 13px;
        padding: 14px;
      }

      thead th {
        font-size: 12px;
        padding: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="orders-wrap">

    <!-- TOOLBAR -->
    <div class="orders-toolbar">
      <button class="btn" onclick="newOrder()">➕ New Order</button>

      <label>From date</label>
      <input type="date" id="filterFromDate" onchange="filterTable()">

      <label>To date</label>
      <input type="date" id="filterToDate" onchange="filterTable()">

      <button class="btn" onclick="clearDateFilter()" style="padding:6px 12px; font-size:12px;">Clear filter</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table id="ordersTable">
        <thead>
          <tr>
            <th class="center">Mark</th>
            <th>Order No</th>
            <th>Customer</th>
            <th>Order Date</th>
            <th>Due Date</th>
            <th class="right">Gr.Wt</th>
            <th class="right">Net (Rs)</th>
            <th class="right">Advance (Rs)</th>
            <th class="right">Balance</th>
            <th class="center">Action</th>
          </tr>
        </thead>

        <!-- EMPTY BODY (NO DATA) -->
        <tbody></tbody>
      </table>
    </div>

    <div class="footer" id="footerText">
      No orders available
    </div>

  </div>

  <script>
    /* =========================
       ELEMENT REFERENCES
    ========================= */
    let tbody = null;
    let footer = null;

    /* =========================
       INITIALIZE ELEMENTS
    ========================= */
    function initElements() {
      // Try to find elements in workspace first (dashboard context)
      const workspace = document.querySelector(".workspace");

      if (workspace) {
        // Look in workspace first
        tbody = workspace.querySelector("#ordersTable tbody");
        footer = workspace.querySelector("#footerText");

        // If not found in workspace, try document
        if (!tbody) {
          tbody = document.querySelector("#ordersTable tbody");
        }
        if (!footer) {
          footer = document.querySelector("#footerText") || document.getElementById("footerText");
        }
      } else {
        // Not in workspace, look in document
        tbody = document.querySelector("#ordersTable tbody");
        footer = document.querySelector("#footerText") || document.getElementById("footerText");
      }

      if (!tbody || !footer) {
        return false;
      }

      return true;
    }

    /* =========================
       LOAD ORDERS
    ========================= */
    function loadOrders() {
      if (!tbody) {
        if (!initElements()) {
          console.warn("Orders table elements not found. Retrying...");
          setTimeout(loadOrders, 100);
          return;
        }
      }

      const orders = JSON.parse(localStorage.getItem("orders") || "[]");
      tbody.innerHTML = "";

      if (orders.length === 0) {
        updateFooter();
        return;
      }

      // Sort by date and time: newest order at top (descending by timestamp, then orderDate)
      const sortedOrders = [...orders].sort((a, b) => {
        const timeA = new Date(a.timestamp || a.orderDate || 0).getTime();
        const timeB = new Date(b.timestamp || b.orderDate || 0).getTime();
        return timeB - timeA;
      });

      sortedOrders.forEach(order => {
        try {
          const row = document.createElement("tr");
          row.dataset.orderId = order.id;

          // Calculate Order-specific totals and Purchase total
          let displayGrWt = 0;
          let displayNet = 0;
          let purchaseTotal = 0;

          if (order.items && order.items.length > 0) {
            order.items.forEach(item => {
              const type = item.type || "Order";
              // Gr.Wt is index 9, Net is index 12
              const grWt = parseFloat(item.values[9] || 0);
              const net = parseFloat(item.values[12] || 0);

              if (type === "Order") {
                displayGrWt += grWt;
                displayNet += net;
              } else if (type === "Purchase") {
                purchaseTotal += net;
              }
            });
          } else {
            // Fallback for orders without item details (legacy)
            displayGrWt = parseFloat(order.grWt || 0);
            displayNet = parseFloat(order.netAmount || 0);
          }

          const cashAdvance = parseFloat(order.advance || 0);
          const totalAdvance = cashAdvance + purchaseTotal;
          const displayBalance = displayNet - totalAdvance;

          const isPending = order.status === "PENDING";
          row.innerHTML = `
        <td class="center">
          <input type="checkbox" ${isPending ? 'checked' : ''} onchange="selectRow(this); toggleOrderStatus(this, ${order.id}); event.stopPropagation();" onclick="event.stopPropagation();">
        </td>
        <td>${order.orderNo || order.billNo || "-"}</td>
        <td>${order.customer || order.customerName || "-"}</td>
        <td>${order.orderDate || "-"}</td>
        <td>${order.dueDate || "-"}</td>
        <td class="right">${displayGrWt.toFixed(3)}</td>
        <td class="right">${displayNet.toFixed(2)}</td>
        <td class="right">${totalAdvance.toFixed(2)}</td>
        <td class="right">${displayBalance.toFixed(2)}</td>
        <td class="center">
          <button class="btn" onclick="editOrder(${order.id}); event.stopPropagation();" style="padding:4px 12px; font-size:12px;">Edit</button>
        </td>
      `;

          if (isPending) row.classList.add("selected");

          // Make row clickable to edit order (but not if clicking Edit button)
          row.style.cursor = "pointer";
          row.onclick = function (e) {
            if (e.target && (e.target.tagName === "BUTTON" || e.target.tagName === "INPUT")) return;
            editOrder(order.id);
          };

          if (tbody) {
            tbody.appendChild(row);
          }
        } catch (e) {
          console.error("Error creating order row:", e);
        }
      });

      updateFooter();
    }

    /* =========================
       GET CUSTOMER DATA FROM CUSTOMERS LIST (BY ID OR NAME)
    ========================= */
    /** Fetch full customer details by customerId (primary for edit). */
    function getCustomerDataById(customerId) {
      if (customerId == null || customerId === "") return null;
      try {
        const customers = JSON.parse(localStorage.getItem("customers") || "[]");
        const customer = customers.find(c =>
          c && (c.id == customerId || String(c.id) === String(customerId))
        );
        if (customer) return formatCustomerForPayload(customer, customer.name);
      } catch (e) {
        console.error("Error fetching customer by ID:", e);
      }
      return null;
    }

    function formatCustomerForPayload(customer, fallbackName) {
      const rel = customer.relation || "";
      const relName = customer.relationName || "";
      return {
        id: customer.id,
        name: customer.name || customer.customerName || fallbackName || "",
        openingBalance: customer.openingBalance ?? customer.currentBal ?? customer.balance ?? "",
        currentBal: customer.openingBalance ?? customer.currentBal ?? customer.balance ?? "",
        relation: (rel && relName ? rel + " " + relName : rel || relName) || "",
        relationName: relName || "",
        station: customer.station || customer.city || customer.location || ""
      };
    }

    function getCustomerData(customerName) {
      if (!customerName) return null;
      try {
        const customers = JSON.parse(localStorage.getItem("customers") || "[]");
        let customer = customers.find(c =>
          c && (c.name === customerName || c.customerName === customerName)
        );
        if (!customer) {
          const lowerName = customerName.toLowerCase().trim();
          customer = customers.find(c =>
            c && (
              (c.name || "").toLowerCase().trim() === lowerName ||
              (c.customerName || "").toLowerCase().trim() === lowerName
            )
          );
        }
        if (customer) return formatCustomerForPayload(customer, customerName);
      } catch (e) {
        console.error("Error fetching customer data:", e);
      }
      return null;
    }

    /* =========================
       EDIT ORDER - IMPROVED WITH CUSTOMER DATA FETCHING
    ========================= */
    function editOrder(orderId) {
      try {
        console.log("=== EDIT ORDER START ===");
        console.log("Order ID:", orderId);
        
        // Clear ALL previous state flags first to prevent conflicts
        const keysToRemove = [
          "editOrderId",
          "editOrderPayload",
          "ratebookOpened",
          "receiptOpened",
          "newOrderState",
          "editCustomerReadOnly",
          "returnToOrders",
          "selectedCustomerData"
        ];
        
        keysToRemove.forEach(key => localStorage.removeItem(key));

        // Get the order data
        const orders = JSON.parse(localStorage.getItem("orders") || "[]");
        const order = orders.find(o => o && (o.id == orderId || String(o.id) === String(orderId)));

        if (!order) {
          console.error("Order not found:", orderId);
          alert("Order not found. Please try again.");
          return;
        }

        console.log("=== FETCHED ORDER DATA (by order ID) ===", order);

        // 1) Fetch linked customer by customerId first (do NOT rely only on name/dropdown)
        const customerId = order.customerId != null && order.customerId !== "" ? order.customerId : null;
        const customerName = (order.customer || order.customerName || "").toString().trim();
        let customerData = null;
        if (customerId) {
          customerData = getCustomerDataById(customerId);
          console.log("=== FETCHED CUSTOMER DATA (by customerId) ===", customerData);
        }
        if (!customerData && customerName) {
          customerData = getCustomerData(customerName);
          console.log("=== FETCHED CUSTOMER DATA (by name) ===", customerData);
        }

        // 2) Build customer info: prefer DB customer, else use order-saved fields so fields are never empty when data exists
        const customerInfo = customerData || {
          id: order.customerId || "",
          name: customerName,
          openingBalance: order.customerOpeningBalance ?? order.currentBal ?? order.customerBalance ?? "",
          currentBal: order.customerOpeningBalance ?? order.currentBal ?? order.customerBalance ?? "",
          relation: order.customerRelation || order.relation || "",
          station: order.customerStation || order.station || ""
        };
        console.log("=== CUSTOMER INFO FOR EDIT (will be stored in payload) ===", customerInfo);

        // Create a complete snapshot of the order with ALL fields preserved for new-order edit
        const orderSnapshot = {
          // ===== EDIT MODE FLAG =====
          isEditMode: true,
          
          // ===== CORE IDENTIFIERS =====
          id: order.id,
          orderNo: order.orderNo || order.billNo || "",
          billNo: order.billNo || order.orderNo || "",
          
          // ===== CUSTOMER INFORMATION (names new-order.html loadOrderForEdit expects) =====
          customerId: customerInfo.id || order.customerId || "",
          customer: customerInfo.name,
          customerName: customerInfo.name,
          currentBal: customerInfo.currentBal,
          customerOpeningBalance: customerInfo.openingBalance ?? customerInfo.currentBal ?? "",
          relation: customerInfo.relation,
          customerRelation: customerInfo.relation,
          station: customerInfo.station,
          customerStation: customerInfo.station,
          
          // Additional customer fields (if they exist in your form)
          customerPhone: order.customerPhone || "",
          customerEmail: order.customerEmail || "",
          customerAddress: order.customerAddress || "",
          
          // ===== BILL INFORMATION =====
          orderDate: order.orderDate || "",
          dueDate: order.dueDate || "",
          hallmark: order.hallmark || "",
          type: order.type || "Order",
          
          // ===== ORDER DETAILS - ITEMS ARRAY =====
          items: order.items || [],
          
          // ===== FINANCIAL INFORMATION =====
          netAmount: order.netAmount || 0,
          advance: order.advance || 0,
          balance: order.balance || 0,
          
          // ===== CALCULATED TOTALS =====
          pc: order.pc || 0,
          grWt: order.grWt || 0,
          
          // ===== STATUS AND METADATA =====
          status: order.status || "",
          timestamp: order.timestamp || new Date().toISOString(),
          
          // ===== ANY OTHER CUSTOM FIELDS =====
          ...order
        };

        console.log("=== ORDER SNAPSHOT CREATED ===");
        console.log("Customer Info:", {
          name: orderSnapshot.customerName,
          currentBal: orderSnapshot.currentBal,
          relation: orderSnapshot.relation,
          station: orderSnapshot.station
        });
        console.log("Items count:", orderSnapshot.items ? orderSnapshot.items.length : 0);

        // Store order ID for the edit mode
        localStorage.setItem("editOrderId", String(orderId));
        
        // Store complete order snapshot
        localStorage.setItem("editOrderPayload", JSON.stringify(orderSnapshot));
        
        // Store customer data separately for easy access
        localStorage.setItem("selectedCustomerData", JSON.stringify(customerInfo));
        
        // Set customer field as read-only when editing from orders page
        localStorage.setItem("editCustomerReadOnly", "true");
        
        // Set flag to indicate we're coming from orders page
        localStorage.setItem("returnToOrders", "true");

        console.log("=== STORAGE COMPLETE ===");
        console.log("Stored editOrderId:", localStorage.getItem("editOrderId"));
        console.log("Stored selectedCustomerData:", localStorage.getItem("selectedCustomerData"));
        console.log("=== NAVIGATING TO NEW ORDER PAGE ===");

        // Navigate to new-order page
        navigateToNewOrder();

      } catch (e) {
        console.error("=== ERROR IN EDIT ORDER ===");
        console.error("Error preparing order edit:", e);
        console.error("Stack trace:", e.stack);
        alert("Error loading order for editing. Please try again.");
      }
    }

    /* =========================
       NAVIGATE TO NEW ORDER PAGE
    ========================= */
    function navigateToNewOrder() {
      // Try to use loadPage if available (workspace context)
      if (typeof loadPage === 'function') {
        loadPage("pages/new-order.html");
        return;
      }

      // Try parent window
      if (window.parent && window.parent !== window && typeof window.parent.loadPage === 'function') {
        window.parent.loadPage("pages/new-order.html");
        return;
      }

      // Try top window
      if (window.top && window.top !== window && typeof window.top.loadPage === 'function') {
        window.top.loadPage("pages/new-order.html");
        return;
      }

      // Fallback: direct navigation
      const currentPath = window.location.pathname;
      if (currentPath.includes('/pages/')) {
        window.location.href = "new-order.html";
      } else {
        window.location.href = "/pages/new-order.html";
      }
    }

    /* =========================
       NEW ORDER
    ========================= */
    function newOrder() {
      // Clear edit state when creating new order
      localStorage.removeItem("editOrderId");
      localStorage.removeItem("editOrderPayload");
      localStorage.removeItem("editCustomerReadOnly");
      localStorage.removeItem("returnToOrders");
      localStorage.removeItem("selectedCustomerData");
      // Signal new-order page to open with fresh form: new Bill No., all data cleared
      localStorage.setItem("newOrderClearForm", "true");

      navigateToNewOrder();
    }

    /* =========================
       SELECT ROW
    ========================= */
    function selectRow(cb) {
      cb.closest("tr").classList.toggle("selected", cb.checked);
    }

    /* =========================
       TOGGLE ORDER STATUS (Mark/Unmark as PENDING via checkbox)
    ========================= */
    function toggleOrderStatus(cb, orderId) {
      try {
        const orders = JSON.parse(localStorage.getItem("orders") || "[]");
        const orderIndex = orders.findIndex(o => o && (o.id === orderId || o.id === Number(orderId) || String(o.id) === String(orderId)));

        if (orderIndex === -1) {
          console.error("Order not found:", orderId);
          return;
        }

        const order = orders[orderIndex];
        if (cb.checked) {
          order.status = "PENDING";
        } else {
          order.status = null;
        }

        localStorage.setItem("orders", JSON.stringify(orders));

        const refreshEvent = new CustomEvent('orderStatusChanged', {
          detail: { orderId: orderId, status: order.status || "UNMARKED" }
        });
        window.dispatchEvent(refreshEvent);
        if (window.parent && window.parent !== window) window.parent.dispatchEvent(refreshEvent);
        if (window.top && window.top !== window) window.top.dispatchEvent(refreshEvent);
      } catch (e) {
        console.error("Error toggling order status:", e);
        alert("Error updating order status");
      }
    }

    /* =========================
       DATE FILTER (by month, day, date)
    ========================= */
    function filterTable() {
      if (!tbody) {
        if (!initElements()) return;
      }

      const workspace = document.querySelector(".workspace");
      let fromEl = workspace ? workspace.querySelector("#filterFromDate") : null;
      let toEl = workspace ? workspace.querySelector("#filterToDate") : null;
      if (!fromEl) fromEl = document.querySelector("#filterFromDate") || document.getElementById("filterFromDate");
      if (!toEl) toEl = document.querySelector("#filterToDate") || document.getElementById("filterToDate");

      const fromValue = fromEl ? fromEl.value : "";
      const toValue = toEl ? toEl.value : "";
      const fromDate = fromValue ? new Date(fromValue) : null;
      const toDate = toValue ? new Date(toValue) : null;
      if (toDate) toDate.setHours(23, 59, 59, 999);

      const rows = tbody.querySelectorAll("tr");
      rows.forEach(row => {
        const cells = row.querySelectorAll("td");
        const orderDateCell = cells[3] ? cells[3].textContent.trim() : "";
        if (!fromValue && !toValue) {
          row.style.display = "";
          return;
        }
        const rowDate = orderDateCell ? new Date(orderDateCell) : null;
        if (!rowDate || isNaN(rowDate.getTime())) {
          row.style.display = fromValue || toValue ? "none" : "";
          return;
        }
        let show = true;
        if (fromDate && rowDate < fromDate) show = false;
        if (toDate && rowDate > toDate) show = false;
        row.style.display = show ? "" : "none";
      });

      updateFooter();
    }

    function clearDateFilter() {
      const workspace = document.querySelector(".workspace");
      let fromEl = workspace ? workspace.querySelector("#filterFromDate") : null;
      let toEl = workspace ? workspace.querySelector("#filterToDate") : null;
      if (!fromEl) fromEl = document.querySelector("#filterFromDate") || document.getElementById("filterFromDate");
      if (!toEl) toEl = document.querySelector("#filterToDate") || document.getElementById("filterToDate");
      if (fromEl) fromEl.value = "";
      if (toEl) toEl.value = "";
      filterTable();
    }

    /* =========================
       FOOTER UPDATE
    ========================= */
    function updateFooter() {
      if (!tbody || !footer) {
        if (!initElements()) return;
      }

      const allRows = tbody.querySelectorAll("tr");
      const visibleRows = Array.from(allRows).filter(row => row.style.display !== "none");
      const count = visibleRows.length;
      const total = allRows.length;

      if (count < total && total > 0) {
        footer.textContent = `Showing ${count} of ${total} orders`;
      } else {
        footer.textContent = count ? `Showing ${count} orders` : "No orders available";
      }
    }

    /* =========================
       INITIALIZE PAGE
    ========================= */
    function initOrdersPage() {
      // Wait for elements to be ready
      if (!initElements()) {
        setTimeout(initOrdersPage, 100);
        return;
      }

      // Load orders
      loadOrders();

      // Ensure all functions are accessible
      ensureFunctionsGlobal();
    }

    /* =========================
       INITIALIZE
    ========================= */
    function isInWorkspace() {
      return !!document.querySelector(".workspace");
    }

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () {
        if (isInWorkspace()) {
          setTimeout(initOrdersPage, 200);
        } else {
          initOrdersPage();
        }
      });
    } else {
      if (isInWorkspace()) {
        setTimeout(initOrdersPage, 200);
      } else {
        setTimeout(initOrdersPage, 50);
      }
    }

    // Listen for page refresh event from dashboard
    window.addEventListener('pageRefresh', function () {
      setTimeout(initOrdersPage, 150);
    });

    const workspace = document.querySelector(".workspace");
    if (workspace) {
      workspace.addEventListener('pageRefresh', function () {
        setTimeout(initOrdersPage, 150);
      });
    }

    // Listen for order saved event
    window.addEventListener('orderSaved', function () {
      loadOrders();
    });

    // Listen for order status changed event
    window.addEventListener('orderStatusChanged', function () {
      loadOrders();
    });

    // Listen for storage changes
    window.addEventListener('storage', function (e) {
      if (e.key === 'orders') {
        loadOrders();
      }
    });

    // Poll for changes
    let lastOrderCount = 0;
    setInterval(function () {
      if (!tbody) {
        if (!initElements()) return;
      }

      const orders = JSON.parse(localStorage.getItem("orders") || "[]");
      if (orders.length !== lastOrderCount) {
        lastOrderCount = orders.length;
        loadOrders();
      }
    }, 1000);

    /* =========================
       ENSURE FUNCTIONS ARE GLOBALLY ACCESSIBLE
    ========================= */
    function ensureFunctionsGlobal() {
      window.loadOrders = loadOrders;
      window.newOrder = newOrder;
      window.editOrder = editOrder;
      window.selectRow = selectRow;
      window.toggleOrderStatus = toggleOrderStatus;
      window.filterTable = filterTable;
      window.clearDateFilter = clearDateFilter;
      window.updateFooter = updateFooter;
      window.initOrdersPage = initOrdersPage;
      window.initElements = initElements;
      window.navigateToNewOrder = navigateToNewOrder;
      window.getCustomerData = getCustomerData;
      window.getCustomerDataById = getCustomerDataById;
    }

    // Make functions globally accessible immediately
    ensureFunctionsGlobal();
  </script>

</body>
