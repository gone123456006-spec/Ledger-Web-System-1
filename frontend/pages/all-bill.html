<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>All Bill</title>

  <style>
    /* =========================
   BASE
========================= */
    * {
      box-sizing: border-box;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 14px;
    }

    body {
      margin: 0;
      background: #e6ebf2;
    }

    /* =========================
   CONTAINER
========================= */
    .balance-wrap {
      margin: 15px;
      background: #fff;
      border: 1px solid #d1d6de;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 30px);
      max-height: calc(100vh - 30px);
      overflow: hidden;
      box-sizing: border-box;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .workspace .balance-wrap {
      margin: 0;
      height: 100%;
      max-height: 100%;
      border-radius: 0;
      box-shadow: none;
    }

    /* =========================
   TOOLBAR
========================= */
    .balance-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 2px solid #d1d6de;
      background: linear-gradient(to bottom, #fafbfc, #f5f7fa);
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .balance-toolbar h2 {
      font-size: 20px;
      font-weight: 600;
    }

    .btn {
      padding: 10px 18px;
      border: 1px solid #d1d6de;
      background: #fff;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      color: #1d1d1f;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .btn:hover {
      background: #007aff;
      border-color: #007aff;
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 2px 4px rgba(0, 122, 255, 0.2);
    }

    label {
      font-size: 14px;
      color: #3a3a3c;
      font-weight: 500;
      white-space: nowrap;
    }

    input,
    select {
      height: 40px;
      padding: 8px 14px;
      border: 1px solid #d1d6de;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      transition: all 0.2s;
      min-width: 140px;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #007aff;
      box-shadow: 0 0 0 3px rgba(0, 122, 255, .12);
    }

    /* =========================
   TABLE (Customer Balance style)
========================= */
    .table-wrap {
      flex: 1;
      overflow: auto;
      position: relative;
      min-height: 0;
      box-sizing: border-box;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 1000px;
      border-collapse: collapse;
      background: #fff;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      box-shadow: 0 1px 0 0 #c5c9ce;
    }

    thead th {
      background: linear-gradient(to bottom, #eef1f5, #e4e8ed);
      border: 1px solid #c5c9ce;
      padding: 18px;
      white-space: nowrap;
      font-weight: 600;
      font-size: 13px;
      text-align: left;
      color: #1d1d1f;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    thead th.center {
      text-align: center;
    }

    thead th.right {
      text-align: right;
    }

    tbody td {
      padding: 18px;
      border: 1px solid #d1d6de;
      font-size: 14px;
      vertical-align: middle;
      color: #333;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    tbody tr {
      transition: background 0.2s;
      background: #fff;
    }

    tbody tr:nth-child(even) {
      background: #f8f9fb;
    }

    tbody tr:hover {
      background: #e8f2ff !important;
    }

    tbody tr:hover td {
      border-color: #b8d4f0;
    }

    .center {
      text-align: center;
    }

    .right {
      text-align: right;
      font-weight: 500;
      color: #1d1d1f;
      font-variant-numeric: tabular-nums;
    }

    button {
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      background: #0d6efd;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    button:hover {
      background: #0b5ed7;
      transform: translateY(-1px);
      box-shadow: 0 2px 4px rgba(11, 94, 215, 0.2);
    }

    button:active {
      transform: translateY(0);
    }

    /* =========================
   FOOTER (Customer Balance style)
========================= */
    .footer {
      padding: 14px 20px;
      font-size: 14px;
      color: #6e6e73;
      border-top: 2px solid #d1d6de;
      background: #f5f7fa;
      flex-shrink: 0;
      box-sizing: border-box;
      font-weight: 500;
    }

    /* =========================
   SCROLLBAR (Customer Balance style)
========================= */
    .table-wrap::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    .table-wrap::-webkit-scrollbar-track {
      background: #f0f2f5;
      border-radius: 6px;
    }

    .table-wrap::-webkit-scrollbar-thumb {
      background: #b0b4b8;
      border-radius: 6px;
    }

    .table-wrap::-webkit-scrollbar-thumb:hover {
      background: #a1a1a6;
    }

    /* =========================
       ACTION BUTTONS
    ========================= */
    .action-buttons {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      /* Prevent overflow on small screens */
    }

    .action-buttons button {
      padding: 4px 10px;
      font-size: 11px;
      white-space: nowrap;
    }
  </style>
</head>

<body>

  <div class="balance-wrap">

    <!-- All Bill = bill ledger (customerBalances). One row per bill. Edit. Different from Customer Balance = one row per customer (customers). -->
    <div class="balance-toolbar">
      <h2>All Bill</h2>
      <button class="btn" onclick="loadBalances()">🔄 Refresh</button>

      <label>Customer</label>
      <input type="text" id="customerFilter" onkeyup="filterTable()" placeholder="Filter by customer...">

      <label>Search</label>
      <input type="text" id="searchBox" placeholder="Search..." onkeyup="searchTable()">
    </div>



    <!-- TABLE: Date, Mark (CID), LF No., Bill No., Name, Relation, Relation Name, Station, Phone No., Mobile Number, Amount -->
    <div class="table-wrap">
      <table id="balanceTable">
        <thead>
          <tr>
            <th class="center">Status</th>
            <th>Bill No.</th>
            <th>Order No.</th>
            <th>Customer</th>
            <th>Bill Date</th>
            <th class="right" title="Ready Order Total — sum of Order + Sale + Other line finals (Ready Extra payment panel)">Net Total Amount (₹)</th>
            <th class="right" title="Advance minus + Advance purchase minus — advance payments + New Order purchase sheet + Purchase-type grid lines">Advance (₹)</th>
            <th class="right" title="Paid rupees + Paid purchase — Paid-type payments + Ready/Extra purchase sheet">Paid (₹)</th>
            <th class="right">Weight (g)</th>
            <th class="right" title="Pending balance net total amount — Ready Order Total minus purchases, sheets, payments, and |rate diff|">Balance (₹)</th>
            <th class="center">Action</th>
          </tr>
        </thead>
        <tbody id="allBillTableBody"></tbody>
      </table>
    </div>

    <div class="footer" id="allBillFooter">
      No balance entries available
    </div>

  </div>

  <script>
    /* =========================
       ELEMENT REFERENCES
    ========================= */
    let tbody = null;
    let footer = null;

    /* =========================
       INITIALIZE ELEMENTS
    ========================= */
    function initElements() {
      const wrap = document.querySelector(".balance-wrap");
      const root = wrap || document.querySelector(".workspace") || document;
      tbody = root.querySelector("#allBillTableBody");
      footer = root.querySelector("#allBillFooter");
      if (!tbody) tbody = document.getElementById("allBillTableBody");
      if (!footer) footer = document.getElementById("allBillFooter");
      return !!(tbody && footer);
    }

    /** New Order + Ready Extra purchase sheet rupees per bill (separate localStorage maps). */
    function purchaseSheetRowAmountAllBill(r) {
      if (!r) return 0;
      if (r.amount != null && String(r.amount).trim() !== "") {
        const a = parseFloat(String(r.amount).replace(/[^0-9.-]/g, ""));
        if (!isNaN(a)) return a;
      }
      const net = parseFloat(r.netWt) || 0;
      const rate = parseFloat(r.rate) || 0;
      return net * rate;
    }

    function purchaseSheetRecordTotalAllBill(rec) {
      if (!rec) return 0;
      if (rec.rows && rec.rows.length > 0) {
        return rec.rows.reduce((s, r) => s + purchaseSheetRowAmountAllBill(r), 0);
      }
      if (rec.total != null && String(rec.total).trim() !== "") {
        const t = parseFloat(rec.total);
        return isNaN(t) ? 0 : t;
      }
      return 0;
    }

    /** New Order sheet rupees vs Ready/Extra sheet rupees (same split as Ready Extra payment panel). */
    function getPurchaseSheetTotalsBySource(billNoVal) {
      if (!billNoVal) return { newOrder: 0, readyExtra: 0 };
      try {
        const key = String(billNoVal).trim();
        const mapNew = JSON.parse(localStorage.getItem("newOrderPurchaseSheets") || "{}") || {};
        const mapReady = JSON.parse(localStorage.getItem("readyExtraOrderPurchaseSheets") || "{}") || {};
        const rec1 = mapNew[key] || mapNew[billNoVal];
        const rec2 = mapReady[key] || mapReady[billNoVal];
        return {
          newOrder: purchaseSheetRecordTotalAllBill(rec1),
          readyExtra: purchaseSheetRecordTotalAllBill(rec2)
        };
      } catch (e) {
        return { newOrder: 0, readyExtra: 0 };
      }
    }

    function getSavedPurchaseSheetTotal(billNoVal) {
      const t = getPurchaseSheetTotalsBySource(billNoVal);
      return t.newOrder + t.readyExtra;
    }

    /**
     * Same rules as ready-orders `readyExtraItemLineTotalFromValues`:
     * 17+ slots → Final at vals[16]; 16-slot legacy → vals[15]; else Est. vals[9].
     * (Using vals[15] for all length>=16 was wrong — on 17-col rows that is not the line total.)
     */
    function readyExtraLineTotalFromValues(vals) {
      if (!vals || vals.length < 16) {
        if (vals && vals.length >= 13) {
          return parseFloat(vals[12] || 0) || 0;
        }
        return 0;
      }
      let fin = 0;
      if (vals.length >= 17) {
        fin = parseFloat(vals[16] || 0) || 0;
        if (fin !== 0) return fin;
      } else {
        fin = parseFloat(vals[15] || 0) || 0;
        if (fin !== 0) return fin;
      }
      const est = parseFloat(vals[9] || 0) || 0;
      return est;
    }

    /* =========================
       GET PAID AMOUNT HELPER
    ========================= */
    function getPaidAmount(billNo, typeFilter = null) {
      if (!billNo) return 0;
      const key = String(billNo).trim();
      const payments = JSON.parse(localStorage.getItem("payments") || "[]");
      return payments
        .filter(p => {
          const billMatch = p && String(p.billNo || "").trim() === key;
          if (!billMatch) return false;
          if (typeFilter === 'Paid') return p.type === 'Paid';
          // Advanced = explicit 'Advanced' OR no type (legacy)
          if (typeFilter === 'Advanced') return p.type !== 'Paid';
          return true; // All payments for this bill
        })
        .reduce((sum, p) => sum + (Number(p.amount) || 0), 0);
    }

    /* =========================
       GET CUSTOMER OVERALL BALANCE
    ========================= */
    function getCustomerBalance(customerName) {
      if (!customerName) return 0;
      const customers = JSON.parse(localStorage.getItem("customers") || "[]");
      const norm = (s) => (s || "").trim().toLowerCase();

      const c = customers.find(cust => norm(cust.name) === norm(customerName));
      // Prefer master Current Balance (Customer Statement / Add Customer) so All Bill status matches Customer Balance grid.
      if (c) {
        const currentRaw = c.currentBalance;
        const currentNum = Number(currentRaw);
        const hasCurrent =
          currentRaw != null &&
          String(currentRaw).trim() !== "" &&
          Number.isFinite(currentNum);
        if (hasCurrent) {
          const t = String(c.currentBalanceType || "Dr").trim().toLowerCase();
          return t === "cr" ? -Math.abs(currentNum) : Math.abs(currentNum);
        }
      }

      let openingBal = 0;
      if (c) {
        const hasM = c.masterOpeningBalance != null && c.masterOpeningBalance !== "";
        const rawOp = hasM ? c.masterOpeningBalance : c.openingBalance;
        const opT = hasM ? (c.masterOpeningBalanceType || c.openingBalanceType) : c.openingBalanceType;
        if (rawOp != null && rawOp !== "") {
          openingBal = Number(rawOp);
          const t = (opT || "").toLowerCase();
          if (t === "cr") openingBal = -Math.abs(openingBal);
          if (t === "dr") openingBal = Math.abs(openingBal);
        }
      }

      const balances = JSON.parse(localStorage.getItem("customerBalances") || "[]");
      const customerEntries = balances.filter((b) =>
        norm(b.customer) === norm(customerName) ||
        (c && c.cid && b.cid && norm(b.cid) === norm(c.cid))
      );

      let dynamicSum = openingBal;

      if (customerEntries.length > 0) {
        const allOrders = JSON.parse(localStorage.getItem('orders') || '[]');
        const allBillsArray = JSON.parse(localStorage.getItem('bills') || '[]');

        customerEntries.forEach(balance => {
          let linkedOrder = allBillsArray.find(o => o.orderNo === balance.orderNo || o.billNo === balance.orderNo);
          if (!linkedOrder) {
            linkedOrder = allOrders.find(o => o.orderNo === balance.orderNo || o.billNo === balance.orderNo);
          }

          let orderTotal = 0; let purchaseTotal = 0; let saleTotal = 0;
          const linkedItems = linkedOrder ? (linkedOrder.items || linkedOrder.rows || []) : [];
          if (linkedItems && linkedItems.length > 0) {
            linkedItems.forEach(it => {
              const vals = it.values || [];
              const type = it.type || 'Order';
              const valTotal = readyExtraLineTotalFromValues(vals);
              if (type === 'Purchase') purchaseTotal += valTotal;
              else if (type === 'Sale') saleTotal += valTotal;
              else orderTotal += valTotal;
            });
          }

          const billNoVal = balance.orderNo || balance.billNo || "";
          const purchaseSheetTotal = getSavedPurchaseSheetTotal(billNoVal);
          const advanceAmt = getPaidAmount(billNoVal, 'Advanced');
          const paidAmt = getPaidAmount(billNoVal, 'Paid');

          let rateDiffResult = 0;
          const rateDiffStored = (linkedOrder && linkedOrder.rateBookDiffSummary) ? linkedOrder.rateBookDiffSummary : (balance.rateBookDiffSummary || "");
          if (rateDiffStored) {
            const match = rateDiffStored.match(/=\s*([-\u2212]?\s*[\d.]+)/);
            if (match) {
              const numStr = match[1].replace(/\u2212/g, "-").replace(/\s/g, "");
              rateDiffResult = parseFloat(numStr) || 0;
            }
          }

          const netOrderSale = orderTotal + saleTotal;
          let billNetBeforePayments;
          if (netOrderSale > 0 || purchaseTotal > 0 || purchaseSheetTotal > 0) {
            billNetBeforePayments = netOrderSale - purchaseTotal - purchaseSheetTotal;
          } else {
            billNetBeforePayments = parseFloat(balance.netAmount || balance.amount || (linkedOrder && (linkedOrder.totalAmount || linkedOrder.netAmount)) || 0) || 0;
          }
          const balAmt = billNetBeforePayments - advanceAmt - paidAmt - Math.abs(rateDiffResult);
          dynamicSum += balAmt;
        });
      }
      return dynamicSum;
    }

    /* =========================
       LOAD BALANCES
    ========================= */
    function loadBalances() {
      tbody = null;
      footer = null;
      if (!initElements()) {
        console.warn("All Bill table elements not found. Retrying...");
        setTimeout(loadBalances, 100);
        return;
      }

      const balances = JSON.parse(localStorage.getItem("customerBalances") || "[]");
      if (tbody) tbody.innerHTML = "";

      if (balances.length === 0) {
        updateFooter();
        return;
      }

      // Sort by date (newest first)
      const sortedBalances = [...balances].sort((a, b) => {
        const dateA = new Date(a.date || a.timestamp || 0);
        const dateB = new Date(b.date || b.timestamp || 0);
        return dateB - dateA;
      });

      const customersList = JSON.parse(localStorage.getItem("customers") || "[]");
      const normName = (s) => (s || "").trim().toLowerCase();

      sortedBalances.forEach((balance, index) => {
        try {
          const row = document.createElement("tr");
          row.dataset.balanceIndex = index;
          row.dataset.balanceTimestamp = balance.timestamp || "";
          row.dataset.orderNo = balance.orderNo || "";
          const typeVal = (balance.readyMetal === "Gold" || balance.readyMetal === "Order") ? "Order" : (balance.readyMetal || "Order");

          // Overall customer balance: used for Clear / Pending status only (Balance column = Net amount per bill)
          const overallBal = getCustomerBalance(balance.customer);

          const custForRow = customersList.find(c =>
            normName(c.name) === normName(balance.customer) ||
            (balance.cid && c.cid && normName(String(c.cid)) === normName(String(balance.cid)))
          );
          const forceClearUi = !!(custForRow && (custForRow.allBillStatusUiClear === true || custForRow.statementBillAmountCleared === true));
          const billStatusCleared = String(balance.status || "").trim().toLowerCase() === "cleared";
          const isClear = billStatusCleared || forceClearUi || Math.abs(overallBal) < 0.000001;
          const statusLabel = isClear
            ? `<span style="background:#dcfce7;color:#166534;border:1px solid #86efac;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;">Clear</span>`
            : `<span style="background:#fef9c3;color:#854d0e;border:1px solid #fde047;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;">Pending</span>`;

          // Try to pull richer figures from the linked order
          const allOrders = JSON.parse(localStorage.getItem('orders') || '[]');
          const allBillsArray = JSON.parse(localStorage.getItem('bills') || '[]');

          let linkedOrder = allBillsArray.find(o =>
            o.orderNo === balance.orderNo || o.billNo === balance.orderNo
          );

          if (!linkedOrder) {
            linkedOrder = allOrders.find(o =>
              o.orderNo === balance.orderNo || o.billNo === balance.orderNo
            );
          }

          let orderTotal = 0;
          let purchaseTotal = 0;
          let saleTotal = 0;
          let totalWeight = 0;

          const linkedItems = linkedOrder ? (linkedOrder.items || linkedOrder.rows || []) : [];

          if (linkedItems && linkedItems.length > 0) {
            linkedItems.forEach(it => {
              const vals = it.values || [];
              const type = it.type || 'Order';
              const isGst = vals.length >= 16;
              const weightIdx = isGst ? 12 : 9;
              const valTotal = readyExtraLineTotalFromValues(vals);
              const valWeight = parseFloat(vals[weightIdx] || 0);

              if (type === 'Purchase') {
                purchaseTotal += valTotal;
              } else if (type === 'Sale') {
                saleTotal += valTotal;
                totalWeight += valWeight;
              } else {
                orderTotal += valTotal;
                totalWeight += valWeight;
              }
            });
          }

          const billNoVal = balance.orderNo || balance.billNo || "";
          const sheetBySource = getPurchaseSheetTotalsBySource(billNoVal);
          const purchaseSheetTotal = sheetBySource.newOrder + sheetBySource.readyExtra;
          const advanceAmt = getPaidAmount(billNoVal, 'Advanced');
          const paidAmt = getPaidAmount(billNoVal, 'Paid');

          // Weight (Total R. Wt, index 12 or 9)
          let grWt = totalWeight;
          if (grWt === 0) {
            grWt = parseFloat(balance.grWt || (linkedOrder && linkedOrder.grWt) || 0);
          }

          // Calculate Rate Difference if available
          let rateDiffResult = 0;
          const rateDiffStored = (linkedOrder && linkedOrder.rateBookDiffSummary) ? linkedOrder.rateBookDiffSummary : (balance.rateBookDiffSummary || "");
          if (rateDiffStored) {
            const match = rateDiffStored.match(/=\s*([-\u2212]?\s*[\d.]+)/);
            if (match) {
              const numStr = match[1].replace(/\u2212/g, "-").replace(/\s/g, "");
              rateDiffResult = parseFloat(numStr) || 0;
            }
          }

          const netOrderSale = orderTotal + saleTotal;
          let billNetBeforePayments;
          if (netOrderSale > 0 || purchaseTotal > 0 || purchaseSheetTotal > 0) {
            billNetBeforePayments = netOrderSale - purchaseTotal - purchaseSheetTotal;
          } else {
            billNetBeforePayments = parseFloat(balance.netAmount || balance.amount || (linkedOrder && (linkedOrder.totalAmount || linkedOrder.netAmount)) || 0) || 0;
          }

          // Pending balance (Ready Extra panel "Pending balance Net Total Amount") — always use live calc for Balance column
          const balAmt = billNetBeforePayments - advanceAmt - paidAmt - Math.abs(rateDiffResult);
          balance.computedBalAmt = Number.isFinite(balAmt) ? Number(balAmt).toFixed(2) : String(balAmt);

          // Ready Order Total (panel order add); legacy rows with no line items use stored bill amount
          let readyOrderTotalAmt = netOrderSale;
          if ((!linkedItems || linkedItems.length === 0) && readyOrderTotalAmt === 0) {
            readyOrderTotalAmt =
              parseFloat(
                (linkedOrder && (linkedOrder.totalAmount || linkedOrder.netAmount)) ||
                  balance.netAmount ||
                  balance.amount ||
                  0
              ) || 0;
          }

          // Advance = Advance minus + Advance purchase minus (panel: advanced + newOrder sheet + Purchase grid)
          const advancePurchaseMinus = sheetBySource.newOrder + purchaseTotal;
          const advanceColumnDisplay = advanceAmt + advancePurchaseMinus;
          // Paid = Paid rupees + Paid purchase (panel: paid + Ready/Extra sheet)
          const paidColumnDisplay = paidAmt + sheetBySource.readyExtra;

          row.innerHTML = `
        <td class="center">${statusLabel}</td>
        <td style="font-weight:600;color:#2a50d8;">${balance.orderNo || balance.billNo || '—'}</td>
        <td>${balance.orderNo || '—'}</td>
        <td>${balance.customer || '—'}</td>
        <td>${balance.date || '—'}</td>
        <td class="right">${readyOrderTotalAmt.toFixed(2)}</td>
        <td class="right">${advanceColumnDisplay.toFixed(2)}</td>
        <td class="right">${paidColumnDisplay.toFixed(2)}</td>
        <td class="right">${grWt.toFixed(3)}</td>
        <td class="right" style="font-weight:600;">${(Number.isFinite(balAmt) ? balAmt : 0).toFixed(2)}</td>
        <td class="center">
          <div class="action-buttons">
            <button onclick="editBill(${index}, '${balance.timestamp || ''}')" style="padding:4px 10px; border-radius:6px; border:none; background:#0d6efd; color:#fff; font-size:11px; cursor:pointer; font-weight:500;">Edit</button>
          </div>
        </td>
      `;

          if (tbody) {
            tbody.appendChild(row);
          }
        } catch (e) {
          console.error("Error creating balance row:", e);
        }
      });

      // Save computed balances back so Customer Balance reads the exact same values
      try { localStorage.setItem("customerBalances", JSON.stringify(sortedBalances)); } catch (e) { }

      updateFooter();
    }

    /* =========================
       SEARCH FILTER
    ========================= */
    function searchTable() {
      if (!tbody) {
        if (!initElements()) return;
      }

      filterTable();
    }

    /* =========================
       FILTER TABLE
    ========================= */
    function filterTable() {
      if (!tbody) {
        if (!initElements()) return;
      }

      const root = document.querySelector(".balance-wrap") || document.querySelector(".workspace") || document;
      const searchBox = root.querySelector("#searchBox") || document.getElementById("searchBox");
      const customerFilter = root.querySelector("#customerFilter") || document.getElementById("customerFilter");

      const searchValue = searchBox ? searchBox.value.toLowerCase() : "";
      const customerValue = customerFilter ? customerFilter.value.toLowerCase() : "";

      const rows = tbody.querySelectorAll("tr");
      let visibleCount = 0;

      rows.forEach(row => {
        const rowText = row.innerText.toLowerCase();
        const cells = row.querySelectorAll("td");
        const customerCell = cells[3] ? cells[3].textContent.toLowerCase() : "";

        let show = true;

        if (searchValue && !rowText.includes(searchValue)) {
          show = false;
        }

        if (customerValue && !customerCell.includes(customerValue)) {
          show = false;
        }

        row.style.display = show ? "" : "none";
        if (show) visibleCount++;
      });

      if (footer) {
        const totalRows = rows.length;
        if (visibleCount < totalRows) {
          footer.textContent = `Showing ${visibleCount} of ${totalRows} entries`;
        } else {
          footer.textContent = visibleCount ? `Showing ${visibleCount} entries` : "No balance entries available";
        }
      }
    }

    /* =========================
       FOOTER UPDATE
    ========================= */
    function updateFooter() {
      if (!tbody || !footer) {
        if (!initElements()) return;
      }

      const allRows = tbody.querySelectorAll("tr");
      const visibleRows = Array.from(allRows).filter(row => row.style.display !== "none");
      const count = visibleRows.length;
      const total = allRows.length;

      if (count < total && total > 0) {
        footer.textContent = `Showing ${count} of ${total} entries`;
      } else {
        footer.textContent = count ? `Showing ${count} entries` : "No balance entries available";
      }
    }

    /* =========================
       INITIALIZE PAGE
    ========================= */
    function initBalancePage() {
      if (!initElements()) {
        setTimeout(initBalancePage, 100);
        return;
      }

      loadBalances();

      // Check for auto-filter (from Customer Balance page)
      const filterName = localStorage.getItem("filterCustomerName");
      if (filterName) {
        const filterInput = document.getElementById("customerFilter");
        if (filterInput) {
          filterInput.value = filterName;
          localStorage.removeItem("filterCustomerName");
          // Apply filter after a brief delay to ensure DOM is ready
          setTimeout(filterTable, 50);
        }
      }

      ensureFunctionsGlobal();
    }

    /* =========================
       INITIALIZE
    ========================= */
    function isInWorkspace() {
      return !!document.querySelector(".workspace");
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () {
        if (isInWorkspace()) {
          setTimeout(initBalancePage, 200);
        } else {
          initBalancePage();
        }
      });
    } else {
      if (isInWorkspace()) {
        setTimeout(initBalancePage, 200);
      } else {
        setTimeout(initBalancePage, 50);
      }
    }

    // Listen for page refresh event
    window.addEventListener('pageRefresh', function () {
      setTimeout(initBalancePage, 150);
    });

    // Listen for storage changes
    window.addEventListener('storage', function (e) {
      if (e.key === 'customerBalances') {
        loadBalances();
      }
    });

    // Listen for custom customerBalancesUpdated event
    window.addEventListener('customerBalancesUpdated', function () {
      loadBalances();
    });

    // Also listen on parent/top window
    if (window.parent && window.parent !== window) {
      window.parent.addEventListener('customerBalancesUpdated', function () {
        loadBalances();
      });
    }
    if (window.top && window.top !== window) {
      window.top.addEventListener('customerBalancesUpdated', function () {
        loadBalances();
      });
    }

    // Poll for changes
    let lastBalanceCount = 0;
    setInterval(function () {
      if (!tbody) {
        if (!initElements()) return;
      }

      const balances = JSON.parse(localStorage.getItem("customerBalances") || "[]");
      if (balances.length !== lastBalanceCount) {
        lastBalanceCount = balances.length;
        loadBalances();
      }
    }, 1000);

    /* =========================
       EDIT BILL FUNCTION
    ========================= */
    function editBill(balanceIndex, timestamp) {
      try {
        const balances = JSON.parse(localStorage.getItem("customerBalances") || "[]");

        // Find balance entry by index or timestamp
        let balanceEntry = null;
        if (timestamp) {
          balanceEntry = balances.find(b => b.timestamp === timestamp);
        } else if (balanceIndex >= 0 && balanceIndex < balances.length) {
          balanceEntry = balances[balanceIndex];
        }

        if (!balanceEntry) {
          alert("Bill entry not found");
          return;
        }

        // Store the balance entry data for loading into ready extra order.html
        // We'll use a special flag to indicate we're editing from all-bill
        localStorage.setItem("editBalanceEntry", JSON.stringify(balanceEntry));
        localStorage.setItem("editFromAllBill", "true");
        localStorage.setItem("editCustomerReadOnly", "true");

        // If balance entry has rows data, we can load it directly
        // Otherwise, try to find the order from orders storage
        if (balanceEntry.rows && balanceEntry.rows.length > 0) {
          // Store rows data for ready extra order.html to load
          localStorage.setItem("editBalanceRows", JSON.stringify(balanceEntry.rows));
        }

        // Prefer full bill from bills (has all row data: R. Metal, Neg, R. Wt, Rate, Making, Total)
        const bills = JSON.parse(localStorage.getItem("bills") || "[]");
        const fullBill = bills.find(b => b.billNo === balanceEntry.orderNo);

        const orders = JSON.parse(localStorage.getItem("orders") || "[]");
        const order = orders.find(o => o.orderNo === balanceEntry.orderNo);

        if (order && order.id) {
          localStorage.setItem("editOrderId", order.id);
          // Ensure ready-extra-order can load full items (incl. cols 10–15); pass payload from bill if it has more complete rows
          if (fullBill && (fullBill.items || fullBill.rows) && (fullBill.items || fullBill.rows).length > 0) {
            const payload = {
              id: order.id,
              orderNo: fullBill.billNo,
              billNo: fullBill.billNo,
              sgjBillNo: fullBill.sgjBillNo || "",
              customer: fullBill.customer,
              customerId: fullBill.customerId,
              orderDate: fullBill.date,
              dueDate: fullBill.dueDate || "",
              items: fullBill.items || fullBill.rows,
              hideBillMidColumns: !!(fullBill.hideBillMidColumns || balanceEntry.hideBillMidColumns)
            };
            localStorage.setItem("editOrderPayload", JSON.stringify(payload));
          }
        } else {
          const tempId = balanceEntry.timestamp || Date.now().toString();
          localStorage.setItem("editOrderId", tempId);
          if (fullBill && (fullBill.items || fullBill.rows) && (fullBill.items || fullBill.rows).length > 0) {
            const payload = {
              id: tempId,
              orderNo: fullBill.billNo,
              billNo: fullBill.billNo,
              sgjBillNo: fullBill.sgjBillNo || "",
              customer: fullBill.customer,
              customerId: fullBill.customerId,
              orderDate: fullBill.date,
              dueDate: fullBill.dueDate || "",
              items: fullBill.items || fullBill.rows,
              hideBillMidColumns: !!(fullBill.hideBillMidColumns || balanceEntry.hideBillMidColumns)
            };
            localStorage.setItem("editOrderPayload", JSON.stringify(payload));
          }
        }

        // Open ready-extra-order for editing
        if (typeof loadPage === 'function') {
          loadPage("pages/ready-extra-order.html");
          return;
        }

        // Try parent window
        if (window.parent && window.parent !== window && typeof window.parent.loadPage === 'function') {
          window.parent.loadPage("pages/ready-extra-order.html");
          return;
        }

        // Try top window
        if (window.top && window.top !== window && typeof window.top.loadPage === 'function') {
          window.top.loadPage("pages/ready-extra-order.html");
          return;
        }

        window.open("/pages/ready-extra-order.html", "EditBill", "width=1400,height=800");

      } catch (e) {
        console.error("Error editing bill:", e);
        alert("Error opening bill for editing: " + (e.message || String(e)));
      }
    }

    /* =========================
       ENSURE FUNCTIONS ARE GLOBALLY ACCESSIBLE
    ========================= */
    function ensureFunctionsGlobal() {
      window.loadBalances = loadBalances;
      window.searchTable = searchTable;
      window.filterTable = filterTable;
      window.updateFooter = updateFooter;
      window.initBalancePage = initBalancePage;
      window.initElements = initElements;
      window.editBill = editBill;
    }

    ensureFunctionsGlobal();
  </script>

</body>
