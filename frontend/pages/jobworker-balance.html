<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobworker Balance</title>
  <style>
    :root {
      --bg: #f8f9fc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --grid-border: #d4d4d4;
      --header-bg: #d6e4f4;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --radius: 12px;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.1);
      --card-pattern:
        radial-gradient(circle at 14px 14px, rgba(0,0,0,0.015) 0 3px, transparent 3.5px),
        linear-gradient(140deg, transparent 0 66%, rgba(255, 178, 0, 0.05) 66% 72%, transparent 72%),
        linear-gradient(140deg, transparent 0 70%, rgba(255,255,255,0.05) 70% 73%, transparent 73%),
        linear-gradient(140deg, transparent 0 74%, rgba(255, 160, 0, 0.05) 74% 82%, transparent 82%),
        linear-gradient(145deg, rgba(255,255,255,0.05) 0 45%, rgba(0,0,0,0.006) 45% 100%);
      /* JobWorker Details: full viewport when open */
      --jw-details-modal-width: 100%;
      --jw-details-modal-max-h: 100%;
      /* Modal title bar + footer strip (neutral grey, not blue-tinted) */
      --jw-modal-chrome-bg: linear-gradient(180deg, #e6e8ee 0%, #d6d9e1 100%);
      /* Ledger entry grid (DATE / Metal / …) — softer than slate-400 */
      --lc-grid-border: #d1dae6;
    }

    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      background: #fff;
      color: var(--text);
    }

    .app {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0;
    }

    /* Full-screen page shell (title + table fill viewport) */
    .app.jobworker-balance-page {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      max-height: 100vh;
      min-height: 0;
      overflow: hidden;
      background: #fff;
      border: none;
      box-shadow: none;
    }

    .workspace .app.jobworker-balance-page,
    .workspace[data-page] .app.jobworker-balance-page {
      height: 100%;
      max-height: none;
      flex: 1 1 auto;
    }

    .jobworker-balance-page > .ledger-page-titlebar.jw-page-titlebar-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      column-gap: 10px;
      text-align: initial;
      background: #f4f6f8;
      color: #1a3a5c;
      padding: 6px 12px;
      font-size: 14px;
      font-weight: 700;
      border-bottom: 1px solid #a8b4c4;
      margin: 0;
      letter-spacing: 0.02em;
      border-radius: 0;
      flex-shrink: 0;
    }

    .workspace[data-page] .app.jobworker-balance-page > .ledger-page-titlebar.jw-page-titlebar-grid:first-child {
      border-radius: 0;
    }

    .jw-page-titlebar-grid .jw-titlebar-left {
      grid-column: 1;
      justify-self: start;
      min-width: 0;
    }

    .jw-page-titlebar-grid .jw-titlebar-heading {
      grid-column: 2;
      justify-self: center;
      text-align: center;
      margin: 0;
      font-size: inherit;
      font-weight: inherit;
    }

    .jw-page-titlebar-grid .jw-titlebar-right {
      grid-column: 3;
      justify-self: end;
      min-width: 0;
    }

    .jobworker-balance-page > .box {
      flex: 1 1 auto;
      min-height: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      border: none;
      border-radius: 0;
      border-top: none;
      box-shadow: none;
      padding: 6px 10px 8px;
      background: #fff !important;
      background-image: none !important;
    }

    .box {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 16px;
    }

    .jobworker-balance-page .list-table-wrap {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      border: none;
      border-top: 1px solid #a8b4c4;
      border-radius: 0;
      background: #fff !important;
      background-image: none !important;
    }

    .box-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .list-table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    /* Balance list — Excel grid (rows / columns only) */
    .list-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
    }

    #jwBalanceTable.list-table,
    .list-table#jwBalanceTable {
      width: 100%;
      min-width: max-content;
      border-collapse: collapse;
      border-spacing: 0;
      font-size: 12px;
      table-layout: fixed;
      background: #fff;
    }

    #jwBalanceTable thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #jwBalanceTable th,
    #jwBalanceTable td {
      padding: 4px 7px;
      text-align: left;
      border: 1px solid var(--grid-border);
      vertical-align: middle;
      font-weight: 400;
    }

    #jwBalanceTable th {
      background: var(--header-bg) !important;
      color: #1a3a5c !important;
      font-weight: 700 !important;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      white-space: nowrap;
      box-shadow: 0 1px 0 var(--border);
    }

    #jwBalanceTable tbody td {
      color: #000;
      font-size: 12px;
    }

    #jwBalanceTable tbody tr:hover {
      background: #eaf7ed !important;
    }

    #jwBalanceTable tbody tr:hover td {
      border-color: #c8e6c9;
    }

    #jwBalanceTable .col-mark {
      width: 40px;
      text-align: center;
    }

    #jwBalanceTable .col-id {
      width: 120px;
    }

    #jwBalanceTable .col-name {
      width: 130px;
    }

    #jwBalanceTable .col-lf {
      width: 48px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    #jwBalanceTable .col-relation {
      width: 140px;
    }

    #jwBalanceTable .col-station {
      width: 100px;
    }

    #jwBalanceTable .col-num {
      width: 72px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .empty-list {
      text-align: center;
      padding: 32px;
      color: var(--muted);
    }

    .search-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
      flex-wrap: nowrap;
      flex-shrink: 0;
    }

    .jobworker-balance-page #balanceEmpty {
      flex-shrink: 0;
    }

    .search-wrap #searchInput {
      flex: 1;
      min-width: 120px;
      max-width: 280px;
      height: 26px;
      min-height: 26px;
      padding: 3px 8px;
      border-radius: 3px;
      border: 1px solid #a8b4c4;
      font-size: 12px;
      font-weight: 400;
      background: #fff;
      color: #1a3a5c;
      box-sizing: border-box;
    }

    .search-wrap #searchInput::placeholder {
      color: #6b7a95;
    }

    .search-wrap #searchInput:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
    }

    .search-wrap #balanceFilter {
      height: 26px;
      min-height: 26px;
      min-width: 120px;
      max-width: 150px;
      padding: 3px 24px 3px 8px;
      border-radius: 3px;
      border: 1px solid #a8b4c4;
      font-size: 12px;
      font-weight: 400;
      background: #fff;
      cursor: pointer;
      color: #1a3a5c;
      box-sizing: border-box;
    }

    .search-wrap #balanceFilter:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
    }

    .search-wrap .jw-balance-select-all-btn {
      height: 26px;
      min-height: 26px;
      padding: 0 10px;
      border: 1px solid #a8b4c4;
      border-radius: 3px;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      color: #1a3a5c;
      cursor: pointer;
      white-space: nowrap;
      box-sizing: border-box;
    }

    .search-wrap .jw-balance-select-all-btn:hover:not(:disabled) {
      background: #d6e4f4;
      border-color: #7a8da6;
    }

    .search-wrap .jw-balance-select-all-btn:disabled {
      background: #f4f6f8;
      border-color: #d4d4d4;
      color: #9aa0a6;
      cursor: not-allowed;
    }

    #jwBalanceTable .balance-mark,
    .list-table .balance-mark {
      cursor: pointer;
      width: 16px;
      height: 16px;
    }

    /* ── JW CLICKABLE NAME ── */
    .jw-link {
      color: #00508c;
      font-weight: 700;
      cursor: pointer;
      text-decoration: underline dotted;
      text-underline-offset: 3px;
      transition: color 0.15s;
    }

    .jw-link:hover {
      color: #0070d8;
      text-decoration: underline solid;
    }

    /* ── LEDGER CARD MODAL — Excel style (JobWorker Details) ── */
    .lc-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #e6ebf2;
      z-index: 9100;
      align-items: stretch;
      justify-content: stretch;
      padding: 0;
    }

    .lc-overlay.open {
      display: flex;
    }

    .lc-modal {
      --lc-r-outer: 0;
      --lc-r-inner: 8px;
      --lc-r-btn: 6px;
      font-family: Calibri, "Segoe UI", Arial, sans-serif;
      background: #fff;
      width: 100%;
      max-width: 100%;
      height: 100%;
      max-height: 100%;
      min-height: 0;
      border-radius: 0;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: none;
      flex: 1 1 auto;
      animation: jwPop 0.15s ease;
    }

    .workspace .lc-overlay.open .lc-modal {
      height: 100%;
      max-height: 100%;
    }

    @keyframes jwPop {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* header: title centred; close sits top-right without shifting title */
    .lc-hdr {
      position: relative;
      background: #f4f6f8;
      border-bottom: 1px solid #a8b4c4;
      padding: 6px 44px 6px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: 0;
    }

    .lc-hdr-title {
      font-weight: 700;
      font-size: 14px;
      color: #1a3a5c;
      text-align: center;
      margin: 0;
    }

    .lc-hdr-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #64748b;
    }

    .lc-hdr-val {
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
    }

    /* Worker info — one-line Excel bar above the ledger table */
    .lc-worker-meta {
      flex-shrink: 0;
      padding: 4px 10px;
      background: #eef1f5;
      border-bottom: 1px solid #a8b4c4;
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      gap: 16px;
    }

    .lc-worker-meta-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 5px;
      line-height: 1.25;
      white-space: nowrap;
    }

    .lc-worker-meta-row:not(:last-child) {
      padding-right: 16px;
      border-right: 1px solid #d4d4d4;
    }

    .lc-worker-meta-label {
      font-size: 10px;
      font-weight: 700;
      color: #1a3a5c;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    .lc-worker-meta-row .lc-hdr-val {
      font-size: 12px;
      font-weight: 600;
      color: #000;
    }

    .lc-close {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      margin-left: 0;
      width: 26px;
      height: 26px;
      border: 1px solid #a8b4c4;
      background: #fff;
      border-radius: var(--lc-r-btn);
      cursor: pointer;
      font-size: 14px;
      color: #1a3a5c;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .lc-close:hover {
      background: #fef2f2;
      color: #b91c1c;
      border-color: #e57373;
    }

    /* Ledger: body fills modal (like dashboard workspace); table scrolls inside */
    .lc-body {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .lc-table-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
    }

    .lc-total-wrap {
      flex-shrink: 0;
      background: #f0fdf4;
      border-top: 1px solid #a8b4c4;
      box-shadow: none;
    }

    /* Ledger grid — Excel cell borders */
    .lc-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      table-layout: fixed;
      border: 1px solid #a8b4c4;
      background: #fff;
    }

    .lc-table-total {
      margin: 0;
    }

    /* Ledger modal table — Excel grid (rows / columns only) */
    .lc-table th {
      background: #d6e4f4 !important;
      color: #1a3a5c !important;
      font-weight: 700;
      padding: 5px 7px;
      text-align: left;
      border: 1px solid #a8b4c4;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      position: sticky;
      top: 0;
      z-index: 2;
      white-space: nowrap;
      box-shadow: 0 1px 0 #a8b4c4;
    }

    .lc-table th.num {
      text-align: right;
    }

    .lc-table td {
      padding: 0;
      border: 1px solid #d4d4d4;
      color: #000;
      vertical-align: middle;
      font-size: 12px;
      font-weight: 400;
    }

    /* Entry rows: no inner padding so inputs fill the cell — avoids “double box” with td + input borders */
    .lc-table .lc-entry-row>td {
      padding: 0;
      vertical-align: middle;
    }

    .lc-table tbody tr:not(.lc-entry-row):hover {
      background: #eaf7ed;
    }

    .lc-table tbody tr:not(.lc-entry-row):hover td {
      border-color: #c8e6c9;
    }

    .lc-table tbody tr.lc-entry-row:hover {
      background: transparent;
    }

    .lc-table tbody tr.lc-entry-row:hover .lc-input:not(:focus) {
      background: #eaf7ed;
    }

    .lc-table .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 400;
    }

    .lc-table .num-val {
      color: #166534;
      font-weight: 600;
    }

    .lc-table .num-zero {
      color: #6b7a95;
    }

    .lc-table .tot-row td {
      background: #f0fdf4 !important;
      font-weight: 700;
      font-size: 12px;
      padding: 5px 7px !important;
      border-color: #a8b4c4;
    }

    .lc-table .tot-row td.tot-label {
      text-align: left;
    }

    .lc-table .tot-row td.num {
      text-align: right;
    }

    .lc-empty {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
      font-size: 14px;
    }

    /* footer stats — Excel toolbar strip */
    .lc-footer {
      border-top: 1px solid #a8b4c4;
      padding: 6px 10px;
      background: #f4f6f8;
      display: flex;
      align-items: center;
      gap: 10px 16px;
      flex-wrap: wrap;
      flex-shrink: 0;
      margin-top: auto;
      border-radius: 0;
    }

    .lc-stat {
      font-size: 11px;
      color: #3c4043;
      font-weight: 600;
      line-height: 1.25;
      white-space: nowrap;
    }

    .lc-stat strong {
      color: #1a3a5c;
      font-size: 12px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      margin-left: 3px;
    }

    .lc-purity {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: #3c4043;
    }

    .lc-purity input {
      width: 52px;
      height: 26px;
      min-height: 26px;
      padding: 3px 6px;
      border: 1px solid #a8b4c4;
      border-radius: var(--lc-r-btn);
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      color: #1a3a5c;
      background: #fff;
    }

    .lc-purity input:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
    }

    .lc-btns {
      margin-left: auto;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .lc-btn {
      height: 26px;
      min-height: 26px;
      padding: 0 10px;
      border-radius: var(--lc-r-btn);
      border: 1px solid #a8b4c4;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      color: #1a3a5c;
      box-shadow: none;
    }

    .lc-btn:hover {
      background: #d6e4f4;
      border-color: #7a8da6;
      color: #1a3a5c;
    }

    .lc-btn.primary {
      background: #f0fdf4;
      color: #166534;
      border-color: #6aae6a;
    }

    .lc-btn.primary:hover {
      background: #dcfce7;
      border-color: #4d9a4d;
      color: #14532d;
    }

    .lc-btn.danger {
      background: #fef2f2;
      color: #b91c1c;
      border-color: #e57373;
    }

    .lc-btn.danger:hover {
      background: #fee2e2;
      border-color: #dc2626;
      color: #991b1b;
    }

    /* Editable cells — fill grid cell, Excel active-cell focus */
    .lc-input {
      width: 100%;
      box-sizing: border-box;
      border: none;
      background: #fff;
      padding: 4px 7px;
      min-height: 28px;
      font-size: 12px;
      line-height: 1.25;
      font-family: inherit;
      color: #000;
      border-radius: 0;
      transition: background 0.12s;
    }

    .lc-input:focus {
      background: #fff;
      outline: 2px solid #1a73e8;
      outline-offset: -2px;
    }

    .lc-input:focus-visible {
      outline: 2px solid #1a73e8;
      outline-offset: -2px;
    }

    .lc-input.num-val {
      text-align: right;
      color: #166534;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .lc-input.date-val {
      width: 100%;
      min-width: 0;
    }

    /* Hide number input arrows */
    .lc-input::-webkit-outer-spin-button,
    .lc-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      appearance: none;
      margin: 0;
    }

    .lc-input[type=number] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    /* Delete Row button */
    .lc-row-del {
      background: transparent;
      border: none;
      color: #b91c1c;
      font-size: 14px;
      cursor: pointer;
      padding: 0 6px;
      min-height: 28px;
      opacity: 0.45;
      transition: background 0.15s, opacity 0.15s;
      margin-left: 0;
      border-radius: var(--lc-r-btn);
      flex-shrink: 0;
    }

    .lc-row-del:hover {
      opacity: 1;
      transform: none;
      background: #fee2e2;
    }

    .lc-narr-cell {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 0;
      padding: 0 !important;
    }

    .lc-narr-cell .lc-narr-input {
      flex: 1;
      min-width: 0;
    }
  </style>
</head>

<body>
  <div class="app jobworker-balance-page">
    <div class="ledger-page-titlebar jw-page-titlebar-grid">
      <div class="jw-titlebar-left" aria-hidden="true"></div>
      <span class="jw-titlebar-heading">Jobworker Balance</span>
      <div class="jw-titlebar-right" aria-hidden="true"></div>
    </div>

    <div class="box">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search by name, id, LF, station..." oninput="filterTable()">
      <select id="balanceFilter" onchange="filterTable()">
        <option value="all">All Balances</option>
        <option value="non-zero">Non-Zero Balance</option>
        <option value="zero">Zero Balance</option>
      </select>
      <button type="button" class="jw-balance-select-all-btn" id="jwBalanceSelectAllBtn" onclick="toggleSelectAllMarksClick()" disabled
        title="Tick or untick all visible rows">Select all</button>
    </div>
    <div class="list-table-wrap">
      <table id="jwBalanceTable" class="list-table">
        <thead>
          <tr>
            <th class="col-mark">Mark</th>
            <th class="col-id">Jobworker Id</th>
            <th class="col-name">Name</th>
            <th class="col-lf">LF</th>
            <th class="col-relation">Relation with Name</th>
            <th class="col-station">Station</th>
            <th class="col-num">Metal</th>
            <th class="col-num">Chain</th>
            <th class="col-num">Nag</th>
            <th class="col-num">Maal</th>
          </tr>
        </thead>
        <tbody id="balanceTableBody"></tbody>
      </table>
    </div>
    <div id="balanceEmpty" class="empty-list" style="display:none;">No balance rows.</div>
  </div>

  <!-- LEDGER CARD MODAL -->
  <div class="lc-overlay" id="lcOverlay">

      <!-- Header: title + close -->
      <div class="lc-hdr">
        <span class="lc-hdr-title">JobWorker Details</span>

      <!-- Entries scroll; Total row pinned to bottom of this block -->
      <div class="lc-body">
        <div class="lc-worker-meta">
          <div class="lc-worker-meta-row">
            <span class="lc-worker-meta-label">Name :</span>
            <span class="lc-hdr-val" id="lcName">—</span>
          </div>
          <div class="lc-worker-meta-row">
            <span class="lc-worker-meta-label">Station :</span>
            <span class="lc-hdr-val" id="lcStation">—</span>
          </div>
          <div class="lc-worker-meta-row">
            <span class="lc-worker-meta-label">LF NO. :</span>

        <div class="lc-total-wrap">
          <table class="lc-table lc-table-total">
            <colgroup>
              <col style="width:11%">
              <col style="width:10%">
              <col style="width:10%">
              <col style="width:10%">
              <col style="width:10%">
              <col>
            </colgroup>

              <tr id="lcTotalRow" class="tot-row" aria-label="Column totals">
                <td class="tot-label"><strong>Total</strong></td>
                <td class="num"><strong id="lcTotM">0.000</strong></td>
                <td class="num"><strong id="lcTotC">0.000</strong></td>
                <td class="num"><strong id="lcTotN">0.000</strong></td>

            oninput="lcUpdateNet()"> %</div>

        <div class="lc-stat">Pending: <strong id="lcPending">0.000</strong></div>

  <script>
    (function () {
      var STORE_KEY = 'jobworkerBalances';

      function getBalances() {
        return JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
      }

      function saveBalances(list) {
        localStorage.setItem(STORE_KEY, JSON.stringify(list));
      }



      function toggleMark(id) {
        var list = getBalances();
        var r = list.filter(function (x) { return x.id === id || String(x.id) === String(id); })[0];
        if (r) { r.mark = !r.mark; saveBalances(list); loadTable(); }
      }

      var _allRows = [];

      function num(v) {
        var n = parseFloat(v);
        return Number.isFinite(n) ? n : 0;
      }

      /** Resolve jobworkers[] row for a balance row or modal context (id or jwId string or name). */
      function findJwRecord(jws, jwIdStr, jwNameStr) {
        var idStr = String(jwIdStr || '').trim();
        var nn = String(jwNameStr || '').trim().toLowerCase();
        if (!jws || !jws.length) return null;
        if (idStr) {
          var by = jws.filter(Boolean).find(function (j) {
            return String(j.id) === idStr || String(j.jwId || '').trim() === idStr;
          });
          if (by) return by;
        }
        if (nn) {
          return jws.filter(Boolean).find(function (j) {
            return String(j.name || '').trim().toLowerCase() === nn;
          }) || null;
        }
        return null;
      }

      /**
       * Same rows as Job Worker Details modal: entries linked by jobworkerId (numeric id or jwId string) or name.
       * Totals match lcComputeTotals (sum of Metal / Chain / Nag / Maal columns only — no opening balance).
       */
      function filterEntriesForWorker(entries, jw, jwIdStr, jwNameStr) {
        var idStr = String(jwIdStr || '').trim();
        var nn = String(jwNameStr || '').trim().toLowerCase();
        var jn = jw && String(jw.name || '').trim().toLowerCase();
        return (entries || []).filter(function (e) {
          if (!e) return false;
          if (idStr && String(e.jobworkerId || '') === idStr) return true;
          if (jw && jw.id != null && String(e.jobworkerId || '') === String(jw.id)) return true;
          if (jw && jw.jwId && String(e.jobworkerId || '').trim() === String(jw.jwId).trim()) return true;
          if (nn && String(e.jobworkerName || '').trim().toLowerCase() === nn) return true;
          if (jn && String(e.jobworkerName || '').trim().toLowerCase() === jn) return true;
          return false;
        });
      }

      function ledgerColumnTotalsFromEntries(entries, jw, jwIdStr, jwNameStr) {
        var list = filterEntriesForWorker(entries, jw, jwIdStr, jwNameStr);
        var sumM = 0, sumC = 0, sumN = 0, sumMl = 0;
        list.forEach(function (e) {
          sumM += num(e.metal); sumC += num(e.chain); sumN += num(e.nag); sumMl += num(e.maal);
        });
        return { metal: sumM, chain: sumC, nag: sumN, maal: sumMl };
      }

      /** Add balance rows for job workers that are not yet in jobworkerBalances (legacy + new saves). */
      function reconcileMissingJobworkerRows() {
        var jws = JSON.parse(localStorage.getItem('jobworkers') || '[]');
        var bals = JSON.parse(localStorage.getItem('jobworkerBalances') || '[]');
        var entries = JSON.parse(localStorage.getItem('jobworkerEntries') || '[]');
        var changed = false;
        jws.forEach(function (jw) {
          if (!jw) return;
          var jwId = (jw.jwId || '').trim();
          var jwName = (jw.name || '').trim();
          var exists = bals.some(function (b) {
            return (jwId && String(b.jwId) === String(jwId)) ||
              (jwName && (b.name || '').trim().toLowerCase() === jwName.toLowerCase());
          });
          if (exists) return;
          var t = ledgerColumnTotalsFromEntries(entries, jw, jwId, jwName);
          var relation = [jw.relationType, jw.relationName].filter(Boolean).join(' ').trim();
          bals.push({
            id: Date.now() + Math.random(),
            mark: false,
            jwId: jw.jwId || '',
            name: jw.name || '',
            lfNo: jw.lfNo || '',
            relation: relation,
            station: jw.station || '',
            metal: t.metal,
            chain: t.chain,
            nag: t.nag,
            maal: t.maal
          });
          changed = true;
        });
        if (changed) {
          try { localStorage.setItem(STORE_KEY, JSON.stringify(bals)); } catch (e) { }
        }
      }

      function renderTable(rows) {
        var tbody = document.getElementById('balanceTableBody');
        var emptyEl = document.getElementById('balanceEmpty');
        if (!tbody) return;

        if (rows.length === 0) {
          tbody.innerHTML = '';
          if (emptyEl) emptyEl.style.display = 'block';
          return;
        }
        if (emptyEl) emptyEl.style.display = 'none';

        tbody.innerHTML = rows.map(function (r) {
          var id = r.id != null ? r.id : '';
          var markChecked = r.mark ? ' checked' : '';
          var safeId = (r.jwId || '').replace(/'/g, "\\'");
          var safeName = (r.name || '').replace(/'/g, "\\'");
          return '<tr style="cursor:pointer;" onclick="roOpenJwModal(\'' + safeId + '\', \'' + safeName + '\')">' +
            '<td class="col-mark" onclick="event.stopPropagation()"><input type="checkbox" class="balance-mark" aria-label="Mark"' + markChecked + ' onclick="toggleMark(\'' + id + '\'); event.stopPropagation()"></td>' +
            '<td class="col-id">' + (r.jwId || '—') + '</td>' +
            '<td class="col-name"><span class="jw-link">' + (r.name || '—') + '</span></td>' +
            '<td class="col-lf">' + (r.lfNo || '—') + '</td>' +
            '<td class="col-relation">' + (r.relation || '—') + '</td>' +
            '<td class="col-station">' + (r.station || '—') + '</td>' +
            '<td class="col-num">' + (r.metal != null ? Number(r.metal).toFixed(3) : '—') + '</td>' +
            '<td class="col-num">' + (r.chain != null ? Number(r.chain).toFixed(3) : '—') + '</td>' +
            '<td class="col-num">' + (r.nag != null ? Number(r.nag).toFixed(3) : '—') + '</td>' +
            '<td class="col-num">' + (r.maal != null ? Number(r.maal).toFixed(3) : '—') + '</td>' +
            '</tr>';
        }).join('');
      }

      function getFilteredRows() {
        var q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
        var balFilter = document.getElementById('balanceFilter') ? document.getElementById('balanceFilter').value : 'all';

        return _allRows.filter(function (r) {
          var matchSearch = !q || (
            (r.jwId || '').toLowerCase().indexOf(q) !== -1 ||
            (r.name || '').toLowerCase().indexOf(q) !== -1 ||
            (r.lfNo || '').toLowerCase().indexOf(q) !== -1 ||
            (r.relation || '').toLowerCase().indexOf(q) !== -1 ||
            (r.station || '').toLowerCase().indexOf(q) !== -1
          );

          var m = parseFloat(r.metal) || 0;
          var c = parseFloat(r.chain) || 0;
          var n = parseFloat(r.nag) || 0;
          var ml = parseFloat(r.maal) || 0;

          function nearlyZero(x) { return Math.abs(x) < 1e-6; }
          var isZero = nearlyZero(m) && nearlyZero(c) && nearlyZero(n) && nearlyZero(ml);

          var matchBal = true;
          if (balFilter === 'zero') matchBal = isZero;
          else if (balFilter === 'non-zero') matchBal = !isZero;

          return matchSearch && matchBal;
        });
      }

      function syncSelectAllMarksButton(rows) {
        var btn = document.getElementById('jwBalanceSelectAllBtn');
        if (!btn) return;
        rows = rows || getFilteredRows();
        if (!rows.length) {
          btn.disabled = true;
          btn.textContent = 'Select all';
          return;
        }
        btn.disabled = false;
        var allMarked = rows.every(function (r) { return !!r.mark; });
        btn.textContent = allMarked ? 'Unselect all' : 'Select all';
      }

      function toggleSelectAllMarksClick() {
        var rows = getFilteredRows();
        if (!rows.length) return;
        var allMarked = rows.every(function (r) { return !!r.mark; });
        var nextMark = !allMarked;
        var idSet = {};
        rows.forEach(function (r) {
          if (r.id != null) idSet[String(r.id)] = true;
        });
        var list = getBalances();
        list.forEach(function (r) {
          if (r && idSet[String(r.id)]) r.mark = nextMark;
        });
        saveBalances(list);
        loadTable();
      }

      function filterTable() {
        var rows = getFilteredRows();
        renderTable(rows);
        syncSelectAllMarksButton(rows);
      }

      function loadTable() {
        reconcileMissingJobworkerRows();
        var entries = JSON.parse(localStorage.getItem('jobworkerEntries') || '[]');
        var jws = JSON.parse(localStorage.getItem('jobworkers') || '[]');
        _allRows = getBalances().map(function (r) {
          if (!r) return r;
          var jw = findJwRecord(jws, r.jwId, r.name);
          var t = ledgerColumnTotalsFromEntries(entries, jw, r.jwId, r.name);
          return {
            id: r.id,
            mark: !!r.mark,
            jwId: r.jwId,
            name: r.name,
            lfNo: r.lfNo,
            relation: r.relation,
            station: r.station,
            metal: t.metal,
            chain: t.chain,
            nag: t.nag,
            maal: t.maal
          };
        });
        filterTable();
      }

      // Expose for inline oninput/onchange (required when script runs inside IIFE / dashboard loadPage)
      window.filterTable = filterTable;
      window.loadJobworkerBalanceTable = loadTable;
      window.toggleMark = toggleMark;
      window.toggleSelectAllMarksClick = toggleSelectAllMarksClick;

      loadTable();
      window.addEventListener('storage', function (e) {
        if (e.key === STORE_KEY) loadTable();
      });
      window.addEventListener('jobworkerBalancesUpdated', function () {
        loadTable();
      });

      /* =========================
         LEDGER CARD MODAL
      ========================= */
      var _lcJwId = null;
      var _lcJwName = null;
      var _lcEntries = [];

      function lcFmt(v) { return v || ''; }
      function lcFmtNum(v) { v = parseFloat(v); return Number.isFinite(v) && v !== 0 ? v.toFixed(3) : ''; }

      // Sync JW balance: Metal/Chain/Nag/Maal = same sums as Job Worker Details total row (entries only).
      function lcSyncToBalance() {
        var entries = JSON.parse(localStorage.getItem('jobworkerEntries') || '[]');
        var jws = JSON.parse(localStorage.getItem('jobworkers') || '[]');
        var jw = findJwRecord(jws, _lcJwId, _lcJwName) || {};
        var t = ledgerColumnTotalsFromEntries(entries, jw, _lcJwId, _lcJwName);

        var bals = JSON.parse(localStorage.getItem('jobworkerBalances') || '[]');
        var bIdx = bals.findIndex(function (b) {
          return (_lcJwId != null && _lcJwId !== '' && String(b.jwId) === String(_lcJwId)) ||
            (_lcJwName && (b.name || '').trim().toLowerCase() === (_lcJwName || '').trim().toLowerCase());
        });

        var relation = [jw.relationType, jw.relationName].filter(Boolean).join(' ').trim();

        if (bIdx >= 0) {
          bals[bIdx].metal = t.metal;
          bals[bIdx].chain = t.chain;
          bals[bIdx].nag = t.nag;
          bals[bIdx].maal = t.maal;
          bals[bIdx].relation = relation;
          bals[bIdx].station = jw.station || bals[bIdx].station || '';
          bals[bIdx].lfNo = jw.lfNo != null ? String(jw.lfNo) : (bals[bIdx].lfNo || '');
        } else {
          bals.push({
            id: Date.now(), mark: false, jwId: jw.jwId || '', name: jw.name || _lcJwName, lfNo: jw.lfNo || '',
            relation: relation, station: jw.station || '', metal: t.metal, chain: t.chain, nag: t.nag, maal: t.maal
          });
        }
        localStorage.setItem('jobworkerBalances', JSON.stringify(bals));
      }

      function lcBuildRowHtml(e, isLast) {
        var safeNarration = (e.narration || '').replace(/"/g, '&quot;');
        return '<tr class="lc-entry-row">' +
          '<td><input type="date" class="lc-input date-val" value="' + (e.date || '') + '" oninput="lcComputeTotals()" onkeydown="lcEntryKeydown(event, this)"></td>' +
          '<td><input type="number" step="0.001" class="lc-input num-val" value="' + lcFmtNum(e.metal) + '" oninput="lcComputeTotals()" onkeydown="lcEntryKeydown(event, this)"></td>' +
          '<td><input type="number" step="0.001" class="lc-input num-val" value="' + lcFmtNum(e.chain) + '" oninput="lcComputeTotals()" onkeydown="lcEntryKeydown(event, this)"></td>' +
          '<td><input type="number" step="0.001" class="lc-input num-val" value="' + lcFmtNum(e.nag) + '" oninput="lcComputeTotals()" onkeydown="lcEntryKeydown(event, this)"></td>' +
          '<td><input type="number" step="0.001" class="lc-input num-val" value="' + lcFmtNum(e.maal) + '" oninput="lcComputeTotals()" onkeydown="lcEntryKeydown(event, this)"></td>' +
          '<td class="lc-narr-cell">' +
          '<input type="text" class="lc-input lc-narr-input" value="' + safeNarration + '" onkeydown="lcEntryKeydown(event, this)">' +
          '<button type="button" class="lc-row-del" onclick="lcDelRow(this)" title="Remove Row">&#x2715;</button>' +
          '</td>' +
          '</tr>';
      }

      window.lcDelRow = function (btn) {
        if (!confirm("Are you sure you want to remove this row? The changes will be permanently applied when you Save and Close.")) return;
        var row = btn.closest('tr');
        row.remove();
        lcComputeTotals();
      };

      window.roOpenJwModal = function (jwId, jwName) {
        _lcJwId = jwId;
        _lcJwName = jwName;

        // Find jw record
        var jws = JSON.parse(localStorage.getItem('jobworkers') || '[]');
        var jw = jws.find(function (j) {
          return String(j.id) === String(jwId) || String(j.jwId) === String(jwId);
        }) || jws.find(function (j) {
          return (j.name || '').trim().toLowerCase() === (jwName || '').trim().toLowerCase();
        }) || null;

        // Fill header
        document.getElementById('lcLfNo').textContent = jw ? (jw.lfNo || '—') : '—';
        document.getElementById('lcName').textContent = jw ? (jw.name || jwName || '—') : (jwName || '—');
        document.getElementById('lcStation').textContent = jw ? (jw.station || '—') : '—';

        // Load entries
        var allEntries = JSON.parse(localStorage.getItem('jobworkerEntries') || '[]');
        _lcEntries = allEntries.filter(function (e) {
          return (jwId && String(e.jobworkerId) === String(jwId)) ||
            (e.jobworkerName || '').trim().toLowerCase() === (jwName || '').trim().toLowerCase();
        }).sort(function (a, b) { return (a.date || '') < (b.date || '') ? -1 : 1; });

        // Render entries
        var tbody = document.getElementById('lcEntriesBody');
        var rowsHtml = '';
        if (_lcEntries.length) {
          rowsHtml = _lcEntries.map(function (e, idx) { return lcBuildRowHtml(e, false); }).join('');
        }
        // Always provide at least one blank row on load for quick entry
        rowsHtml += lcBuildRowHtml({ date: new Date().toISOString().slice(0, 10) }, true);

        tbody.innerHTML = rowsHtml;
        lcComputeTotals(true);
        document.getElementById('lcOnDate').textContent = new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        document.getElementById('lcOverlay').classList.add('open');
        setTimeout(function () {
          var tb = document.getElementById('lcEntriesBody');
          if (!tb) return;
          var rows = tb.querySelectorAll('.lc-entry-row');
          if (!rows.length) return;
          lcFocusCell(tb, rows.length - 1, 1);
        }, 0);
      };

      window.lcComputeTotals = function (initial) {
        var tbody = document.getElementById('lcEntriesBody');
        if (!tbody) return;
        var rows = tbody.querySelectorAll('.lc-entry-row');
        var totM = 0, totC = 0, totN = 0, totMl = 0;
        rows.forEach(function (tr) {
          var inputs = tr.querySelectorAll('input');
          totM += num(inputs[1].value);
          totC += num(inputs[2].value);
          totN += num(inputs[3].value);
          totMl += num(inputs[4].value);
        });

        var elM = document.getElementById('lcTotM');
        var elC = document.getElementById('lcTotC');
        var elN = document.getElementById('lcTotN');
        var elMl = document.getElementById('lcTotMl');
        if (elM) elM.textContent = totM.toFixed(3);
        if (elC) elC.textContent = totC.toFixed(3);
        if (elN) elN.textContent = totN.toFixed(3);
        if (elMl) elMl.textContent = totMl.toFixed(3);

        // Footer stats (T. Metal / Net / Pending)
        var tMetal = totM - totC - totN;
        document.getElementById('lcTotalMetal').textContent = tMetal.toFixed(3);
        lcUpdateNet();
      };

      function lcGetRowInputs(tr) {
        return Array.prototype.slice.call(tr.querySelectorAll('input')).filter(function (inp) {
          return inp.type !== 'button' && !inp.closest('button');
        });
      }

      function lcFocusCell(tbody, rowIdx, colIdx) {
        var rows = Array.prototype.slice.call(tbody.querySelectorAll('.lc-entry-row'));
        if (rowIdx < 0 || rowIdx >= rows.length) return false;
        var inputs = lcGetRowInputs(rows[rowIdx]);
        if (colIdx < 0 || colIdx >= inputs.length) return false;
        var el = inputs[colIdx];
        el.focus();
        try {
          if (el.select && el.type !== 'date') el.select();
        } catch (err) { }
        return true;
      }

      function lcAppendEntryRow(tbody) {
        var newRow = document.createElement('tr');
        newRow.className = 'lc-entry-row';
        newRow.innerHTML = lcBuildRowHtml({ date: new Date().toISOString().slice(0, 10) }).replace('<tr class="lc-entry-row">', '').replace('</tr>', '');
        tbody.appendChild(newRow);
        lcComputeTotals();
        return newRow;
      }

      /** Enter + arrow keys: Excel-style grid in ledger entries */
      window.lcEntryKeydown = function (e, inputEl) {
        var tr = inputEl.closest('tr');
        var tbody = document.getElementById('lcEntriesBody');
        if (!tr || !tbody || !tr.classList.contains('lc-entry-row')) return;

        var rows = Array.prototype.slice.call(tbody.querySelectorAll('.lc-entry-row'));
        var r = rows.indexOf(tr);
        var inputs = lcGetRowInputs(tr);
        var c = inputs.indexOf(inputEl);
        if (c < 0) return;

        var key = e.key;
        if (key !== 'Enter' && key !== 'ArrowUp' && key !== 'ArrowDown' && key !== 'ArrowLeft' && key !== 'ArrowRight') {
          return;
        }
        if (e.altKey || e.ctrlKey || e.metaKey) return;

        var lastCol = inputs.length - 1;
        var lastRow = rows.length - 1;

        if (key === 'Enter') {
          e.preventDefault();
          if (r < lastRow) {
            lcFocusCell(tbody, r + 1, c);
          } else {
            lcAppendEntryRow(tbody);
            lcFocusCell(tbody, rows.length, c);
          }
          return;
        }

        if (key === 'ArrowRight') {
          e.preventDefault();
          if (c < lastCol) {
            inputs[c + 1].focus();
            try { if (inputs[c + 1].select && inputs[c + 1].type !== 'date') inputs[c + 1].select(); } catch (err2) { }
          } else if (r < lastRow) {
            lcFocusCell(tbody, r + 1, 0);
          } else {
            lcAppendEntryRow(tbody);
            lcFocusCell(tbody, rows.length, 0);
          }
          return;
        }

        if (key === 'ArrowLeft') {
          e.preventDefault();
          if (c > 0) {
            inputs[c - 1].focus();
            try { if (inputs[c - 1].select && inputs[c - 1].type !== 'date') inputs[c - 1].select(); } catch (err3) { }
          } else if (r > 0) {
            lcFocusCell(tbody, r - 1, lastCol);
          }
          return;
        }

        if (key === 'ArrowDown') {
          e.preventDefault();
          if (r < lastRow) {
            lcFocusCell(tbody, r + 1, c);
          } else {
            lcAppendEntryRow(tbody);
            lcFocusCell(tbody, rows.length, c);
          }
          return;
        }

        if (key === 'ArrowUp') {
          e.preventDefault();
          if (r > 0) {
            lcFocusCell(tbody, r - 1, c);
          }
        }
      };

      window.lcHandleEnter = window.lcEntryKeydown;

      window.lcClose = function () {
        document.getElementById('lcOverlay').classList.remove('open');
      };

      /* Esc closes JobWorker Details modal (same as ×) when overlay is open */
      (function initLcOverlayEscape() {
        if (window.__lcOverlayEscapeBound) return;
        window.__lcOverlayEscapeBound = true;
        document.addEventListener('keydown', function (e) {
          if (e.key !== 'Escape') return;
          var ov = document.getElementById('lcOverlay');
          if (!ov || !ov.classList.contains('open')) return;
          e.preventDefault();
          e.stopPropagation();
          if (typeof window.lcClose === 'function') window.lcClose();
        }, true);
      })();

      window.lcUpdateNet = function () {
        var tbody = document.getElementById('lcEntriesBody');
        if (!tbody) return;
        var rows = tbody.querySelectorAll('.lc-entry-row');
        var totM = 0, totC = 0, totN = 0, totMl = 0;
        rows.forEach(function (tr) {
          var inputs = tr.querySelectorAll('input');
          if (inputs && inputs.length >= 5) {
            totM += num(inputs[1].value);
            totC += num(inputs[2].value);
            totN += num(inputs[3].value);
            totMl += num(inputs[4].value);
          }
        });
        var purity = parseFloat(document.getElementById('lcPurity').value) || 100;
        // T. Metal = Total Maal − (Total Chain + Total Nag)
        var tMetal = totMl - (totC + totN);
        // Net Wt logic:
        // Value1 = (Chain + Nag) × Purity%
        // Value2 = Maal × Purity%
        // Net Wt = Value2 − Value1
        var value1 = (totC + totN) * (purity / 100);
        var value2 = totMl * (purity / 100);
        var netWt = value2 - value1;
        // Pending = Total Metal + Value1 − Value2
        var pending = totM + value1 - value2;
        document.getElementById('lcPending').textContent = pending.toFixed(3);
        document.getElementById('lcNet').textContent = netWt.toFixed(3);
        document.getElementById('lcTotalMetal').textContent = tMetal.toFixed(3);
      };

      window.lcSaveAndClose = function () {
        var tbody = document.getElementById('lcEntriesBody');
        var rows = tbody.querySelectorAll('.lc-entry-row');

        // Remove all previous entries for this Jobworker
        var allEntries = JSON.parse(localStorage.getItem('jobworkerEntries') || '[]');
        allEntries = allEntries.filter(function (e) {
          return !((_lcJwId && String(e.jobworkerId) === String(_lcJwId)) ||
            (e.jobworkerName || '').trim().toLowerCase() === (_lcJwName || '').trim().toLowerCase());
        });

        // Add the new entries from the table
        rows.forEach(function (tr) {
          var inputs = tr.querySelectorAll('input');
          var date = inputs[0].value;
          var m = num(inputs[1].value);
          var c = num(inputs[2].value);
          var n = num(inputs[3].value);
          var ml = num(inputs[4].value);
          var narr = inputs[5].value.trim();

          if (m === 0 && c === 0 && n === 0 && ml === 0 && narr === '') return; // Skip completely blank rows

          allEntries.push({
            id: Date.now() + Math.random(),
            jobworkerId: _lcJwId || Date.now(),
            jobworkerName: _lcJwName || 'Unknown',
            date: date || new Date().toISOString().slice(0, 10),
            metal: m, chain: c, nag: n, maal: ml, narration: narr,
            createdAt: new Date().toISOString()
          });
        });

        localStorage.setItem('jobworkerEntries', JSON.stringify(allEntries));
        lcSyncToBalance();
        loadTable();
        lcClose();
      };

      window.lcClearAccount = function () {
        if (!confirm('Remove all entry rows and leave one empty row? Click Save And Close to update stored data.')) return;
        var tbody = document.getElementById('lcEntriesBody');
        if (!tbody) return;
        var today = new Date().toISOString().slice(0, 10);
        tbody.innerHTML = lcBuildRowHtml({ date: today }, true);
        lcComputeTotals();
        setTimeout(function () {
          lcFocusCell(tbody, 0, 0);
        }, 0);
      };

      window.lcPrint = function () { window.print(); };

      // Keep old close refs working
      window.roCloseJwModal = window.lcClose;






    })();
  </script>
  </body>

</html>
