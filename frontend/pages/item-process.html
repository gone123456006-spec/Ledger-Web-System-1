<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Item Process</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* =========================
       BASE
    ========================= */
        * {
            box-sizing: border-box;
            font-family: Segoe UI, Arial, sans-serif;
            font-size: 14px;
        }

        body {
            margin: 0;
            background: #e6ebf2;
        }

        .workspace {
            background: linear-gradient(to bottom, #cde1ff, #e6f1ff) !important;
        }

        /* =========================
       CONTAINER
    ========================= */
        .process-items-wrap {
            margin: 15px;
            background: #fff !important;
            border: 1px solid #d1d6de;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 30px);
            max-height: calc(100vh - 30px);
            overflow: hidden;
            box-sizing: border-box;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            position: relative;
        }

        .workspace .process-items-wrap {
            margin: 0 !important;
            height: 100% !important;
            max-height: 100% !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            background: #fff !important;
            border: none !important;
        }

        /* =========================
       TOOLBAR
    ========================= */
        .process-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            border-bottom: 2px solid #d1d6de;
            background: linear-gradient(to bottom, #fafbfc, #f5f7fa) !important;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .workspace .process-items-wrap .process-toolbar {
            background: linear-gradient(to bottom, #fafbfc, #f5f7fa) !important;
        }

        .process-toolbar h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
            color: #1d1d1f !important;
            flex: 1;
        }

        .sel-pill {
            background: #eaf0ff;
            color: #3a68e8;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 700;
            display: none;
            border: 1px solid #c5d5fb;
        }

        .btn {
            padding: 9px 16px;
            border: 1px solid #d1d6de;
            background: #fff;
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            color: #1d1d1f !important;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: #007aff;
            border-color: #007aff;
            color: #fff !important;
            transform: translateY(-1px);
            box-shadow: 0 2px 4px rgba(0, 122, 255, 0.2);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .btn-ready {
            background: #34c759;
            border-color: #34c759;
            color: #fff !important;
            font-weight: 600;
        }

        .btn-ready:hover:not(:disabled) {
            background: #28a745;
            border-color: #28a745;
            color: #fff !important;
        }

        .btn-ready:disabled {
            background: #a8e0b8;
            border-color: #a8e0b8;
            color: #fff !important;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        input[type="text"] {
            height: 40px;
            padding: 8px 14px;
            border: 1px solid #d1d6de;
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
            transition: all 0.2s;
            min-width: 200px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, .12);
        }

        input[type="text"]::placeholder {
            color: #8e8e93;
        }

        /* =========================
       TABLE
    ========================= */
        .table-wrap {
            flex: 1;
            overflow: auto;
            position: relative;
            min-height: 0;
            box-sizing: border-box;
            background: #fff !important;
        }

        .workspace .process-items-wrap .table-wrap {
            background: #fff !important;
        }

        table {
            width: 100%;
            min-width: 1450px;
            border-collapse: collapse;
            background: #fff !important;
        }

        .workspace .process-items-wrap table {
            background: #fff !important;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #fff !important;
            box-shadow: 0 1px 0 0 #c5c9ce;
        }

        .workspace .process-items-wrap thead {
            background: #fff !important;
        }

        thead th {
            background: linear-gradient(to bottom, #eef1f5, #e4e8ed) !important;
            border: 1px solid #c5c9ce;
            padding: 14px 16px;
            white-space: nowrap;
            font-weight: 600;
            font-size: 13px;
            text-align: left;
            color: #1d1d1f !important;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        thead th.center {
            text-align: center;
        }

        thead th.right {
            text-align: right;
        }

        tbody td {
            padding: 14px 16px;
            border: 1px solid #d1d6de;
            font-size: 14px;
            vertical-align: middle;
            color: #333 !important;
            background: transparent !important;
            line-height: 1.35;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        tbody td.col-item-name,
        tbody td.col-sample {
            max-width: 220px;
            white-space: normal;
            word-break: break-word;
        }

        .workspace .process-items-wrap tbody td {
            color: #333 !important;
            background: transparent !important;
        }

        tbody tr {
            transition: background 0.2s;
            background: #fff !important;
        }

        tbody tr:nth-child(even) {
            background: #f8f9fb !important;
        }

        tbody tr:hover {
            background: #e8f2ff !important;
        }

        tbody tr:hover td {
            border-color: #b8d4f0;
        }

        tbody tr.row-selected {
            background: #eef4ff !important;
        }

        .center {
            text-align: center;
        }

        .right {
            text-align: right;
            font-weight: 500;
            color: #1d1d1f !important;
            font-variant-numeric: tabular-nums;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .badge.process {
            background: #e1f0fa;
            color: #0060a8;
            border: 1px solid #9ccaf0;
        }

        .badge.ready-done {
            background: #d1f2eb;
            color: #0f5132;
            border: 1px solid #a3cfbb;
        }

        /* Checkbox */
        .cb-cell input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #34c759;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .empty-state-subtext {
            font-size: 13px;
            color: #8e8e93;
        }

        /* Footer */
        .footer {
            padding: 12px 20px;
            font-size: 14px;
            color: #6e6e73 !important;
            border-top: 2px solid #d1d6de;
            background: #f5f7fa !important;
            flex-shrink: 0;
            box-sizing: border-box;
            font-weight: 500;
        }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.48);
            backdrop-filter: blur(3px);
            z-index: 9000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #fff;
            width: 440px;
            border-radius: 18px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            animation: pop 0.22s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        @keyframes pop {
            from {
                transform: scale(0.93) translateY(10px);
                opacity: 0;
            }

            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 20px 22px 14px;
            border-bottom: 1px solid #edf0f5;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .modal-header-text h3 {
            font-size: 16px;
            font-weight: 700;
            color: #1a1f2e;
            margin-bottom: 4px;
        }

        .modal-header-text p {
            font-size: 12.5px;
            color: #6b7a95;
            margin: 0;
        }

        .modal-close-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: #f0f2f7;
            border-radius: 7px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7a95;
            transition: all 0.12s;
            flex-shrink: 0;
            font-size: 16px;
        }

        .modal-close-btn:hover {
            background: #e2e5ef;
            color: #1a1f2e;
        }

        .modal-body {
            padding: 16px 22px;
        }

        .modal-body-info {
            background: #f0fff4;
            border: 1px solid #a3cfbb;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: #0f5132;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .modal-item-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e2e7ef;
            border-radius: 8px;
            padding: 6px 0;
        }

        .modal-item-row {
            padding: 8px 14px;
            font-size: 13px;
            color: #374151;
            border-bottom: 1px solid #f0f2f7;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .modal-item-row:last-child {
            border-bottom: none;
        }

        .modal-item-order {
            font-weight: 700;
            color: #2a50d8;
            white-space: nowrap;
        }

        .modal-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            padding: 14px 18px;
            border-top: 1px solid #edf0f5;
            background: #fafbfc;
        }

        .btn-cancel-modal {
            height: 38px;
            padding: 0 18px;
            border: 1px solid #dde3ec;
            background: #fff;
            border-radius: 8px;
            font-family: Segoe UI, Arial, sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #444c5c;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-cancel-modal:hover {
            background: #f5f7fa;
        }

        .btn-confirm-ready {
            height: 38px;
            padding: 0 20px;
            border: none;
            background: #34c759;
            border-radius: 8px;
            font-family: Segoe UI, Arial, sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: all 0.15s;
        }

        .btn-confirm-ready:hover:not(:disabled) {
            background: #28a745;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(52, 199, 89, 0.35);
        }

        .btn-confirm-ready:disabled {
            background: #a8e0b8;
            cursor: not-allowed;
        }

        /* Toast */
        #ipToast {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            z-index: 99999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            white-space: nowrap;
        }

        #ipToast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast-inner {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 13.5px;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            background: #1a2040;
            color: #fff;
        }

        .table-wrap::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        .table-wrap::-webkit-scrollbar-track {
            background: #f0f2f5;
            border-radius: 6px;
        }

        .table-wrap::-webkit-scrollbar-thumb {
            background: #b0b4b8;
            border-radius: 6px;
        }
    </style>
</head>

<body>

    <div class="process-items-wrap">
        <!-- TOOLBAR -->
        <div class="process-toolbar">
            <h2>⚙️ Item Process</h2>
            <span class="sel-pill" id="ipSelPill">0 selected</span>
            <input type="text" id="searchBox" placeholder="🔍 Search by item, job worker, order..."
                onkeyup="ipFilterTable()">
            <button class="btn" onclick="loadProcessItems()">🔄 Refresh</button>
            <button class="btn btn-ready" id="markReadyBtn" onclick="openMarkReadyModal()" disabled>
                ✅ Mark Ready
            </button>
        </div>

        <!-- TABLE -->
        <div class="table-wrap">
            <table id="processItemsTable">
                <thead>
                    <tr>
                        <th class="center cb-cell" style="width:46px;">
                            <input type="checkbox" id="ipSelectAll" onchange="ipToggleAll(this)">
                        </th>
                        <th class="center">Status</th>
                        <th class="right">Qty</th>
                        <th>Item Name</th>
                        <th>Sample Details</th>
                        <th>Design</th>
                        <th class="right">Est. Unit Wt</th>
                        <th class="right">Est. Total Wt</th>
                        <th>Job Worker</th>
                        <th>Assigned Date</th>
                        <th>Order No.</th>
                        <th>Customer</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Filled by JS -->
                </tbody>
            </table>
        </div>

        <div class="footer" id="footerText">No items in process</div>
    </div>

    <!-- MARK READY CONFIRMATION MODAL -->
    <div class="modal-overlay" id="markReadyModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-header-text">
                    <h3>✅ Mark as Ready</h3>
                    <p id="modalSubtitle">The selected orders will be moved to Ready Orders.</p>
                </div>
                <button class="modal-close-btn" onclick="closeMarkReadyModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-body-info" id="modalInfo"></div>
                <div class="modal-item-list" id="modalItemList"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel-modal" onclick="closeMarkReadyModal()">Cancel</button>
                <button class="btn-confirm-ready" id="confirmReadyBtn" onclick="confirmMarkReady()">
                    ✅ Confirm — Mark Ready
                </button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="ipToast">
        <div class="toast-inner" id="ipToastInner"></div>
    </div>

    <script>
        let tbody = null;
        let footer = null;
        let ipToastTimer = null;

        /* ── HELPERS ── */
        function ipGetRoot() {
            const workspace = document.querySelector('.workspace');
            const wrap = workspace ? workspace.querySelector('.process-items-wrap') : null;
            return wrap || document;
        }

        function initElements() {
            const root = ipGetRoot();
            tbody = root.querySelector('#tableBody') || document.getElementById('tableBody');
            footer = root.querySelector('#footerText') || document.getElementById('footerText');
            return !!(tbody && footer);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '—';
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return dateStr;
                return d.toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch (e) { return dateStr; }
        }

        function escapeHtml(str) {
            if (str == null || str === '') return '—';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function showIpToast(msg) {
            const t = document.getElementById('ipToast');
            const i = document.getElementById('ipToastInner');
            if (!t || !i) return;
            i.textContent = msg;
            t.classList.add('show');
            clearTimeout(ipToastTimer);
            ipToastTimer = setTimeout(() => t.classList.remove('show'), 3200);
        }

        /* ── UI STATE ── */
        function ipUpdateUI() {
            const checked = document.querySelectorAll('.ip-row-cb:not(:disabled):checked');
            const n = checked.length;
            const pill = document.getElementById('ipSelPill');
            if (pill) {
                pill.style.display = n > 0 ? 'inline-block' : 'none';
                pill.textContent = n + ' selected';
            }
            const btn = document.getElementById('markReadyBtn');
            if (btn) btn.disabled = n === 0;

            // Update select-all checkbox state
            const all = [...document.querySelectorAll('.ip-row-cb:not(:disabled)')].filter(c => {
                const tr = c.closest('tr');
                return tr && tr.style.display !== 'none';
            });
            const sa = document.getElementById('ipSelectAll');
            if (sa) {
                sa.checked = all.length > 0 && all.every(c => c.checked);
                sa.indeterminate = !sa.checked && all.some(c => c.checked);
            }
        }

        function ipOnCbChange(cb) {
            const tr = cb.closest('tr');
            if (tr) tr.classList.toggle('row-selected', cb.checked);
            ipUpdateUI();
        }

        function ipToggleAll(src) {
            document.querySelectorAll('.ip-row-cb:not(:disabled)').forEach(cb => {
                const tr = cb.closest('tr');
                if (!tr || tr.style.display === 'none') return;
                cb.checked = src.checked;
                ipOnCbChange(cb);
            });
        }

        /* ── LOAD TABLE ── */
        function loadProcessItems() {
            if (!tbody && !initElements()) {
                setTimeout(loadProcessItems, 100);
                return;
            }
            tbody.innerHTML = '';

            try {
                const items = JSON.parse(localStorage.getItem('itemProcess') || '[]');

                if (items.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                          <td colspan="12" style="border:none;">
                            <div class="empty-state">
                              <div class="empty-state-icon">⚙️</div>
                              <div class="empty-state-text">No Items in Process</div>
                              <div class="empty-state-subtext">Items assigned to Job Workers will appear here</div>
                            </div>
                          </td>
                        </tr>`;
                    if (footer) footer.textContent = 'No items in process';
                    ipUpdateUI();
                    return;
                }

                items.forEach((r, idx) => {
                    const isReady = r.status === 'READY';
                    const tr = document.createElement('tr');
                    tr.dataset.search = [r.itemName, r.jobworkerName, r.orderNo, r.customerName, r.design, r.sampleDetails].join(' ').toLowerCase();
                    tr.dataset.processId = r.id;
                    tr.dataset.orderId = r.orderId;
                    if (isReady) tr.classList.add('row-selected');

                    tr.innerHTML = `
                        <td class="center cb-cell">
                            <input type="checkbox" class="ip-row-cb"
                                data-process-id="${escapeHtml(r.id)}"
                                data-order-id="${escapeHtml(r.orderId)}"
                                ${isReady ? 'disabled' : ''}
                                ${isReady ? 'checked' : ''}
                                onchange="ipOnCbChange(this)">
                        </td>
                        <td class="center">
                            ${isReady
                            ? `<span class="badge ready-done">✓ Ready</span>`
                            : `<span class="badge process">In Process</span>`}
                        </td>
                        <td class="right">${(r.qty || 0).toFixed(0)}</td>
                        <td class="col-item-name">${escapeHtml(r.itemName)}</td>
                        <td class="col-sample">${escapeHtml(r.sampleDetails)}</td>
                        <td>${escapeHtml(r.design)}</td>
                        <td class="right">${(r.estUnitWt || 0).toFixed(3)}</td>
                        <td class="right">${(r.estTotalWt || 0).toFixed(3)}</td>
                        <td style="font-weight:bold; color:#00508c !important;">${escapeHtml(r.jobworkerName)}</td>
                        <td>${formatDate(r.assignedDate)}</td>
                        <td>${escapeHtml(r.orderNo)}</td>
                        <td>${escapeHtml(r.customerName)}</td>`;
                    tbody.appendChild(tr);
                });

                if (footer) footer.textContent = `${items.length} item(s) in process`;
                ipFilterTable();
                ipUpdateUI();
            } catch (e) {
                console.error('Error loading process items:', e);
                tbody.innerHTML = `<tr><td colspan="12" class="empty-state">Error loading data.</td></tr>`;
                if (footer) footer.textContent = 'Error';
            }
        }

        function ipFilterTable() {
            if (!tbody || !tbody.querySelector('tr[data-search]')) return;
            const searchEl = document.getElementById('searchBox');
            const query = (searchEl ? searchEl.value : '').toLowerCase().trim();
            tbody.querySelectorAll('tr[data-search]').forEach(tr => {
                tr.style.display = (!query || tr.dataset.search.includes(query)) ? '' : 'none';
            });
            ipUpdateUI();
        }

        /* ── MARK READY MODAL ── */
        function openMarkReadyModal() {
            const checked = [...document.querySelectorAll('.ip-row-cb:not(:disabled):checked')];
            if (checked.length === 0) {
                showIpToast('⚠️ Please select at least one item first');
                return;
            }

            // Group by orderId to show what orders will be affected
            const orderMap = {};
            checked.forEach(cb => {
                const oid = cb.dataset.orderId;
                const tr = cb.closest('tr');
                if (!orderMap[oid]) {
                    const tds = tr.querySelectorAll('td');
                    orderMap[oid] = {
                        orderId: oid,
                        orderNo: tds[10] ? tds[10].textContent.trim() : oid,
                        customer: tds[11] ? tds[11].textContent.trim() : '—',
                        items: []
                    };
                }
                const tds = tr.querySelectorAll('td');
                orderMap[oid].items.push(tds[3] ? tds[3].textContent.trim() : '—');
            });

            const orders = Object.values(orderMap);
            const itemCount = checked.length;
            const orderCount = orders.length;

            document.getElementById('modalSubtitle').textContent =
                `${itemCount} item${itemCount > 1 ? 's' : ''} from ${orderCount} order${orderCount > 1 ? 's' : ''} will be marked as Ready.`;
            document.getElementById('modalInfo').textContent =
                `✅ These orders will move to the Ready Orders section.`;

            const list = document.getElementById('modalItemList');
            list.innerHTML = orders.map(o => `
                <div class="modal-item-row">
                    <span class="modal-item-order">${escapeHtml(o.orderNo)}</span>
                    <span style="color:#6b7a95;">| ${escapeHtml(o.customer)}</span>
                    <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#374151;">${escapeHtml(o.items.join(', '))}</span>
                </div>`).join('');

            document.getElementById('markReadyModal').classList.add('open');
        }

        function closeMarkReadyModal() {
            document.getElementById('markReadyModal').classList.remove('open');
        }

        /* ── CONFIRM MARK READY ── */
        function confirmMarkReady() {
            const checked = [...document.querySelectorAll('.ip-row-cb:not(:disabled):checked')];
            if (checked.length === 0) { closeMarkReadyModal(); return; }

            const btn = document.getElementById('confirmReadyBtn');
            btn.disabled = true;
            btn.textContent = 'Saving…';

            setTimeout(() => {
                try {
                    const orders = JSON.parse(localStorage.getItem('orders') || '[]');
                    const itemProcess = JSON.parse(localStorage.getItem('itemProcess') || '[]');
                    const now = new Date().toISOString();

                    // Collect unique order IDs from selected items
                    const affectedOrderIds = new Set();
                    checked.forEach(cb => affectedOrderIds.add(String(cb.dataset.orderId)));

                    // Mark each selected item process entry as READY
                    checked.forEach(cb => {
                        const pid = String(cb.dataset.processId);
                        const entry = itemProcess.find(e => String(e.id) === pid);
                        if (entry) {
                            entry.status = 'READY';
                            entry.readyDate = now;
                        }
                    });

                    // Mark the corresponding orders as READY in localStorage
                    affectedOrderIds.forEach(oid => {
                        const order = orders.find(o => String(o.id) === oid);
                        if (order) {
                            order.status = 'READY';
                            order.readyDate = now;
                        }
                    });

                    localStorage.setItem('orders', JSON.stringify(orders));
                    localStorage.setItem('itemProcess', JSON.stringify(itemProcess));

                    closeMarkReadyModal();

                    const count = checked.length;
                    const oCount = affectedOrderIds.size;
                    showIpToast(`✅ ${count} item${count > 1 ? 's' : ''} marked Ready — ${oCount} order${oCount > 1 ? 's' : ''} moved to Ready Orders`);

                    // Reload table
                    tbody = null;
                    loadProcessItems();

                    // Dispatch events so other pages can refresh
                    try { window.dispatchEvent(new Event('storage')); } catch (e) { }
                    try { window.dispatchEvent(new CustomEvent('orderStatusChanged', { detail: { status: 'READY' } })); } catch (e) { }

                    // Offer to open Ready Orders
                    setTimeout(() => {
                        if (confirm(`${oCount} order${oCount > 1 ? 's' : ''} moved to Ready Orders. Open Ready Orders now?`)) {
                            if (typeof loadPage === 'function') {
                                loadPage('pages/ready-orders.html');
                            } else if (typeof window.loadPage === 'function') {
                                window.loadPage('pages/ready-orders.html');
                            } else {
                                window.open('pages/ready-orders.html', '_blank');
                            }
                        }
                    }, 400);

                } catch (err) {
                    console.error('Mark Ready error:', err);
                    showIpToast('❌ Failed to mark ready. Please try again.');
                    btn.disabled = false;
                    btn.textContent = '✅ Confirm — Mark Ready';
                }
            }, 400);
        }

        /* ── INIT ── */
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => setTimeout(loadProcessItems, 50));
        } else {
            setTimeout(loadProcessItems, 50);
        }

        window.addEventListener('storage', e => {
            if (e.key === 'itemProcess') { tbody = null; loadProcessItems(); }
        });
        window.addEventListener('pageRefresh', () => { tbody = null; setTimeout(loadProcessItems, 150); });

        // Close modal on overlay click
        document.getElementById('markReadyModal').addEventListener('click', function (e) {
            if (e.target === this) closeMarkReadyModal();
        });

        /* Expose all functions to window (required when loaded via dashboard loadPage IIFE wrapper) */
        window.loadProcessItems = loadProcessItems;
        window.ipFilterTable = ipFilterTable;
        window.ipToggleAll = ipToggleAll;
        window.ipOnCbChange = ipOnCbChange;
        window.openMarkReadyModal = openMarkReadyModal;
        window.closeMarkReadyModal = closeMarkReadyModal;
        window.confirmMarkReady = confirmMarkReady;
    </script>
</body>

</html>
